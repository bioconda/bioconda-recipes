{% set name = "orographer" %}
{% set version = "0.1.0" %}
{% set shasum = "2599cbad345c09ee1a2be07137c13e191f407aa8229815a6b0db641798085631" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/PacificBiosciences/Orographer/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ shasum }}

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir

requirements:
  host:
    - pip
    - python >=3.10
    - hatchling
  run:
    - python >=3.10
    - bokeh >=3.0
    - intervaltree >=3.1
    - pysam >=0.23

test:
  imports:
    - orographer
  commands:
    - orographer --version
    - orographer --help

about:
  home: https://github.com/PacificBiosciences/Orographer
  dev_url: https://github.com/PacificBiosciences/Orographer
  doc_url: https://github.com/PacificBiosciences/Orographer/blob/main/docs/user_guide.md
  license: Pacific Biosciences Software License Agreement
  license_family: PROPRIETARY
  license_file: LICENSE.md
  summary: Command line tool for visualizing alignments from BAM files.
  description: |
    Orographer reads a BAM file and one or more genomic regions, then generates
    interactive Bokeh-based HTML plots for reviewing alignments. It supports optional
    GTF/GFF3 gene tracks and VCF variant overlay.

extra:
  recipe-maintainers:
    - jbelyeu

