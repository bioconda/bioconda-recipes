{% set version = "0.8.2" %}
{% set name = "lorikeet-genome" %}
{% set sha256 = "125fb87f7aa586aa92183ed2c11721477d0b2ba2481f80a1e047ab581e3ff50b" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rhysnewell/lorikeet/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 2
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cargo-bundle-licenses
    - pkg-config
    - make
    - cmake
    - clangdev
    - python ==3.10
  host:
    - zlib
    - blis
    - libblas
    - openblas
    - openssl
  run:
    - samtools >=1.9
    - coreutils
    - python ==3.10
    - prodigal
    - minimap2 >=2.24
    - bwa >=0.7.17
    - bwa-mem2
    - numpy
    - scikit-allel >=1.3.6
    - svim
    - bcftools
    - polars >=0.18
    - scipy >=1.11

test:
  commands:
    - lorikeet --version | grep '{{ version }}'

about:
  home: "https://github.com/rhysnewell/Lorikeet"
  doc_url: "https://rhysnewell.github.io/Lorikeet"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Metagenomic Variant Calling & Diversity Analysis"
  description: Lorikeet aims to call variants in metagenomes using local reassembly of haplotypes.
  dev_url: "https://github.com/rhysnewell/Lorikeet"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.5281/zenodo.10275468
  skip-lints:
    - compiler_needs_stdlib_c
