{% set version='0.4.2' %}
{% set sha256='488ee2c4b87c064904e2ea1ef24ef833c2f5932aa4c1f03e361e2e4061692baf' %}

package:
  name: badread
  version: {{ version }}

source:
  url: https://github.com/rrwick/Badread/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  
build:
  number: 0
  noarch: python
  entry_points:
    - badread = badread.__main__:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('badread', max_pin="x.x") }}

requirements:
  host:
    - python >=3.6
    - pip
    - setuptools
  run:
    - python >=3.6
    - pip
    - numpy
    - python-edlib
    - matplotlib-base
    - scipy
    
test:
  imports:
    - edlib
    - numpy
    - scipy
    - matplotlib
  commands:
    - badread -h

about:
  home: "https://github.com/rrwick/Badread"
  license: "GPL-3.0-or-later"
  summary: "A long read simulator that can imitate many types of read problems."
  license_family: GPL3
  license_file: LICENSE
