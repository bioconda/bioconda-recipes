{% set name = "cellprofiler-core" %}
{% set version = "4.2.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/cellprofiler_core-{{ version }}.tar.gz
  sha256: ad835474f0a30f7945d8399bec79ca8a417f0d78db1943319950d7269bfca96c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools
  run:
    - boto3 >=1.12.28
    - centrosome >=1.2.3,<1.3
    - docutils ==0.15.2
    - h5py >=3.6.0,<3.7.dev0
    - matplotlib-base >=3.1.3
    - numpy >=1.18.2
    - prokaryote ==2.4.4
    - psutil >=5.7.0
    - python >=3.8
    - python-bioformats ==4.0.7
    - python-javabridge ==4.0.3
    - pyzmq >=22.3,<23.dev0
    - scikit-image ==0.18.3
    - scipy >=1.4.1

test:
  imports:
    - cellprofiler_core
    - cellprofiler_core.analysis

about:
  home: "https://github.com/CellProfiler/core"
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: "Dependency for CellProfiler v4."
  dev_url: "https://github.com/CellProfiler/core"
  doc_url: "https://github.com/CellProfiler/CellProfiler/wiki"

extra:
  recipe-maintainers:
    - raivivek
