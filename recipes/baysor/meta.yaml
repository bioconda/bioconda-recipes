{% set name = "baysor" %}
{% set version = "0.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/kharchenkolab/Baysor/releases/download/v{{ version }}/baysor-x86_x64-linux-v{{ version }}_build.zip
  sha256: f37f02695a068fd360ade7abd0f91b07c5199a3cce6e91ded550689459fbe5c0

build:
  number: 0
  skip: True  # [not linux]
  platforms:
    - linux-64
  run_exports:
    - {{ pin_subpackage('baysor', max_pin="x") }}

requirements:
  run:
    - libgcc-ng >=10

test:
  commands:
    - baysor --version

about:
  home: https://github.com/kharchenkolab/Baysor
  license: MIT
  license_family: MIT
  summary: 'Bayesian segmentation of imaging-based spatial transcriptomics data'
  description: |
    Baysor is a tool for performing cell segmentation on imaging-based 
    spatial transcriptomics data. It optimizes segmentation considering 
    the likelihood of transcriptional composition, size and shape of the cell.
  doc_url: https://kharchenkolab.github.io/Baysor/
  dev_url: https://github.com/kharchenkolab/Baysor

extra:
  notes: This package installs the precompiled Julia binary for Linux x86_64.
  skip-lints:
    - should_be_noarch_generic
