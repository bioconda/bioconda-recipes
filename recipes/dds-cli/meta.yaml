{% set version = "2.14.2" %}

package:
  name: dds-cli
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/d/dds-cli/dds_cli-{{ version }}.tar.gz
  sha256: fcf017a232e3008fa4b735990e5ecc4339c24b2f01bdf88cc58a43a1d2ed49ef

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.10
    - pip
  run:
    - python >=3.10
    - boto3 ==1.24.73
    - botocore ==1.27.73
    - click ==8.1.3
    - cryptography ==46.0.6
    - immutabledict ==2.2.1
    - jwcrypto ==1.5.6
    - prettytable ==3.7.0
    - prompt-toolkit ==3.0.40
    - pynacl ==1.6.2
    - pytz ==2026.1.post1
    - pyyaml ==6.0.2
    - questionary ==2.1.1
    - requests ==2.33.0
    - rich ==14.3.3
    - rich-click ==1.5.2
    - simplejson ==3.17.6
    - tzlocal ==4.2
    - zstandard ==0.23.0
    - legacy-cgi ==2.6.1

test:
  imports:
    - dds_cli
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/ScilifelabDataCentre/dds_cli
  summary: A command line tool to manage data and projects in the SciLifeLab Data Delivery System.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mashehu
