{% set version = "0.1.4" %}

package:
  name: alpaqa-bio
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/a/alpaqa-bio/alpaqa_bio-{{ version }}.tar.gz
  sha256: d2bccb4db18e66c7ce61b6e65694aab506a1de656394519c5230e2fd4b1fccc6

build:
  entry_points:
    - alpaqa = alpaqa.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - hatchling >=1.20
    - pip
    - scipy >=1.10.0
  run:
    - python >=3.9
    - scipy >=1.10.0

test:
  imports:
    - alpaqa
  commands:
    - pip check
    - alpaqa --help
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/alpaqa-bio/
  summary: a quality control tool for bacterial ONT-only assemblies
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - MBiggel
