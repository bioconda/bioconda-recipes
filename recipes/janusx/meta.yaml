{% set version = "1.0.20" %}

package:
  name: janusx
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz
  sha256: 98c8a4aa57657a78e6550d08ec8c3f362d6e80cac40ff951aaed902a1a67326c

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps"

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
  host:
    - python
    - pip
    - maturin >=1.7,<2
    - setuptools
  run:
    - python >=3.9
    - numpy
    - scipy
    - pandas <3.0
    - matplotlib-base
    - psutil
    - rich
    - tqdm
    - rich-argparse
    - joblib >=1.5

test:
  imports:
    - janusx
  commands:
    - jxpy -h

about:
  home: https://github.com/FJingxian/JanusX
  summary: A suite of genotyping tools for genome-wide association study and genomic selection
  license: AGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - FJingxian
