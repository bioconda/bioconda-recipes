{% set version = "1.0.16" %}

package:
  name: janusx
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz
  sha256: e09d6325f0ab685e941f93da5e3bc69b8b0cdfec4bb039dcf925a43c209c1f14\nmd5=2e19b8eb6ba5e98b3a49aa0aa01eddf2\n
  md5: 

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps"

requirements:
  host:
    - python
    - pip
    - maturin >=1.7,<2
    - setuptools
  run:
    - python
    - numpy
    - scipy
    - pandas <3.0
    - matplotlib
    - psutil
    - rich
    - tqdm
    - rich-argparse
    - joblib >=1.5

test:
  imports:
    - janusx
  commands:
    - jxpy -h

about:
  home: https://github.com/FJingxian/JanusX
  summary: A suite of genotyping tools for genome-wide association study and genomic selection
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - FJingxian
