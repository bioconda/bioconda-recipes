{% set version = "1.0.21" %}

package:
  name: janusx
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/j/janusx/janusx-{{ version }}.tar.gz
  sha256: 28791ee42ee4de741bd0190931d3ca96a8c99c23948f4b60c833695e05b9a824

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps"
  run_exports:
    - {{ pin_subpackage('janusx', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
  host:
    - python
    - pip
    - maturin >=1.7,<2
    - setuptools
  run:
    - python >=3.9
    - numpy
    - scipy
    - pandas <3.0
    - matplotlib-base
    - psutil
    - rich
    - tqdm
    - rich-argparse
    - joblib >=1.5

test:
  imports:
    - janusx
  commands:
    - jxpy -h

about:
  home: https://github.com/FJingxian/JanusX
  summary: A suite of genotyping tools for genome-wide association study and genomic selection
  license: AGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - FJingxian
