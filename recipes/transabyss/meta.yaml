{% set version = "2.0.1" %}

package:
  name: transabyss
  version: {{ version }}

source:
  url: https://github.com/BirolLab/transabyss/releases/download/{{ version }}/transabyss-{{ version }}.zip
  sha256: 542779af2d1232ca872a57b922cfd32e1c6e9e7e0b5fae56ef2e7682dfdf6040
  patches:
    - transabyss.patch
    - transabyss-merge.patch

build:
  noarch: python
  number: 8
  run_exports:
    - {{ pin_subpackage("transabyss", max_pin="x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - abyss 2.0.*
    # This recipe pins python-igraph to an old version for which builds lack to
    # define their icu dependency => we include icu 58.* here then...
    - icu 58.*
    - python-igraph 0.7.*
    - samtools
    - blat
    - python
    - setuptools

test:
  commands:
    - transabyss --help
    - transabyss-merge --help

about:
  home: https://github.com/BirolLab/transabyss
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'de novo assembly of RNA-Seq data using ABySS'
