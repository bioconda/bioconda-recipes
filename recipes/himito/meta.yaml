{% set name = "himito" %}
{% set version = "alpha" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/broadinstitute/Himito/releases/download/{{ version }}/Himito
  sha256: 98abfb5885935e383af7cc0df23a31089e672aa3d85a8c1494628b21f7c5696b

build:
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    
test:
  commands:
    - himito --help

about:
  home: https://github.com/broadinstitute/Himito
  summary: 'Mitochondrial variant caller for long reads'
  description: |
    Building Mitochondrial anchor-based graphical genome from long reads. 
    Filter Numts reads, assemble major haplotypes, call homoplasmic and heteroplasmic variants, 
    analyze methylation signals
  license: MIT
  license_url: https://github.com/broadinstitute/Himito/blob/main/LICENSE
  documentation: https://github.com/broadinstitute/Himito/blob/main/docs/User_guide.md
  repository: https://github.com/broadinstitute/Himito

extra:
  recipe-maintainers:
    - eliottBo
  additional-platforms:
    - linux-aarch64
    - osx-arm64