{% set version = "0.1.0" %}
{% set sha256 = "1360be49395cb47f962cc267a936f1f6833f0581c53286004e6871f14903e59e" %}

package:
  name: repdenovo
  version: {{ version }}

source:
  url: https://github.com/simoncchu/REPdenovo/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
    - 0001-Makefiles.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('repdenovo', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - zlib
    - bamtools
  run:
    - python
    - bwa
    - kmer-jellyfish
    - velvet
    - bamtools

test:
  commands:
    - TERefiner_1

about:
  home: "https://github.com/Reedwarbler/REPdenovo"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "REPdenovo is designed for constructing repeats directly from sequence reads."
  dev_url: "https://github.com/Reedwarbler/REPdenovo"
  doc_url: "https://github.com/simoncchu/REPdenovo/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1371/journal.pone.0150719
    - biotools:repdenovo
