{% set name = "itsxrust" %}
{% set version = "0.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ayobi/ITSxRust/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 3e17ba8a5859acad18e3c13ef038c5e02caa0d9986eb12f19690c862608e51cf

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  host: []
  run:
    - hmmer

test:
  commands:
    - itsxrust --help
    - itsxrust extract --help

about:
  summary: "ITSxRust is a tool for extracting ITS regions from DNA sequences."
  home: https://github.com/ayobi/ITSxRust
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - ayobi

