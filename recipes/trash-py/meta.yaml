{% set name = "trash-py" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mbeavitt/trash-py/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4a939e4121474e78d439b5d93f2dba95297327564302e482441bd852db69e510

build:
  number: 1
  skip: True  # [py < 311]
  entry_points:
    - trash-py = trash_py.cli:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python >=3.11
    - pip
    - setuptools >=68
  run:
    - python >=3.11
    - biopython >=1.83
    - numpy >=1.26
    - rapidfuzz >=3.6
    - hmmer
    - clustalo

test:
  imports:
    - trash_py
    - trash_py._ext
  commands:
    - trash-py --help

about:
  home: "https://github.com/mbeavitt/trash-py"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tandem-repeat array identifier — Python port of TRASH."
  description: |
    trash-py is a Python re-implementation of the TRASH program (Tandem
    Repeat Annotation and Structural Hierarchy) originally written in R by
    Piotr Włodzimierz. It identifies tandem repeat arrays in genome
    assemblies and exposes a library of reusable repeat-annotation
    primitives in addition to the drag-and-drop CLI replacement for the
    upstream pipeline. Performance-critical routines are implemented as a
    C extension.
  dev_url: "https://github.com/mbeavitt/trash-py"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/btad308
  recipe-maintainers:
    - mbeavitt
