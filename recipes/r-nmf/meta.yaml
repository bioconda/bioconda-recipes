{% set version = "0.22.0" %}

package:
  name: r-nmf
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/NMF_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/NMF/NMF_{{ version }}.tar.gz
  sha256: 989d024bdf5379130406d7f679f690fd5b228cf6f729584855364f1bfad0542c
  patches:
    - patches/0001-support-strict-r-headers.patch

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports:
    - {{ pin_subpackage('r-nmf', max_pin="x.x") }}
  patches:
    - patches/0001-support-strict-r-headers.patch

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - make
  host:
    - r-base
    - bioconductor-biobase
    - r-biocmanager
    - r-rcolorbrewer
    - r-cluster
    - r-colorspace
    - r-digest
    - r-doparallel
    - r-foreach
    - r-ggplot2
    - r-gridbase
    - r-pkgmaker >=0.20
    - r-registry
    - r-reshape2
    - r-rngtools >=1.2.3
    - r-stringr >=1.0.0
  run:
    - r-base
    - bioconductor-biobase
    - r-biocmanager
    - r-rcolorbrewer
    - r-cluster
    - r-colorspace
    - r-digest
    - r-doparallel
    - r-foreach
    - r-ggplot2
    - r-gridbase
    - r-pkgmaker >=0.20
    - r-registry
    - r-reshape2
    - r-rngtools >=1.2.3
    - r-stringr >=1.0.0

test:
  commands:
    - $R -e "library('NMF')"

about:
  home: http://renozao.github.io/NMF
  license: GPL-2.0-or-later
  summary: Framework to perform Non-negative Matrix Factorization (NMF).
  description: The package implements a set of already published algorithms and
    seeding methods, and provides a framework to test, develop and plug
    new/custom algorithms. Most of the built-in algorithms have been optimized
    in C++, and the main interface function provides an easy way of performing
    parallel computations on multicore machines.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  skip-lints:
    - in_other_channels # was on conda-forge, migrated here for newer versions with bioconductor dependency
    - version_constraints_missing_whitespace  # TODO: remove once resolved here: https://github.com/bioconda/bioconda-utils/pull/1044
  recipe-maintainers:
    - johanneskoester
    - bgruening
    - daler
    - jdblischak
    - cbrueffer
    - dbast
    - dlaehnemann