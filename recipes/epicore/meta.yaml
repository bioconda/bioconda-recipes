{% set name = "epicore" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/epicore-{{ version }}.tar.gz
  sha256: 78370bb45d829b8c9beebbf847203688965e8fb24e0e820e0221e1496a248ed1

build:
  entry_points:
    - epicore = epicore_utils.epicore_main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports: 
    - {{ pin_subpackage('epicore', max_pin="x.x") }}

requirements:
  host:
    - python >=3.12
    - setuptools >=61.0
    - pip
  run:
    - python >=3.12
    - biopython >=1.80
    - click >=8.1
    - matplotlib-base >=3.4
    - numpy >=2
    - pandas >=2
    - pyyaml >=6.0.2
    - polars >=1.32.3
    - pyarrow >=22.0.0
    
    - mpld3

test:
  imports:
    - epicore_utils
  commands:
    - epicore --help

about:
  home: https://github.com/AG-Walz/epicore
  summary: "Compute core epitopes from multiple overlapping peptides."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/AG-Walz/epicore

extra:
  recipe-maintainers:
    - janaHoffmann1
