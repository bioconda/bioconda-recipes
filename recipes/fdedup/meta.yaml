{% set name = "fdedup" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/RaphaelRibes/FastDedup/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 31d577899ab1b9e8921be2174f6164e2c3200d9a263b9f39d00d110046d06d4c

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
  host:
    - zlib
    - bzip2
    - xz
    - zstd
  run:

test:
  commands:
    - fdedup --help

about:
  home: https://github.com/RaphaelRibes/FastDedup
  license: MIT
  license_file:
    - Licence
    - THIRDPARTY.yml
  summary: "A fast and memory-efficient FASTX PCR deduplication tool"
  dev_url: https://github.com/RaphaelRibes/FastDedup


extra:
  recipe-maintainers:
    - RaphaelRibes
  additional-platforms:
    - linux-aarch64
    - osx-arm64
