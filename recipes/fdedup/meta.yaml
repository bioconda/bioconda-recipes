{% set name = "fdedup" %}
{% set version = "1.2.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/RaphaelRibes/FastDedup/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 250cb02d08c2c99c5420f994fb35f9b3918de908e6c68ec641ec88909e2ca250

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
  host:
    - zlib
    - bzip2
    - xz
    - zstd

test:
  commands:
    - fdedup --help

about:
  home: "https://github.com/RaphaelRibes/FastDedup"
  license: MIT
  license_family: MIT
  license_file:
    - Licence
    - THIRDPARTY.yml
  summary: "A fast and memory-efficient FASTX PCR deduplication tool."
  dev_url: "https://github.com/RaphaelRibes/FastDedup"

extra:
  recipe-maintainers:
    - RaphaelRibes
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
