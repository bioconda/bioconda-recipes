{% set name = "fdedup" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/RaphaelRibes/FastDedup/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4ec2091d7c97d1ae2c5f68d9157619f763f81e52029d070b6934f0de63ed3da9

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
  host:
  run:

test:
  commands:
    - fdedup --help

about:
  home: https://github.com/RaphaelRibes/FastDedup
  license: MIT
  license_file:
    - Licence
    - THIRDPARTY.yml
  summary: "A fast and memory-efficient FASTX PCR deduplication tool"
  dev_url: https://github.com/RaphaelRibes/FastDedup


additional-platforms:
  - linux-aarch64
  - osx-arm64

extra:
  recipe-maintainers:
    - RaphaelRibes
