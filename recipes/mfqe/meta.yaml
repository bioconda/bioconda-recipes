{% set version = "0.5.0" %}
{% set name = "mfqe" %}
{% set sha256 = "dbbafb84e2b40f319735fd9c61b6c60401e311d2dd23fad6e5669f66e0610abf" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wwood/{{ name }}/archive/v{{version}}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 6
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - cargo-bundle-licenses
    - pkg-config

test:
  commands:
    - mfqe --help

about:
  home: "https://github.com/wwood/mfqe"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.txt"
  summary: "mfqe is a tool for quickly seperating fasta and fastq files."
  dev_url: "https://github.com/wwood/mfqe"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
