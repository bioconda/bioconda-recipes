{% set name = "rmats-long" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/r/rmats-long/rmats_long-{{ version }}.tar.gz
  sha256: 5c1212400536f553e482db7e5242cff7a029a50d278065123eacc3f2f98e3fad

build:
  skip: true  # [py<311]
  entry_points:
    - rmats-long = rmats_long.command_line_interface:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

# Was getting an error about python_abi =3.14 *_cp314t conflicting with
# matplotlib-base requiring python_abi =3.14 *_cp314
# Seems related to: https://github.com/conda/conda-build/issues/5843
# Using a fix like: https://github.com/3MAH/simcoon/pull/76
# But since {{ python }} is a value like 3.14.* *_cpython instead of just 3.14
# py_major and py_minor are used here instead
{% set py_major = py // 100 %}
{% set py_minor = py % 100 %}

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python >=3.11
    - python_abi {{ py_major }}.{{ py_minor }} *_cp{{ py_major }}{{ py_minor }}
    - setuptools >=80.0.0
    - cython >=3.2.0
    - pip
  run:
    - python >=3.11
    - bioconductor-biocparallel
    - bioconductor-drimseq
    - matplotlib-base >=3.7
    - networkx >=2.8
    - numpy >=1.24
    - pandas >=2
    - pydot >=3
    - r-base
    - r-cowplot
    - r-ggplot2
    - r-ggrepel
    - r-ggvenndiagram
    - r-mclogit
    - r-this.path
    - rpy2 >=3.5
    - samtools
    - threadpoolctl >=3.6
    # Specifying the r-stringi version so that the conda-forge version
    # of r-stringi is used along with a compatible icu version:
    # https://github.com/mamba-org/boa/issues/115
    - r-stringi >=1.7.8

test:
  imports:
    - rmats_long
  commands:
    - pip check
    - rmats-long --help > /dev/null
  requires:
    - pip
    - python

about:
  home: https://github.com/Xinglab/rMATS-long
  license: Free for non-commercial use, see LICENSE file
  summary: Differential isoform analysis using long-read RNA-seq data
  license_file: LICENSE
