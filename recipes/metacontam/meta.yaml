{% set name = "metacontam" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Lifemining-lab/Metacontam/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9f2095a9c46f16cfb75d8952191bc94e338d676f8684be2306afab5620a8b799

build:
  number: 1
  noarch: generic
  script: {{ PYTHON }} -m pip install . --no-deps
  run_exports:
    - {{ pin_subpackage('metacontam', max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - pandas >=2.0.3
    - numpy >=1.25.2
    - networkx >=3.1
    - biopython >=1.74
    - matplotlib-base >=3.8.2
    - kraken2 >=2.1.3
    - bracken >=2.8
    - bowtie2 >=2.5
    - samtools >=1.10
    - mash >=2.1
    - r-netcomi >=1.1.0

test:
  commands:
    - metacontam --help

about:
  home: https://github.com/Lifemining-lab/Metacontam
  summary: Contamination detection tool for metagenomic sequencing data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - iamjunwoojo
