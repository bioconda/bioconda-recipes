{% set version = "1.2.3" %}

package:
  name: decodiphy
  version: {{ version }}

source:
  url: https://github.com/shayesteh99/DecoDiPhy/archive/v{{ version }}.tar.gz
  sha256: 68efaca54946044d3c73631eeebc3fc5c1cb97be76b244889f2e7542843583b5

build:
  number: 0
  noarch: python
  entry_points:
    - decodiphy = decodiphy.__main__:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('decodiphy', max_pin="x") }}

requirements:
  host:
    - python >=3.8,<3.13
    - pip
    - setuptools >=42
  run:
    - python >=3.8,<3.13
    - numpy >=1.24,<2.0
    - cvxpy >=1.2,<2.0
    - treeswift >=1.1.0,<2.0

test:
  imports:
    - decodiphy
  commands:
    - decodiphy --help

about:
  home: "https://github.com/shayesteh99/DecoDiPhy"
  license: MIT
  license_file: LICENSE
  summary: "DecoDiPhy: a Python tool for consolidating millions of sequence reads into few accurate phylogenetic placements."
  dev_url: "https://github.com/shayesteh99/DecoDiPhy"

extra:
  recipe-maintainers:
    - shayesteh99
