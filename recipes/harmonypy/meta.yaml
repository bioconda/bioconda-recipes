{% set name = "harmonypy" %}
{% set version = "2.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: "98c18954781aec9a82aaec3cde3764d89fd2ef93e84ece6724bc0f25b37244ed"

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ stdlib("c") }}
    - cmake >=3.15
    - make
    - ninja
  host:
    - pip
    - python >=3.9
    - armadillo
    - scikit-build-core >=0.10
    - nanobind >=2.0
    - libopenblas
  run:
    - numpy
    - pandas
    - python >=3.9
    - scipy
    - scikit-learn
    - pytorch
    - libopenblas

test:
  imports:
    - harmonypy

about:
  home: "https://github.com/slowkow/harmonypy"
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: "A data integration algorithm."
  dev_url: "https://github.com/slowkow/harmonypy"
  doc_url: "https://portals.broadinstitute.org/harmony"

extra:
  additional-platforms:
    - linux-aarch64
  recipe-maintainers:
    - pinin4fjords
