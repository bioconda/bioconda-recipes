{% set name = "sqanti3" %}
{% set version = "6.0" %} 

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ConesaLab/SQANTI3/archive/refs/tags/v6.0.tar.gz
  sha256: 7703da9acca51150d4e1ab9def8bf1cd37e507a760a9a5259b9cd9b8be1fd3fa

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run:
    # Core Python
    - python >=3.10,<3.11
    - pyyaml 6.0.3
    
    # Core scientific computing
    - numpy >=1.26,<2.0
    - scipy >=1.11,<1.12
    - pandas >=2.2,<2.3
    - scikit-learn >=1.5,<1.6
    - seaborn >=0.13,<0.14
    
    # Core Python utilities
    - argcomplete >=3.4
    - jinja2 >=3.1
    - psutil >=6.1

    # Bioinformatics tools
    - bcbio-gff >=0.7
    - bedtools >=2.31
    - biopython >=1.81,<1.82
    - bx-python >=0.11
    - gffread >=0.12
    - gtftools >=0.9
    - namfinder >=0.1.3
    - pybedtools >=0.10
    - pysam >=0.22,<0.23
    - samtools >=1.21
    - seqtk >=1.4
    
    # Aligners and mappers
    - desalt >=1.5
    - gmap >=2024.11
    - kallisto >=0.48
    - minimap2 >=2.28
    - star ==2.7.11b
    
    # R and Bioconductor
    - r-base >=4.3.3     # Changed from 'r'
    - r-biocmanager >=1.30
    - r-caret >=6.0
    - r-dplyr >=1.1
    - r-dt >=0.33
    - r-devtools >=2.4
    - r-e1071 >=1.7
    - r-forcats >=1.0
    - r-ggplot2 >=3.4.0a
    - r-ggplotify >=0.1
    - r-gridbase >=0.4
    - r-gridextra >=2.3
    - r-htmltools >=0.5
    - r-jsonlite >=1.8
    - r-optparse >=1.7
    - r-plotly >=4.10
    - r-plyr >=1.8
    - r-purrr >=1.0
    - r-randomforest >=4.7
    - r-rmarkdown >=2.29
    - r-reshape >=0.8
    - r-readr >=2.1
    - r-scales >=1.3
    - r-stringi >=1.8
    - r-stringr >=1.5
    - r-tibble >=3.2
    - r-tidyr >=1.3
    
    # Bioconductor packages
    - bioconductor-noiseq >=2.46
    - bioconductor-gviz
    
    # System utilities
    - pandoc >=3.5
    - perl >=5.32,<5.33
    
    # Testing
    - pytest >=7.4,<8.0
    
    # Previously Pip packages (Flattened)
    - ultra_bioinformatics >=0.1
    - argh >=0.31
    - dill >=0.3.9
    - edlib >=1.3.9
    - gffutils >=0.13
    - gtfparse >=2.5
    - importlib-metadata >=8.5
    - intervaltree >=3.1
    - parasail >=1.3
    - pdf2image >=1.17
    - polars >=0.20,<0.21
    - pyarrow >=14.0,<15.0
    - pyfaidx >=0.8
    - simplejson >=3.19
    - sortedcontainers >=2.4
    - zipp >=3.21
    - td2 >=1.0

test:
  source_files:
    - test/
    - pytest.ini
    - src/
  commands:
    - sqanti3 --help
    - sqanti3_qc.py --help
    - sqanti3_filter.py --help
    - sqanti3_rescue.py --help
    - sqanti3_reads.py --help

about:
  home: https://github.com/ConesaLab/SQANTI3
  license: GPL-3.0
  license_file: LICENSE
  summary: "SQANTI3 is a tool for the structural and quality annotation of long-read transcriptomes."
  