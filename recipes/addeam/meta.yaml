{% set name = "addeam" %}
{% set version = "1.0.0" %}
{% set sha256 = "04688556a1b551de111580c35b0185058d077fe336659e4d577111ea74b71e08" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/LouisPwr/AdDeam/releases/download/{{ version }}/AdDeam-v{{ version }}.tar.gz
  sha256: {{ sha256 }}


build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage("addeam", max_pin="x") }}  

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - gxx >=12.0
  host:
    - cython
    - zlib
    - xz
    - curl
    - bzip2
    - gsl
    - htslib
    - samtools
  run:
    - python
    - numpy >=2
    - pandas
    - matplotlib-base
    - scikit-learn
    - scipy
    - opencv
    - pypdf2
    - bottleneck
    - htslib
    - samtools
    - zlib
    - xz
    - curl
    - bzip2
    - gsl
    - libcurl
    - openblas


test:
  commands:
    - addeam-bam2prof.py --help | grep "Python wrapper for bam2prof"
    - addeam-cluster.py --help | grep "Cluster and plot damage profiles."


about:
  home: "https://github.com/LouisPwr/AdDeam"
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: "A Fast and Scalable Tool for Estimating and Clustering Reference-Level Damage Profiles."

extra:
  identifiers:
    - biotools:addeam
  recipe-maintainers:
    - gabriel-renaud
    - louis-kraft
