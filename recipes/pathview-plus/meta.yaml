{% set name = "pathview-plus" %}
{% set version = "2.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/raw-lab/pathview-plus/archive/refs/tags/v{{version}}.tar.gz
  sha256: d0574affcd54bd8ed68f779b972211b5268884b3f8bb6a28d4bbcefcf36c2117

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage({{name}}, max_pin="x") }}

requirements:
  host:
    - pip
    - python >=3.8
    - setuptools
    - wheel
  run:
    - python >=3.8

    - polars >= 0.19.0
    - numpy >= 1.24.0
    - matplotlib >= 3.7.0
    - seaborn >= 0.12.0
    - pyarrow
    - pillow >= 10.0.0
    - networkx >= 3.1
    - requests >= 2.31.0

test:
  imports:
    - pathview
  commands:
    - pathview-cli.py --help

about:
  home: "https://github.com/raw-lab/pathview-plus"
  license: "CC BY-NC 4.0"
  license_family: "OTHER"
  license_file: "LICENSE"
  summary: "Full-featured Python implementation of R pathview + SBGNview with support for KEGG, Reactome, MetaCyc, and more."
  doc_url: "https://github.com/raw-lab/pathview-plus/blob/v{{ version }}/README.md"
  dev_url: "https://github.com/raw-lab/pathview-plus"

extra:
  recipe-maintainers:
    - decrevi
    - raw-lab
