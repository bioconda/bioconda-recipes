{% set name = "isopedia" %}
{% set version = "1.6.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/zhengxinchang/isopedia/releases/download/v{{ version }}/isopedia-v{{ version }}-linux-x86_64.tar.gz
  sha256: f2f81bed3dae9e9bcea95c0196e6769d39d2a3e1a1690fc9090998615fd365b6  

build:
  number: 0
  skip: True  # [osx]
  binary_relocation: False  
  run_exports:
    - {{ pin_subpackage('isopedia', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}  
  host:
    - python >=3.6
    - zlib
    - bzip2
    - xz
    - libdeflate
    - curl
    - openssl
  run:
    - python >=3.6
    - zlib
    - bzip2
    - xz
    - libdeflate
    - curl
    - openssl

test:
  commands:
    - {{ name }} --help
    - {{ name }} --version

about:
  home: https://github.com/zhengxinchang/{{ name }}
  license: MIT  
  license_family: MIT
  license_file: LICENSE
  summary: 'Simultaneous exploration of thousands of long-read transcriptomes by read-level indexing'
  description: |
    Simultaneous exploration of thousands of long-read transcriptomes by read-level indexing
  doc_url: https://github.com/zhengxinchang/{{ name }}
  dev_url: https://github.com/zhengxinchang/{{ name }}

extra:
  recipe-maintainers:
    - zhengxinchang  
  skip-lints:
    - should_be_noarch_generic
