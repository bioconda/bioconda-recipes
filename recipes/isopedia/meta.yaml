{% set name = "isopedia" %}
{% set version = "1.6.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/zhengxinchang/isopedia/archive/refs/tags/v{{ version }}.tar.gz
  sha256: fe828d578e986f4565766856feb3acd2bf70233bba4c75c717c7acab1ff55615

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
    - cmake
    - make
    - clangdev
  host:
    - perl
    - openssl
    - zlib
    - bzip2
    - xz
    - libcurl
  run:
    - python >=3.6

test:
  commands:
    - isopedia --help
    - isopedia --version
    - isopedia-splice-viz.py --help
    - test -f $PREFIX/share/isopedia/isopedia-splice-viz-temp.html
about:
  home: "https://github.com/zhengxinchang/{{ name }}"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY_LICENSES
  summary: 'Simultaneous exploration of thousands of long-read transcriptomes by read-level indexing.'
  description: |
    Simultaneous exploration of thousands of long-read transcriptomes by read-level indexing
  doc_url: "https://github.com/zhengxinchang/{{ name }}"
  dev_url: "https://github.com/zhengxinchang/{{ name }}"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - zhengxinchang
  skip-lints:
    - compiler_needs_stdlib_c
