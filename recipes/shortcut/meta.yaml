{% set name = "ShortCut" %}
{% set version = "2.0" %}
{% set sha256 = "358054768290f82893f9fff952baf09aaa66c3cac031807e4ce73818f61d4616" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Aez35/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  strip_prefix: ShortCut-{{ version }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('shortcut', max_pin="x") }}

requirements:
  host:
    - python >=3.10,<3.13
    - pip
  run:
    - python >=3.10,<3.13
    - pandas
    - plotly
    - cutadapt

test:
  commands:
    - ShortCut --help

about:
  home: https://github.com/Aez35/ShortCut
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'ShortCut Small RNA-seq data trimmer and quality control tool'
