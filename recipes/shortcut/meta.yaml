{% set name = "ShortCut" %}
{% set version = "2.0" %}
{% set sha256 = "dec4f91577acf56714806515df5401b03c3582cd0ccbb1871897ed2e985db968" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Aez35/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  strip_prefix: ShortCut-{{ version }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('shortcut', max_pin="x") }}

requirements:
  host:
    - python >=3.8
  run:
    - python >=3.8
    - pandas
    - plotly
    - cutadapt >=4.8

test:
  commands:
    - ShortCut --help

about:
  home: https://github.com/Aez35/ShortCut
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'ShortCut Small RNA-seq data trimmer and quality control tool'
