{% set name = "stemsage" %}
{% set version = "0.8.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/stemsage-{{ version }}.tar.gz
  sha256: 1d8327109866d131f295580bed977db5e411b4c4a589fc7c44e5013122f7b7b1
  
  # git_url: https://github.com/PrinceWang2018/stemsage
  # git_rev: v{{ version }}

build:
  number: 39_1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  skip_git_info: true
  git_depth: 0 
  entry_points:
    - stemsage = stemsage.main:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy >=1.21.0
    - pandas >=1.3.0
    - scikit-learn >=1.0.0
    - xgboost >=1.5.0
    - matplotlib-base >=3.5.0
    - seaborn >=0.11.0
    - biopython >=1.79
    - scipy >=1.7.0
    - statsmodels >=0.13.0
    - tqdm >=4.62.0
    - joblib >=1.1.0
    - python-levenshtein >=0.20.0
    - jinja2 >=3.0.0
    - logomaker >=0.8
    - viennarna >=2.7.2
    - cairosvg >=2.7.1
    - cairo
    - pango

test:
  imports:
    - stemsage
    - stemsage.steps
  commands:
    - stemsage --help
  requires:
    - pip

about:
  home: https://github.com/PrinceWang2018/stemsage
  summary: "Uncovering Stem-loop Motifs from RBP Binding Regions"
  license: GPL-3.0
  license_file: LICENSE
  description: |
    Stemage is a tool for uncovering stem-loop motifs from RBP binding regions.
  dev_url: https://github.com/PrinceWang2018/stemsage

extra:
  recipe-maintainers:
    - PrinceWang2018
