{% set version = '0.4.0' %}
{% set github_user = 'Ararder' %}
{% set github_repo = 'ldsR' %}
{% set github_commit = '8ced044' %}

package:
  name: r-ldsr
  version: {{ version }}

source:
  url: https://github.com/{{ github_user }}/{{ github_repo }}/archive/{{ github_commit }}.tar.gz
  sha256: 0ba9f2d03fa31d42fc75661d8295893aa789fb0b9e4fd11c72654ec2e0c04251

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('r-ldsr', max_pin="x.x") }}
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-arrow
    - r-cli
    - r-dplyr
    - r-fs
    - r-purrr
    - r-rlang >=1.1.0
    - r-tidyr
  run:
    - r-base
    - r-arrow
    - r-cli
    - r-dplyr
    - r-fs
    - r-purrr
    - r-rlang >=1.1.0
    - r-tidyr

test:
  commands:
    - $R -e "library('ldsR')"

about:
  home: https://ararder.github.io/ldsR/
  license: MIT
  license_file: LICENSE
  summary: 'An R implementation of LDscore regression (LDSC)'
  description: |
    An implementation of the classical LDscore regression software in R.
    The package supports estimating heritability and partitioned heritability.
  dev_url: https://github.com/Ararder/ldsR

extra:
  recipe-maintainers:
    - lyh970817
