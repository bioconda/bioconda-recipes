{% set name = "snakemake-logger-plugin-prometheus" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/snakemake_logger_plugin_prometheus-{{ version }}.tar.gz
  sha256: b6951c402ae02443902ce7480dd12fa2bc6fba8ea4396a27bc356345cc649814

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  host:
    - python >=3.11,<4.0
    - hatchling
    - pip
  run:
    - python >=3.11,<4.0
    - snakemake-interface-logger-plugins >=2.0.0,<3.0.0
    - requests >=2.31

test:
  imports:
    - snakemake_logger_plugin_prometheus

about:
  home: "https://github.com/tedil/snakemake-logger-plugin-prometheus"
  summary: "A Snakemake logger plugin that exposes workflow metrics via a Prometheus-compatible HTTP endpoint."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/tedil/snakemake-logger-plugin-prometheus"

extra:
  recipe-maintainers:
    - tedil
    - fgvieira
