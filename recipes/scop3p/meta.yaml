{% set name = "scop3p" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: bdbab752bd1a02590941f364742f7a19f8fcfb7bc1fcd6726d6e807aa2baae95

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python >=3.6
    - pip
    - setuptools >=61
  run:
    - python >=3.6
    - requests >=2.0

test:
  imports:
    - scop3p_api_client
  commands:
    - scop3p --help
    - scop3p --version
    - pip check
  requires:
    - pip

about:
  home: https://iomics.ugent.be/scop3p/
  license: Apache-2.0
  license_file: LICENSE
  summary: The official Scop3P REST API Python client
  description: |
    Scop3P provides a unique and powerful resource to explore and understand the
    impact of phospho-sites on human protein structure and function,
    and can thus serve as a springboard for researchers seeking to analyse and,
    interpret a given phospho-site or phosphoprotein in a structural, biophysical,
    and biological context.
  doc_url: https://iomics.ugent.be/scop3p/documentation
  dev_url: https://github.com/Bio2Byte/scop3p-api-client

extra:
  recipe-maintainers:
    - Pathmanaban
    - dunecatnat
    - agdiaz
  identifiers:
    - doi:10.5281/zenodo.18909477
    - doi:10.1021/acs.jproteome.0c00306
