{% set name = "priorcons" %}
{% set version = "0.1.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/p/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c75580bb09ab44a35fd8bf634c24f59731624aca41b69f4eda5e49e54d56f27a


build:
  noarch: python
  number: 0
  script: python -m pip install . --no-deps -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.8
    - numpy
    - pandas
    - biopython
    - pyarrow

test:
  commands:
    - priorcons --help
  imports:
    - priorcons

about:
  home: https://github.com/GERMAN00VP/priorcons
  license: APL-1.0
  license_file: LICENSE
  summary: Prior-guided integration tool that improves viral consensus sequences by filling masked regions using candidate sequences validated against evolutionary priors.
  author: Germán Vallejo Palma
  maintainer: Germán Vallejo Palma

extra:
  recipe-maintainers:
    - GERMAN00VP
