{% set version = "1.0.5" %}

package:
  name: humid
  version: {{ version }}

source:
  url: https://github.com/jfjlaros/HUMID/releases/download/v{{ version }}/humid-v{{ version }}.tar.gz
  sha256: a0d5201c00cc99aae476314f7240644d55c52f327312d4021a4d1e7f3f98a1b8

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('humid', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - isa-l
    - libdeflate
  run:
    - isa-l

test:
  commands:
    - humid > /dev/null

about:
  home: "https://github.com/jfjlaros/HUMID"
  license: MIT
  license_family: MIT
  summary: "HUMID -- High-performance UMI Deduplicator"
  doc_url: "https://humid.readthedocs.io/en/latest/usage.html"
  dev_url: "https://github.com/jfjlaros/HUMID"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
