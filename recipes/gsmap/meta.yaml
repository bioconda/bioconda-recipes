{% set name = "gsmap" %}
{% set version = "1.73.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/gsMap/{{ name }}-{{ version }}.tar.gz"
  sha256: 4d1bd7893d4afc616ae8e0d784c0a23615ecb90b999d059effaa931da98f3d1d

build:
  noarch: python
  number: 0
  entry_points:
    - gsmap = gsMap.main:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - flit-core >=3.2,<4
  run:
    - python >=3.10
    - numpy <2.0.0
    - pandas
    - scipy
    - scikit-learn
    - matplotlib-base
    - seaborn-base
    - tqdm
    - progress
    - pyyaml
    - pyranges
    - pyfiglet
    - plotly
    - python-kaleido
    - jinja2
    - scanpy >=1.8
    - zarr
    - bitarray
    - pyarrow
    - scikit-misc
    - psutil

test:
  commands:
    - gsmap --help

about:
  home: "https://github.com/LeonSong1995/gsMap"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "gsMap (genetically informed spatial mapping of cells for complex traits)."
  description: |
    gsMap integrates spatial transcriptomics (ST) data with genome-wide association study (GWAS) summary statistics to map cells to human complex traits, including diseases, in a spatially resolved manner.
  authors:
    - name: liyang
      email: songliyang@westlake.edu.cn
    - name: wenhao
      email: chenwenhao@westlake.edu.cn
  doc_url: "https://yanglab.westlake.edu.cn/gsmap/document"
  dev_url: "https://github.com/LeonSong1995/gsMap"

extra:
  recipe-maintainers:
    - Ganten-Hornby
    - leonSong1995
