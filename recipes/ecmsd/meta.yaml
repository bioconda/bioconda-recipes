{% set name = "ECMSD" %}
{% set version = "1.1.0" %}
{% set sha256 = "faa83378592d684f410515be28383b81b8b8c22537dbd029ff1811e1bc49b19b" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/capoony/ECMSD/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic

requirements:
  run:
    - minimap2
    - bbmap
    - r-base
    - r-tidyverse
    - pigz
    - wget
    - python >=3.6
    - numpy

test:
  commands:
    - ECMSD --version
    - ECMSD --help

about:
  home: https://github.com/capoony/ECMSD
  dev_url: https://github.com/capoony/ECMSD
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Efficient Comprehensive Mitochondrial Sequence Detection Pipeline"
  description: |
    ECMSD detects and taxonomically classifies mitochondrial sequences
    from high-throughput sequencing data using minimap2 alignment and RMUS scoring.

extra:
  recipe-maintainers:
    - capoony
    - SarahSaadain