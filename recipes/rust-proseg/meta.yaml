{% set version = "3.1.1" %}
{% set name = "rust-proseg" %}
{% set sha256 = "2c71d76a9f59f8464b7f5fcc8a652fd1d3aa7733dc76400f9d803818e720bb1d" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('rust-proseg', max_pin="x.x") }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install -v --locked --no-track --root $PREFIX --path .

source:
  url: "https://github.com/dcjones/proseg/archive/refs/tags/v{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - proseg --version
    - proseg-to-baysor --help

about:
  home: "https://github.com/dcjones/proseg"
  doc_url: "https://github.com/dcjones/proseg/blob/v{{ version }}/README.md"
  dev_url: "https://github.com/dcjones/proseg"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.md"
  summary: "A Rust crate for running Proseg, a cell segmentation method for in situ spatial transcriptomics."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
