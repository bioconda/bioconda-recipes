{% set name = "sumstats-liftover" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/95/d9/8f2fcba7107fe27fe8da08c9cc817dbc0313ef0e4d98055acc5565069a37/sumstats_liftover-1.1.0.tar.gz
  sha256: 057a0605802ff15cf73b10c7dcba0e8bb83fe0f2a3fdc60f2d32c333f14b63ab

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.8
    - numpy >=1.20.0
    - pandas >=1.3.0

test:
  imports:
    - sumstats_liftover

about:
  home: https://pypi.org/project/sumstats-liftover/
  summary: Fast chain-based liftover for pandas DataFrames
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/yourusername/sumstats-liftover

extra:
  recipe-maintainers:
    - lyh970817
