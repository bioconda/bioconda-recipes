{% set name = "sumstats-liftover" %}
{% set version = "1.1.0" %}
{% set source_name = name|replace("-", "_") %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ source_name[0] }}/{{ source_name }}/{{ source_name }}-{{ version }}.tar.gz
  sha256: 057a0605802ff15cf73b10c7dcba0e8bb83fe0f2a3fdc60f2d32c333f14b63ab

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.8
    - numpy >=1.20.0
    - pandas >=1.3.0

test:
  imports:
    - sumstats_liftover

about:
  home: https://github.com/Cloufield/sumstats-liftover
  summary: Fast chain-based liftover for pandas DataFrames
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/Cloufield/sumstats-liftover

extra:
  recipe-maintainers:
    - lyh970817
