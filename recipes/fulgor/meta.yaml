{% set name = "fulgor" %}
{% set version = "4.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/jermp/fulgor/releases/download/v{{ version}}/v{{ version }}.tar.gz"
  sha256: "956b38c24998849db882fac546f895cb0e6bc3d7c6f19d45e035968a8d693ce9"

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cmake
    - make
  host:
    - zlib
  run:
    - zlib

test:
  commands:
    - "fulgor 2>&1 | grep 'Usage: fulgor'"

about:
  home: "https://github.com/jermp/fulgor"
  license: MIT
  license_file: LICENSE
  summary: "A fast and space-efficient colored de Bruijn graph index."
  description: |
    Fulgor is a tool for indexing large-scale genomic data using 
    a colored de Bruijn graph representation, optimized for 
    low memory usage and fast pseudoalignment.
  dev_url: "https://github.com/jermp/fulgor"
