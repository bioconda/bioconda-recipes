{% set name = "versionix" %}
{% set version = "0.99.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/versionix-{{ version }}.tar.gz
  sha256: 14413939afd1ce19c903ab16ad581144d4a0ab75aaad16100b47cb4e709d9361

build:
  entry_points:
    - versionix = versionix.scripts:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage('versionix', max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - poetry-core >=1.0.0
  run:
    - python >=3.8
    - click >=8.1.7
    - rich-click
    - colorlog

test:
  imports:
    - versionix
  commands:
    - versionix --help

about:
  home: https://github.com/sequana/versionix
  summary: "Get version of any tools."
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/sequana/versionix
