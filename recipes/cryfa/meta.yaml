{% set version = "26.04" %}

package:
  name: cryfa
  version: {{ version }}

build:
  number: 0

source:
  url: https://github.com/cobilab/cryfa/archive/refs/tags/v{{ version }}.tar.gz
  sha256: afb510c06ec78b678df585a79a84ff9d24b7fb84307eb4a10d4165153244c054

requirements:
  build:
    - make
    - cmake
    - {{ compiler('cxx') }}

test:
  commands:
     - cryfa --version 2>&1 | grep {{ version }}

about:
  home: https://github.com/smortezah/cryfa
  license: GPL3
  license_file: LICENSE
  license_family: GPL
  summary: A secure encryption tool for genomic data
