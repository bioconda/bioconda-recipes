{% set name = "TMB" %}
{% set version = "1.6.0" %}
{% set sha256 = "b34974e4ab3e648ff6fb061fa6db313fde81fdfa5fabf6b05d76b22175ae3044" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bioinfo-pf-curie/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  entry_points:
    - pyTMB = pytmb.cli.run_tmb:main
    - pyEffGenomeSize = pytmb.cli.run_effgenomesize:main
  run_exports:
    - {{ pin_subpackage('tmb', max_pin="x.x") }}

requirements:
  host:
    - python >=3
    - pip
    - setuptools
  run:
    - python >=3
    - cyvcf2 >=0.30
    - pyyaml >=6.0
    - numpy >=1.21
    - scipy >=1.9
    - pybedtools >=0.9
    - pandas >=1.3

test:
  imports:
    - pytmb
  commands:
    - pyTMB -h
    - pyEffGenomeSize -h

about:
  home: "https://github.com/bioinfo-pf-curie/TMB"
  license: CECILL-2.1
  license_file: LICENSE
  summary: "This tool was designed to calculate a Tumor Mutational Burden (TMB) score from a VCF file."
  dev_url: "https://github.com/bioinfo-pf-curie/TMB"
  doc_url: "https://github.com/bioinfo-pf-curie/TMB/blob/v{{ version }}/README.md"

extra:
  identifiers:
    - doi:10.1186/s12915-024-01839-8
