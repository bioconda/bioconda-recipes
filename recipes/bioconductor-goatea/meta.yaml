{% set version = "1.0.2" %}
{% set name = "goatea" %}
{% set bioc = "3.22" %}

package:
  name: bioconductor-{{ name|lower }}
  version: '{{ version }}'

source:
  url:
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/{{ name }}_{{ version }}.tar.gz
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/Archive/{{ name }}/{{ name }}_{{ version }}.tar.gz
    - https://bioarchive.galaxyproject.org/{{ name }}_{{ version }}.tar.gz
    - https://depot.galaxyproject.org/software/bioconductor-{{ name }}/bioconductor-{{ name }}_{{ version }}_src_all.tar.gz
  md5: 3ceef8c2575b819ea5e5e56b42748f50

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports: '{{ pin_subpackage("bioconductor-goatea", max_pin="x.x") }}'
  noarch: generic

# Suggests: org.Hs.eg.db, org.Mm.eg.db, org.Dm.eg.db, org.Mmu.eg.db, org.Rn.eg.db, org.Ce.eg.db, org.Pt.eg.db, org.Dr.eg.db, knitr, rmarkdown, BiocStyle
requirements:

  host:
    - bioconductor-annotationdbi >=1.72.0,<1.73.0
    - bioconductor-complexheatmap >=2.26.0,<2.27.0
    - bioconductor-dose >=4.4.0,<4.5.0
    - bioconductor-enhancedvolcano >=1.28.0,<1.29.0
    - bioconductor-enrichplot >=1.30.0,<1.31.0
    - bioconductor-interactivecomplexheatmap >=1.18.0,<1.19.0
    - r-arrow >=18.1.0.1
    - r-base
    - r-dplyr >=1.1.4
    - r-dt >=0.33
    - r-ggplot2 >=3.5.1
    - r-goat >=1.0
    - r-htmltools >=0.5.8.1
    - r-igraph >=2.1.4
    - r-openxlsx >=4.2.7.1
    - r-plotly >=4.10.4
    - r-plyr >=1.8.9
    - r-purrr >=1.0.2
    - r-rlang >=1.1.6
    - r-shiny >=1.10.0
    - r-shinydashboard >=0.7.2
    - r-shinyjqui >=0.4.1
    - r-shinyjs >=2.1.0
    - r-tibble >=3.2.1
    - r-tidyr >=1.3.1
    - r-upsetjs >=1.11.1
    - r-visnetwork >=2.1.2

  run:
    - bioconductor-annotationdbi >=1.72.0,<1.73.0
    - bioconductor-complexheatmap >=2.26.0,<2.27.0
    - bioconductor-dose >=4.4.0,<4.5.0
    - bioconductor-enhancedvolcano >=1.28.0,<1.29.0
    - bioconductor-enrichplot >=1.30.0,<1.31.0
    - bioconductor-interactivecomplexheatmap >=1.18.0,<1.19.0
    - r-arrow >=18.1.0.1
    - r-base
    - r-dplyr >=1.1.4
    - r-dt >=0.33
    - r-ggplot2 >=3.5.1
    - r-goat >=1.0
    - r-htmltools >=0.5.8.1
    - r-igraph >=2.1.4
    - r-openxlsx >=4.2.7.1
    - r-plotly >=4.10.4
    - r-plyr >=1.8.9
    - r-purrr >=1.0.2
    - r-rlang >=1.1.6
    - r-shiny >=1.10.0
    - r-shinydashboard >=0.7.2
    - r-shinyjqui >=0.4.1
    - r-shinyjs >=2.1.0
    - r-tibble >=3.2.1
    - r-tidyr >=1.3.1
    - r-upsetjs >=1.11.1
    - r-visnetwork >=2.1.2

test:
  commands:
    - $R -e "library('{{ name }}')"

about:
  home: https://bioconductor.org/packages/{{ bioc }}/bioc/html/{{ name }}.html
  license: Apache License (>= 2)
  summary: Interactive Exploration of GSEA by the GOAT Method
  description: 'Geneset Ordinal Association Test Enrichment Analysis (GOATEA) provides a ''Shiny'' interface with interactive visualizations and utility functions for performing and exploring automated gene set enrichment analysis using the ''GOAT'' package. ''GOATEA'' is designed to support large-scale and user-friendly enrichment workflows across multiple gene lists and comparisons, with flexible plotting and output options. Visualizations pre-enrichment include interactive ''Volcano'' and ''UpSet'' (overlap) plots. Visualizations post-enrichment include interactive geneset dotplot, geneset treeplot, gene-effectsize heatmap, gene-geneset heatmap and ''STRING'' database of protein-protein-interactions network graph. ''GOAT'' reference: Frank Koopmans (2024) <doi:10.1038/s42003-024-06454-5>.'

