{% set name = "naibr-plus" %}
{% set version = "0.5.4" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: https://github.com/pontushojer/NAIBR/releases/download/v{{ version }}/naibr-{{ version }}.tar.gz
  sha256: 7d2de2edf5eabb68799e26fb2f964c5e5aaf23aa302104c8ef76df2242bb9437

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps .
  run_exports:
    - {{ pin_subpackage('naibr-plus', max_pin="x.x") }}

requirements:
  host:
    - python >=3.7
    - setuptools-scm
    - pip
  run:
    - python >=3.7
    - pysam >=0.15.0
    - mpmath
    - numpy
    - scipy
    - matplotlib-base

test:
  commands:
    - naibr --help

about:
  home: https://github.com/pontushojer/NAIBR
  license: MIT
  summary: "Identify novel adjacencies created by structural variations using linked-read data"
