package:
  name: emits
  version: "0.1.0"

source:
  url: https://github.com/ayobi/emits/archive/refs/tags/v{{ version }}.tar.gz
  sha256: cc7cf4089ed63a2f2b5da52e483dfea551796856198622a8139da6048a5612c5

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('emits', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
  run:
    - minimap2

test:
  commands:
    - emits --help

about:
  home: https://github.com/ayobi/emits
  license: MIT
  license_file: LICENSE
  summary: "EM abundance estimation for fungal ITS communities from long-read sequencing"
  dev_url: https://github.com/ayobi/emits

extra:
  recipe-maintainers:
    - ayobi