{% set name = "emits" %}
{% set version = "0.1.0" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: https://github.com/ayobi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 556f4c519c5c600a88d518e33fa8c62db767b1a8270fe32dddf3ae57920ba6f7

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
  host:
  run:
    - minimap2

test:
  commands:
    - emits --help

about:
  home: https://github.com/ayobi/{{ name }}
  license: MIT
  license_file: LICENSE
  summary: "EM abundance estimation for fungal ITS communities from long-read sequencing"
  dev_url: https://github.com/ayobi/{{ name }}

extra:
  recipe-maintainers:
    - ayobi