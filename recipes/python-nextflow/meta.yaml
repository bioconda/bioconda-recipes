{% set name="python-nextflow" %}
{% set repo="nextflow.py" %}
{% set version="0.13.0" %}


package:
  name: {{ name }}
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed -vvv .
  run_exports:
    - {{ pin_subpackage('python-nextflow', max_pin="x") }}

source:
  url: https://github.com/goodwright/{{ repo }}/archive/v{{ version }}.tar.gz
  sha256: 1b62ace8a6e22de61b2dab78fee22007bfc322b218bcf3797a368b50464b85cb

requirements:
  host:
    - python >=3.6,<=3.10
    - pip
  run:
    - python >=3.6,<=3.10
    - nextflow

test:
  imports:
    - nextflow

about:
  home: https://github.com/goodwright/{{ repo }}/
  license: 'MIT'
  license_file: LICENSE
  summary: 'Python module to run Nextflow pipelines'

extra:
  recipe-maintainers:
    - telatin
