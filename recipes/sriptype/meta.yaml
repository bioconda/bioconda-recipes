{% set name = "sriptype" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 97e47f170cce549d43d944b76a664c8a70ee7f985ab034faa9ce9ce02bf592ef

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - sriptype = sriptype_modules.cli:main
  run_exports:
    - {{ pin_subpackage('sriptype', max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=64
  run:
    - python >=3.8
    - flash
    - pigz
    - seqkit
    - blast
    - bedtools
    - samtools

test:
  requires:
    - pip
  imports:
    - sriptype_modules.cli
  commands:
    - pip check
    - sriptype --help

about:
  home: https://github.com/mobilome/SRIPType
  summary: "SRIPType - A bioinformatics tool for 51k-SINE-RIP chip genotyping"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/mobilome/SRIPType

extra:
  recipe-maintainers:
    - mobilome
