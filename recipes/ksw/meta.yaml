{% set version = "0.3.0" %}

package:
  name: ksw
  version: {{ version }}

source:
  url: https://github.com/nh13/ksw/releases/download/{{ version }}/{{ version }}.tar.gz
  sha256: 90b7d57a17cc2b4876261aa4f84bd1de8851181dfc71dc353e9bc651dab1205b

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('ksw', max_pin="x.x") }}

requirements:
  build:
    - make
    - cmake
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - zlib
    - coreutils
    - parasail
  run:
    - parasail

test:
  commands:
    - ksw -h 2>&1 | grep Version | grep -qF '{{ version }}'

about:
  home: "https://github.com/nh13/ksw"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Ksw: (interactive) smith-waterman in C"
  dev_url: "https://github.com/nh13/ksw"

extra:
  identifiers:
    - biotools:ksw
  additional-platforms:
    - linux-aarch64
    - osx-arm64
