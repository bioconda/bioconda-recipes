{% set name = "libgff" %}
{% set version = "2.0.1" %}
{% set sha256 = "96d2bda64aaf9cf7b6c1a42205e408b0ef2a353ba42dad560db215e7ec105e2e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/COMBINE-lab/libgff/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('libgff', max_pin='x') }}

requirements:
  build:
    - ninja
    - cmake
    - {{ compiler('cxx') }}
    - pkg-config
  host:
    - zlib

test:
  commands:
    - ls ${PREFIX}/lib/libgff.a

about:
  home: "https://github.com/COMBINE-lab/libgff"
  license: MIT
  license_family: MIT
  summary: 'A simple "libraryfication" of the GFF/GTF parsing code that is used in GFFRead codebase.'
  dev_url: "https://github.com/COMBINE-lab/libgff"
  doc_url: "https://github.com/COMBINE-lab/libgff/blob/v{{ version }}/Readme.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
