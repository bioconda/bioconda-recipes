{% set name = "crypt4gh" %}
{% set version = "1.8.6" %}
{% set sha256 = "b2802d587c354fbaed5a524f814c82607d7ecc25323356f3264f20e959f19c31" %}

package:
  name: python-{{ name }}
  version: {{ version }}

source:
  url:  https://github.com/EGA-archive/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [py < 36]
  entry_points:
    - crypt4gh = crypt4gh.__main__:main
    #- crypt4gh-keygen = crypt4gh.keys.__init__:main
  script:
    - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib $(pkg-config --libs libsodium)"
    - export CFLAGS="${CFLAGS} -O3 $(pkg-config --cflags libsodium)"
    - export SODIUM_INSTALL=system
    - {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('python-crypt4gh', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - pkg-config
  host:
    - python
    - pip
    - setuptools
    - libsodium
  run:
    - python
    - pyyaml
    - docopt-ng
    - cryptography
    - bcrypt
    - libsodium

test:
  imports:
    - crypt4gh
  commands:  # [osx]
    - crypt4gh -h > testfile-help.txt  # [osx]
    #- crypt4gh-keygen --sk alice.key --pk alice.pub -C 'bioconda Alice test' --nocrypt
    #- crypt4gh-keygen --sk bob.key --pk bob.pub -C 'bioconda Bob test' --nocrypt
    #- crypt4gh encrypt --sk bob.key --recipient_pk bob.pub --recipient_pk alice.pub < testfile-help.txt > message.c4gh
    #- crypt4gh decrypt --sk alice.key < message.c4gh > message.alice.received
    #- diff testfile-help.txt message.alice.received
    #- crypt4gh decrypt --sk bob.key < message.c4gh > message.bob.received
    #- diff testfile-help.txt message.bob.received

about:
  home: "https://github.com/EGA-archive/crypt4gh"
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  summary: "GA4GH cryptographic tools"
  dev_url: "https://github.com/EGA-archive/crypt4gh"
  doc_url: "http://crypt4gh.readthedocs.io"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
