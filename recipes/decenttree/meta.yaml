{% set name = "decenttree" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/iqtree/decenttree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d7d592e424b7969a8a361f2de74233659f52d76ad21b9aa2910bd312887addbb

build:
  number: 1
  skip: True  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - ninja
    - pkg-config
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - zlib
  run:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]

test:
  commands:
    - decenttree

about:
  home: "https://github.com/iqtree/decenttree"
  license: "GPL-2.0-only"
  license_family: GPL
  license_file: LICENSE
  summary: "Scalable Neighbour-Joining and related algorithms for phylogenetic inference."
  description: |
    DecentTree is a fast and memory-efficient implementation of distance-based
    phylogenetic tree construction methods, including Neighbour-Joining and its variants.
  dev_url: "https://github.com/iqtree/decenttree"
  doc_url: "https://github.com/iqtree/decenttree/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/btad536
    - biotools:decenttree
  skip-lints:
    - compiler_needs_stdlib_c
