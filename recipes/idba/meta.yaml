{% set name = "idba" %}
{% set version = "1.1.3a2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/abishara/idba/archive/refs/tags/{{ version }}.tar.gz
  sha256: 421d097aaafd27e7b0c8b7bd5ae51b17e2f2a899dfd27fa1e9f5df909168f57e
  patches:
    - idba-kmer.patch  # https://github.com/loneknightpy/idba/pull/41

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - autoconf
    - automake
    - libtool
    - pkg-config
    - gnuconfig
    - {{ compiler('cxx') }}
  host:
    - gawk
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - python
    - perl
    - libgomp  # [linux]
    - llvm-openmp  # [osx]

test:
  commands:
    - idba --help 2>&1 | grep "Iterative de Bruijn Graph Assembler"

about:
  home: "https://i.cs.hku.hk/~alse/hkubrg/projects/idba_ud"
  license: GPL2
  summary: "IDBA is a practical iterative De Bruijn Graph De Novo Assembler for sequence assembly in bioinformatics."
  doc_url: "https://i.cs.hku.hk/~alse/hkubrg/projects/idba_ud"
  dev_url: "https://github.com/abishara/idba"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:idba
    - usegalaxy-eu:idba_ud
    - doi:10.1007/978-3-642-12683-3_28
  skip-lints:
    - compiler_needs_stdlib_c
