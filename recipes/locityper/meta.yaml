{% set name = "locityper" %}
{% set version = "1.4.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/tprodanov/locityper/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e5fe361932731d05861e513234e5abfe7d9ed909e9a59d1f5a2242aa52785f22
  patches:
    - 0001-rust-htslib.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - pkg-config
  host:
    - clangdev
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - python
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - samtools >=1.19
    - kmer-jellyfish >=1.0
    - minimap2 >=2.26
    - strobealign >=0.17
    - pysam

test:
  commands:
    - locityper version

about:
  summary: "Targeted genotyper for complex polymorphic loci from short and long read WGS."
  home: "https://github.com/tprodanov/locityper"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/tprodanov/locityper"
  doc_url: "https://locityper.vercel.app"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
