{% set name = "smcpp" %}
{% set version = "1.15.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/popgenmethods/{{ name }}
  git_rev: 6779fae
  sha256: unused
  patches:
    - 0001-conditioned_sfs.patch  # [osx]
    - 0002-marginalize.patch  # [osx]

build:
  number: 1
  skip: True  # [py > 310]
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
    - setuptools-scm
    - gmp
    - gsl
    - numpy <2
    - mpfr
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - python
    - numpy <2
    - gnuplot
    - gmp
    - gsl
    - mpfr
    - pysam >=0.18
    - matplotlib-base >=3,<3.6  # at most 3.6 because seaborn styles are removed
    - pandas >=1.4
    - scikit-learn >=1
    - scipy >=1.8
    - appdirs
    - tqdm
    - seaborn-base
    - setuptools <82

about:
  home: "https://github.com/popgenmethods/smcpp"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "SMC++ infers population history from whole-genome sequence data."
  dev_url: "https://github.com/popgenmethods/smcpp"
  doc_url: "https://github.com/popgenmethods/smcpp/blob/v{{ version }}/README.rst"

test:
  imports:
    - smcpp
    - smcpp._smcpp
  source_files:
    - example/example.vcf.gz
    - example/example.vcf.gz.csi

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - uses_vcs_url
    - compiler_needs_stdlib_c
