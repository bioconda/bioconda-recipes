{% set version = "1.1.1" %}

package:
  name: dfast_qc
  version: {{ version }}

source:
  url: https://github.com/nigyta/dfast_qc/archive/{{ version }}.tar.gz
  sha256: 9de5ed7a0a0e45b1d9418caa3049ad47d3057da5a2aef3712985f9ac9575b711

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('dfast_qc', max_pin="x") }}

requirements:
  run:
    - python >=3.8
    - prodigal
    - hmmer
    - checkm-genome
    - ete3
    - more-itertools
    - peewee
    - mash
    - skani
    - gsl

test:
  commands:
    - which dfast_qc
    - dfast_qc -h

about:
  home: 'https://dfast.nig.ac.jp'
  license: "GPLv3"
  license_file: "docs/LICENSE"
  summary: "DFAST_QC: Taxonomy and completeness check for prokaryotic genomes."
  dev_url: "https://github.com/nigyta/dfast_qc"
