package:
  name: perl-mime-lite
  version: "3.037"

source:
  url: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MIME-Lite-3.037.tar.gz
  sha256: 2c77d33ff73e4d37e6fd5020e53968b97452d33e307932afbf10a84c031ebadc

build:
  noarch: generic
  number: 0

requirements:
  build:
    - make
  host:
    - perl
    - perl-email-date-format
    - perl-mailtools
    - perl-mime-types >=1.28

  run:
    - perl
    - perl-email-date-format
    - perl-mailtools
    - perl-mail-address >=1.62
    - perl-mime-base64 
    - perl-mime-quotedprint 
    - perl-mime-types >=1.28

test:
  # Perl 'use' tests
  imports:
    - MIME::Lite

about:
  home: http://metacpan.org/pod/MIME-Lite
  license: perl_5
  summary: 'Handy-dandy MIME mailing class'
