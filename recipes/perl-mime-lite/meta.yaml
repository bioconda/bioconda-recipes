package:
  name: perl-mime-lite
  version: "3.038"

source:
  url: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MIME-Lite-3.038.tar.gz
  sha256: 06eb47db74d594d2256cf4794f2c259e9f3f54b9f61b900544e6e1d879e244f5

build:
  noarch: generic
  number: 0

requirements:
  build:
    - make
  host:
    - perl
    - perl-email-date-format
    - perl-mailtools
    - perl-mime-types >=1.28

  run:
    - perl
    - perl-email-date-format
    - perl-mailtools
    - perl-mail-address >=1.62
    - perl-mime-base64 
    - perl-mime-quotedprint 
    - perl-mime-types >=1.28

test:
  # Perl 'use' tests
  imports:
    - MIME::Lite

about:
  home: http://metacpan.org/pod/MIME-Lite
  license: perl_5
  summary: 'Handy-dandy MIME mailing class'
