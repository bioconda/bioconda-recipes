{% set name = "xloci" %}
{% set version = "0.0.4" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: 95e8ed2840906744d2253648a5345661779219f3d36fd4561cd75119e3d0be07

build:
 number: 0
 run_exports:
    - {{ pin_subpackage('xloci', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - xloci --help
   - xloci --version

about:
 home: https://github.com/alejandrogzi/xloci
 license: Apache-2.0
 license_family: APACHE
    - THIRDPARTY.yml
 summary: "get sequences from 2bit/fa using bed/gtf/gff"

extra:
  recipe-maintainers:
    - alejandrogzi
  dev_url: https://github.com/alejandrogzi/xloci
