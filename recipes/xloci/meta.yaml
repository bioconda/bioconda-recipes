{% set name = "xloci" %}
{% set version = "0.0.3" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: 67d6ae47a5e58ea0c54ff987d745fdcff8dff0f910f402e4bd0293c8d240c64d

build:
 number: 0
 run_exports:
    - {{ pin_subpackage('xloci', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - xloci --help
   - xloci --version

about:
 home: https://github.com/alejandrogzi/xloci
 license: Apache-2.0
 license_family: APACHE
    - THIRDPARTY.yml
 summary: "get sequences from 2bit/fa using bed/gtf/gff"

extra:
  recipe-maintainers:
    - alejandrogzi
