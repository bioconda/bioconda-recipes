{% set name = "PhyloAcc" %}
{% set version = "2.5.0" %}
{% set sha256 = "a791362755dbe8e8678e1ba441225583d3203329850a03145e5f2a90cb5ccee1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/phyloacc/PhyloAcc/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [py < 311]
  run_exports:
    - {{ pin_subpackage('phyloacc', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
  host:
    - python
    - gsl
    - openblas
    - blis
    - liblapack
    - armadillo
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - mkl # [target_platform != "linux-aarch64"]
  run:
    - python
    - blis
    - matplotlib-base >=3.5
    - biopython >=1.79
    - numpy >=1.22
    - snakemake-minimal >=8.0
    - snakemake-executor-plugin-slurm
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - mkl # [target_platform != "linux-aarch64"]

test:
  requires:
    - wget

about:
  home: https://phyloacc.github.io/
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.md
  summary: 'Bayesian estimation of substitution rate shifts in non-coding regions'
  description: 'Bayesian estimation of substitution rate shifts in non-coding regions'
  doc_url: https://phyloacc.github.io/readme.html
  dev_url: https://github.com/phyloacc/PhyloAcc

extra:
  additional-platforms:
    - linux-aarch64
  recipe-maintainers:
    - gwct
