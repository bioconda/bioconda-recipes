{% set name = "bam-tide" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://crates.io/api/v1/crates/bam_tide/{{ version }}/download
  sha256: 6b8825367ff7cf697153ad3887313b50865664812b3a416348b70af99714784c

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - pkg-config
    - cargo-bundle-licenses
  host:
    - htslib
    - zlib
  run:
    - htslib
    - zlib

test:
  commands:
    - bam-coverage --help
    - bam-subset-tag --help

about:
  home: https://github.com/stela2502/bam_tide
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Fast BAM to BigWig coverage tool written in Rust
  description: |
    bam_tide provides a high-performance implementation of BAM coverage
    calculation and BigWig generation, serving as a fast alternative to
    deepTools bamCoverage.
  dev_url: https://github.com/stela2502/bam_tide

extra:
  recipe-maintainers:
    - stela2502
