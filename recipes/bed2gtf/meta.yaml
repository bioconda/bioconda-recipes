{% set name = "bed2gtf" %}
{% set version = "2.0.0" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v.{{ version }}.tar.gz
 sha256: 69c1ec8b896aa4626007d6549d56c18ac906d00c43e46c783cee3c875644a094

build:
 number: 0
 run_exports:
    - {{ pin_subpackage('bed2gtf', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - bed2gtf --help
   - bed2gtf --version

about:
 home: https://github.com/alejandrogzi/bed2gtf
 license: MIT
 license_family: MIT
 license_file:
   - LICENSE
   - THIRDPARTY.yml
 summary: "A high-performance BED-to-GTF converter written in Rust"

extra:
  additional-platforms:
    - linux-aarch64
  recipe-maintainers:
    - alejandrogzi
