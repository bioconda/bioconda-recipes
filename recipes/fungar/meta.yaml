{% set version = "1.0.0" %}

package:
  name: fungar
  version: {{ version }}

source:
  url: https://github.com/resgen-br/fungar/archive/refs/tags/v1.0.0.tar.gz
  sha256: 274dcd2c49a4a49941aded474ab3cde4b038f7eae6395a5c2c006df1139fee5f

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p $PREFIX/bin
    - cp FUNGAR.sh $PREFIX/bin/fungar
    - chmod +x $PREFIX/bin/fungar

requirements:
  run:
    - bash
    - python >=3.8
    - pandas
    - diamond

test:
  commands:
    - fungar --help

about:
  home: https://github.com/resgen-br/fungar
  license: MIT
  license_file: LICENSE
  summary: "Pipeline for detecting antifungal resistance genes and mutations from metagenomic sequencing reads"
  description: |
    FUNGAR is a command-line pipeline for detecting antifungal resistance
    genes and associated amino acid mutations from metagenomic sequencing data.
    It uses DIAMOND for protein alignment and Python-based mutation parsing.

extra:
  identifiers:
    - biotools:fungar
