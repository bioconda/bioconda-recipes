{% set version = "1.3.0" %}

package:
  name: falco
  version: {{ version }}

source:
  url: https://github.com/smithlabcode/falco/releases/download/v{{ version }}/falco-{{ version }}.tar.gz
  sha256: 7c3f0b05472f8b1cb5664e4267bdd7a6a51381bff030b369b22c0c754cdb8065

build:
  number: 0
  run_exports:
    # falco is currently not intended to be stable between minor versions (x.x).
    - {{ pin_subpackage('falco', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - autoconf
    - automake
    - libtool
    - gnuconfig
  host:
    - zlib
    - htslib
  run:
    - htslib

test:
  commands:
    - falco

about:
  home: "https://github.com/smithlabcode/falco"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  summary: "falco is a drop-in C++ implementation of FastQC to assess the quality of sequence reads."
  doc_url: "https://falco.readthedocs.io"
  dev_url: "https://github.com/smithlabcode/falco"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - andrewdavidsmith
    - guilhermesena1
  identifiers:
    - biotools:falco
    - usegalaxy-eu:falco
    - doi:10.12688/f1000research.21142.2
