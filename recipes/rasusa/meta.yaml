{% set version = "4.1.0" %}
{% set name = "rasusa" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/mbhall88/{{ name }}/archive/{{ version }}.tar.gz
  sha256: bc3db8950f14d8a398382054212bbaad2f850d45f79eaf6fa582055ffd3e02af

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('rasusa', max_pin="x.x") }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - cargo install -v --locked --no-track --root $PREFIX --path .

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}              # [not win]
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - rasusa --help
    - rasusa reads --help
    - rasusa aln --help
    - rasusa cite

about:
  home: https://github.com/mbhall88/rasusa
  license: MIT
  summary: Randomly subsample sequencing reads or alignments
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - mbhall88
  identifiers:
    - doi:10.46471/gigabyte.180
    - doi:10.21105/joss.03941
