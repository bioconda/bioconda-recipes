{% set name = "pacini_typing" %}
{% set version = "3.1.0" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: https://github.com/RIVM-bioinformatics/Pacini-typing/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 46124fd3e60dffc462731ec7ae87a4f369df25b490f8b049b54c30243154d8b4

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  run_exports:
    - {{ pin_subpackage("pacini_typing", max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - pandas
    - pyyaml
    - blast
    - kma

test:
  commands:
    - pacini_typing --help
    - Pacini-typing --help

about:
  home: "https://github.com/RIVM-bioinformatics/Pacini-typing"
  license: AGPL-3.0
  license_file: LICENSE
  summary: "YAML-based bacterial genotyping application"
  dev_url: "https://github.com/RIVM-bioinformatics/Pacini-typing"

extra:
  recipe-maintainers:
    - MarkStreek
