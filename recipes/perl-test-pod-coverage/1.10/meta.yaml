{% set name = "perl-test-pod-coverage" %}
{% set version = "1.10" %}
{% set sha256 = "48c9cca9f7d99eee741176445b431adf09c029e1aa57c4703c9f46f7601d40d4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/N/NE/NEILB/Test-Pod-Coverage-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 4
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
  host:
    - perl
    - perl-extutils-makemaker
    - perl-pod-coverage
    - perl-test-builder-tester
    - perl-lib
  run:
    - perl
    - perl-pod-coverage

test:
  imports:
    - Test::Pod::Coverage

about:
  home: "https://metacpan.org/pod/Test::Pod::Coverage"
  license: "Artistic-License-2.0"
  summary: "Check for pod coverage in your distribution."
  doc_url: "https://metacpan.org/pod/Test::Pod::Coverage"
