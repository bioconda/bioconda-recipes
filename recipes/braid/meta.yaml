{% set name = "braid" %}
{% set pypi_name = "pybraid" %}
{% set version = "1.0.0" %} 

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name }}-{{ version }}.tar.gz
  sha256: "10d4b3da3e4fc504a9f98e6009c45cbe7c937f165e3dab1b02f2ccd55833c020"

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.8
  run:
    - python >=3.8
    - pysam
    - biopython

test:
  imports:
    - braid 
  commands:
    - braid --help

about:
  home: https://github.com/YuefanHuang1998/BRAID
  summary: "A software tool for Block Resolution and Annotation of Integrated DNA."
  license: MIT
  license_family: MIT

  extra:
  skip-lints:
    - missing_run_exports
