{% set name = "telescope" %}
{% set version = "1.0.3_fix" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/hanalysis/telescope/archive/v{{ version }}.tar.gz
  sha256: a508d3598f14e9df888c7fa48f982a59b735b65ab4d15b81a25a202d2af8b2a0
  patches:
    - 0001-Fix-setup.py.patch

build:
  number: 6
  skip: True  # [py<30]
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - pip
    - python ==3.6
    - setuptools
    - numpy ==1.16.3
    - scipy ==1.2.1
    - pysam ==0.15.2
    - future >=0.17.1
    - pyyaml >=5.1
    - cython ==0.29.7
    - intervaltree ==3.0.2
    - htslib ==1.9
    - pandas ==1.1.3
  run:
    - python
    - {{ pin_compatible('numpy') }}
    - scipy ==1.2.1
    - pysam ==0.15.2
    - future >=0.17.1
    - pyyaml >=5.1
    - intervaltree ==3.0.2

test:
  commands:
    - telescope --version
    - telescope -h &> /dev/null
    - telescope assign -h &> /dev/null
    - telescope resume -h &> /dev/null

about:
  home: 'https://github.com/mlbendall/telescope'
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Single locus resolution of Transposable ELEment expression.

extra:
  identifiers:
    - doi:10.1101/398172
  container:
    extended-base: True
  recipe-maintainers:
    - davebx
