{% set version = "0.3.31" %}
{% set sha256 = "fdb2a2f867b45d568c26f1b416f487a47746872678f9b9d3179665c89e2330c7" %}

package:
  name: hts-nim-tools
  version: {{ version }}

source:
- url: https://github.com/brentp/hts-nim-tools/archive/refs/tags/v0.2.1.tar.gz
  sha256: {{ sha256 }}
- url: https://github.com/brentp/hts-nim/archive/v{{ version }}.tar.gz
  sha256: e2e8572156cced4557fcb75ecf5a7ee072bcc7abf81066d4b54d5bf674dab3e0
  folder: hts-nim

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('hts-nim-tools', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - nim  # [not arm64]
  host:
    - pcre
    - htslib
    - curl
    - tar
  run:
    - pcre
    - htslib

test:
  commands:
    - hts_nim_tools -h
    - hts_nim_tools count-reads -h

about:
  home: "https://github.com/brentp/hts-nim-tools"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Useful command-line tools written to show-case hts-nim."
  dev_url: "https://github.com/brentp/hts-nim-tools"
  doc_url: "https://brentp.github.io/hts-nim"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
