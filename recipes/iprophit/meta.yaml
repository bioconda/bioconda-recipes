{% set name = "iprophit" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/HongboZhang-z3d/iProphIT-FAFU/archive/refs/tags/v1.0.0.tar.gz
  sha256: eeed3641d39893d22eca95b4991009f4a4d134fec770e67fcaa561862b1c411b

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps"
  entry_points:
    - iprophit = iprophit.classifier:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - pytorch >=2.0.0
    - biopython >=1.80
    - numpy >=1.21.0

test:
  # Bioconda 
  imports:
    - iprophit
  commands:
    - iprophit --help

about:
  home: https://github.com/HongboZhang-z3d/iProphIT-FAFU
  license: GPL-3.0
  license_file: LICENSE
  summary: "A deep learning approach that identifies the inducible activity of prophages from their DNA sequences."
  description: |
    A deep learning approach that identifies the inducible activity of prophages from their DNA sequences.
  doc_url: https://doi.org/10.5281/zenodo.17605580
  dev_url: https://github.com/HongboZhang-z3d/iProphIT-FAFU

extra:
  recipe-maintainers:
    - Hongbo Zhang
    - Chen Liu
    - Hanpeng Liao
