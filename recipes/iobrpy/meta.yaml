{% set name = "iobrpy" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 60046891042a276d7bc6426c608920db44be9e1dc1df8f5fd4f3f28faca51104

build:
  number: 0
  skip: true  # [not linux]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - wheel

  run:
    - python >=3.11
    - numpy >=1.22
    - pandas >=1.5
    - scipy >=1.9
    - scikit-learn >=1.2
    - statsmodels >=0.13
    - matplotlib-base >=3.7
    - tqdm >=4.66
    - click >=8.0
    - gseapy >=1.0.6
    - joblib >=1.3
    - regex >=2024.5
    - tiktoken >=0.11,<0.13
    - multiqc ==1.31
    - xarray >=0.20
    - requests >=2.32
    - prompt-toolkit >=3.0
    - pysam ==0.23.3
    - biopython >=1.83
    - fastp
    - star
    - salmon
    - gzip
    - trust4

test:
  commands:
    - python -c "import iobrpy.main"
    - iobrpy --help
    - iobrpy-cli --help

about:
  home: https://github.com/IOBR/IOBRpy
  license: MIT
  license_file: LICENSE
  summary: Immuno-Oncology Biological Research using Python (IOBRpy)
  doc_url: https://github.com/IOBR/IOBRpy
  dev_url: https://github.com/IOBR/IOBRpy

extra:
  recipe-maintainers:
    - hhn0527
