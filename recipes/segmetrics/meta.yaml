{% set name = "segmetrics" %}
{% set version = "1.6.0" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: "https://github.com/BMCV/segmetrics/archive/refs/tags/{{ version }}.zip"
  sha256: 3bc7a781782506b587b2004c41dd0a8a74ce857896d10629c28330feb8125ccc

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install --no-deps --ignore-installed . -vv "
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - numpy >=1.20
    - scipy
    - scikit-image >=0.18,<0.27
    - scikit-learn
    - dill
    - Deprecated ==1.2
  run:
    - python >=3.9 
    - numpy >=1.20
    - scipy
    - scikit-image >=0.18,<0.27
    - scikit-learn
    - dill
    - Deprecated ==1.2

test:
  commands:
    - python -m segmetrics --help

about:
  home: "https://github.com/BMCV/segmetrics"
  license: MIT
  summary: "A Python package implementing image segmentation and object detection performance measures, for biomedical image analysis and beyond."
  dev_url: "https://github.com/BMCV/segmetrics"
  doc_url: "https://segmetrics.readthedocs.io"

extra:
  recipe-maintainers:
    - kostrykin
