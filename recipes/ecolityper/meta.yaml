{% set name = "ecolityper" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bbeckley-hub/EcoliTyper/archive/v{{ version }}.tar.gz
  sha256: af602f8181f1dddbc8231d971ebaf86633e16bdcd2bc5ace84c43982f3f17f3f

build:
  noarch: python
  number: 1
  script: "{{ PYTHON }} -m pip install . --no-build-isolation -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - pandas >=1.5.0
    - biopython >=1.80
    - psutil >=5.9.0
    - requests >=2.28.0
    - tqdm >=4.64.0
    - click >=8.0.0
    - tabulate >=0.9.0
    - beautifulsoup4 >=4.11.0
    - lxml >=4.9.0
    - matplotlib-base >=3.5.0
    - seaborn >=0.12.0
    - scipy >=1.10.1
    - plotly >=5.10.0
    - abricate >=1.2.0
    - perl
    - any2fasta
    - cgecore >=1.5.6
    - blast >=2.13.0
    - perl-moo
    - perl-list-moreutils
    - perl-json
    - perl-lwp-protocol-https
    - perl-path-tiny
    - perl-data-dumper
    - perl-getopt-long
    - perl-file-which

test:
  commands:
    - ecolityper --help

about:
  home: https://github.com/bbeckley-hub/EcoliTyper
  license: MIT
  license_file: LICENSE
  summary: 'Comprehensive E. coli Typing Pipeline: MLST, Serotyping, CH Typing, Phylogrouping, AMR, and Virulence Analysis'
  description: |
    EcoliTyper is a comprehensive bioinformatics pipeline for complete Escherichia coli
    genomic characterization. It integrates multiple typing schemes including MLST,
    serotyping (O and H antigens), CH typing (FumC and FimH), ezClermont phylogrouping,
    antibiotic resistance detection (AMRfinderPlus), and virulence/plasmid screening (ABRicate).
  doc_url: https://github.com/bbeckley-hub/EcoliTyper
  dev_url: https://github.com/bbeckley-hub/EcoliTyper

extra:
  recipe-maintainers:
    - bbeckley-hub
