{% set version = "0.3.4" %}

package:
  name: alen
  version: {{ version }}

source:
  url: https://github.com/jakobnissen/alen/archive/v{{ version }}.tar.gz
  sha256: 10f8b337d6c143f4852f613c77d9f4428e19eebad91493a55c220e924f05c6a9

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("alen", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }} 
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - alen --help

about:
  home: "https://github.com/jakobnissen/alen"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Simple terminal sequence alignment viewer."
  dev_url: "https://github.com/jakobnissen/alen"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
