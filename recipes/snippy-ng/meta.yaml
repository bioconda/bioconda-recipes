{% set name = "snippy-ng" %}
{% set pname = "snippy-nextgen" %}
{% set version = "1.24.0" %}
{% set sha256 = "db2768b8d651d33d664b3c7a654c936428109c7f838f4143a8cc3d19caa128f4" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ pname[0] }}/{{ pname }}/{{ pname }}-{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('{{ name }}', max_pin="x") }}

requirements:
  host:
    - python >=3.15,<4
    - pip
    - hatchling
  run:
    - python >=3.15,<4 
    - packaging >=26
    - pydantic >=2.12
    - click >=8
    - bcbio-gff >=0.7
    - biopython >=1.86
    - htslib >=1.23
    - samtools >=1.23
    - bcftools >=1.23
    - freebayes >=1.3
    - minimap2 >=2.30
    - fastp >=1
    - seqkit >=2
    - rasusa >=2
    - bedtools >=2.31
    - core-snp-filter >=0.2
    - iqtree >=3

test:
  commands:
    - {{ name }} --version | grep -F '{{ version }}'
    - {{ name }} --help

about:
  home: "https://github.com/centre-pathogen-genomics/{{ name }}"
  license: "MIT"
  license_family: "MIT"
  license_file: "LICENSE.txt"
  summary: "Universal microbial variant calling"

extra:
  recipe-maintainers:
    - Wytamma
    - tseemann
