{% set name = "alerax" %}
{% set version = "1.4.0" %}
{% set sha256 = "b117db57c380500e4c046b842bb20a49559b3f32478d09280da4e4128ddb0d24" %}

package:
  name: alerax
  version: {{ version }}

source:
  - url: https://github.com/BenoitMorel/AleRax/archive/v{{ version }}.tar.gz
    sha256: {{ sha256 }}

  - url: https://github.com/noahares/GeneRaxCore/archive/d0c3da8.tar.gz
    folder: ext/GeneRaxCore
    sha256: 3f19a25588f62b991c3ff9347588ac77062253abe94e7cd31cec5cb26c6ffd72

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - openmpi
  run:
    - openmpi

test:
  commands:
    - alerax --help
    - which alerax


about:
  home: https://github.com/BenoitMorel/AleRax
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "Probabilistic gene tree and species tree reconciliation tool."
