{% set name = "alerax" %}
{% set version = "1.4.0" %}
{% set sha256 = "b117db57c380500e4c046b842bb20a49559b3f32478d09280da4e4128ddb0d24" %}

package:
  name: alerax
  version: {{ version }}

source:
  - url: https://github.com/BenoitMorel/AleRax/archive/v{{ version }}.tar.gz
    sha256: {{ sha256 }}

  - url: https://github.com/noahares/GeneRaxCore/archive/d0c3da8.tar.gz
    folder: ext/GeneRaxCore
    sha256: 3f19a25588f62b991c3ff9347588ac77062253abe94e7cd31cec5cb26c6ffd72

  - url: https://github.com/noahares/MPIScheduler/archive/603c772.tar.gz
    folder: ext/GeneRaxCore/ext/MPIScheduler
    sha256: ece15a5a28f558619d69d90d7f4f041772defc1f5eeab3e8084b05fcfc1a9e86

  - url: https://codeberg.org/Exelixis-Lab/coraxlib/archive/5acc49d.tar.gz
    folder: ext/GeneRaxCore/ext/coraxlib
    sha256: 52a0b7918ce4eeb42c69c5b7cc5fc550dc0e4e91ff930a28925b36dac431401a

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
  host:
    - openmpi
    - gsl
  run:
    - openmpi
    - gsl

test:
  commands:
    - which alerax
    - ldd $(which alerax)
    - alerax 2>&1 || true

about:
  home: https://github.com/BenoitMorel/AleRax
  license: GPL-3.0-only
  summary: "Probabilistic gene tree and species tree reconciliation tool."
