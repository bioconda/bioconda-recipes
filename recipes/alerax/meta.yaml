{% set name = "alerax" %}
{% set version = "1.4.0" %}
{% set sha256 = "b117db57c380500e4c046b842bb20a49559b3f32478d09280da4e4128ddb0d24" %}

package:
  name: alerax
  version: {{ version }}

source:
  url: https://github.com/BenoitMorel/AleRax/archive/refs/tags/v{{ version }}.tar.gz
  sha256: '{{ sha256 }}'


build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake

test:
  commands:
    - alerax --help


about:
  home: https://github.com/BenoitMorel/AleRax
  license: GPL-3.0-only
  summary: "Probabilistic gene tree and species tree reconciliation tool."
