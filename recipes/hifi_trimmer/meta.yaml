{% set name = "hifi_trimmer" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hifi_trimmer-{{ version }}.tar.gz
  sha256: 08b78b38c6cd79b960ad8f46212ca815e07175f1070d2a8065d74600df3b88d7

build:
  entry_points:
    - hifi-trimmer = hifi_trimmer.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage("hifi_trimmer", max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - hatchling
    - pip
  run:
    - python >=3.10
    - py-bgzip >=0.5.1
    - click >=8.1.8
    - polars <=1.22.0
    - pysam >=0.23.0
    - pyyaml >=6.0.2

test:
  imports:
    - hifi-trimmer
  commands:
    - pip check
    - hifi-trimmer --help
  requires:
    - pip

about:
  home: https://github.com/sanger-tol/hifi-trimmer
  summary: hifi-trimmer is a tool for filtering and trimming extraneous adapter hits from a HiFi read set using a BLAST search.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - prototaxites
