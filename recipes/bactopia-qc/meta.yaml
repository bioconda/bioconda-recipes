{% set version = "1.0.4" %}

package:
  name: bactopia-qc
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('bactopia-qc', max_pin='x.x') }}

source:
  url: https://github.com/bactopia/bactopia-qc/archive/v{{version}}.tar.gz
  sha256: 28da6d426fffa9ed118114d7390b346232629796a1797baebd43369080c9b4a3

requirements:
  run:
    - bactopia-py >=2.0.1
    - bbmap >=39.01
    - coreutils
    - fastp >=0.23.4
    - fastqc >=0.12.1
    - fastq-scan >=1.0.1
    - gsl 2.6
    - lighter >=1.1.2
    - nanoplot >=1.41.6
    - nanoq >=0.10.0
    - pigz
    - porechop >=0.2.4
    - python <3.13
    - rasusa >=1
    - rename
    - sed

test:
  commands:
    - "bactopia-qc --version"
    - "bactopia-qc"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: The methods used in Bactopia for read QC
  dev_url: https://github.com/bactopia/bactopia-qc/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
