{% set name = "trim-galore" %}
{% set version = "2.1.0b8" %}
{% set version_upstream = "2.1.0-beta.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/FelixKrueger/TrimGalore/releases/download/v{{ version_upstream }}/trim_galore-linux-x86_64.tar.gz  # [linux and x86_64]
    sha256: 1ac82f15901fd3e72cb165110d54bd380ed129da4965b7d370e790834b205dbe  # [linux and x86_64]
  - url: https://github.com/FelixKrueger/TrimGalore/releases/download/v{{ version_upstream }}/trim_galore-linux-aarch64.tar.gz  # [linux and aarch64]
    sha256: cf1f1ca35bf0715f7e44d471b8a9c78f37b3d68ccd82d87d5b4ffb76858fcf10  # [linux and aarch64]
  - url: https://github.com/FelixKrueger/TrimGalore/releases/download/v{{ version_upstream }}/trim_galore-macos-aarch64.tar.gz  # [osx and arm64]
    sha256: 8e5f46b76219d88f7f706577cda1760fcf53fb44a0999c6087d45376e351b336  # [osx and arm64]

build:
  number: 0
  skip: True  # [osx and x86_64]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run: []

test:
  commands:
    - which trim_galore   # pre-built binaries may require glibc >=2.39; bioconda CI uses CentOS 7 (glibc 2.17)

about:
  home: https://felixkrueger.github.io/TrimGalore/
  dev_url: https://github.com/FelixKrueger/TrimGalore
  summary: "Fast adapter and quality trimming for NGS data — Oxidized Edition (Rust)"
  description: |
    Trim Galore v2 is a Rust rewrite of the original Perl Trim Galore. Single
    static binary, no Python/Perl/Cutadapt/Java/igzip/pigz dependencies. Drop-in
    compatible with v0.6.x scripts and pipelines (same CLI, same output
    filenames, same report format) with adapter auto-detection (Illumina,
    Nextera, Small RNA, BGI/DNBSEQ), poly-G/poly-A trimming, paired-end
    single-pass processing, RRBS support, and bundled FastQC integration via
    fastqc-rust.
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE

extra:
  notes: |
    Linux x86_64, Linux aarch64, and macOS aarch64 (Apple Silicon) prebuilt
    binaries ship via the GitHub Releases page. Intel Mac users (osx-x86_64)
    should install via `cargo install trim-galore`, or pull the Docker
    linux/amd64 image (`docker pull ghcr.io/felixkrueger/trimgalore:beta` on
    Apple Silicon Docker also works — pulls the linux/arm64 multi-arch variant).
  skip-lints:
    - should_be_noarch_generic
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - usegalaxy-eu:trim_galore
  recipe-maintainers:
    - FelixKrueger
    - ewels
