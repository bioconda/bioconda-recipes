{% set version = "1.4.0" %}

package:
  name: ont-dorado
  version: {{ version }}

source:
  git_url: https://github.com/nanoporetech/dorado.git
  git_rev: v{{ version }}
  version: {{ version }}
  sha256: ignored

build:
  number: 0
  skip: true  # [osx]
  run_exports:
    - {{ pin_subpackage("ont-dorado", max_pin="x.x") }}

requirements:
  build:
    - cmake
    - make
    - autoconf
    - cuda-nvcc 12.9
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
    - {{ stdlib('c') }}
  host:
    - libcublas-dev
    - cuda
    - pytorch-gpu
    - python
    - zlib
    - cusparselt

test:
  commands:
    - dorado basecaller --help

about:
  home: https://github.com/nanoporetech/dorado
  license: LicenseRef-ONT-Public-License-1.0
  license_file: LICENSE.txt
  summary: Oxford Nanopore's Basecaller

extra:
  skip-lints:
    - uses_vcs_url  # There are a LOT of submodules and they don't supply a single tarball :(
