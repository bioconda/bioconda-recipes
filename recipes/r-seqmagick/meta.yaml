{% set version = '0.1.8' %}

package:
  name: r-seqmagick
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/seqmagick_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/seqmagick/seqmagick_{{ version }}.tar.gz
  sha256: 259591499edc61d947e135a44f0ef91f6fc002104172974b0cfd991c5df387b8


build:
  number: 1
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]
  run_exports:
    - {{ pin_subpackage('r-seqmagick', max_pin="x.x") }}

requirements:
  host:
    - r-base
    - bioconductor-biostrings
    - r-magrittr
    - r-yulab.utils >0.1.6
  run:
    - r-base
    - bioconductor-biostrings
    - r-magrittr
    - r-yulab.utils >0.1.6


test:
  commands:
    - $R -e "library('seqmagick')"           # [not win]
    - "\"%R%\" -e \"library('seqmagick')\""  # [win]

about:
  home: https://github.com/YuLab-SMU/seqmagick
  license: Artistic-2.0
  summary: Tools for reading and writing biological sequences in multiple formats, including
    'FASTA', 'PHYLIP', 'CLUSTAL', 'STOCKHOLM', 'MEGA' and 'GenBank'. Supports interleaved
    and sequential layouts where applicable, converts between formats, and manipulates
    sequence sets (e.g., filtering by patterns and computing consensus sequences from
    alignments). Also includes functions to download nucleotide records from NCBI by
    accession.
  license_family: OTHER
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/Artistic-2.0'

