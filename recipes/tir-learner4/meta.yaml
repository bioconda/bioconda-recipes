package:
  name: tir-learner4
  version: "1.0"

source:
  url: https://github.com/KGerhardt/TIR-Learner/archive/refs/tags/v4.0.1.tar.gz
  sha256: f36828693f1c3bbf4f7c2441b7ba8d64d8a42653d0cb3738e52b0c365444e2e8

build:
  number: 1

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - python
    - numpy
    - cython
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - pyfastx
    - pywfa
    - keras
    - pytorch
    - genometools-genometools
    - genericrepeatfinder
    - blast
    - pigz

test:
  commands:
    - tirlearner4 --help
    
about:
  home: https://github.com/KGerhardt/TIR-Learner
  license: GPL-3.0
  summary: "Accelerated tool for identifying TIR transposable elements"

extra:
  recipe-maintainers:
    - KGerhardt
