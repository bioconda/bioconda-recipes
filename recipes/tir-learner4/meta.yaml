{% set name = "tir-learner4" %}
{% set version = "4.0.1" %}
{% set sha256 = "f36828693f1c3bbf4f7c2441b7ba8d64d8a42653d0cb3738e52b0c365444e2e8" %}

package:
  name: tir-learner4
  version: "4.0.1"

source:
  url: https://github.com/KGerhardt/TIR-Learner/archive/refs/tags/v4.0.1.tar.gz
  sha256: f36828693f1c3bbf4f7c2441b7ba8d64d8a42653d0cb3738e52b0c365444e2e8

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('tir-learner4', max_pin='x') }}
  skip: True  # [osx]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - python <3.13
    - numpy
    - cython
    - pip
    - setuptools
    - wheel
  run:
    - python <3.13
    - numpy
    - pyfastx
    - pywfa
    - keras
    - pytorch
    - genometools-genometools
    - genericrepeatfinder
    - blast
    - pigz

summary: "Accelerated tool for identifying TIR transposable elements"
dev_url: https://github.com/KGerhardt/TIR-Learner
doc_url: https://github.com/KGerhardt/TIR-Learner/blob/main/README.md

test:
  commands:
    - tirlearner4 --help
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
    
about:
  home: https://github.com/KGerhardt/TIR-Learner
  license: GPL-3.0
  summary: "Accelerated tool for identifying TIR transposable elements"

extra:
  recipe-maintainers:
    - KGerhardt
