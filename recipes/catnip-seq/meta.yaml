{% set version = "0.1.5" %}

package:
  name: catnip-seq
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/catnip-seq/catnip_seq-{{ version }}.tar.gz
  sha256: c0bcaf717316d1742d2aa9bf49d528e5fce3426e4ccce8439ca26fc43b004661

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.9
    - setuptools >=45
    - wheel
    - pip
  run:
    - python >=3.9
    - pysam
    - pandas
    - numpy
    - cd-hit
    - bowtie2
    - samtools

test:
  imports:
    - catnip
  commands:
    - pip check
    - catnip --help
  requires:
    - pip
    - python

about:
  home: https://github.com/CIBIO-BU/catnip
  summary: Explore nucleotide divergence and sequence resolution across user-defined categories.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  skip-lints:
    - missing_run_exports
  recipe-maintainers:
    - camilababo
