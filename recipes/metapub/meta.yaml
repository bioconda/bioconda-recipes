{% set name = "metapub" %}
{% set version = "0.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metapub-{{ version }}.tar.gz
  sha256: 656657a64a9677c6e3054ac87b923a28006170b1501406fb13ea0a07847bc9cd

build:
  entry_points:
    - pubmed_article = metapub.pubmedfetcher_cli:main
    - convert = metapub.convert:main
    - ncbi_health_check = metapub.ncbi_health_check:main
    - metapub_build_registry = metapub.scripts.build_registry_from_yaml:main
    - metapub-registry = metapub.findit.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('metapub', max_pin="x.x") }}
requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - setuptools
    - lxml
    - lxml-html-clean
    - requests
    - habanero
    - tabulate
    - cssselect
    - unidecode
    - docopt
    - six
    - coloredlogs
    - python-levenshtein
    - pyyaml
    - brotli

test:
  imports:
    - metapub
  commands:
    - pip check
    - pubmed_article --help
    - convert --help
    - ncbi_health_check --help
    - metapub_build_registry --help
    - metapub-registry --help
  requires:
    - pip

about:
  home: https://metapub.org
  summary: Pubmed / NCBI / eutils interaction library, handling the metadata of pubmed papers.
  license: Apache-2.0
  license_file:
    - LICENSE
    - LICENSE-2.0.txt

extra:
  recipe-maintainers:
    - hechth
