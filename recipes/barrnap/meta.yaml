{% set name = "barrnap" %}
{% set user = "tseemann" %}
{% set version = "1.10.5" %}
{% set sha256 = "37f1451b1c3521f3495fde0d6483e97600bd6f4a7ce625db11a78cbd06a68b19"%}

package:
  name: {{ name }}
  version: {{ version }}

source:
  sha256: {{ sha256 }}
  url: https://github.com/{{ user }}/{{ name }}/archive/v{{ version }}.tar.gz

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run:
    - perl >=5.32
    - perl-list-moreutils
    - perl-path-tiny
    - perl-file-which
    - infernal >=1.1.2
    - aragorn
    - bedtools
    - any2fasta >=0.6.0
    - seqkit
    - pyrodigal
    - transtermhp >=2
    - ziggypep
    - diamond
    - taxonkit
    - make
    - bats-core
    - mmseqs2

test:
  commands:
    - {{ name }} --version | grep -F "{{ version }}"
    - {{ name }} --help
    - {{ name }} --listdb

about:
  home: https://github.com/{{ user }}/{{ name }}
  license: GPLv3
  license_family: GPL
  license_file: LICENSE
  summary: 'Rapid microbial RNA identidication'

extra:
  identifiers:
    - biotools:{{ name }}
