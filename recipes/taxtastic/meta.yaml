{% set version = "1.0.1" %}
{% set sha256 = "054e623875b522ad4305de0b22598c0c29f80321c6e985f852f3c0e7b19f3bd2" %}

package:
  name: taxtastic
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/taxtastic/taxtastic-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  entry_points:
    - taxit = taxtastic.scripts.taxit:main
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION="${PKG_VERSION}"
    - {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('taxtastic', max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - setuptools
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.8
    - dendropy
    - pyyaml
    - decorator
    - fastalite
    - jinja2
    - psycopg2-binary
    - sqlalchemy >=2
    - sqlparse

test:
  imports:
    - taxtastic
    - taxtastic.scripts
    - taxtastic.subcommands
  commands:
    - taxit --help

about:
  home: "https://github.com/fhcrc/taxtastic"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Tools for taxonomic naming and annotation."
  dev_url: "https://github.com/fhcrc/taxtastic"
  doc_url: "https://fhcrc.github.io/taxtastic/index.html"
