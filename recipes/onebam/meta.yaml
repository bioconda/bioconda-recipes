{% set version = "0" %}
{% set commit = "6f609cac239f29d688709131bccac207d1cdeb60" %}

package:
  name: onebam
  version: {{ version }}

# NOTE: upstream has no version tags yet; version is pinned to a specific commit.
# Please update when upstream releases a tagged version.

source:
  url: https://github.com/richarddurbin/onebam/archive/{{ commit }}.tar.gz
  sha256: 61c4658ea1e5c6419232f05e569749641d2b8e90db13647fa467a883c7973740

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('onebam', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - clang # [osx]
    - libclang-cpp # [osx]
  host:
    - htslib
    - zstd
    - libcurl
    - bzip2
    - xz
    - zlib
  run:
    - htslib
    - zstd
    - libcurl
    - bzip2
    - xz
    - zlib

test:
  commands:
    - onebam 2>&1 | head -5
    - ONEview 2>&1 | head -5 || true
    - ONEstat 2>&1 | head -5 || true
    - seqstat 2>&1 | head -5 || true
    - seqconvert 2>&1 | head -5 || true

about:
  home: https://github.com/richarddurbin/onebam
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: ONEcode replacement for SAM/BAM in large-scale eDNA mapping and taxonomic analysis
  description: |
    onebam converts read-sorted SAM/BAM/CRAM files into a compact ONEcode
    .1read format, storing reads with sequences, quality scores, best-match
    damage information, and taxonomy hit data. It supports merging, LCA
    (Lowest Common Ancestor) assignment, taxonomic reporting, and read
    extraction, making it suitable for eDNA workflows mapping against very
    large reference databases such as all of NCBI.
  doc_url: https://github.com/richarddurbin/onebam
  dev_url: https://github.com/richarddurbin/onebam

extra:
  recipe-maintainers:
    - 7PintsOfCherryGarcia
