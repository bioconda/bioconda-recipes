{% set version = "1.0.5" %}

package:
  name: bactopia-assembler
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('bactopia-assembler', max_pin='x') }}

source:
  url: https://github.com/bactopia/bactopia-assembler/archive/v{{version}}.tar.gz
  sha256: fdf2685308772c57e31a855d6312f18d40f61bb6e55e5e64e413c93881d94129

requirements:
  run:
    - coreutils
    - dragonflye >=1.2.0
    - importlib-metadata <5
    - sed
    - shovill-se
    - skesa >=2.5.1
    - unicycler >=0.5.0
    - wget

test:
  commands:
    - "bactopia-assembler --version"
    - "bactopia-assembler"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: The assembly process used by Bactopia.
  dev_url: https://github.com/bactopia/bactopia-assembler/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
