{% set name = "muat" %}
{% set version = "0.1.17" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/primasanjaya/muat/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 25ca9dda95d8c26e08c15f6b3e32d5805ef91cf35998dd544973342ab573b40b

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - pandas
    - requests
    - bedtools
    - htslib
    - natsort
    - boto3
    - openpyxl
    - scikit-learn
    - pytorch
    - pyliftover
    - bcftools
    - tqdm
    - bedops
    - swalign

test:
  imports:
    - muat

about:
  home: https://github.com/primasanjaya/muat
  license: Apache-2.0
  license_file: LICENSE
  summary: A package for Mutation Attention Tool

extra:
  recipe-maintainers:
    - primasanjaya