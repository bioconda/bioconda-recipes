{% set name = "nfixplanet" %}
{% set version = "0.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/n/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: b145212e93fb11341dad68f80456ec5a77d44a2b281ae162f0c32d1a454d9781

build:
  noarch: python
  number: 0
  entry_points:
    - nfixplanet = nfixplanet.cli:main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('nfixplanet', max_pin='x.x') }}

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - pandas >=1.3,<2.2
    - defopt <7
    - prodigal >=2.6.3
    - hmmer >=3.4
    - fastp =0.24.0
    - minimap2 =2.28
    - coverm =0.7.0
    - wget

test:
  imports:
    - nfixplanet
  commands:
    - nfixplanet --help

about:
  home: https://github.com/grp-bork/nfixplanet
  license: MIT
  summary: Nitrogen fixer detection pipeline

extra:
  recipe-maintainers:
    - mahdi-robbani