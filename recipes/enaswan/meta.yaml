{% set version = "0.1.1" %}

package:
  name: enaswan
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/e/enaswan/enaswan-{{ version }}.tar.gz
  sha256: a66cc55072305f9ffa1b97509ef9d25c5544f261bc25dbeac5c9132605e3ba14

build:
  entry_points:
    - enaswan = enaswan.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=77.0.3
    - wheel
    - pip
  run:
    - python >=3.8
    - requests >=2.28.0
    - tqdm >=4.65.0
    - pandas >=1.5.0
    - urllib3 >=1.26.0

test:
  imports:
    - enaswan
  commands:
    - pip check
    - enaswan --help
  requires:
    - pip
    - python

about:
  home: https://github.com/Bharathwaj8920/enaswan
  summary: ENA Smart Workflow and Acquisition Network — fast parallel FASTQ downloader for the European Nucleotide Archive
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Bharathwaj8920
