{% set name = "atol-qc-raw-pacbio" %}
{% set version = "0.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/amytims/atol-qc-raw-pacbio/archive/refs/tags/{{ version }}.tar.gz
  sha256: 17607b50df583437b51db1ed8fdeb8442c8fbcb8b09d0878cc9123d562745939

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  entry_points:
    - atol-qc-raw-pacbio = atol_qc_raw_pacbio.__main__:main
  run_exports:
    - {{ pin_subpackage('atol-qc-raw-pacbio', max_pin="x.x") }}

requirements:
  host:
    - pip
    - python >=3.12,<3.13
    - setuptools-scm
  run:
    - python >=3.12,<3.13
    - snakemake >=9.16.3,<10
    - cutadapt >=4.4
    - seqkit >=2.13.0
    - pigz
    - samtools >=1.19.2


test:
  commands:
    - "atol-qc-raw-pacbio --help | grep 'usage: atol-qc-raw-pacbio'"

about:
  home: "https://github.com/amytims/atol-qc-raw-pacbio"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Runs QC and produces summary stats on Pacbio HiFi reads"
  dev_url: "https://github.com/amytims/atol-qc-raw-pacbio"
