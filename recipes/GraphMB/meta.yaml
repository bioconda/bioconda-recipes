{% set name = "GraphMB" %}
{% set version = "0.1.5" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/MicrobialDarkMatter/GraphMB/archive/refs/tags/v{{ version }}.tar.gz"
  sha256: 7a0b005bad5a36f1cb3c521e844700ccaf14da2350afbed72c867a81871e6489

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install .

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - pip
    - python =3.7
  run:
    - python =3.7
    - libgcc
    - cmake
    - make

test:
  commands:
    - graphmb --help

about:
  home: "https://github.com/MicrobialDarkMatter/GraphMB"
  license: MIT
  license_file: LICENSE
  summary: "GraphMB: Assembly Graph Metagenomic Binner"
  doc_url: "https://graphmb.readthedocs.io/en/latest/"
  dev_url: "https://github.com/MicrobialDarkMatter/GraphMB"

extra:
  recipe-maintainers:
    - AndreLamurias 
    - Serka-M
  identifiers:
    - https://doi.org/10.1093/bioinformatics/btac557
