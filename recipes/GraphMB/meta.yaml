{% set name = "GraphMB" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/MicrobialDarkMatter/GraphMB/archive/v{{ version }}.tar.gz
  sha256: 7a0b005bad5a36f1cb3c521e844700ccaf14da2350afbed72c867a81871e6489

build:
  entry_points:
    - graphmb=graphmb.main:main
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python
    - setuptools >=58.0,<59.dev0
    - wheel
    - pip
  run:
    - python
    - wheel
    - requests
    - setuptools >57.5.0importlib  # [py==37]
    - networkx ==2.6.2
    - scikit-learn ==0.24.2
    - tqdm ==4.61.2
    - vamb

test:
  imports:
    - graphmb
  commands:
    - pip check
    - graphmb --help
  requires:
    - pip

about:
  home: https://github.com/MicrobialDarkMatter/GraphMB
  license: MIT
  license_familY: MIT
  license_file: LICENSE
  summary: "GraphMB: Assembly Graph Metagenomic Binner"
  doc_url: https://graphmb.readthedocs.io/en/latest

extra:
  recipe-maintainers:
    - AndreLamurias 
    - Serka-M
  identifiers:
    - https://doi.org/10.1093/bioinformatics/btac557
