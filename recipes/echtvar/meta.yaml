{% set name = "echtvar" %}
{% set version = "0.2.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/brentp/echtvar/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9f5987ef450617400bbd92031fbb20da6a16a33acbcd362b02e7559bbfa1dc1a

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
    - clangdev
  host:
    - openssl
    - curl

test:
  commands:
    - echtvar --help

about:
  home: "https://github.com/brentp/echtvar"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Using all the bits for echt rapid variant annotation and filtering."
  dev_url: "https://github.com/brentp/echtvar"
  doc_url: "https://github.com/brentp/echtvar/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
