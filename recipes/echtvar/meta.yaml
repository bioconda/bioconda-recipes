{% set name = "echtvar" %}
{% set version = "0.2.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/brentp/echtvar/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e4d04d16d9c8e02aa9c216d7c7173e4d35ed3a9f848d05e5908d60e74b5c128b

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
    - clangdev
  host:
    - openssl
    - curl

test:
  commands:
    - echtvar --help

about:
  home: "https://github.com/brentp/echtvar"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Using all the bits for echt rapid variant annotation and filtering."
  dev_url: "https://github.com/brentp/echtvar"
  doc_url: "https://github.com/brentp/echtvar/blob/v{{ version }}/README.md"
