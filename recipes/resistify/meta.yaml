{% set name = "resistify" %}
{% set version = "2.0.1" %}
{% set sha256 = "65cc5cb1aaf20f5a9d82d2a1b8491964d5a66a45c6c0a9fe25ad37ee82cc24e0" %}

package:
  name: "{{ name }}"
  version: "{{ version }}"

source:
  url: https://github.com/SwiftSeal/resistify/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  entry_points:
    - resistify = resistify.main:main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - pip
    - python >=3.13,<3.14
    - uv-build
  run:
    - python >=3.13,<3.14 # loosen in next release
    - pyhmmer >=0.12.0
    - scikit-learn # needs to be dropped from pyproject first
    - svg.py >=1.9.1
    - numpy
    - fair-esm
    - pytorch
    - transformers
    - xgboost >=3.2.0
    - einops >=0.8.2
    - sentencepiece >=0.2.1
    - tqdm

test:
  imports:
    - resistify
  commands:
    - resistify --help

about:
  home: https://github.com/swiftseal/resistify
  dev_url: https://github.com/SwiftSeal/resistify
  doc_url: "https://github.com/SwiftSeal/resistify/blob/v{{ version }}/README.md"
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  license_url: https://github.com/SwiftSeal/resistify/blob/main/LICENSE
  summary: "A resistance gene annotation tool."
  description: |
    Resistify is a program which rapidly identifies and classifies plant resistance genes from protein sequences.
    It is designed to be lightweight and easy to use.
