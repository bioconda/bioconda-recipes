{% set name = "reseq2" %}
{% set version = "2.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/berntpopp/ReSeq2/archive/v{{ version }}.tar.gz
  sha256: 61d6c003f5a929f00cba846b2dd40a15d2a1d76f21af97e0ffcd75ebbe3750b4

build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - cmake >=3.16
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - zlib
    - bzip2
    - boost-cpp
    - nlopt
  run:
    - boost-cpp
    - nlopt

test:
  commands:
    - reseq2 --version

about:
  home: https://github.com/berntpopp/ReSeq2
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Realistic Illumina paired-end sequencing simulator"
  description: |
    ReSeq2 is a maintained continuation of ReSeq (Schmeing & Robinson,
    Genome Biology 2021). It learns error, quality, and coverage profiles
    from real Illumina paired-end data and uses them to simulate synthetic
    reads with matching k-mer spectra. Changes from upstream include C++20
    migration, modernized CMake build, CI/CD, expanded test suite, binary/text
    profile format conversion, and code quality tooling.
  dev_url: https://github.com/berntpopp/ReSeq2
  doc_url: https://berntpopp.github.io/ReSeq2/

extra:
  recipe-maintainers:
    - berntpopp
  identifiers:
    - doi:10.1186/s13059-021-02265-7
