{% set version = "1.3.0" %}
{% set sha256 = "a0ff859c5250f78edf08f5bb09ac706286239b5aa6d3a074790d80a5475a812b" %}

package:
  name: soi
  version: {{ version }}

source:
  url: https://github.com/zhangrengang/SOI/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: ${PYTHON} -m pip install . --no-deps --no-build-isolation --ignore-installed -vv
  entry_points:
    - soi = soi.options:main
  run_exports:
    - {{ pin_compatible('soi', max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - setuptools >=68.2.2
    - pip >=23.2.1
    - biopython >=1.81
    - lazy-property >=0.0.1
    - networkx >=3.1
  run:
    - python >=3
    - biopython >=1.81
    - lazy-property >=0.0.1
    - networkx >=3.1
    - mcl >=22.282
    - pp >=1.6.4.4
    - xopen >=1.1.0
    - muscle >=3.8.1551
    - blast >=2.14.1
    - diamond >=2.1.8
    - entrez-direct >=16.2
    - mafft >=7.520
    - orthofinder >=2.5.5
    - mmseqs2 >=14.7e284
    - iqtree >=2.2.5
    - raxml-ng >=1.2.0
    - trimal
    - newick_utils
    - pal2nal
    - biopython
    - networkx
    - drmaa
    - psutil
    - matplotlib-base

test:
  commands:
    - soi -h

about:
  home: https://github.com/zhangrengang/SOI/
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: GPL
  summary: "Orthology Index (OrthoIndex or OI) determines the orthology of a syntenic block."
