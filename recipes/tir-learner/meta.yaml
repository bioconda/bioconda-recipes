{% set name = "TIR-Learner" %}
{% set version = "4.02" %}
{% set sha256 = "dfca035caf6c60777fef1b41bb33b29b38c98ffa8238e3a2d6df107cc9312e23" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: https://github.com/KGerhardt/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name | lower, max_pin='x') }}

requirements:
  run:
    - python >=3.9,<3.13
    - numpy
    - pyfastx
    - pywfa
    - keras
    - pytorch
    - genometools-genometools
    - genericrepeatfinder
    - blast
    - pigz

test:
  commands:
    - tirlearner4 --help

about:
  home: https://github.com/KGerhardt/{{ name }}
  summary: "Accelerated tool for identifying TIR transposable elements"
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  dev_url: https://github.com/KGerhardt/{{ name }}
  doc_url: https://github.com/KGerhardt/{{ name }}/blob/main/README.md
