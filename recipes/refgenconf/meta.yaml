{% set name = "refgenconf" %}
{% set version = "0.13.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: "ffc77f7d9c5662df4cd0ef921c706f1edd9d0b7f8348f3c6ddeb9571132b4af5"

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - pip
    - python >=3.6
    - setuptools
  run:
    - python >=3.6
    - pyyaml
    - requests
    - yacman >=0.8.0
    - future
    - rich >=9.0.1
    - jsonschema >=3.0.1

test:
  imports:
    - refgenconf
  requires:
    - pytest

about:
  home: "https://refgenie.databio.org"
  license: "BSD-2-Clause"
  license_family: "BSD"
  license_file: "LICENSE.txt"
  summary: "A standardized configuration object for reference genome assemblies"

extra:
  recipe-maintainers:
    - stolarczyk
