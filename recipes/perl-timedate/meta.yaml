{% set name = "perl-timedate" %}
{% set version = "2.35" %}
{% set sha256 = "baddd0306ae2e86e9ec28d3de5439e514643e80b3735e43bd0fbb426d73304de" %}

package:
  name: "perl-timedate"
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/A/AT/ATOOMIC/TimeDate-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
  host:
    - perl
  run:
    - perl

about:
  home: "https://metacpan.org/pod/TimeDate"
  license: "Perl_5"
  summary: "Date formating subroutines."
  dev_url: "https://metacpan.org/pod/TimeDate"

skip-lints:
    - missing_tests
