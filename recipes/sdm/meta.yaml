{% set name = "sdm" %}
{% set version = "3.28" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/hildebra/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: a6b0cd749d5a022d4e50e8e5b2ef2f80715afb553bd013bcb521751d6cda05af

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - make
    - pkg-config
  host:
    - zlib

test:
  commands:
    - sdm

about:
  home: "https://github.com/hildebra/sdm"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "sdm - simple demultiplex tool for FASTQ demultiplexing and dereplication."
  dev_url: "https://github.com/hildebra/sdm"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
