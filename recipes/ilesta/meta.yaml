{% set name = "ilesta" %}
{% set version = "1.2.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/yvlaere/Ilesta/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 7ab5f6468ccc9bbd33445e7459bf9f397ac62b7bed34eb87e6749f4a457b03f0

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yaml
    - cargo install -v --locked --no-track --root $PREFIX --path .

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - Ilesta --help

about:
  home: "https://github.com/yvlaere/Ilesta"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file:
    - LICENSE
    - THIRDPARTY.yaml
  summary: "De novo genome assembler for long-read sequencing data."
  dev_url: "https://github.com/yvlaere/Ilesta"

extra:
  recipe-maintainers:
    - yvlaere
  additional-platforms:
    - linux-aarch64
    - osx-arm64
