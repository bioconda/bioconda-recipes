{% set name = "art_modern" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/YU-Zhejian/art_modern/archive/refs/tags/{{ version }}.zip
  sha256: c62d54879ef4c6fd6bc639c95a58be25c88690c920173f71b66c8c091b90b92c

build:
  number: 1
  run_exports:
    - {{ pin_subpackage('art_modern', max_pin="x.x") }}

requirements:
  build:
    - cmake >=3.17
    - make
    - pkg-config
    # This is essential as coreutils >=8.28 provides `env -C` command.
    - coreutils >=8.28
    - bash
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    # Python is only needed for the build
    - python {{ python }}
  host:
    # Boost version copied from Pixi environment of art_modern.
    - libboost-devel >=1.90.0,<2
    - zlib
    - htslib # samtools does not specify HTSLib version, so do us.
    - fmt
    # Conda do not have moodycamel-concurrentqueue, so using the bundled one.
  run:
    - libboost >=1.90.0,<2

test:
  commands:
    - ART_NO_LOG_DIR=1 art_modern --version 2>&1 | grep -q "{{ version }}"
    - ART_NO_LOG_DIR=1 art_profile_builder --version 2>&1 | grep -q "{{ version }}"
    - ART_NO_LOG_DIR=1 am_compress --version 2>&1 | grep -q "{{ version }}"

about:
  home: "https://github.com/YU-Zhejian/art_modern"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: "License.md"
  summary: "Modernized ART simulator of diverse Next-Generation Sequencing reads"
  dev_url: "https://github.com/YU-Zhejian/art_modern"
  doc_url: "https://github.com/YU-Zhejian/art_modern/releases/download/{{ version }}/art_modern.pdf"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
