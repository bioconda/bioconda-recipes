{% set name = "aliceasm" %}
{% set version = "0.7.14" %}
{% set sha256 = "09e926313fac06510334b594ff54324109bffb151b8796c7a266e3762c0ec476" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/RolandFaure/Alice-asm/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('aliceasm', max_pin="x.x") }}

requirements:
  build:
    - cmake
    - ninja
    - {{ compiler('cxx') }}
    - pkg-config
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - zlib
  run:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - bcalm
    - gfatools

test:
  commands:
    - aliceasm --help 2>&1 | grep "Command line:"

about:
  home: "https://github.com/RolandFaure/alice-asm"
  license: "AGPL-3.0-only"
  license_family: AGPL
  license_file: "LICENSE.txt"
  summary: "Efficient HiFi genome assembler producing haplotype-separated assemblies."
  dev_url: "https://github.com/RolandFaure/alice-asm"

extra:
  recipe-maintainers:
    - RolandFaure
  additional-platforms:
    - linux-aarch64
    - osx-arm64
