{% set version = "1.0.0" %}


package:
  name: bwise
  version: '{{version}}'

source:
  url: "https://github.com/Malfoy/BWISE/archive/1.0.0.tar.gz"
  sha256: daca421f91e9b3a4c272b46665df2e681d0068bb53fde86f41f04a2637f4f91d

build:
  number: 4
  skip: true # [osx]
  run_exports:
    - {{ pin_subpackage("bwise", max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - zlib
  run:
    - python >=3
    - bgreat
    - bcalm
    - btrim
    - zlib

test:
  commands:
    - bwise --help

about:
  home: https://github.com/Malfoy/BWISE
  license: AGPL-3.0
  license_file: '{{ RECIPE_DIR }}/agpl-3.0.txt'
  summary: BWISE is a de Bruijn assembly Workflow using Integral information of Short paired-End reads
