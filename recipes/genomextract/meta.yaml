{% set version = "0.2.1" %}
{% set sha256 = "62b3a037fcf5f4dc5784095135baa72a2ebbcda789cc5a43884dcec12f929696" %}

package:
  name: genomextract
  version: '{{ version }}'

source:
  url: https://github.com/kevinkarbstein/GenomeXtract/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-build-isolation --no-deps -vvv"
  run_exports:
    - {{ pin_subpackage("genomextract", max_pin="x.x") }}
  
requirements:
  build:
  host:
    - python >=3.6
    - pip
    - setuptools
  run:
    - python >=3.6
    - biopython
    - pandas
    - requests
    - openpyxl
    - ncbi-datasets-cli ==18.9.0
    - raxml-ng ==1.2.2
    - iqtree ==3.0.1
    - mafft ==7.525
    - astral-tree ==5.7.8
    - blast ==2.17.0
    - mash ==2.3
    - alnPairDist ==1.0.5

test:
  commands:
    - findGenome --help
    - findClosestGenome --help
    - assembleOrgGenome --help
    - assembleOrgGenes --help

about:
  home: https://github.com/kevinkarbstein/GenomeXtract
  license: GPL-3.0-only
  license_file: LICENSE.txt
  summary: "GenomeXtract - A toolkit to easily find, compare, and assemble NCBI genomes."
