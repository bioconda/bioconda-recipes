{% set name = "predictosaurus" %}
{% set version = "0.12.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/fxwiegand/predictosaurus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f8e7fecb6fa85226123b8f42b29a9f2d224cdaa622a23cc357a4ea0a698ab1d1

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
    - make
    - cmake
    - clangdev <22
  host:
    - gsl
    - libcblas
    - libcurl
    - openssl  # [not osx]

test:
  commands:
    - predictosaurus --help

about:
  home: "https://github.com/fxwiegand/predictosaurus"
  license: MIT
  license_family: MIT
  summary: "Predictosaurus is a command-line tool designed for uncertainty-aware haplotype-based genomic variant effect prediction."
  dev_url: "https://github.com/fxwiegand/predictosaurus"
  doc_url: "https://github.com/fxwiegand/predictosaurus/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - fxwiegand
    - felixmoelder
    - johanneskoester
  skip-lints:
    - compiler_needs_stdlib_c
