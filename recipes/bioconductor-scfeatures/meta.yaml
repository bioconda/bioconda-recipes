{% set version = "1.10.9" %}
{% set name = "scFeatures" %}
{% set bioc = "3.22" %}

package:
  name: bioconductor-{{ name|lower }}
  version: '{{ version }}'

source:
  url:
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/{{ name }}_{{ version }}.tar.gz
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/Archive/{{ name }}/{{ name }}_{{ version }}.tar.gz
    - https://bioarchive.galaxyproject.org/{{ name }}_{{ version }}.tar.gz
    - https://depot.galaxyproject.org/software/bioconductor-{{ name|lower }}/bioconductor-{{ name|lower }}_{{ version }}_src_all.tar.gz
  md5: f46b4ab427f418e3faad6ac014882fae

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports: '{{ pin_subpackage("bioconductor-scfeatures", max_pin="x.x") }}'
  noarch: generic

# Suggests: knitr, S4Vectors, survival, survminer, BiocStyle, ClassifyR, org.Hs.eg.db, clusterProfiler, pheatmap, limma, ggplot2, plotly, igraph, data.table, enrichplot, DOSE, rmarkdown
requirements:

  host:
    - bioconductor-aucell >=1.32.0,<1.33.0
    - bioconductor-biocparallel >=1.44.0,<1.45.0
    - bioconductor-delayedarray >=0.36.0,<0.37.0
    - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
    - bioconductor-ensdb.hsapiens.v79 >=2.99.0,<2.100.0
    - bioconductor-ensdb.mmusculus.v79 >=2.99.0,<2.100.0
    - bioconductor-ensembldb >=2.34.0,<2.35.0
    - bioconductor-gsva >=2.4.0,<2.5.0
    - bioconductor-matrixgenerics >=1.22.0,<1.23.0
    - r-ape
    - r-base
    - r-cli
    - r-dplyr
    - r-dt
    - r-glue
    - r-gtools
    - r-msigdbr
    - r-proxyc
    - r-reshape2
    - r-rmarkdown
    - r-seurat
    - r-spatstat.explore
    - r-spatstat.geom
    - r-tidyr

  run:
    - bioconductor-aucell >=1.32.0,<1.33.0
    - bioconductor-biocparallel >=1.44.0,<1.45.0
    - bioconductor-delayedarray >=0.36.0,<0.37.0
    - bioconductor-delayedmatrixstats >=1.32.0,<1.33.0
    - bioconductor-ensdb.hsapiens.v79 >=2.99.0,<2.100.0
    - bioconductor-ensdb.mmusculus.v79 >=2.99.0,<2.100.0
    - bioconductor-ensembldb >=2.34.0,<2.35.0
    - bioconductor-gsva >=2.4.0,<2.5.0
    - bioconductor-matrixgenerics >=1.22.0,<1.23.0
    - r-ape
    - r-base
    - r-cli
    - r-dplyr
    - r-dt
    - r-glue
    - r-gtools
    - r-msigdbr
    - r-proxyc
    - r-reshape2
    - r-rmarkdown
    - r-seurat
    - r-spatstat.explore
    - r-spatstat.geom
    - r-tidyr

test:
  commands:
    - $R -e "library('{{ name }}')"

about:
  home: https://bioconductor.org/packages/{{ bioc }}/bioc/html/{{ name }}.html
  license: GPL-3
  summary: 'scFeatures: Multi-view representations of single-cell and spatial data for disease outcome prediction'
  description: scFeatures constructs multi-view representations of single-cell and spatial data. scFeatures is a tool that generates multi-view representations of single-cell and spatial data through the construction of a total of 17 feature types. These features can then be used for a variety of analyses using other software in Biocondutor.
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

