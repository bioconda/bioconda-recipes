{% set name = "snakefmt" %}
{% set version = "1.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 72f7405c55447a072e5a8356bff0f712d8a37bbdddb79d0ed843ce9453a75d08

build:
  number: 0
  noarch: python
  entry_points:
    - snakefmt = snakefmt.snakefmt:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('snakefmt', max_pin="x.x") }}

requirements:
  host:
    - python >=3.11,<4.0
    - pip
    - hatchling
  run:
    - python >=3.11,<4.0
    - black >=26.3.1,<27.0
    - click >=8.2.0,<9.0
    - pathspec

test:
  imports:
    - snakefmt
  commands:
    - snakefmt --help

about:
  home: "https://github.com/snakemake/snakefmt"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "The uncompromising Snakemake code formatter."
  dev_url: "https://github.com/snakemake/snakefmt"
  doc_url: "https://github.com/snakemake/snakefmt/blob/v{{ version }}/README.md"

extra:
  recipe-maintainers:
    - mbhall88
    - bricoletc
