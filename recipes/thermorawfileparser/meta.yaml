{% set name = "ThermoRawFileParser" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  run_exports:
    - {{ pin_subpackage('thermorawfileparser', max_pin="x.x.x") }}
  number: 0
  noarch: generic
  script:
    - mkdir $PREFIX/bin
    - cp -r * $PREFIX/bin
    - chmod +x $PREFIX/bin/ThermoRawFileParser
    - ln -s $PREFIX/bin/ThermoRawFileParser $PREFIX/bin/thermorawfileparser

source:
  # downloading pre-compiled packages, msbuild is a hell to compile under Linux
  url: https://github.com/compomics/ThermoRawFileParser/releases/download/v{{ version }}-dev/ThermoRawFileParser{{ version }}-dev-linux.zip
  sha256: 19566762ce6759a93cee9aa4cef50de1e9ae2ad9078bd95826e8e733d4bb0d52

requirements:
  build:
    - zlib
  run:
    - zlib

test:
  commands:
    - ThermoRawFileParser 2>&1 | grep metadata

about:
  home: https://github.com/compomics/ThermoRawFileParser
  license: Apache Software
  license_family: APACHE
  license_file: '{{ environ["RECIPE_DIR"] }}/LICENSE'
  summary: Wrapper around the .net (C#) ThermoFisher ThermoRawFileReader library for running on Linux with mono
  dev_url: https://github.com/compomics/ThermoRawFileParser
  doc_url: https://github.com/compomics/ThermoRawFileParser/blob/master/README.md

extra:
  recipe-maintainers:
    - RECETOX
    - hechth
