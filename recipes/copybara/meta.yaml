{% set name = "copybara" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/cortes-ciriano-lab/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: fd24967f74099f767bfd163fd05e62beae76a5f5960872960d6511c98bc9cb21

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - copybara = copybara.copybara:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - numpy
    - scipy
    - seaborn
    - pybedtools >=0.9.0
    - pysam >=0.20.0
    - pandas >=2.0.0
    - matplotlib-base >=3.7.1

test:
  commands:
    - copybara --version
    - copybara --help
    - copybara pon --help
    - copybara focal --help

about:
  home: "https://github.com/cortes-ciriano-lab/{{ name }}"
  license: "Apache-2.0"
  license_family: APACHE
  license_file: "LICENSE.txt"
  summary: "COPYBARA - copy number analysis for cfDNA sequencing data"
  dev_url: "https://github.com/cortes-ciriano-lab/{{ name }}"
