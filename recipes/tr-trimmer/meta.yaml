{% set version = "0.5.0" %}

package:
  name: tr-trimmer
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('tr-trimmer', max_pin="x.x") }}

source:
  url: https://github.com/apcamargo/tr-trimmer/archive/v{{ version }}.tar.gz
  sha256: 903aa6fd5ce8bcef1969a2ad4d98bbcdecd609af33077aeda2672dc1da2ebe39
  patches:
    - rust-edition.patch

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - tr-trimmer --help

about:
  home: "https://github.com/apcamargo/tr-trimmer"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Identify and trim terminal repeats from sequences in FASTA files."
  dev_url: "https://github.com/apcamargo/tr-trimmer"
  doc_url: "https://github.com/apcamargo/tr-trimmer/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
