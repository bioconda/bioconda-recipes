{% set name = "kaptive" %}
{% set version = "3.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/kaptive-{{ version }}.tar.gz
  sha256: 9b83666360f8842c7bbeca6043e6d111e8eba9b29242424f652225d8f0ef50d0

build:
  entry_points:
    - kaptive = kaptive.cli:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage('kaptive', max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=3.9
    - biopython >=1.83
    - numpy
    - dna_features_viewer
    - minimap2

test:
  imports:
    - kaptive
  commands:
    - kaptive --help
    - minimap2 --help

about:
  home: "https://kaptive.readthedocs.io/en/latest"
  dev_url: "https://github.com/klebgenomics/Kaptive"
  summary: "Reports information about surface polysaccharide loci for Klebsiella pneumoniae species complex and Acinetobacter baumannii genome assemblies."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  doc_url: "https://kaptive.readthedocs.io/en/latest"

extra:
  recipe-maintainers:
    - tomdstanton
