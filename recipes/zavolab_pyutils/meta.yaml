{% set name = "zavolab_pyutils" %}
{% set version = "0.1.2" %}

package:
    name: {{ name|lower }}
    version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/zavolab_pyutils-{{ version }}.tar.gz
  sha256: 081aec6cf8fe27d6be81f1e959867414998773c7eb0c380851140aa0a93c5103

build:
  run_exports:
        - {{ pin_subpackage('zavolab_pyutils', max_pin="x.x") }}
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=3.8
    - numpy >=1.20.0

test:
  imports:
    - zavolab_pyutils
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/zavolanlab/zavolab_pyutils
  summary: Genomic data analysis utilities from Zavolan Lab
  doc_url: https://github.com/zavolanlab/zavolab_pyutils
 # readme
  license: MIT
 # readme
  license_file: LICENSE  # readme

extra:
  recipe-maintainers:
    - magmir71
