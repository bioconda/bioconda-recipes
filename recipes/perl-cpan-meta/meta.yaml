package:
  name: perl-cpan-meta
  version: "2.150013"

source:
  url: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/CPAN-Meta-2.150013.tar.gz
  sha256: 7c2bcbaf988d50ba8902a0d0cdf3c66b22aa7e968f5b67d1339a8995aff25dbd

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('perl-cpan-meta', max_pin="x") }}

requirements:
  host:
    - perl
    - perl-carp
    - perl-cpan-meta-yaml
    - perl-encode
    - perl-extutils-makemaker
    - perl-cpan-meta-requirements
    - perl-storable
    - perl-version
    - perl-data-dumper
    - perl-lib
    - perl-exporter
    - perl-file-temp
    - perl-json-pp
  run:
    - perl
    - perl-carp
    - perl-cpan-meta-yaml
    - perl-encode
    - perl-cpan-meta-requirements
    - perl-version
    - perl-exporter
    - perl-json-pp

test:
  imports:
    - CPAN::Meta
    - CPAN::Meta::Converter
    - CPAN::Meta::Feature
    - CPAN::Meta::History
    - CPAN::Meta::Merge
    - CPAN::Meta::Prereqs
    - CPAN::Meta::Spec
    - CPAN::Meta::Validator

about:
  home: "https://github.com/dagolden/cpan-meta"
  license: "Perl_5"
  summary: 'The distribution metadata for a CPAN dist.'
