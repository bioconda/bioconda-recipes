{% set version = "0.12.0" %}
{% set sha256 = "d63a6665b8f8413d2a3ccaa508f19aa86b909aeaf168b499bb26e20384dbde94" %}

package:
  name: treetime
  version: '{{ version }}'

source:
  url: https://github.com/neherlab/treetime/archive/v{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
  entry_points:
    - treetime = treetime.__main__:main
  run_exports:
    - {{ pin_subpackage('treetime', max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - numpy >=1.10.4
    - scipy >=0.16.1
    - biopython >=1.67,!=1.77,!=1.78
    - pandas >=0.17.1
    - matplotlib-base >=2.0

test:
  commands:
    - treetime -h
  imports:
    - treetime

about:
  home: "https://github.com/neherlab/treetime"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Maximum-Likelihood dating and ancestral inference for phylogenetic trees."
  doc_url: "https://treetime.readthedocs.io/en/latest/index.html"
  dev_url: "https://github.com/neherlab/treetime"

extra:
  identifiers:
    - doi:10.1093/ve/vex042
  recipe-maintainers:
    - corneliusroemer
    - rneher
    - ivan-aksamentov
