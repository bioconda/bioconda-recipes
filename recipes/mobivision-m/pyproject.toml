[build-system]
requires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["lib"]  

[project]
name = "MobiVision-M"
version = "1.3.2"
requires-python = ">=3.8.12,<3.9"
dependencies = [
    "numpy",
    "pandas",
    "scanpy",
    "rtoml",
    "structlog",
    "loguru",
    "mako",
    "matplotlib",
    "scikit-learn",
    "scipy",
    "leidenalg",
    "louvain"
]
