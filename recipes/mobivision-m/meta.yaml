{% set name = "MobiVision-M" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/Bicyclecardcn/MobiVision-M/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 847fdd044349f9c1aa59fcbef1dfb611d669519ed75161ea5c4d5e5eb22dc264

build:
  number: 0
  noarch: generic
  script: 
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
    - cp $SRC_DIR/mobivision-M $PREFIX/bin/mobivision-M
    - chmod +x $PREFIX/bin/mobivision-M
    - install -v -m 0755 bin/* $PREFIX/bin
    - mkdir -p $PREFIX/share/mobivision-m
    - cp -r config resources demo $PREFIX/share/mobivision-m
  run_exports:
    - {{ pin_subpackage('mobivision-m', max_pin="x") }}

requirements:
  host:
    - python >=3.8,<3.9
    - setuptools >=45
    - setuptools-scm >=6.2
    - pip
  run:
    - python >=3.8,<3.9
    - numpy
    - pandas
    - scanpy <=1.9.8
    - rtoml
    - structlog
    - loguru
    - mako
    - matplotlib-base
    - scikit-learn
    - scipy
    - leidenalg
    - louvain
    - star ==2.7.10b
    - samtools ==1.12
    - fastqc
    - cutadapt ==3.5
    - fastp

test:
  commands:
    - mobivision-M --help 

about:
  home: "https://github.com/Bicyclecardcn/MobiVision-M"
  summary: "MobiVision-M is a linux based software design specifically for single-microbe RNA sequencing analysis."
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  dev_url: "https://github.com/Bicyclecardcn/MobiVision-M"

extra:
  recipe-maintainers:
    - Bicyclecardcn
