{% set name = "prank" %}
{% set version = "251117" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ariloytynoja/prank-msa/archive/refs/tags/v.{{ version }}.tar.gz
  sha256: 992eb5980f3c8c331b2860093756b98491f501999d4d09fc4d16ea89d849a105

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}

test:
  commands:
    - prank -version

about:
  home: "http://wasabiapp.org/software/prank"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.md"
  summary: "PRANK is a probabilistic multiple alignment program for DNA, codon and amino-acid sequences."
  doc_url: "https://ariloytynoja.github.io/prank-msa"
  dev_url: "https://github.com/ariloytynoja/prank-msa"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:prank
    - doi:10.1007/978-1-62703-646-7_10
  skip-lints:
    - compiler_needs_stdlib_c
