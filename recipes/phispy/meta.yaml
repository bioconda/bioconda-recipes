{% set name = "phispy" %}
{% set ucname = "PhiSpy" %}
{% set version = "5.0.6" %}
{% set sha256 = "0a10a92a58ee0051f869d25f3ce7343101be7b810e3e3aa47df30ea10513af25" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - pkg-config
  host:
    - pip
    - python
  run:
    - biopython
    - numpy
    - python
    - hmmer
    - scikit-learn
    - bcbio-gff
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

test:
  imports:
    - PhiSpyModules
  commands:
    - PhiSpy.py -v

about:
  home: "https://github.com/linsalrob/PhiSpy"
  license: MIT
  license_family: MIT
  summary: "Prophage finder using multiple metrics"
  doc_url: "https://github.com/linsalrob/PhiSpy/blob/master/README.md"
  dev_url: "https://github.com/linsalrob/PhiSpy"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - linsalrob
  identifiers:
    - doi:10.5281/zenodo.3475717
