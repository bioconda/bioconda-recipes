{% set name = "MentaLiST" %}
{% set version = "0.2.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/WGS-TB/MentaLiST/archive/v{{ version }}.tar.gz
  sha256: 6cc0ff1f39e892b0a5c71e6d477404c6b72d368ab3436146248419d59863eb48

build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage("mentalist", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
  host:
    - julia >=1.1
    - libgfortran3 # [linux]
    - hdf5
    - mpfr
  run:
    - julia >=1.1
    - libgfortran3 # [linux]
    - hdf5
    - mpfr
    - libxml2
    - unzip

test:
  commands:
    - mentalist -h

about:
  home: https://github.com/WGS-TB/MentaLiST
  summary: The MLST pipeline developed by the PathOGiST research group.
  license: MIT
  license_file: LICENSE

extra:
  skip-lints:
    - should_be_noarch_generic
