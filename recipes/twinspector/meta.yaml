{% set name = "TwInsPEctor" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed"

source:
  url: https://github.com/clementlab/TwInsPEctor/archive/v{{ version }}.tar.gz
  sha256: ba694c26519bfc7f47b827fc8c1e1ed74ee705e4e893b0aa3185237f5f39e11e

requirements:
  build:
  host:
    - python
    - pip

  run:
    - python
    - numpy
    - crispresso2

test:
  imports:
    - TwInsPEctor
  commands:
    - TwInsPEctor -h

about:
  home: https://github.com/clementlab/TwInsPEctor
  license: LicenseRef-Proprietary
  license_file: LICENSE.txt
  summary: "TwInsPEctor: A tool for twin prime editing analysis."
