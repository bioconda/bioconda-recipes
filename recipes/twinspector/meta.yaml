{% set name = "TwInsPEctor" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x.x") }}

source:
  url: https://github.com/clementlab/TwInsPEctor/archive/v{{ version }}.tar.gz
  sha256: 24b027ea585e019f26995751522f54912153e6c90cfd95bc79d08ec33fbd3038

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.8
    - numpy
    - crispresso2
    - pandas
    - matplotlib-base
    - seaborn

test:
  imports:
    - TwInsPEctor
  commands:
    - TwInsPEctor -h

about:
  home: https://github.com/clementlab/TwInsPEctor
  license: MIT
  license_file: LICENSE
  summary: "TwInsPEctor: A tool for twin prime editing analysis."
