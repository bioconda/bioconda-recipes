{% set version = "0.1.0" %}

package:
  name: biofastq-a
  version: {{ version }}

source:
  url: https://github.com/DilaDeniz/BioFastq-a/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6ff76cae008076660f7c0d2871c848244edb949be032e7a043c20d56b2c57047

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('biofastq-a', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}

test:
  commands:
    - biofastq-a --version

about:
  home: https://github.com/DilaDeniz/BioFastq-a
  license: MIT
  license_file: LICENSE
  summary: High-performance FASTQ/FASTA quality analysis tool written in Rust

extra:
  recipe-maintainers:
    - DilaDeniz
