{% set name = "ampliclip" %}
{% set version = "1.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/dnieuw/ampliclip/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9bd1c53ebd570560a5ea590839a62de2784f43515ebea4864f9a2aa5171b42d3

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.7
    - setuptools
  run:
    - python >=3.7
    - biopython >=1.80
    - pysam >=0.20

test:
  commands:
    - ampliclip --help
    - ampliclip --version

about:
  home: https://github.com/dnieuw/ampliclip
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Tool to softclip reads in bam files based on amplicon primers
  description: |
    Ampliclip is a tool to softclip reads in bam files based on amplicon primers.
    It identifies primer locations using sequence alignment and correctly adjusts
    the CIGAR strings of overlapping reads.

extra:
  recipe-maintainers:
    - lvzon
