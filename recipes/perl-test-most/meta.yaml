package:
  name: perl-test-most
  version: "0.41"

source:
  url: https://cpan.metacpan.org/authors/id/D/DC/DCANTRELL/Test-Most-0.41.tar.gz
  sha256: 1399d99e88e5faf4e282cb6be92c42dfd2871f1dc4f4d96e8620666abf130261

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('perl-test-most', max_pin="x.x") }}

requirements:
  build:
    - make
  host:
    - perl
    - perl-exception-class
    - perl-test-deep
    - perl-test-differences
    - perl-test-exception
    - perl-test-warn

  run:
    - perl
    - perl-exception-class
    - perl-test-deep
    - perl-test-differences
    - perl-test-exception
    - perl-test-warn

test:
  imports:
    - Test::Most
    - Test::Most::Exception

about:
  home: http://metacpan.org/pod/Test-Most
  license: unknown
  summary: 'Most commonly needed test functions and features'
