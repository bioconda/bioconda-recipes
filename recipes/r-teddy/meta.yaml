{% set version = "1.0" %}

package:
  name: r-teddy
  version: {{ version }}

source:
  url: https://github.com/YeehanXiao/Teddy/archive/refs/heads/main.tar.gz
  sha256: 5dbb9e2eb3e15fb5834213806ba5143f918d5d4a161d67fe9c9b44e76fb037bb

build:
  number: 0

requirements:
  build:
    - make
    - cmake
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - zlib
    - xz
    - bzip2

  host:
    - r-base 4.2.*
    - zlib
    - xz
    - bzip2
    - r-dplyr
    - r-ggplot2
    - r-statmod
    - bioconductor-rtracklayer
    - bioconductor-genomicfeatures
    - bioconductor-rsamtools
    - bioconductor-genomicalignments
    - bioconductor-genomicranges
    - bioconductor-iranges
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - bioconductor-rsubread
    - bioconductor-deseq2
    - bioconductor-biocparallel
    - bioconductor-matrixgenerics
    - bioconductor-biostrings

  run:
    - r-base >=4.2,<4.3
    - r-dplyr
    - r-ggplot2
    - r-statmod
    - bioconductor-rtracklayer
    - bioconductor-genomicfeatures
    - bioconductor-rsamtools
    - bioconductor-genomicalignments
    - bioconductor-genomicranges
    - bioconductor-iranges
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - bioconductor-rsubread
    - bioconductor-deseq2
    - bioconductor-biocparallel
    - bioconductor-matrixgenerics
    - bioconductor-biostrings

test:
  commands:
    - $R -e "library('Teddy')"

about:
  home: https://github.com/YeehanXiao/Teddy
  summary: Analysis of TE-dependent gene isoforms
  license: GPL-3

extra:
  recipe-maintainers:
    - YeehanXiao
