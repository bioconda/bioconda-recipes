{% set version = "1.1.0" %}

package:
  name: r-teddy
  version: {{ version }}

source:
  url: https://github.com/YeehanXiao/Teddy/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5e4e152fc208311f1eb2b954841de283e9e1d73533fda27728260d9db8c1d45d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('r-teddy', max_pin="x") }}

requirements:
  build:
    - make
    - cmake
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - pkg-config
  host:
    - r-base 4.1.*
    - zlib
    - xz
    - bzip2
    - r-dplyr
    - r-ggplot2
    - r-statmod
    - bioconductor-rtracklayer
    - bioconductor-genomicfeatures
    - bioconductor-rsamtools
    - bioconductor-genomicalignments
    - bioconductor-genomicranges
    - bioconductor-iranges
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - bioconductor-rsubread
    - bioconductor-deseq2
    - bioconductor-biocparallel
    - bioconductor-matrixgenerics
    - bioconductor-biostrings

  run:
    - r-base >=4.1,<4.2
    - r-dplyr
    - r-ggplot2
    - r-statmod
    - bioconductor-rtracklayer
    - bioconductor-genomicfeatures
    - bioconductor-rsamtools
    - bioconductor-genomicalignments
    - bioconductor-genomicranges
    - bioconductor-iranges
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - bioconductor-rsubread
    - bioconductor-deseq2
    - bioconductor-biocparallel
    - bioconductor-matrixgenerics
    - bioconductor-biostrings

test:
  commands:
    - $R -e "library('Teddy')"

about:
  home: "https://github.com/YeehanXiao/Teddy"
  summary: "Analysis of TE-dependent gene isoforms."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  dev_url: "https://github.com/YeehanXiao/Teddy"

extra:
  recipe-maintainers:
    - YeehanXiao
