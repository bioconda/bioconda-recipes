{% set name = "virconsens" %}
{% set version = "1.2" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/dnieuw/virconsens/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 57ee2bad8c905e0cbb16a8065edbbb5e3b0eaa43532ab555b76e60e408cc72bb

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  entry_points:
    - virconsens=virconsens.virconsens:main
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python >=3.7
    - setuptools
  run:
    - python >=3.7
    - biopython >=1.70
    - pysam >=0.20

test:
  commands:
    - virconsens --help

about:
  home: https://github.com/dnieuw/virconsens
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Tool to create a consensus sequence from mapped virus Nanopore data
  description: |
    Virconsens is a tool to create a consensus sequence from Nanopore amplicon reads mapped to a reference in a mapping .bam file. It works by reading the mapping file position-by-position and counting the mutations, insertions and deletions. The mutation or deletion (or original nucleotide from the reference) with the highest count is considered the “consensus” at that position.
    
extra:
  recipe-maintainers:
    - lvzon
