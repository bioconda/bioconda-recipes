{% set name = "kegg-pathways-completeness" %}
{% set version = "1.4.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/kegg_pathways_completeness-{{ version }}.tar.gz
  sha256: d9bc31c473bdc5cc469aee7e8237dbde46466678ddfcdccca79a4ef039e542a0

build:
  entry_points:
    - give_completeness = kegg_pathways_completeness.bin.give_completeness:main
    - plot_modules_graphs = kegg_pathways_completeness.bin.plot_modules_graphs:main
    - make_graphs = kegg_pathways_completeness.bin.make_graphs:main
    - fetch_modules_data = kegg_pathways_completeness.bin.fetch_modules_data:main
    - parse_hmmer_table = kegg_pathways_completeness.bin.parse_hmmer_table:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 1
  run_exports:
    - {{ pin_subpackage('kegg-pathways-completeness', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=61.0
    - pip
  run:
    - python >=3.10
    - biopython >=1.83
    - networkx >=3.3
    - python-graphviz >=0.20.3
    - pydot >=3.0.4
    - click >=8.0.0
    - requests >=2.25.0
    - tqdm >=4.60.0

test:
  imports:
    - kegg_pathways_completeness

about:
  summary: "The tool counts completeness of each KEGG pathway for protein sequences."
  home: https://github.com/EBI-Metagenomics/kegg-pathways-completeness-tool
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/EBI-Metagenomics/kegg-pathways-completeness-tool

extra:
  recipe-maintainers:
    - chrisAta
    - KateSakharova
