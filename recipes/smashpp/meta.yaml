{% set version = "26.05" %}

package:
  name: smashpp
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('smashpp', max_pin="x") }}

source:
  url: https://github.com/smortezah/smashpp/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 30cf78eaedb835d96fb8118de81102b61c0b01d7fb0e47346f9cd30e60cf0388

requirements:
  build:
    - make
    - cmake >=4,<5
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}

test:
  commands:
    - smashpp -V 2>&1 | grep {{ version }}

about:
  home: https://github.com/smortezah/smashpp
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: GPL3
  summary: A fast tool to find and visualize rearrangements in DNA sequences

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
