{% set name = "funprofiler" %}
{% set commit = "806045cc6b9cbd1a2f227185356a4dd9217f3db9" %}
{% set version = "1.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/KoslickiLab/fmh-funprofiler/archive/806045cc6b9cbd1a2f227185356a4dd9217f3db9.tar.gz
  sha256: 1e79e543e02b89f33471339d3d4c29b6d04d609590118a09fef573fdb5701dad

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('funprofiler', max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - pandas
    - numpy
    - sourmash
    - biom-format

test:
  import:
    - funprofiler
  commands:
    - funcprofiler --help

about:
  home: https://github.com/KoslickiLab/fmh-funprofiler
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "funprofiler is a pipeline that leverages FracMinHash (implemented in sourmash) to functionally profile metagenomic samples, offering a faster and more memory-efficient alternative to alignment-based methods."
  dev_url: https://github.com/KoslickiLab/fmh-funprofiler

extra:
  identifiers:
    - doi:10.1093/bioinformatics/btae397
    - biotools:fmh-funprofiler
  recipe-maintainers:
    - miraep8
