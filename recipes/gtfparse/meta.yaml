{% set name = "gtfparse" %}
{% set version = "2.6.2" %}
{% set sha256 = "266438ad6baf2336fed0d121d2bc8811aa8db02783d8a3e6a3b50992ac79c5d1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gtfparse-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - polars >=0.20.2
    - numpy >=1.7
    - pandas >=2.1.0
    - pyarrow >=18.0.0

test:
  imports:
    - gtfparse

about:
  home: "https://github.com/openvax/gtfparse"
  summary: "Parsing library for extracting data frames of genomic features from GTF files."
  license: "APACHE-2.0"
  license_family: Apache
  license_file: LICENSE
  dev_url: "https://github.com/openvax/gtfparse"
