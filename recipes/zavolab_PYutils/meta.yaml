{% set version = "0.1.0" %}

package:
  name: zavolab_pyutils
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/z/zavolab_PYutils/zavolab_pyutils-{{ version }}.tar.gz
  sha256: c18a45a198929eece6f5e055b99b3192e58ca1114a6460346858a096d8f352a3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=3.8
    - numpy >=1.20.0

test:
  imports:
    - genomic_utils
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/zavolanlab/zavolab_PYutils
  summary: Genomic data analysis utilities from Zavolan Lab
  doc_url: https://github.com/zavolanlab/zavolab_PYutils
 # readme
  license: MIT
 # readme
  license_file: LICENSE  # readme

extra:
  recipe-maintainers:
    - AddYourGitHubIdHere
