{% set name = "pretextannotate" %}
{% set version = "1.0.1" %}
{% set sha256 = "0c1c5ef36f68a89efeb52c7410df575ac326a6140ba5a500ddc1b590ade70bcf" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sanger-tol/pretextannotate/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir

requirements:
  host:
    - python>=3.12
    - pip
    - setuptools
    - wheel
  run:
    - python>=3.12
    - pillow>=12.1.0

test:
  imports:
    - pretextannotate
  commands:
    - pretextannotate --version

about:
  home: https://github.com/sanger-tol/pretextannotate
  license: MIT
  license_file: LICENSE
  summary: A package to annotate a pretext snapshot with size and chromosome information
  description: |
    This package uses API calls to NCBI to retrieve chromosome length data
    (this can instead be given on the CLI). This data is then used to annotate
    a pretext snapshot with chromosome names and sizes.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64

  recipe-maintainers:
    - DLBPointon
