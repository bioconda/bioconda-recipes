{% set version = "1.6" %}

package:
  name: xxmotif
  version: {{ version }}

source:
  url: https://github.com/soedinglab/xxmotif/archive/{{ version }}.tar.gz
  sha256: 235eb8ad562c4757a549751bb290f443ff70c29a142edbff0f03440f097b61cb
  patches:
    - fix-build.patch
    - 0002-branch-osx.patch  # [osx]

build:
  number: 5
  run_exports:
    - {{ pin_subpackage('xxmotif', max_pin="x") }}

requirements:
  build:
    - make
    - cmake
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - clangdev  # [osx]
    - pkg-config
  run:
    - perl

test:
  commands:
    - test -f ${PREFIX}/bin/XXmotif

about:
  home: "https://github.com/soedinglab/xxmotif"
  summary: "eXhaustive, weight matriX-based motif discovery in nucleotide sequences."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  dev_url: "https://github.com/soedinglab/xxmotif"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:xxmotif
    - doi:10.1093/nar/gks602
    - doi:10.1101/gr.139881.112
