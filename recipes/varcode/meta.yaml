{% set name = "varcode" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 29933172b276233a821535ed2e7e41214569a869cdfafb7987a60fe020a34395

build:
  number: 0
  noarch: python
  entry_points:
    - varcode-genes = varcode.cli.genes_script:main
    - varcode = varcode.cli.effects_script:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - biopython >=1.64
    - memoized-property >=1.0.2
    - numpy >=2.0.0
    - pandas >=0.15
    - pyensembl >=1.8.1
    - python
    - pyvcf3 >=1.0.0
    - sercol >=0.1.4
    - serializable >=0.2.1

test:
  imports:
    - test
    - varcode
    - varcode.cli
    - varcode.effects
  commands:
    - varcode-genes --help
    - varcode --help

about:
  home: "https://github.com/openvax/varcode"
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  summary: "Variant annotation in Python."
  dev_url: "https://github.com/openvax/varcode"

extra:
  recipe-maintainers:
    - jonasscheid
