{% set name = 'genoboo' %}
{% set version = '0.4.19' %}
{% set sha256 = '30dfa282930726bfcb15b8d03ca680928cf200535e413b207db07c376b175b4c' %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/gogepp/genoboo/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('genoboo', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - make
  host:
    - jq
    - nodejs
    - python >=3
  run:
    - blast
    - nodejs
    - mongodb >=5.0

test:
  commands:
    - genoboo -v

about:
  home: https://github.com/gogepp/genoboo
  license: AGPL-3.0
  license_file: LICENSE
  summary: A collaborative notebook for comparative genomics (active fork of GeneNoteBook)
