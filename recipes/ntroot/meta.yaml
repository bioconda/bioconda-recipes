{% set name = "ntRoot" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/ntRoot/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: c31ce1d428159de25135b6956240de51217fdc1262a44d031e6fd68335a879f0

build:
  number: 0
  noarch: generic
  run_exports: 
    - {{ pin_subpackage("ntroot", max_pin="x") }}

requirements:
  host:
    - python  >=3.8,<3.13 # CI fails for python 3.13
    - perl
  run:
    - python >=3.8,<3.13
    - snakemake
    - samtools
    - ntedit >=2.0.2
    - perl
    - bedtools

test:
  commands:
    - ntroot -h

about:
  home: https://github.com/BirolLab/ntroot
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'Ancestry inference from genomic data'
