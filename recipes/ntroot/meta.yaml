{% set name = "ntRoot" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/ntRoot/releases/download/v{{ version }}/{{ name }}-{{ version }}.tar.gz
  sha256: e4e0fb6c264818a67d671e08732d314913182d37acac637be605ebfc2eb9ea8c

build:
  number: 0
  noarch: generic
  run_exports: 
    - {{ pin_subpackage("ntroot", max_pin="x") }}

requirements:
  host:
    - perl
  run:
    - python <3.13
    - snakemake
    - samtools
    - ntedit >=2.0.2
    - perl
    - bedtools

test:
  commands:
    - ntroot -h

about:
  home: https://github.com/BirolLab/ntroot
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'Ancestry inference from genomic data'
