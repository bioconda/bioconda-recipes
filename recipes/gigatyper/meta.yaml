{% set name = "gigatyper" %}
{% set version = "1.0.0" %}

package:
  name: {{ name | lower }}
  version: {{ version }}

source:
  url: https://github.com/rpetit3/gigatyper/archive/v{{ version }}.tar.gz
  sha256: a263096c94cdac43ff146acebcd8c44d2782338730ed2de3ef302332eb33c2af

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run:
    - mlst >=2.32.2
    - python >=3.12
    - rich-click

test:
  commands:
    - gigatyper --version
    - gigatyper --help
    - gigatyper --check

about:
  home: "https://github.com/rpetit3/gigatyper"
  license: MIT
  license_file: LICENSE
  summary: "Run all available MLST schemes for a species against an assembly"

extra:
  recipe-maintainers:
    - rpetit3



