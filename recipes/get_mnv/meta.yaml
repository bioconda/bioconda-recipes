{% set name = "get_mnv" %}
{% set version = "1.1.2" %}
{% set sha256 = "dd64b4c54434e3ed17f220c95e0e16014a92d2868ffbb38a6152264a9b9283a0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/PathoGenOmics-Lab/{{ name }}/archive/refs/tags/{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

build:
  number: 0
  script: |
    set -xe
    export LANG=C.UTF-8
    export LC_ALL=C.UTF-8
    export RUST_BACKTRACE=1
    cargo install --no-track --locked --verbose --root "${PREFIX}" --path . --bin get_mnv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - pkg-config

test:
  commands:
    - get_mnv --help
    - get_mnv --version

about:
  home: "https://github.com/PathoGenOmics-Lab/get_mnv"
  license: "AGPL-3.0-or-later"
  license_family: AGPL
  license_file: LICENSE
  summary: "Tool to identify Multi-Nucleotide Variants (MNVs) in genomic sequences."
  description: |
    get_MNV is a tool designed to identify Multi-Nucleotide Variants (MNVs) within the same codon in genomic sequences, providing more accurate annotation for genomic data. Pure Rust implementation with no C dependencies.
  doc_url: "https://github.com/PathoGenOmics-Lab/get_mnv"
  dev_url: "https://github.com/PathoGenOmics-Lab/get_mnv"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - paururo
    - PathoGenOmics-Lab
  categories:
    - Genomics
    - Variant Analysis
