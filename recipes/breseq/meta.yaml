{% set version = "0.40.0" %}

package:
  name: breseq
  version: {{ version }}

source:
  url: https://github.com/barricklab/breseq/releases/download/v{{ version }}/breseq-{{ version }}-Source.tar.gz
  sha256: da179b5c778e6d1b9cb8615a777300b2232374c6ab333644c97418b835511d6b

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('breseq', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler("cxx") }}
    - {{ stdlib('c') }}
    - autoconf
    - automake
    - libtool
    - pkg-config
  host:
    - zlib
  run:
    - r-base
    - r-cairo
    - bowtie2 >=2.0.0,!=2.0.3,!=2.0.4,!=2.3.1

test:
  commands:
    - breseq --help 2>&1 | grep Usage
    - gdtools --help 2>&1 | grep Usage

about:
  home: "https://github.com/barricklab/breseq"
  license: "GPL-2.0-or-later"
  license_family: GPL
  license_file: COPYING
  summary: "A computational pipeline for finding mutations relative to a reference sequence in short-read DNA re-sequencing data."
  doc_url: "https://barricklab.org/twiki/pub/Lab/ToolsBacterialGenomeResequencing/documentation"
  dev_url: "https://github.com/barricklab/breseq"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:breseq
    - biotools:breseq_bam2aln
    - biotools:breseq_bam2cov
    - usegalaxy-eu:breseq
