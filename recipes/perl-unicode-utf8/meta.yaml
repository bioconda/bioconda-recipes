{% set name = "perl-unicode-utf8" %}
{% set version = "0.65" %}
{% set sha256 = "a10414b85516fddeeea3f8ac16118e4705b9a779b81360f5c8047d6273b3f43f" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/C/CH/CHANSEN/Unicode-UTF8-0.65.tar.gz
  sha256: {{ sha256 }}

build:
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  number: 0

requirements:
  build:
    - make
    - {{ compiler('cxx') }}

  host:
    - perl
    - perl-test-fatal
    - perl-exporter
    - perl-encode
    - perl-extutils-makemaker
    - perl-carp
  run:
    - perl
    - perl-carp
    - perl-exporter

test:
  imports:
    - Unicode::UTF8

about:
  home: http://metacpan.org/pod/Unicode::UTF8
  license: perl_5
  summary: 'Encoding and decoding of UTF-8 encoding form'

extra:
  # osx-arm64 is erroring due to missing perl-encode in conda forge
  additional-platforms:
    - linux-aarch64
