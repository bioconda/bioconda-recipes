{% set name = "perl-unicode-utf8" %}
{% set version = "0.70" %}
{% set sha256 = "4ed46cdd3b6196e3f803ce3d01fa94fba9834ab86a0b1d3978e547fe60cd2e26" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/C/CH/CHANSEN/Unicode-UTF8-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
  host:
    - perl
    - perl-test-fatal
    - perl-exporter
    - perl-encode
    - perl-extutils-makemaker
    - perl-carp
  run:
    - perl
    - perl-carp
    - perl-exporter

test:
  imports:
    - Unicode::UTF8

about:
  home: "https://metacpan.org/pod/Unicode::UTF8"
  license: "Perl_5"
  summary: "Encoding and decoding of UTF-8 encoding form."
  doc_url: "https://metacpan.org/pod/Unicode::UTF8"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
