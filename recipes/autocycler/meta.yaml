{% set name = "autocycler" %}
{% set version = "0.6.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rrwick/Autocycler/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5bb281c3216ac266fc17fcda74b99fea11fdf7b01b5e32656d515fe470109efa
  patches:
    - fix_type_inference.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('autocycler', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
    - clangdev
    - make
    - cmake

test:
  commands:
    - autocycler --help

about:
  home: https://github.com/rrwick/Autocycler
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "A tool for generating consensus long-read assemblies for bacterial genomes."
  doc_url: https://github.com/rrwick/Autocycler/wiki
  dev_url: https://github.com/rrwick/Autocycler

extra:
  identifiers:
    - doi:10.5281/zenodo.14642607
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - rrwick
    - mbhall88
