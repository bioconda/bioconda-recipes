{% set version = "1.14.1" %}
{% set name = "netZooR" %}
{% set bioc = "3.22" %}

package:
  name: bioconductor-{{ name|lower }}
  version: '{{ version }}'

source:
  url:
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/{{ name }}_{{ version }}.tar.gz
    - https://bioconductor.org/packages/{{ bioc }}/bioc/src/contrib/Archive/{{ name }}/{{ name }}_{{ version }}.tar.gz
    - https://bioarchive.galaxyproject.org/{{ name }}_{{ version }}.tar.gz
    - https://depot.galaxyproject.org/software/bioconductor-{{ name|lower }}/bioconductor-{{ name|lower }}_{{ version }}_src_all.tar.gz
  md5: d69ac66fa7bb2cd00123134c9e51d3f8

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports: '{{ pin_subpackage("bioconductor-netzoor", max_pin="x.x") }}'
  noarch: generic

# Suggests: testthat (>= 2.1.0), knitr, rmarkdown, pkgdown, viridisLite, STRINGdb, GOstats, AnnotationDbi, GO.db, org.Hs.eg.db, matrixTests, gplots, nnet, vegan, reshape2, penalized, ggplot2, ggdendro, grid, assertthat, tidyr, dplyr, GeneNet, loo, rARPACK, corpcor, biomaRt, downloader, edgeR, limma, preprocessCore, readr, RColorBrewer, quantro, fgsea
requirements:
  host:
    - bioconductor-biobase >=2.70.0,<2.71.0
    - bioconductor-pandar >=1.42.0,<1.43.0
    - r-base
    - r-data.table
    - r-doparallel
    - r-foreach
    - r-igraph
    - r-mass
    - r-matrix
    - r-matrixstats
    - r-reshape
    - r-reticulate
  run:
    - bioconductor-biobase >=2.70.0,<2.71.0
    - bioconductor-pandar >=1.42.0,<1.43.0
    - r-base
    - r-data.table
    - r-doparallel
    - r-foreach
    - r-igraph
    - r-mass
    - r-matrix
    - r-matrixstats
    - r-reshape
    - r-reticulate

test:
  commands:
    - $R -e "library('{{ name }}')"

about:
  home: https://bioconductor.org/packages/{{ bioc }}/bioc/html/{{ name }}.html
  license: GPL-3
  summary: A Menagerie of Methods for the Inference and Analysis of Gene Regulatory Networks
  description: Unifies the implementations of several Network Zoo methods (netzoo, netzoo.github.io) into a single package by creating interfaces between network inference and network analysis methods. Currently, the package has 3 methods for network inference including PANDA and its optimized implementation OTTER (network reconstruction using multiple lines of biological evidence), LIONESS (single-sample network inference), and EGRET (genotype-specific networks). Network analysis methods include CONDOR (community detection), ALPACA (differential community detection), CRANE (significance estimation of differential modules), MONSTER (estimation of network transition states). In addition, YARN allows to process gene expression data for tissue-specific analyses and SAMBAR infers missing mutation data based on pathway information.
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

