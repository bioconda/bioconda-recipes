{% set version = "0.2.6" %}
{% set sha256 = "7f77cb7281a3c76e1bc7b82a8448f520102d4c0440c8104712aa6f205215115e" %}

package:
  name: breaktracer
  version: '{{ version }}'

source:
  url: https://github.com/tobiasrausch/breaktracer/archive/v{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('breaktracer', max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
  host:
    - zlib
    - bzip2
    - xz
    - boost-cpp
    - htslib
  run:
    - boost-cpp
    - htslib

test:
  commands:
    - breaktracer --help

about:
  home: https://github.com/tobiasrausch/breaktracer
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Tracing inserted sequence fragments at structural variant breakpoints using long-reads
  dev_url: "https://github.com/tobiasrausch/breaktracer"
  doc_url: "https://github.com/tobiasrausch/breaktracer/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
