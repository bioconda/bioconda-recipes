{% set name = "pandepth" %}
{% set version = "2.26" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/HuiyangYu/PanDepth/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 8f0227cc0551f40f389e161a3621dea687560a49a1d2271009ba87e5872704d3

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - htslib
    - libdeflate
    - zlib
  run:
    - htslib

test:
  commands:
    - pandepth -h

about:
  home: https://github.com/HuiyangYu/PanDepth
  license: MIT
  license_family: MIT
  license_file: LICENSE 
  summary: An ultra-fast and efficient genomic tool for coverage calculation.
  description: |
    PanDepth is an ultra-fast and efficient tool for calculating coverage and depth from sequencing alignments. 
    It outperforms other tools in computation time and memory efficiency for both BAM and CRAM-format 
    alignment files, utilizing chromosome parallel computation and optimized data structures.
  dev_url: https://github.com/HuiyangYu/PanDepth

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
