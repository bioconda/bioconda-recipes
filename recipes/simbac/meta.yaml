{% set name = "simbac" %}
{% set version = "0.1a" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/tbrown91/SimBac/archive/0b6bcb01dced7207d41a22322220cccc95ed8b7d.tar.gz
  sha256: 00224377bf1fbb8debcb2d3218d04b443dc06643d3dd520515d39809420864d5

build:
  number: 7
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
  host:
    - gsl
  run:
    - gsl

test:
  commands:
    - SimBac -h | grep "SimBac \[OPTIONS\]"

about:
  home: "https://github.com/tbrown91/SimBac"
  license: "GPL-3.0-or-later"
  summary: "SimBac simulates bacterial genomes with the clonal genealogy under a coalescent model with recombination."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1099/mgen.0.000044
  skip-lints:
    - compiler_needs_stdlib_c
