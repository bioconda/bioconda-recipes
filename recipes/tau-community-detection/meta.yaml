{% set version = "1.2.10" %}

package:
  name: tau-community-detection
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/tau-community-detection/tau_community_detection-{{ version }}.tar.gz
  sha256: 9961d32a8d0d6bf0a2b6c732b41cef5912294daa37d08f1fcdec81420d8b8c53

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - networkx >=3.4
    - numpy >=2.0
    - python-igraph >=0.10  
    - scikit-learn >=1.6

test:
  imports:
    - tau_community_detection
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/tau-community-detection/
  summary: Community detection via Louvain/Leiden + Genetic Algorithm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - HillelCharbit
