{% set version = "1.2.8" %}

package:
  name: tau-community-detection
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/tau-community-detection/tau_community_detection-{{ version }}.tar.gz
  sha256: d8a794265350f172d805da9bbfd302e769ca451b47d750bfac1a7512a4b441d2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('tau-community-detection', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools ==75.3.2
    - wheel ==0.43.0
    - pip
  run:
    - python >=3.10
    - networkx >=3.2.1
    - numpy >=1.26.4
    - python-igraph >=1.0.0
    - scikit-learn >=1.6

test:
  imports:
    - tau_community_detection
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/tau-community-detection/
  summary: Community detection via Louvain/Leiden + Genetic Algorithm
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - HillelCharbit
