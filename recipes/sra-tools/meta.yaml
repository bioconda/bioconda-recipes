{% set name = "sra-tools" %}
{% set version = "3.4.1" %}
{% set sha256_linux64  = "f4850a32975596ca0755d928b166ecb0095918284ea992fba10f1acb3fcff64d" %}
{% set sha256_osx64    = "8e19acfc0be8544b982b5233ae3f9469df31a317e50d63e984de034587e77488" %}
{% set sha256_osxarm64 = "b38ec90f9c99805533c90684310b0495288890559c5af194f1074b72f4e95255" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # Linux x86_64
  - url: https://ftp-trace.ncbi.nlm.nih.gov/sra/sdk/{{ version }}/sratoolkit.{{ version }}-alma_linux64.tar.gz # [linux and x86_64]
    sha256: {{ sha256_linux64 }} # [linux and x86_64]
    folder: sra-tools # [linux and x86_64]

  # macOS Intel
  - url: https://ftp-trace.ncbi.nlm.nih.gov/sra/sdk/{{ version }}/sratoolkit.{{ version }}-mac-x86_64.tar.gz # [osx and x86_64]
    sha256: {{ sha256_osx64 }} # [osx and x86_64]
    folder: sra-tools # [osx and x86_64]

  # macOS Apple Silicon
  - url: https://ftp-trace.ncbi.nlm.nih.gov/sra/sdk/{{ version }}/sratoolkit.{{ version }}-mac-arm64.tar.gz # [osx and arm64]
    sha256: {{ sha256_osxarm64 }} # [osx and arm64]
    folder: sra-tools # [osx and arm64]

build:
  number: 0
  skip: true # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  run:
    - ca-certificates
    - curl
    - ossuuid  # [linux]
    - perl
    - perl-xml-libxml
    - perl-uri

test:
  commands:
    # create config file with /LIBS/GUID value so tests pass; new GUID value will be created in user's home dir upon installation via post-link.sh
    - fastq-dump --help > /dev/null
    - fasterq-dump --help > /dev/null
    - prefetch --help > /dev/null
    - sam-dump --help > /dev/null
    - sra-pileup --help > /dev/null
    - vdb-config --help > /dev/null
    - vdb-decrypt --help > /dev/null

about:
  home: "https://github.com/ncbi/sra-tools"
  license: "Public Domain"
  summary: "The SRA Toolkit and SDK from NCBI."
  description:  |
    "The SRA Toolkit and SDK from NCBI is a collection of tools and libraries
    for using data in the INSDC Sequence Read Archives."
  dev_url: "https://github.com/ncbi/sra-tools"
  doc_url: "https://github.com/ncbi/sra-tools/wiki"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  notes: 'After installation, you should run the configuration tool: ./vdb-config
    -i. This tool will setup your download/cache area for downloaded files and references.'
  identifiers:
    - biotools:sra-tools
