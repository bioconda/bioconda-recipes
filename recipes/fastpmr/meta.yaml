{% set name = "fastpmr" %}
{% set version = "0.2.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ehuangc/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: "d32c5a0f48a3fb11823b4c05ef3c9b7b054ba20f58c4be361e04cde334ab5d94"

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - make
    - cargo-bundle-licenses
    - pkg-config

test:
  commands:
    - fastpmr --help

about:
  home: "https://github.com/ehuangc/fastpmr"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Calculate pairwise mismatch rates (PMRs) between ancient DNA sequences."
  dev_url: "https://github.com/ehuangc/fastpmr"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - ehuangc
  skip-lints:
    - compiler_needs_stdlib_c
