{% set name = "fastpmr" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/ehuangc/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: "5f7a8a7e0908a7fb14e5f4379a02ab9093a6e705c91e0eff7ff722c56c766de8"

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config

test:
  commands:
    - fastpmr --help

about:
  home: "https://github.com/ehuangc/fastpmr"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: "Calculate pairwise mismatch rates (PMRs) between ancient DNA sequences."
  dev_url: "https://github.com/ehuangc/fastpmr"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - ehuangc
