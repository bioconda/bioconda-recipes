{% set name = "perl-crypt-openssl-bignum" %}
{% set version = "0.09" %}
{% set sha256 = "234e72fb8396d45527e6fd45e43759c5c3f3a208cf8f29e6a22161a996fd42dc" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/K/KM/KMX/Crypt-OpenSSL-Bignum-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - make
  host:
    - perl
  run:
    - perl

test:
  imports:
    - Crypt::OpenSSL::Bignum
    - Crypt::OpenSSL::Bignum::CTX

about:
  home: "https://metacpan.org/pod/Crypt::OpenSSL::Bignum"
  license: "Perl_5"
  summary: "OpenSSL's multiprecision integer arithmetic."
  doc_url: "https://metacpan.org/pod/Crypt::OpenSSL::Bignum"
  dev_url: "https://github.com/kmx/perl-Crypt-OpenSSL-Bignum"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
