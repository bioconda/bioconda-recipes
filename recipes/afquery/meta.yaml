{% set name = "afquery" %}
{% set version = "0.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 28ddc9afe5260ecdefab83679e0633684980666c49812215d1233ce3bae4fb7f

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - afquery = afquery.cli:cli
  run_exports:
    - {{ pin_subpackage("afquery", max_pin="x.x") }}

requirements:
  host:
    - pip
    - python >=3.10
    - hatchling
    - hatch-vcs
  run:
    - python >=3.10
    - pyroaring >=0.4.8
    - pyarrow >=14.0
    - duckdb >=0.10
    - click >=8.1
    - cyvcf2 >=0.30
    - tqdm >=4.60
    - pyranges >=0.1.2,<0.2

test:
  imports:
    - afquery
  commands:
    - afquery --help

about:
  home: https://github.com/dlopez-bioinfo/afquery
  license: MIT
  license_file: LICENSE
  summary: Genomic allele frequency query engine with bitmap-encoded genotypes

extra:
  recipe-maintainers:
    - dlopez-bioinfo
