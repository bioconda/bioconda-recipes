{% set name = "perl-crypt-openssl-rsa" %}
{% set version = "0.41" %}
{% set sha256 = "82fa839897b88e9c245b6265f3be26d3bc879cae4c7a8151fad4a307c3366822" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/T/TI/TIMLEGGE/Crypt-OpenSSL-RSA-0.41.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - perl
    - perl-crypt-openssl-bignum
    - perl-crypt-openssl-guess
    - perl-crypt-openssl-random
    - perl-test-more
    - openssl
  run:
    - perl

test:
  imports:
    - Crypt::OpenSSL::RSA

about:
  home: "https://github.com/cpan-authors/Crypt-OpenSSL-RSA"
  license: "Perl_5"
  summary: "RSA encoding and decoding, using the openSSL libraries."
  dev_url: "https://github.com/cpan-authors/Crypt-OpenSSL-RSA"
  doc_url: "https://metacpan.org/pod/Crypt::OpenSSL::RSA"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
