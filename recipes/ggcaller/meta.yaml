{% set name = "ggCaller" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bacpop/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 89e34fbc92c8595b19a27c9f3852026229ff88e2f977df5e08ba0e8ca5f6169a

build:
  number: 0
  skip: True  # [osx_arm64 or py < 39]
  entry_points:
    - ggcaller = ggCaller.__main__:main
  run_exports:
    - {{ pin_subpackage("ggcaller", max_pin="x") }}

requirements:
  build:
    - {{ compiler('c')}}
    - {{ compiler('cxx') }}
    - cmake >=3.10
    - make
    - tbb =2021
    - tbb-devel =2021
    - mkl-devel =2022
    - openblas  # [osx]
    - protobuf
    - pytorch-cpu =1.10
    - pytorch =1.10
  host:
    - python >=3.9
    - pybind11
    - bifrost >=1.2
    - zlib
    - pip
    - bzip2
    - pytorch-cpu =1.10
    - pytorch =1.10
    - boost-cpp
    - setuptools
    - llvm-openmp # [osx]
    - libgomp # [linux]
    - mkl-devel =2022
    - lapack # [osx]
    - openblas # [osx]
    - eigen =3.3
    - tbb =2021
    - tbb-devel =2021
    - protobuf
  run:
    - python >=3.9
    - numpy
    - scipy
    - pandas
    - bifrost >=1.2
    - biopython =1.80
    - bcbio-gff
    - pytorch-cpu =1.10
    - pytorch =1.10
    - zlib
    - pthread-stubs
    - matplotlib-base
    - xorg-libxi
    - xorg-libxcursor
    - xorg-libxdamage
    - xorg-libxcomposite
    - xorg-libxrandr
    - xorg-libxinerama
    - xorg-libxpm
    - xorg-libxaw
    - xorg-libxfixes
    - uncertainties
    - python-edlib
    - joblib
    - gffutils
    - python-wget
    - boost-cpp
    - networkx

test:
  imports:
    - ggCaller_cpp
    - ggCaller
  commands:
    - ggcaller -h | grep -q "Generates ORFs from a Bifrost graph."

about:
   home: https://github.com/bacpop/ggCaller
   license: MIT
   license_family: MIT
   license_file: LICENSE
   summary: 'A de Bruijn graph-based gene-caller and pangenome analysis tool'
