{% set name = "pyfish" %}
{% set version = "1.1.1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 9c5b1da5e3c17f722c4b98356d0e9bf8b8725dfbfc1ee2d83344781a21b90096

build:
  noarch: python
  number: 0
  entry_points:
    - pyfish = pyfish.main:run
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - pip
    - python
  run:
    - matplotlib-base >=3.0
    - numpy >=1.14
    - pandas >=1.0
    - python >=3.8
    - scipy >=1.0

test:
  imports:
    - pyfish
  commands:
    - pyfish --help

about:
  home: "https://bitbucket.org/schwarzlab/pyfish"
  license: GPL-3
  license_file: LICENSE
  summary: "Plotting tool for evolutionary population dynamics. Creates a Fish (Muller) plot."

extra:
  recipe-maintainers:
    - tlkaufmann
    - xstreck1
