{% set version = "3.0.0" %}
{% set name = "pling" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/iqbal-lab-org/{{ name|lower }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 55bf252345b715a98821b004c27fcd154ef0f004d105daf056a157e32d3f279f

build:
  number: 0
  noarch: python
  script: "pip install . --no-deps --ignore-installed --no-cache-dir -vvv"
  entry_points:
    - pling = pling.run_pling:main
  run_exports:
    - {{ pin_subpackage("pling", max_pin="x") }}

requirements:
  host:
    - python >=3.9,<3.12
    - pip
  run:
    - python >=3.9,<3.12
    - sourmash >=4.4.0,<5.0.0
    - pandas >=1.5.3
    - numpy >=1.26.0
    - intervaltree >=3.0.2
    - mummer4
    - glpk >=5.0
    - snakemake >=7.25.4,<8.0.0
    - plasnet >=0.7.0
    - dingII
test:
  imports:
    - pling

  commands:
    - pling --help

about:
  home: https://github.com/iqbal-lab-org/pling
  license: LICENSE
  license_family: MIT
  summary: 'Pling computes the rearrangement distance between plasmids and clusters on their basis '

