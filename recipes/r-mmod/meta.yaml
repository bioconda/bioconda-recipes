{% set name = "mmod" %}

package:
  name: r-{{ name|lower }}
  version: "1.3.3"

source:
  url: https://cran.r-project.org/src/contrib/mmod_1.3.3.tar.gz
  sha256: c40bc308d1104a3eb10bfe47fd2efa7ac3247b5d8a7194a47c6a615a0f42e6b7

build:
  number: 0
  noarch: generic
  script: |
    mkdir -p $PREFIX/lib/R/library
    R CMD INSTALL --library=$PREFIX/lib/R/library .

requirements:
  build:
    - r-base >=2.6.0
    - r-devtools
    - r-adegenet >=2.0
    - r-pegas
  run:
    - r-base >=2.6.0
    - r-adegenet >=2.0
    - r-pegas

test:
  commands:
    - R -e "library(mmod)"

about:
  home: https://github.com/dwinter/mmod
  license: MIT
  license_file: LICENSE
  summary: Modern Measures of Population Differentiation.
  description: Provides functions for measuring population divergence from genotypic data.
  doc_url: https://github.com/dwinter/mmod
  bugtrack_url: https://github.com/dwinter/mmod/issues

extra:
  recipe-maintainers:
    - ton-nom-utilisateur
