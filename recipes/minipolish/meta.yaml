{% set name = "minipolish" %}
{% set version = "0.2.0" %}
{% set sha256 = "5c376775cb44773264d68c7018f5123eed3b7b73cbce35419812419488813441" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rrwick/Minipolish/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  entry_points:
    - minipolish = minipolish.__main__:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.6
    - pip
    - setuptools
  run:
    - python >=3.6
    - python-edlib
    - minimap2
    - racon

test:
  commands:
    - minipolish --version

about:
  home: "https://github.com/rrwick/Minipolish"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "A tool for Racon polishing miniasm assemblies."
  dev_url: "https://github.com/rrwick/Minipolish"
  doc_url: "https://github.com/rrwick/Minipolish/blob/v{{ version }}/README.md"

extra:
  recipe-maintainers:
    - thanhleviet
    - rrwick
  identifiers:
    - doi:10.12688/f1000research.21782.4
    - biotools:minipolish
    - usegalaxy-eu:minipolish
