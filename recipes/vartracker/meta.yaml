{% set version = "2.2.0" %}

package:
  name: vartracker
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/v/vartracker/vartracker-{{ version }}.tar.gz
  sha256: 65be4bc4bdfe84a1dc15933e5830d7f43ec970c26315f986e406446095757bab

build:
  entry_points:
    - vartracker = vartracker.main:main
    - parse_pokay = vartracker.data.parse_pokay:main
  noarch: python
  run_exports:
    - {{ pin_subpackage('vartracker', max_pin="x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - pandas >=1.3.0
    - numpy >=1.20.0
    - matplotlib-base >=3.5.0
    - seaborn >=0.11.0
    - cyvcf2 >=0.30.0
    - biopython >=1.83,<2
    - snakemake-minimal >=9
    - bcftools
    - htslib
    - samtools
    - lofreq
    - fastp
    - bwa

test:
  imports:
    - vartracker
  commands:
    - vartracker --help
    - parse_pokay --help
    - vartracker bam --test --snakemake-dryrun --outdir /tmp/smoke-bam
    - test -f /tmp/smoke-bam/run_metadata.json

about:
  home: https://github.com/charlesfoster/vartracker
  summary: Track the persistence (or loss) of mutations during long-term passaging
  doc_url: https://github.com/charlesfoster/vartracker/blob/main/README.md
  dev_url: https://github.com/charlesfoster/vartracker
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - charlesfoster
