package:
  name: snoopy
  version: 0.4.3


source:
  url: https://github.com/RolandFaure/snoopy/archive/v0.4.3.tar.gz
  sha256: 7eac6988a40d4d6bd608e4cdf1a0bdd15daffd43a9cb954cff4f631d5e134168

build:
  number: 0
  noarch: python
  script: pip install --no-deps --ignore-installed .
  run_exports:
    - {{ pin_subpackage("snoopy", max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy
    - scipy
    - pandas
    - pysam
    - scikit-learn

test:
  imports:
    - sklearn
    - scipy
    - pysam
  commands:
    - snoopy --help

about:
  home: https://github.com/RolandFaure/snoopy
  license: MIT
  license_family: MIT
  summary: Metagenomic SNP caller for strain-level variant detection in long reads
  description: SNooPy detects strain-level nucleotide polymorphisms in long read metagenomic data
  doc_url: https://github.com/RolandFaure/snoopy
  dev_url: https://github.com/RolandFaure/snoopy

extra:
  recipe-maintainers:
    - RolandFaure
