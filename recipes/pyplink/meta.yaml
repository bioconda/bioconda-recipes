{% set name = "pyplink" %}
{% set version = "1.3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/pyplink-{{ version }}.tar.gz
  sha256: 23a90a1cb762681bc575c9204074b28f4a42816fc8179115bfbe4c17c3b5df6e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('pyplink', max_pin="x.x") }}
    
requirements:
  host:
    - python
    - pip
  run:
    - python >=3.8
    - numpy >=1.8.2
    - pandas >=0.17.1
    - six >=1.9.0

test:
  imports:
    - pyplink
  commands:
    - pip check
    - python -m pyplink.tests
  requires:
    - pip

about:
  home: https://github.com/lemieuxl/pyplink
  summary: Python module to read binary Plink files.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - nebfield
