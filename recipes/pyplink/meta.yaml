{% set name = "pyplink" %}
{% set version = "1.3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pyplink-{{ version }}.tar.gz
  sha256: 23a90a1cb762681bc575c9204074b28f4a42816fc8179115bfbe4c17c3b5df6e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
    
requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy >=1.8.2
    - pandas >=0.17.1
    - six >=1.9.0

test:
  imports:
    - pyplink
  commands:
    - python -m pyplink.tests

about:
  home: "https://github.com/lemieuxl/pyplink"
  summary: "Python module to read binary Plink files."
  license: MIT
  license_family: MIT
  license_file: "LICENSE.txt"
  dev_url: "https://github.com/lemieuxl/pyplink"

extra:
  recipe-maintainers:
    - nebfield
