{% set name = "r-pcgrr" %}
{% set version = "2.2.5" %}
{% set sha256 = "d97069ef9bd14377930a639ba336fe986784f2a6f8f6722b31505fb1e0c658ed" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/sigven/pcgr/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  folder: pcgrr

build:
  number: 0
  noarch: generic
  run_exports: {{ pin_subpackage("r-pcgrr", max_pin="x.x") }}
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-assertable
    - r-assertthat
    - bioconductor-biostrings
    - r-bslib
    - r-caret
    - r-crosstalk
    - r-dplyr
    - r-dt
    - r-formattable
    - bioconductor-genomeinfodb
    - r-ggplot2
    - r-glue
    - r-htmltools
    - r-log4r
    - bioconductor-mutationalpatterns
    - r-openxlsx2
    - r-plotly
    - bioconductor-quantiseqr
    - r-quarto
    - quarto
    - r-randomforest
    - r-readr
    - r-reshape2
    - r-rlang
    - r-rrapply
    - bioconductor-s4vectors
    - r-scales
    - r-shiny
    - r-stringr
    - r-stringi
    - r-tidyr
    - r-yaml
  run:
    - r-base
    - r-assertable
    - r-assertthat
    - bioconductor-biostrings
    - r-bslib
    - r-caret
    - r-crosstalk
    - r-dplyr
    - r-dt
    - r-formattable
    - bioconductor-genomeinfodb
    - r-ggplot2
    - r-glue
    - r-htmltools
    - r-log4r
    - bioconductor-mutationalpatterns
    - r-openxlsx2
    - r-plotly
    - bioconductor-quantiseqr
    - r-quarto
    - quarto
    - r-randomforest
    - r-readr
    - r-reshape2
    - r-rlang
    - r-rrapply
    - bioconductor-s4vectors
    - r-scales
    - r-shiny
    - r-stringr
    - r-stringi
    - r-tidyr
    - r-yaml

test:
  commands:
    - $R -e "library('pcgrr')"

about:
  home: https://github.com/sigven/pcgr
  license: MIT
  license_file: ../LICENSE
  summary: Personal Cancer Genome ReporterR - R package for PCGR reports.
  description: |
    Functions, tools and utilities for the generation of clinical
    cancer genome reports with PCGR. This R package is an integrated
    part of the Docker/Conda-based PCGR workflow (https://github.com/sigven/pcgr),
    it should thus not be used as a stand-alone package.

extra:
  recipe-maintainers:
    - sigven
