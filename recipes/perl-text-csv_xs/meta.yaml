{% set name = "perl-text-csv_xs" %}
{% set version = "1.61" %}
{% set sha256 = "2cb9151e8c093921ff68ab9e5c376f7be014a0cb139342f0c3229ac5cdd9fc3a" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/H/HM/HMBRAND/Text-CSV_XS-{{ version }}.tgz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - perl
    - perl-extutils-makemaker
    - perl-test-harness
    - perl-text-csv
  run:
    - perl
    - perl-test-harness
    - perl-text-csv

test:
  imports:
    - Text::CSV_XS

about:
  home: "https://metacpan.org/pod/Text::CSV_XS"
  license: "Perl_5"
  summary: "Text::CSV_XS - comma-separated values manipulation routines."
  doc_url: "https://metacpan.org/pod/Text::CSV_XS"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
