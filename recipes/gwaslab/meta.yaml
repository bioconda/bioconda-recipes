{% set name = "gwaslab" %}
{% set version = "4.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/2c/e2/e900e96e12c43d33737363bad888936fec814fe3d2af5da6264cf2829e21/gwaslab-4.1.2.tar.gz
  sha256: 618424c34745b0bec4131056eb73166acbc262b3ffb1cada239212465c154408

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage('gwaslab', max_pin='x') }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.9
    - pandas !=1.5,>=1.3,<=2.3.3
    - numpy >=1.21.2,<2
    - matplotlib-base >=3.8,<3.9
    - seaborn >=0.12
    - scipy >=1.12
    - pysam ==0.22.1
    - adjusttext >=0.7.3,<=0.8
    - scikit-allel >=1.3.5
    - h5py >=3.10.0
    - pyarrow
    - polars >=1.27.0
    - sumstats-liftover ==1.1.0
    - requests
    - pyyaml
    - bitarray
    - platformdirs

test:
  imports:
    - gwaslab
  commands:
    - gwaslab --help

about:
  home: https://cloufield.github.io/gwaslab/
  summary: Python toolkit for handling GWAS summary statistics
  license: GPL-3.0-only
  license_file: LICENSE
  dev_url: https://github.com/Cloufield/gwaslab

extra:
  recipe-maintainers:
    - lyh970817
