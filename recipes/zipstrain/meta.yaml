{% set name = "zipstrain" %}
{% set version = "0.5.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 44e1889fe62be9164312f54338f65982375f8afed71bfff0112ad5fcc8f6477f  

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv
  run_exports:
    - {{ pin_subpackage('zipstrain', max_pin="x.x") }}
requirements:
  host:
    - python >=3.12
    - poetry-core   
    - pip
    
  run:
    - python >=3.12
    - samtools 
    - click
    - polars
    - plotly
    - numpy
    - seaborn
    - scipy
    - pyarrow
    - intervaltree
    - aiofiles
    - pydantic
    - rich
    - psutil
test:
  imports:
    - zipstrain
  commands:
    - zipstrain --help
    - samtools --version

about:
  home: https://github.com/OlmLab/ZipStrain  
  summary: Fast strain-level metagenomics
  license: MIT     
  license_family: MIT

