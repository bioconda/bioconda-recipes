{% set version = "1.0.0" %}

package:
  name: markadoros
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/markadoros/markadoros-{{ version }}.tar.gz
  sha256: ffcba0f3392665c712748de53ad518e6e906f004f077371e2df4ac0f27395f64

build:
  entry_points:
    - markadoros = markadoros:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage("markadoros", max_pin="x") }}

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - biopython >=1.86
    - click >=8.3.1
    - python-isal >=1.8.0
    - jsonschema >=4.26.0
    - loguru >=0.7.3
    - pandas >=2.3.3
    - polars >=1.39.3
    - pymmseqs >=1.0.7
    - pysam >=0.23.3
    - requests >=2.33.1
    - scikit-learn >=1.8.0
    - hifiasm >=0.21.0
    - mmseqs2 >=16.747c6
    - spades >=4.0.0

test:
  imports:
    - markadoros
  commands:
    - markadoros --help
  requires:
    - pip
    - python

about:
  home: https://github.com/sanger-tol/markadoros/
  summary: Markadoros is a tool for the identification and assembly of barcode genes in raw sequencing data.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - prototaxites
