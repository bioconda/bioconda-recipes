{% set version = "1.2.14" %}

package:
  name: r-genepop
  version: {{ version }}
 
source:
  url: https://cran.r-project.org/src/contrib/genepop_{{ version }}.tar.gz
  sha256: ca00614222b67f00d511c9329d2e49de81cc5048882634e0748660af7f91d8f9
 
build:
  number: 0
  noarch: generic
  script: R CMD INSTALL --build .
  rpaths:
    - lib/R/lib/
    - lib/
 
requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - r-base >=4.2
    - r-rcpp >=0.12.10
    - r-rcppprogress
    - r-stringr
  run:
    - r-base >=4.2
    - r-rcpp >=0.12.10
    - r-stringr
 
test:
  commands:
    - R -e "library(genepop)"
    - $R -e "library('genepop')"
 
about:
  home: "https://gitlab.mbb.univ-montp2.fr/francois/genepop"
  license: "CeCILL-2"
  summary: 'Population Genetic Data Analysis Using Genepop'
  description: |
    Makes the Genepop software available in R. This software implements a mixture of traditional population genetic methods and some more focused developments: it computes exact tests for Hardy-Weinberg equilibrium, for population differentiation and for genotypic disequilibrium among pairs of loci; it computes estimates of F-statistics, null allele frequencies, allele size-based statistics for microsatellites, etc.; and it performs analyses of isolation by distance from pairwise comparisons of individuals or population samples. 
  dev_url: "https://github.com/cran/genepop"
  doc_url: "https://cran.r-project.org/web/packages/genepop/genepop.pdf"
 

