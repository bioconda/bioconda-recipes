# Note: beast2 releases are made as a "full" release with all files and then "patch" releases which
# must be extracted overtop of the "full" release contents. Hence, there are two types of versions
# "version_patch" and "version_full". See https://github.com/CompEvol/beast2/releases
{% set name = 'beast2' %}

# Patch release contents that must be extracted overtop of a full release
{% set version_patch = '2.7.8' %}
{% set hash_app_patch = '89088b592e635d47b735d5557d938d8a8d80965a9609466e6f3c42b4aba85001' %}
{% set hash_base_patch = 'c18e33dd3cbe126050a0881c658c0051495bcee0496384c5157006605b727f46' %}

# The full release with all necessary beast2 files
{% set version_full = '2.7.7' %}
{% set hash_full = 'a866f3e5da4ef890a042f01849e32322aa0a8e16e3e1cb2c59f823de2611781a' %}

package:
  name: '{{ name }}'
  version: '{{ version_patch }}'

source:
  - url: https://github.com/CompEvol/beast2/releases/download/v{{ version_full }}/BEAST.v{{ version_full }}.Linux.x86.tgz
    sha256: '{{ hash_full }}'
    folder: beast2_full
  - url: https://github.com/CompEvol/beast2/releases/download/v{{ version_patch }}/BEAST.app.package.v{{ version_patch }}.zip
    sha256: '{{ hash_app_patch }}'
    folder: beast2_app_patch
  - url: https://github.com/CompEvol/beast2/releases/download/v{{ version_patch }}/BEAST.base.package.v{{ version_patch }}.zip
    sha256: '{{ hash_base_patch }}'
    folder: beast2_base_patch

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - openjdk
    - beagle-lib
    - fontconfig
    - font-ttf-ubuntu
    - fontconfig
    - freetype
    - xorg-libxtst
  run:
    - openjdk
    - beagle-lib
    - fontconfig
    - font-ttf-ubuntu
    - fontconfig
    - freetype
    - xorg-libxtst

test:
  commands:
    - beast -version
    # check to make sure beagle-lib is loaded ok
    - beast -beagle_info \| grep Flags
    - applauncher -help
    - packagemanager -help
    - loganalyser -h
    - logcombiner -help
    - treeannotator -help

about:
  home: http://www.beast2.org
  license: LGPL-2.1-or-later
  license_file: LICENSE.txt
  summary: "BEAST 2 is a cross-platform program for Bayesian phylogenetic analysis of molecular sequences."
