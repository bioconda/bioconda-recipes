{% set name = "salmon" %}
{% set version = "1.11.0" %}
{% set sha256 = "bf0754cd9e3b44b2acd74534b7853bfd6f0eb2ad784895f517454733c39f5acf" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/COMBINE-lab/salmon/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
    - 0001-CMakeLists.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("salmon", max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - autoconf
    - automake
    - libtool
    - cmake
    - make
    - pkg-config
    - gnuconfig
  host:
    - boost-cpp >= 1.84.0
    - mimalloc >=3.2.8
    - tbb-devel >=2022.3.0
    - htslib >=1.23.0
    - cereal
    - libcurl
    - libiconv
    - libdeflate
    - xz
    - zlib-ng
    - zstd
    - bzip2
    - unzip
  run:
    - boost-cpp
    - icu
    - htslib >=1.23.0

test:
  source_files:
    - sample_data.tgz
  commands:
    - salmon --help

about:
  home: "https://github.com/COMBINE-lab/salmon"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Highly-accurate & wicked fast transcript-level quantification from RNA-seq reads using selective alignment."
  dev_url: "https://github.com/COMBINE-lab/salmon"
  doc_url: "https://combine-lab.github.io/salmon"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - rob-p
    - k3yavi
    - mjsteinbaugh
  identifiers:
    - biotools:salmon
    - usegalaxy-eu:salmon
    - usegalaxy-eu:salmonquantmerge
    - usegalaxy-eu:alevin
    - doi:10.1038/nmeth.4197
