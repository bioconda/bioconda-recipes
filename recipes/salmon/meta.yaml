{% set name = "salmon" %}
{% set version = "1.11.0" %}
{% set sha256 = "bf0754cd9e3b44b2acd74534b7853bfd6f0eb2ad784895f517454733c39f5acf" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/COMBINE-lab/salmon/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("salmon", max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.24
    - ninja
    - make
    - pkg-config
  host:
    - boost-cpp >=1.84
    - tbb >=2021.4
    - htslib >=1.23
    - mimalloc >=3.2.8
    - tbb-devel >=2022.3.0
    - zlib-ng
    - libiconv
    - bzip2
    - xz
    - curl
  run:
    - {{ pin_compatible('htslib') }}
    - {{ pin_compatible('boost-cpp') }}
    - tbb
    - zlib-ng
    - bzip2
    - xz
    - curl
    - boost-cpp
    - icu

test:
  source_files:
    - sample_data.tgz
  commands:
    - salmon --help

about:
  home: "https://github.com/COMBINE-lab/salmon"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Highly-accurate & wicked fast transcript-level quantification from RNA-seq reads using selective alignment."
  dev_url: "https://github.com/COMBINE-lab/salmon"
  doc_url: "https://combine-lab.github.io/salmon"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - rob-p
    - k3yavi
    - mjsteinbaugh
  identifiers:
    - biotools:salmon
    - usegalaxy-eu:salmon
    - usegalaxy-eu:salmonquantmerge
    - usegalaxy-eu:alevin
    - doi:10.1038/nmeth.4197
