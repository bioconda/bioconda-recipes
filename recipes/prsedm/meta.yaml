{% set name = "prsedm" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/prsedm/prsedm-{{ version }}.tar.gz
  sha256: 0515313654af33c983733bfe60522aa77a2f0c2e57c1d3d2bb4bdbe8134708f2

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - prsedm = prsedm.extensions.score_dm:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9
    - pandas >=2
    - numpy <2
    - pysam >=0.22
    - joblib >=1.3

test:
  commands:
    - prsedm --help
    - python -c "import prsedm"

about:
  home: "https://github.com/sethsh7/PRSedm"
  summary: "Polygenic risk score toolkit for diabetes."
  license: MIT
  license_file: LICENSE
