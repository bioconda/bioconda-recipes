{% set name = "prsedm" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9
    - pandas >=2
    - numpy <2
    - pysam >=0.22
    - joblib >=1.3

about:
  home: https://github.com/sethsh7/PRSedm
  summary: Polygenic risk score toolkit for diabetes
  license: MIT
