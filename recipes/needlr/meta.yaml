{% set name = "needlr" %}
package:
  name: needlr
  version: "4.0"

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x.x") }}

source:
  url: https://s3.amazonaws.com/1000g-ont/needLR/needLR-v4.0-release.tar.gz
  sha256: fbade18b2c5d30f8b4583c1a7afe690345c11661ccc13aead3cf70160ac66dee
  
requirements:
  build:
    - sed =4.7
  host:
    - sed =4.7
  run:
    - bcftools =1.23.1
    - bedtools =2.31.1
    - truvari =4.2.2
    - gawk =5.3.1
    - coreutils =9.5
    - sed =4.7

test:
  commands:
    - tput -V
    - needLR --version
    - bcftools -h
    - bedtools -version
    - truvari version
    - sed --version
    - awk --version
    - cut --version
    - paste --version

about:
  home: https://github.com/millerlaboratory/needLR
  license: MIT
  summary: needLR is a command line tool that uses Truvari merging to compare query structural variant (SV) vcfs to our collection of 1000 Genomes Project (1KGP) samples sequenced by Oxford Nanopore Technologies long-read sequencing (ONT LRS).