{% set version = '0.2.3' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-instantiate
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/instantiate_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/instantiate/instantiate_{{ version }}.tar.gz
  sha256: dff964c58ca82684cfe0f9fcbe3cee683294329cdc42e83a1ecdf0121b40cdd7

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}sed               # [win]
    - {{ posix }}grep              # [win]
    - {{ posix }}autoconf
    - {{ posix }}automake          # [not win]
    - {{ posix }}automake-wrapper  # [win]
    - pkg-config
    - {{ posix }}make
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - r-callr
    - r-fs
    - r-rlang
  run:
    - r-base
    - r-callr
    - r-fs
    - r-rlang

test:
  commands:
    - $R -e "library('instantiate')"           # [not win]
    - "\"%R%\" -e \"library('instantiate')\""  # [win]

about:
  home: https://wlandau.github.io/instantiate/, https://github.com/wlandau/instantiate
  license: MIT
  summary: Similar to 'rstantools' for 'rstan', the 'instantiate' package builds pre-compiled
    'CmdStan' models into CRAN-ready statistical modeling R packages. The models compile
    once during installation, the executables live inside the file systems of their
    respective packages, and users have the full power and convenience of 'cmdstanr'
    without any additional compilation after package installation. This approach saves
    time and helps R package developers migrate from 'rstan' to the more modern 'cmdstanr'.
    Packages 'rstantools', 'cmdstanr', 'stannis', and 'stanapi' are similar Stan clients
    with different objectives.
  license_family: MIT
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/MIT'
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r

