{% set name = "negspy" %}
{% set version = "0.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/negspy-{{ version }}.tar.gz
  sha256: 53f97c30571ecf8c14a27d629ede030fd7f931a13d631287b02da41ecf165977

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python
    - smart-open

test:
  imports:
    - negspy
  commands:
    - pip check

about:
  home: "https://github.com/pkerpedjiev/negspy"
  summary: Python NGS tools
  license: MIT
  dev_url: "https://github.com/pkerpedjiev/negspy"
  doc_url: "https://github.com/pkerpedjiev/negspy?tab=readme-ov-file#readme"
