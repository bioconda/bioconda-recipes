{% set name = "snakemake-storage-plugin-rucio" %}
{% set version = "0.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/snakemake_storage_plugin_rucio-{{ version }}.tar.gz
  sha256: 9481098681fd932a87e63415fed0b09160ddd0f1777806fa2fd713ee869b845c

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.11,<4.0
    - poetry-core
    - pip
  run:
    - python >=3.11,<4.0
    - rucio-clients >=36
    - snakemake-minimal >=9.5.1
    - snakemake-interface-common >=1.18.0,<2.0.0
    - snakemake-interface-storage-plugins >=4.2.1,<5.0.0

test:
  imports:
    - snakemake_storage_plugin_rucio
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/snakemake-storage-plugin-rucio/
  summary: A Snakemake storage plugin that handles files available through Rucio.
  doc_url: https://snakemake.github.io/snakemake-plugin-catalog/plugins/storage/rucio.html
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bouweandela
