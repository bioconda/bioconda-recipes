{% set name = "motifscan" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8059ab3232dfe7580835c5e953a8edd3f843676d57a6afbc41c5518a8a4dfde2

build:
  number: 6
  skip: True  # [py < 36]
  entry_points:
    - motifscan = motifscan.cli.main:main
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps --no-cache-dir --use-pep517 -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - numpy >=1.15
    - pysam >=0.15.0
    - requests
    - scipy >=1.0
    - matplotlib-base >=3.0.0
    - tqdm >=4.42.1

test:
  imports:
    - motifscan
    - motifscan.cli
    - motifscan.genome
    - motifscan.io
    - motifscan.motif
    - motifscan.region
  commands:
    - motifscan --help

about:
  home: "http://bioinfo.sibs.ac.cn/shaolab/motifscan/index.php"
  doc_url: "https://motifscan.readthedocs.io"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "A package for motif discovery and motif enrichment analysis."
  dev_url: "https://github.com/shao-lab/MotifScan"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1038/s41421-018-0045-y
  skip-lints:
    - compiler_needs_stdlib_c
