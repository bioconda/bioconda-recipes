{% set name = "translatory" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://forge.ird.fr/transvihmi/nfernandez/translatory/-/archive/v{{ version }}/translatory-v{{ version }}.tar.gz
  sha256: "a0bb397f6e5bbc68ea18d0bc112e91636dfc5e45c7a0d7073cd7b12926750ff8"

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('translatory', max_pin="x") }}

requirements:
  run:
    - python >=3.8
    - python >=3.8
    - biopython >=1.86
    - blast >=2.17.0
    - clustalw >=2.1
    - gblocks >=0.91b
    - mafft >=7.526
    - muscle >=5.3
    - t-coffee >=12.00.7fb08c2
test:
  commands:
    - translatory --help

about:
  home: https://forge.ird.fr/transvihmi/nfernandez/translatory
  license: AGPL-3.0-only
  license_file: LICENSE
  summary: "TranslatorY: Multiple alignment of nucleotide sequences guided by amino acid translations"

extra:
  recipe-maintainers:
    - Nicolas-Fernandez
