{% set name = "tricord" %}
{% set version = "0.1.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/fg-labs/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 850d5dec7c7a5b72da3ae21a723d0058e7622f9891124d293af65fc3d8363179

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("tricord", max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - clangdev

test:
  commands:
    - tricorder --help

about:
  home: https://github.com/fg-labs/tricord
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Run a command and report its process tree's CPU, memory, and I/O usage
  dev_url: https://github.com/fg-labs/tricord
  doc_url: https://github.com/fg-labs/tricord/blob/v{{ version }}/README.md

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - nh13
