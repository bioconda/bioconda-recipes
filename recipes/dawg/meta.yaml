package:
  name: dawg
  version: "2.0.beta1"

source:
  url: https://github.com/reedacartwright/dawg/archive/96b0b31b03c9892e4178eba7236217adcf3f9b63.tar.gz
  sha256: 011e95e439ff2e385aaa15e6ee597157894178f87c3cd4293e2f01e365791519

build:
  number: 9
  run_exports:
    - {{ pin_subpackage('dawg', max_pin="x") }}

requirements:
  build:
    - ninja
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
    - pkg-config
  host:
    - boost-cpp
    - gsl
  run:
    - boost-cpp
    - gsl

test:
  commands:
    - dawg --help

about:
  home: "https://github.com/reedacartwright/dawg"
  summary: "DNA Assembly with Gaps (Dawg) is an application designed to simulate the evolution of recombinant DNA sequences in continuous time based on the robust general time reversible model with gamma and invariant rate heterogeneity and a novel length-dependent model of gap formation."
  license: "GPL-2.0-or-later"
  license_family: GPL
  license_file: "copying.txt"
  dev_url: "https://github.com/reedacartwright/dawg"
  doc_url: "https://github.com/reedacartwright/dawg/blob/master/readme.txt"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/bti1200
  skip-lints:
    - in_other_channels
    - compiler_needs_stdlib_c
