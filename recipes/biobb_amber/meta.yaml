{% set name = "biobb_amber" %}
{% set version = "5.2.0" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a6e13f3c50cf65c4975b92944ec9152f94716d2ae7d3e87e9e69b2d7b7dbaebc

build:
  number: 2
  skip: true  # [py<310 or py>=313]
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  host:
    - python
    - setuptools
    - pip
    - openmpi
  run:
    - python >=3.10,<3.13
    - biobb_common ==5.2.0
    - ambertools ==24.8
    - openmpi
    - numpy <=2.2.6

test:
  imports:
    - biobb_amber
    - biobb_amber.ambpdb
    - biobb_amber.cphstats
    - biobb_amber.cpptraj
    - biobb_amber.leap
    - biobb_amber.parmed
    - biobb_amber.pdb4amber
    - biobb_amber.pmemd
    - biobb_amber.process
    - biobb_amber.sander

about:
  home: https://github.com/bioexcel/biobb_amber
  license: Apache-2.0 license
  summary: Biobb_amber is a BioBB category for AMBER MD package.
  description: "# biobb_amber\n\n### Introduction\nBiobb_amber is a BioBB category for AMBER MD package. Biobb (BioExcel building blocks) packages are Python building blocks that create new layer of compatibility and interoperability over popular bioinformatics tools.\nThe latest documentation of this package can be found in our readthedocs site:\n[latest API documentation](http://biobb-amber.readthedocs.io/en/latest/).\n\
    \n\n### Copyright & Licensing\nThis software has been developed in the [MMB group](http://mmb.irbbarcelona.org) at the [BSC](http://www.bsc.es/) & [IRB](https://www.irbbarcelona.org/) for the [European BioExcel](http://bioexcel.eu/), funded by the European Commission (EU Horizon Europe [101093290](https://cordis.europa.eu/project/id/101093290), EU H2020 [823830](http://cordis.europa.eu/projects/823830), EU H2020 [675728](http://cordis.europa.eu/projects/675728)).\
    \n\n* (c) 2015-2026 [Barcelona Supercomputing Center](https://www.bsc.es/)\n* (c) 2015-2026 [Institute for Research in Biomedicine](https://www.irbbarcelona.org/)\n\
    Licensed under the\n\
    [Apache License 2.0](https://www.apache.org/licenses/LICENSE-2.0), see the file LICENSE for details.\n\
    \n\
    ![](https://bioexcel.eu/wp-content/uploads/2019/04/Bioexcell_logo_1080px_transp.png \"Bioexcel\")\n\n\n"
  doc_url: http://biobb-amber.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - gbayarri
    - RubenChM
  skip-lints:
    - should_be_noarch_generic
