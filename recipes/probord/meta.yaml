{% set name = "probord" %}
{% set version = "1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mujiezhang/ProBord/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f5a689d1a25f63299f4706469e75275a78162a239fbd04101b190293ec67029a

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - probord = probord:main
  run_exports:
    - {{ pin_subpackage('probord', max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - biopython
    - blast
    - checkv
    - ncbi-genome-download

test:
  imports:
    - probord
  commands:
    - probord --help

about:
  home: https://github.com/mujiezhang/ProBord
  license: MIT
  license_file: LICENSE
  summary: A tool for precise delimitation of provirus borders in host genomes
