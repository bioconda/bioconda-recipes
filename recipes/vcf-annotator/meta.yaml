{% set name="vcf-annotator" %}
{% set version = "1.0.0" %}
{% set sha256 = "c150dd7d79222ef9858f645c080adef2bef49a024bef87008b28cef32967b9a9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rpetit3/vcf-annotator/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('vcf-annotator', max_pin='x.x') }}

requirements:
  run:
    - python <3.14
    - biopython >=1.82
    - pyvcf3 >=1.0.3

test:
  commands:
    - vcf-annotator
    - vcf-annotator --version
    - vcf-annotator -h

about:
  home: https://github.com/rpetit3/vcf-annotator
  license: MIT
  license_file: LICENSE
  summary: Use the reference GenBank file to add biological annotations to the variant calls in a VCF.
