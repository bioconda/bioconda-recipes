{% set name = "annorefine" %}
{% set version = "2026.2.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/nextgenusfs/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 58408e975fd1f33d5f022ffca6ac4ded49493e41dab79f0dc0396499a1c18279

build:
  number: 0
  skip: True  # [win]
  run_exports:
    - {{ pin_subpackage('annorefine', max_pin=None) }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - python
    - maturin >=1.0,<2.0
    - pkg-config
    - make
    - clangdev
  host:
    - python
    - pip
    - maturin >=1.0,<2.0
    - openssl
  run:
    - python

test:
  imports:
    - annorefine
  commands:
    - annorefine --help

about:
  home: https://github.com/nextgenusfs/annorefine
  summary: 'Genome annotation refinement using RNA-seq data'
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  dev_url: https://github.com/nextgenusfs/annorefine
  doc_url: https://nextgenusfs.github.io/annorefine/

extra:
  recipe-maintainers:
    - nextgenusfs
  additional-platforms:
    - linux-aarch64
    - osx-arm64

