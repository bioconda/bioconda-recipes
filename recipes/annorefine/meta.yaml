{% set name = "annorefine" %}
{% set version = "2026.2.22" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nextgenusfs/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 1c20bc7e5c93e7867ab7bd40d05db85e81f9bc7bba38c826b8c4df92865edfe4

build:
  number: 1
  skip: True  # [py < 39 or py > 313]
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
    - make
  host:
    - python
    - pip
    - maturin >=1.0,<2.0
    - openssl
  run:
    - python

test:
  imports:
    - annorefine
  commands:
    - annorefine --help

about:
  home: "https://github.com/nextgenusfs/annorefine"
  summary: "Genome annotation refinement using RNA-seq data."
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  dev_url: "https://github.com/nextgenusfs/annorefine"
  doc_url: "https://nextgenusfs.github.io/annorefine"

extra:
  recipe-maintainers:
    - nextgenusfs
  additional-platforms:
    - linux-aarch64
    - osx-arm64
