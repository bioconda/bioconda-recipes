{% set name = "kleboscope" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/bbeckley-hub/Kleboscope/archive/v{{ version }}.tar.gz
  sha256: b5ee68a124aba4c505adc0dec8188047de77547bd2cfc02bb39d8d5e6f86fbd4

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - pandas >=1.5.0
    - biopython >=1.85
    - psutil >=5.9.0
    - requests >=2.28.0
    - tqdm >=4.64.0
    - click >=8.0.0
    - kaptive >=3.1.0
    - beautifulsoup4 >=4.11.0
    - lxml >=4.9.0
    - matplotlib-base >=3.5.0
    - seaborn >=0.12.0
    - scipy >=1.10.1
    - plotly >=5.10.0
    - abricate >=1.2.0
    - perl
    - any2fasta
    - blast >=2.13.0
    - perl-moo
    - perl-list-moreutils
    - perl-json
    - perl-lwp-protocol-https
    - perl-path-tiny
    - perl-data-dumper
    - perl-getopt-long
    - perl-file-which

test:
  commands:
    - kleboscope --help

about:
  home: https://github.com/bbeckley-hub/Kleboscope
  license: MIT
  license_file: LICENSE
  summary: 'Kleboscope: Comprehensive K. pneumoniae genomic typing pipeline with parallel execution'
  description: |
    Kleboscope is a complete, automated genomic analysis pipeline for Klebsiella pneumoniae,
    featuring parallel execution for rapid processing of bacterial genomes.
  doc_url: https://github.com/bbeckley-hub/Kleboscope
  dev_url: https://github.com/bbeckley-hub/Kleboscope

extra:
  recipe-maintainers:
    - bbeckley-hub
