{% set version = "1.15" %}

package:
  name: andi
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("andi", max_pin="x.x") }}

source:
  url: https://github.com/EvolBioInf/andi/releases/download/v{{ version }}/andi-{{ version }}.tar.gz
  sha256: ac879545c063992e1e76bf0c088152c9e59ee5b9f32d2b3d1b4bcf4d1b075f22

requirements:
  build:
    - make
    - {{ compiler('c') }}
  host:
    - libdivsufsort
    - gsl
    - openblas
    - mkl
  run:
    - libdivsufsort
    - gsl
    - openblas
    - mkl

test:
  commands:
    - andi -h

about:
  home: https://github.com/evolbioinf/andi/
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: Efficient Estimation of Evolutionary Distances

extra:
  identifiers:
    - biotools:andi
    - doi:10.1093/bioinformatics/btu815
