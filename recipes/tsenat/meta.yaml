package:
  name: tsenat
  version: '0.99.0'

source:
  git_url: https://github.com/gallardoalba/TSENAT.git
  git_rev: v.0.99.0

build:
  number: 2
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports: '{{ pin_subpackage("tsenat", max_pin="x.x") }}'

requirements:
  host:
    - r-base >=4.3.0,<4.5.0a0
    - r-ggplot2
    - r-withr
    - bioconductor-biocparallel
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - r-matrixstats
    - r-mgcv
    - r-geepack
    - r-pheatmap
    - r-cowplot
    - r-dplyr
    - r-tidyr
    - r-rlang
    - r-rcpp
    - r-rcpparmadillo
    - r-memoise
    - r-readr
    - r-glmnet
    - r-nlme
    - r-glmmTMB
    - r-fdrtool
    - r-patchwork
    - r-gridextra
    - r-rcolorbrewer
  run:
    - r-base >=4.3.0,<4.5.0a0
    - r-ggplot2
    - r-withr
    - bioconductor-biocparallel
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - r-matrixstats
    - r-mgcv
    - r-geepack
    - r-pheatmap
    - r-cowplot
    - r-dplyr
    - r-tidyr
    - r-rlang
    - r-rcpp
    - r-rcpparmadillo
    - r-memoise
    - r-readr
    - r-glmnet
    - r-nlme
    - r-glmmTMB
    - r-fdrtool
    - r-patchwork
    - r-gridextra
    - r-rcolorbrewer

test:
  requires:
    - tsenat
  commands:
    - $R -e "library('TSENAT')"

about:
  home: https://github.com/gallardoalba/TSENAT
  license: GPL-3
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
  summary: Tsallis Entropy Analysis Toolbox for transcriptome and RNA-seq complexity analysis
  description: |
    Quantifies and models isoform-usage complexity in RNA-seq data using Tsallis entropy,
    a scale-dependent diversity measure. TSENAT computes q-dependent transcriptome
    diversity and divergence, compares measures between conditions, and provides
    visualization routines for scale-dependent complexity analysis.
  doc_url: https://gallardoalba.github.io/TSENAT
  dev_url: https://github.com/gallardoalba/TSENAT
