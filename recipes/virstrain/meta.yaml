{% set name = "virstrain" %}
{% set version = "1.18" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 0197ed06bb04d7bc4e097579be99324dac889a233cee797e7576cd9270478d46

build:
  number: 0
  entry_points:
    - virstrain = VirStrain.VirStrain:main
    - virstrain_build = VirStrain.VirStrain_build:main
    - virstrain_contig = VirStrain.VirStrain_contig:main
    - virstrain_merge = VirStrain.VirStrain_contigDB_merge:main
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv"
  noarch: python
  run_exports:
    - {{ pin_subpackage('virstrain', max_pin="x.x") }}

requirements:
  host:
    - pip
    - python >=3.8
  run:
    - python >=3.8
    - biopython >=1.78
    - matplotlib-base >=3.1
    - networkx >=2.4
    - numpy >=1.17
    - pandas >=1.0
    - plotly >=5.0
    - perl
    - bowtie2

test:
  imports:
    - VirStrain
  commands:
    - virstrain --help
    - virstrain_build --help
    - virstrain_contig --help
    - virstrain_merge --help

about:
  home: https://github.com/liaoherui/VirStrain
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: An RNA/DNA virus strain-level identification tool for short reads.

extra:
  recipe-maintainers:
    - liaoherui
