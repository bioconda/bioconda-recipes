{% set name = "beast2-xml" %}
{% set version = "1.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/beast2_xml-{{ version }}.tar.gz
  sha256: 866ee093c8a8faadd2c7f28063bbc57578aba3bb29b37f205b36352801273650

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  noarch: python

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools
  run:
    - python >=3.10
    - dark-matter >=1.1.28
    - pandas >=2.2.2
    - ete3 >=3.1.3
    - six >=1.16.0
    - numpy >=1.10.0
    - legacy-cgi

test:
  imports:
    - beast2xml

about:
  home: https://github.com/acorg/beast2-xml
  summary: Command line script and Python class for generating BEAST2 XML config files.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - m-d-grunnill
