{% set name = "RagTag" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 99994d7caac7d2ec590f7ac51031dc675a0fd20a51aa3703713295607e8f70e8
  patches:
    - 0001-python-tweaks.patch

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x") }}

requirements:
  host:
    - pip
    - python >=3
    - setuptools
  run:
    - python >=3
    - networkx
    - intervaltree
    - numpy
    - pysam
    - minimap2
    - mummer

test:
  imports:
    - ragtag_utilities
  commands:
    - ragtag.py --help

about:
  home: "https://github.com/malonge/RagTag"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Fast reference-guided genome assembly scaffolding."
  doc_url: "https://github.com/malonge/RagTag/wiki"
  dev_url: "https://github.com/malonge/RagTag"

extra:
  recipe-maintainers:
    - malonge
  identifiers:
    - doi:10.1186/s13059-022-02823-7
    - biotools:ragtag
    - usegalaxy-eu:ragtag
