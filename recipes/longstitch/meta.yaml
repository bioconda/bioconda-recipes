{% set version = "1.0.5" %}

package:
  name: longstitch
  version: {{ version }}

source:
  url: https://github.com/BirolLab/LongStitch/releases/download/v{{ version }}/longstitch-{{ version }}.tar.gz
  sha256: 53b538d80906ebc5499fdf694ce3a10a801335a356c4c371318010914cecf88c

build:
  noarch: generic
  number: 2
  run_exports:
    - {{ pin_subpackage('longstitch', min_pin='x') }}

requirements:
  run:
    - make
    - samtools
    - python
    - tigmint >=1.2.4
    - ntlink
    - arcs >=1.2.2
    - links ==2.0.1

test:
  commands:
    - longstitch help

about:
  summary: "A genome assembly correction and scaffolding pipeline using long reads."
  home: "https://github.com/BirolLab/longstitch"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  doc_url: "https://github.com/BirolLab/LongStitch/blob/v{{ version }}/README.md"
  dev_url: "https://github.com/BirolLab/longstitch"

extra:
  identifiers: 
    - doi:10.1101/2021.06.17.448848
    - biotools:longstitch
