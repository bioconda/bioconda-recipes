{% set version = "2.0.2" %}
{% set name = "OrfM" %}
{% set sha256 = "fd9d37f886444675288103d16fbc0d52c604004b2ab528ba6e3cef64977d2952" %}

package:
  name: orfm
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name| lower, max_pin="x") }}

source:
  url: https://github.com/wwood/{{ name }}/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - orfm -h

about:
  home: https://github.com/wwood/OrfM
  license: LGPL-3.0
  license_family: LGPL
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  summary: OrfM is a simple and not slow ORF caller

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:{{ name| lower }}
    - doi:10.1093/bioinformatics/btw241
