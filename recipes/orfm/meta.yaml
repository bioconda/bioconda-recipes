{% set version = "2.0.1" %}
{% set name = "OrfM" %}
{% set sha256 = "52b7f1b3dd1e4dae7a74de0928fd6f01b1785494d627cce4b1d95a1bf1e139c5" %}

package:
  name: orfm
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name| lower, max_pin="x") }}

source:
  url: https://github.com/wwood/{{ name }}/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - orfm -h

about:
  home: https://github.com/wwood/OrfM
  license: LGPL-3.0
  license_family: LGPL
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  summary: OrfM is a simple and not slow ORF caller

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:{{ name| lower }}
    - doi:10.1093/bioinformatics/btw241
