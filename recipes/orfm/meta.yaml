{% set version = "2.1.1" %}
{% set name = "OrfM" %}
{% set sha256 = "c3c8bd703ef43d006a64843ae3b340381d819ddb18a19aa4d68e23a6db638f2f" %}

package:
  name: orfm
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name| lower, max_pin="x") }}

source:
  url: https://github.com/wwood/{{ name }}/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - cargo-bundle-licenses
    - cmake
    - make

test:
  commands:
    - orfm -h

about:
  home: https://github.com/wwood/OrfM
  license: LGPL-3.0
  license_family: LGPL
  license_file:
    - LICENSE.txt
    - THIRDPARTY.yml
  summary: OrfM is a simple and not slow ORF caller

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:{{ name| lower }}
    - doi:10.1093/bioinformatics/btw241
