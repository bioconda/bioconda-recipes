{% set name = "simpleaf" %}
{% set version = "0.22.0" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("simpleaf", max_pin="x.x") }}

source:
  url: https://github.com/COMBINE-lab/simpleaf/archive/v{{ version }}.tar.gz
  sha256: 432069c4e560a178c7a14f2e122c28372c5f1073566dd01c4c3559a0f91084f5

requirements:
  build:
    - autoconf
    - automake
    - libtool
    - make
    - cmake
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
  run:
    - alevin-fry >=0.13.0
    - piscem >=0.18.0

test:
  commands:
    - simpleaf --help || test $? -eq 1

about:
  home: "https://github.com/COMBINE-lab/simpleaf"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "A rust framework to make using alevin-fry even simpler."
  dev_url: "https://github.com/COMBINE-lab/simpleaf"
  doc_url: "https://simpleaf.readthedocs.io/en/latest"

extra:
  additional-platforms:
    - osx-arm64
    - linux-aarch64
