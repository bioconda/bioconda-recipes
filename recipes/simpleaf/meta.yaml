{% set name = "simpleaf" %}
{% set version = "0.24.0" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("simpleaf", max_pin="x.x") }}

source:
  url: https://github.com/COMBINE-lab/simpleaf/archive/v{{ version }}.tar.gz
  sha256: 05fb74305c23c12c90772e4a9ea42c84af04c32f354186102113c554b314a9e8

requirements:
  build:
    - autoconf
    - automake
    - libtool
    - make
    - cmake
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
  run:
    - alevin-fry >=0.14.0
    - piscem >=0.19.0

test:
  commands:
    - simpleaf --help || test $? -eq 1

about:
  home: "https://github.com/COMBINE-lab/simpleaf"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "A rust framework to make using alevin-fry even simpler."
  dev_url: "https://github.com/COMBINE-lab/simpleaf"
  doc_url: "https://simpleaf.readthedocs.io/en/latest"


extra:
  skip-lints: 
    - compiler_needs_stdlib_c
  additional-platforms:
    - osx-arm64
    - linux-aarch64
