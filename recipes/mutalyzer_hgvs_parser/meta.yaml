{% set name = "mutalyzer_hgvs_parser" %}
{% set version = "0.4.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 6d7530a047a4f39f1e929bde3920887b6abea58d574b6794e725b5ca53aab71e

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir"
  run_exports:
    - {{ pin_subpackage("mutalyzer_hgvs_parser", max_pin="x.x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - python
    - lark >=1.0.0

test:
  commands:
    - mutalyzer_hgvs_parser --help
    - mutalyzer_hgvs_parser -c "NG_012337.1:c.20del"

about:
  home: "https://github.com/mutalyzer/hgvs-parser"
  license: MIT
  license_family: MIT
  summary: "Mutalyzer HGVS variant description parser."
  doc_url: "https://mutalyzer-hgvs-parser.readthedocs.io"
  dev_url: "https://github.com/mutalyzer/hgvs-parser"

extra:
  recipe-maintainers:
    - Redmar-van-den-Berg
