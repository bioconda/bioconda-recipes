{% set name = "snakehichiptf" %}
{% set version = "0.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f7061c871ba123586b86964446511ce70ba1bde7d9e26535cdc00ba7650f5aad

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
  run:
    - python >=3.11
    - snakemake >=8.28.0

test:
  commands:
    - snakehichiptf --help

about:
  home: https://github.com/YidanSunResearchLab/SnakeHichipTF
  summary: Snakemake-based HiChIP/TF analysis pipeline
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/YidanSunResearchLab/SnakeHichipTF

extra:
  recipe-maintainers:
    - YukivWu
    - YidanSunResearchLab
