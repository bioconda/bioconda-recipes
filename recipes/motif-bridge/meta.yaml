{% set name = "motif-bridge" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://crates.io/api/v1/crates/{{ name }}/{{ version }}/download
  sha256: 0ab60554d19b96321449c6493ca3e72aa7fbe83f15fe2b54cf987f96eb902267

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}

test:
  commands:
    - meme2homer --help
    - homer2meme --help

about:
  home: https://github.com/hzauzengyuanzhao/motif-bridge
  license: MIT
  license_file: LICENSE
  summary: "Bidirectional converter between MEME and HOMER motif formats"
  description: |
    Cross-language toolkit (Perl/Python/Rust) for converting transcription
    factor binding motifs between MEME and HOMER formats, enabling seamless
    interoperability in ChIP-seq analysis pipelines.
  doc_url: https://github.com/hzauzengyuanzhao/motif-bridge
  dev_url: https://github.com/hzauzengyuanzhao/motif-bridge

extra:
  recipe-maintainers:
    - hzauzengyuanzhao
