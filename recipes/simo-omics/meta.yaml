{% set name = "simo-omics" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/c5/80/abfdc375d0ce3f9efde595214e8f71b7db6532f0dd7429d52be734bde79b/simo_omics-1.0.0-py3-none-any.whl
  sha256: e4e7f60c4bd8d6dca7af23e2fdc45433c4c72ca0cff0ecd464de6ad421a0a039

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation simo_omics-1.0.0-py3-none-any.whl
  noarch: python
  run_exports:
    - {{ pin_subpackage("simo-omics", max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
  run:
    - python >=3.9
    - pot >=0.8.2
    - scanpy >=1.9.1
    - python-igraph >=0.10.8
    - leidenalg >=0.10.0
    - louvain >=0.7.1
    - networkx >=3.1

test:
  imports:
    - simo

about:
  home: https://github.com/ZJUFanLab/SIMO
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
summary: Spatial integration of multi-omics single-cell datasets through probabilistic alignment

extra:
  recipe-maintainers:
    - askmadsen