{% set name = "yame" %}
{% set version = "1.8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/zhou-lab/YAME/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f762425ef8fcf4fc8967da7889272f27804af232117931ce524687d7af715136

build:
  number: 0
  script: |
    make
    mkdir -p $PREFIX/bin
    cp yame $PREFIX/bin/
    run_exports:
      - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - make
  run:
    - libgcc-ng  # or libcxx if it's C++

test:
  commands:
    - yame --help

about:
  home: https://github.com/zhou-lab/YAME
  license: MIT
  license_file: LICENSE
  summary: "YAME: Yet Another Methylation Extractor."

extra:
  recipe-maintainers:
    - Hongxiang2023


