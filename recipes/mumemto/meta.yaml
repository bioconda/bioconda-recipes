{% set name = "mumemto" %}
{% set version = "1.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # Local build from this repo (repo root is parent of this folder):
  # path: ..
  # Bioconda PR: replace `path` with release tarball after tagging, e.g.:
  url: https://github.com/vikshiv/mumemto/archive/refs/tags/v{{ version }}.tar.gz
  sha256: f74091d91acc454cbce27ecb370af6f337c3a5d17b94d7dfd616f174bc6d436f

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cmake
    - make
    - pkg-config
  host:
    - python
    - pip
    - zlib
    - numpy
    - pybind11
    - scikit-build-core
    - setuptools
    - wheel
  run:
    - python
    - libgcc-ng >=12  # [linux]
    - libstdcxx-ng >=12  # [linux]
    - zlib
    - matplotlib-base
    - {{ pin_compatible('numpy') }}
    - tqdm
    - numba

test:
  requires:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
  imports:
    - mumemto
    - mumemto.utils
  commands:
    - mumemto --help
    - mumemto viz --help
    - mumemto coverage --help
    - mumemto inversion --help
    - mumemto lengths --help
    - mumemto collinear --help
    - mumemto convert --help
    - mumemto extract --help
    - mumemto label --help
    - mumemto merge --help
    - mumemto bed --help
    - test -f "${PREFIX}/lib/cmake/Mumemto/MumemtoConfig.cmake"
    - test -f "${PREFIX}/include/mumemto.hpp"
    - test -f "${PREFIX}/include/mumemto.h"
    - python -c "import mumemto; r = mumemto.mum([['ACGTACGT'], ['TACGTAAA']], min_match_len=3); assert r.num_matches() >= 0"
    - python -c "import mumemto, numpy as np; r = mumemto.mem([['ACGTACGT'], ['TACGTAAA']], min_match_len=3, max_doc_freq=2); assert r.num_matches() > 0; t = r.match_at(0); assert isinstance(t[1], np.ndarray); assert not t[1].flags['OWNDATA']"
    - |
      export LD_LIBRARY_PATH="${PREFIX}/lib:${LD_LIBRARY_PATH:-}"
      export DYLD_LIBRARY_PATH="${PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
      echo '#include "mumemto.hpp"
      int main() { return 0; }' > mum_abi_smoke.cpp
      ${CXX} -std=c++17 -I"${PREFIX}/include" mum_abi_smoke.cpp -L"${PREFIX}/lib" -lmumemto ${LDFLAGS} -o mum_abi_smoke
      ./mum_abi_smoke
    - |
      export LD_LIBRARY_PATH="${PREFIX}/lib:${LD_LIBRARY_PATH:-}"
      export DYLD_LIBRARY_PATH="${PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
      python - <<'PY'
      src = "\n".join([
          "#include <vector>",
          "#include <string>",
          "#include \"mumemto_api.hpp\"",
          "",
          "int main() {",
          "  std::vector<std::vector<std::string>> seqs;",
          "  seqs.push_back(std::vector<std::string>(1, \"ACGTACGT\"));",
          "  seqs.push_back(std::vector<std::string>(1, \"TACGTAAA\"));",
          "  auto r = mumemto::mumemto_mem(seqs, 3, true, 0, 0, 2, false);",
          "  (void)r;",
          "  return 0;",
          "}",
      ])
      with open("mum_cpp_api_link.cpp", "w") as f:
          f.write(src)
      PY
      ${CXX} -std=c++17 -I"${PREFIX}/include" mum_cpp_api_link.cpp -L"${PREFIX}/lib" -lmumemto ${LDFLAGS} -o mum_cpp_api_link
      ./mum_cpp_api_link
    - |
      export LD_LIBRARY_PATH="${PREFIX}/lib:${LD_LIBRARY_PATH:-}"
      export DYLD_LIBRARY_PATH="${PREFIX}/lib:${DYLD_LIBRARY_PATH:-}"
      echo '#include "mumemto.h"
      int main(void) { return 0; }' > mum_c_abi_smoke.c
      ${CC} -std=c11 -I"${PREFIX}/include" mum_c_abi_smoke.c -L"${PREFIX}/lib" -lmumemto ${LDFLAGS} -o mum_c_abi_smoke
      ./mum_c_abi_smoke

about:
  home: "https://github.com/vikshiv/mumemto"
  summary: "Finding maximal unique matches across pangenomes."
  description: |
    Mumemto is a tool for finding a variety of matches across collections of sequences like a pangenome.
    It includes a visualization tool for visualizing pangenome synteny.
    The conda package installs the CLI, the C/C++ library (headers include mumemto.h and mumemto.hpp)
    and CMake package (find_package(Mumemto)),
    and the Python package (utilities plus pybind11 bindings).
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  dev_url: "https://github.com/vikshiv/mumemto"
  doc_url: "https://github.com/vikshiv/mumemto/wiki"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - vikshiv
