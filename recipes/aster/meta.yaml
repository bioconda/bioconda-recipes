{% set version = "1.25" %}
{% set name = "ASTER" %}
{% set sha256 = "7d5cd2218e0811f2ad5ce9e459dd14d65de46af8ee6ed84cfdba9ec40ebdf1ff" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/chaoszhang/ASTER/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
    - 0001-makefile.patch

build:
  number: 0
  # changing install names or rpaths can't be redone for: bin/wastral (for architecture x86_64) because larger updated load commands do not fit (the
  # program must be relinked, and you may need to use -headerpad or -headerpad_max_install_names)
  skip: True  # [osx and x86_64]
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}

test:
  commands:
    - caster-site -h &> /dev/null
    - caster-pair -h &> /dev/null
    - astral -h &> /dev/null
    - astral-pro -h &> /dev/null
    - astral-hybrid -h &> /dev/null

about:
  home: "https://github.com/chaoszhang/ASTER"
  license: "AGPL-3.0-or-later"
  license_family: AGPL
  license_file: LICENSE
  summary: "Accurate Species Tree EstimatoR series; a family of optimation algorithms for species tree inference implemented in C++."
  dev_url: "https://github.com/chaoszhang/ASTER"
  doc_url: "https://github.com/chaoszhang/ASTER/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/molbev/msaf172
