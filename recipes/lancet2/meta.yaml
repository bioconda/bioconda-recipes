{% set name = "lancet2" %}
{% set version = "2.9.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nygenome/Lancet2/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e676d9f991d800958e6cf1d451b42749e2ad1e5dadebd8d219192433efb644c9

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.25
    - make
    - pkg-config
  host:
    - libcurl
    - openssl
    - bzip2
    - liblzma-devel
    - xz
  run:
    - openssl

test:
  commands:
    - "Lancet2 pipeline --help"

about:
  home: "https://github.com/nygenome/Lancet2"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "Lancet2 is a highly accurate somatic variant caller using localized colored de Bruijn graphs."
  dev_url: "https://github.com/nygenome/Lancet2"
  doc_url: "https://nygenome.github.io/Lancet2/latest"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
