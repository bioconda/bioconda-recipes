{% set name = "lancet2" %}
{% set version = "2.9.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/nygenome/Lancet2/archive/refs/tags/v2.9.0.tar.gz
  sha256: e676d9f991d800958e6cf1d451b42749e2ad1e5dadebd8d219192433efb644c9

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  script:
    - mkdir build && cd build
    - cmake -GNinja \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_INSTALL_PREFIX=$PREFIX \
      -DLANCET_BUILD_STATIC=OFF \
      -DLANCET_ENABLE_CLOUD_IO=ON \
      ..
    - ninja install -v

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.25
    - ninja
    - pkg-config
  host:
    - libcurl
    - openssl
    - bzip2
    - xz
  run:
    - openssl

tests:
  commands:
    - Lancet2 pipeline --help

about:
  homepage: "https://github.com/nygenome/Lancet2"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: LICENSE
  summary: "Lancet2 is a highly accurate somatic variant caller using localized colored de Bruijn graphs."
  dev_url: "https://github.com/nygenome/Lancet2"
  doc_url: "https://nygenome.github.io/Lancet2/latest"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
