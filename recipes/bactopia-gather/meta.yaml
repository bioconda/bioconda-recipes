{% set version = "1.0.5" %}

package:
  name: bactopia-gather
  version: {{ version }}

build:
  number: 0
  noarch: generic

source:
  url: https://github.com/bactopia/bactopia-gather/archive/v{{version}}.tar.gz
  sha256: 58482c7c1d3ccd048bc81b8575ea214dd84a34a27b583bfdc42a9d6c0d526e26

requirements:
  run:
    - bactopia-py >=2.0.1
    - art >=2016.06.05
    - bbmap >=39.01
    - coreutils
    - fastq-dl >=2.0.4
    - fastq-scan >=1.0.1
    - gsl 2.6
    - mash >=2.3
    - ncbi-genome-download >=0.3.3
    - rename
    - pigz
    - python <3.13
    - sed
    - sra-tools >=3.0.1

test:
  commands:
    - "bactopia-gather --version"
    - "bactopia-gather"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: The methods used in Bactopia to gather all samples into one place
  dev_url: https://github.com/bactopia/bactopia-gather/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
