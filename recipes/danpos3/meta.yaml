{% set name = "danpos3" %}
{% set version = "3.2.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
 
source:
  url: https://github.com/boenc28-cmyk/DANPOS/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 3ceda7452013517f22542ef47c8bc7bd0c49b0e1a32282097b67f3bc4ad7a6c8

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools 
    - wheel
  run:
    - python >=3.7
    - samtools >=1.7
    - rpy2 >=3.3.3
    - numpy >=1.18.5
    - pysam >=0.16.0.1
    - scipy

test:
  commands:
    - danpos -h
about:
  home: https://github.com/boenc28-cmyk/DANPOS
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy by Sequencing - Version 3"
