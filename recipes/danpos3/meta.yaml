{% set name = "danpos3" %}
{% set version = "3.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
 
source:
  url: https://github.com/boenc28-cmyk/DANPOS3/archive/refs/tags/v3.1.1.tar.gz
  sha256: da815fd70f73620f27ca582daf1eb08d3cd2dd86d527fcbd2cf3829cad96bd0c

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python =3.7.6
    - r-base =4.0.1
    - samtools =1.7
    - rpy2 >=3.3.3
    - numpy =1.18.5
    - pysam =0.16.0.1
    - typing-extensions
    - scipy

test:
  commands:
    - danpos -h

about:
  home: https://github.com/sklasfeld/DANPOS3
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy by Sequencing - Version 3"
