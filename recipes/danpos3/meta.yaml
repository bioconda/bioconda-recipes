{% set name = "danpos3" %}
{% set version = "3.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
 
source:
  url: https://github.com/boenc28-cmyk/DANPOS/archive/refs/tags/v{{ version }}.tar.gz
  sha256: dc498301b6abe6314c780454eafc33e1d76cbdb0753909b163a93b0bc3ed5fbe

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools 
    - r-base >=4.0.1
    - wheel
  run:
    - python >=3.7
    - python >=3.7
    - pip
    - setuptools 
    - wheel
    - samtools >=1.7
    - rpy2 >=3.3.3
    - numpy >=1.18.5
    - pysam >=0.16.0.1
    - scipy
    - scipy
    - setuptools

test:
  commands:
    - danpos -h
about:
  home: https://github.com/boenc28-cmyk/DANPOS
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy by Sequencing - Version 3"
