{% set name = "danpos3" %}
{% set version = "3.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
 
source:
  url: https://github.com/boenc28-cmyk/DANPOS3/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 1495219e2f600da5d5b954ede7438d5d8202c02cb720a26eba0c4779ccb60e3b

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - r-base >=4.0.1
    - samtools >=1.7
    - rpy2 >=3.3.3
    - numpy >=1.18.5
    - pysam >=0.16.0.1
    - typing-extensions
    - scipy

test:
  commands:
    - danpos -h

about:
  home: https://github.com/sklasfeld/DANPOS3
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy by Sequencing - Version 3"
