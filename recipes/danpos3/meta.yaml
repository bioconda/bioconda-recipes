{% set name = "danpos3" %}
{% set version = "3.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
 
source:
  # url: https://github.com/boenc28-cmyk/DANPOS3/archive/refs/tags/v{{ version }}.tar.gz
  # sha256: f77f7ecf1ab212048cf1f964a2d675dabaaedefbd94db567d0ba4ac3cc16c4b7
  path: /Users/bc/Documents/PY/DANPOS_update/DANPOS

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools 
    - r-base >=4.0.1
    - wheel
  run:
    - python >=3.7
    - r-base >=4.0.1
    - samtools >=1.7
    - rpy2 >=3.3.3
    - numpy >=1.18.5
    - pysam >=0.16.0.1
    - typing-extensions
    - scipy
    - setuptools

test:
  source_files:
    - scripts/print_versions.py
  commands:
    - python scripts/print_versions.py
    - danpos -h
about:
  home: https://github.com/sklasfeld/DANPOS3
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "A toolkit for Dynamic Analysis of Nucleosome Positioning and Occupancy by Sequencing - Version 3"
