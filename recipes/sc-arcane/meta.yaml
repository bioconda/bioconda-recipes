{% set name = "sc-arcane" %}
{% set version = "0.1.1.1" %}

package:
  name: sc-arcane
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sc-arcane/sc_arcane-{{ version }}.tar.gz
  sha256: 5c4ad1f2d7f5be3b3757ee0bf24dde4d8ce343fed4609ae8d0da41b1036f7074

build:
  entry_points:
    - arcane = arcane.arcane.arcane_main:main
    - scfastqsim = arcane.scfastqsim.scfastqsim_main:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}


requirements:
  host:
    - python >=3.12
    - setuptools >=69.0.3
    - pip
  run:
    - python >=3.12
    - numpy
    - numba
    - pytest
    - jsonargparse >=4.29.0
    - pip
    - llvmlite
    - clangdev
    - xz
    - tabix
    - bzip2


test:
  imports:
    - arcane
  commands:
    - pip check
    - arcane --help
    - scfastqsim --help
  requires:
    - pip
    - python

about:
  home: https://gitlab.com/rahmannlab/arcane
  dev_url: https://gitlab.com/rahmannlab/arcane
  summary: "Arcane: Alignment-free single cell RNA-seq gene expression estimation"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - JZentgraf
