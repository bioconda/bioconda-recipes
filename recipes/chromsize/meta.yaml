{% set name = "chromsize" %}
{% set version = "0.0.34" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: 0c4b941fcc43c73f791a2e623ac88477b7b8a63a5c4904cfd2e7be127d6af0f3

build:
 number: 0
 run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - cmake
    - make
    - pkg-config

test:
 commands:
   - chromsize --help
   - chromsize --version

about:
 home: "https://github.com/alejandrogzi/chromsize"
 license: MIT
 license_family: MIT
 license_file: LICENSE
 summary: "Just get your chrom sizes."
 dev_url: "https://github.com/alejandrogzi/chromsize"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - alejandrogzi
  skip-lints:
    - compiler_needs_stdlib_c
