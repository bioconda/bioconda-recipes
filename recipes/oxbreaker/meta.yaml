{% set name = "oxbreaker" %}
{% set version = "1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://gitlab.com/rc-reding/OxBreaker/-/archive/1.0/OxBreaker-{{ version }}.tar.bz2
  sha256: 9ef375c42f60193db29b7d0dc8e5792d6a5c4009660c9f43ffe9a046b28eaef9

build:
  number: 0
  run_exports:
    - {{ name }}
  # Pure-Python package, but we depend on platform GTK libs; avoid noarch to keep things simple.
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    # Python side
    - python >=3.9
    - pygobject            # PyGObject bindings (maps to gi / Gtk bindings)
    # GTK4 stack (runtime libs used by PyGObject)
    - gtk4
    - gobject-introspection
    - cairo
    - pango
    - harfbuzz
    - glib
    # Nextflow + Java
    - bioconda::nextflow >=24

entry_points:
    - oxbreaker = oxbreaker.gui:main

test:
  commands:
    - nextflow -version

about:
  home: "https://github.com/oxfordmmm/OxBreaker"
  license: LGPL-2.1
  license_file: https://gitlab.com/rc-reding/OxBreaker/-/raw/main/LICENSE
  summary: "GTK4 GUI wrapper that launches a Nextflow pipeline"
  description:
    Outbreaker is a GTK4-based interface that collects parameters and launches a Nextflow pipeline.
    The package bundles the Nextflow project files and assets so they are available at runtime.

extra:
  recipe-maintainers:
    - rc-reding
  identifiers:
    - doi:10.64898/2026.03.18.709804
