{% set name = "a-liner" %}
{% set version = "1.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mokuno3430/a-liner/archive/v{{ version }}.tar.gz
  sha256: 4679b4695a4ffaca7cda5ec9b3f7a40a45aae1ddb8078b7e776ccf6d9811e173

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=61.0
  run:
    - python >=3.8
    - matplotlib-base
    - pandas
    - biopython
    - numpy
    - openpyxl
    - bcbio-gff

test:
  commands:
    - a-liner --help

about:
  home: https://github.com/mokuno3430/a-liner
  license: MIT
  license_file: LICENSE
  summary: "Flexible command-line tool for linear visualization of genome-scale sequence alignments"

extra:
  recipe-maintainers:
    - mokuno3430

