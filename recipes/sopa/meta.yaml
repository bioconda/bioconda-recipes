{% set version = "2.2.1" %}

package:
  name: sopa
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/sopa/sopa-{{ version }}.tar.gz
  sha256: c9ffcc0bdd6a59cd44b0786104cf72e8100022f80a459fb089ad8c600430f1a5

build:
  entry_points:
    - sopa = sopa.main:app
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1
  run_exports:
    - {{ pin_subpackage('sopa', max_pin="x") }}

requirements:
  host:
    - python >=3.11
    - hatchling
    - pip
  run:
    - python >=3.11
    - spatialdata >=0.7.2
    - spatialdata-io >=0.3.0
    - spatialdata-plot >=0.2.10
    - scanpy >=1.10.4
    - anndata >=0.11.0
    - igraph >=0.11.0
    - typer >=0.9.0
    - dask-core >=2024.4.1

test:
  imports:
    - sopa
  commands:
    - pip check
    - sopa --help
  requires:
    - pip
    - python

about:
  home: https://gustaveroussy.github.io/sopa
  summary: Spatial-omics pipeline and analysis
  doc_url: https://gustaveroussy.github.io/sopa
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - quentinblampey
