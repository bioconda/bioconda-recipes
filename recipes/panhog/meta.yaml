{% set version = "0.1.0" %}

package:
  name: panhog
  version: {{ version }}

source:
  
  url: https://github.com/yykaya/PanHOG/archive/refs/tags/v{{ version }}.tar.gz
  
  
  sha256: 859b84d350f492d3e3c97827a9934e218b0c73d3aa1ab8a27c6e738a5269da89

build:
 
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"
  entry_points:
    - panhog = PanHOG:main

requirements:
  host:
    
    - python 3.9
    - pip
    - setuptools
  
  run:
    
    - python 3.9
    
    
    - muscle
    - iqtree
    - panx
    
    
    - diamond >=2.1,<=2.1.8
    - orthofinder >=2.5.1,<=2.5.5
    
    
    - miniprot
    - k8
    - biopython
    - pandas
    - blast
    - numpy
    - seaborn
    - matplotlib
    - pyyaml 
    - seqtk
    
    
    - pip
    - pip:
      - pangene

test:
 
  commands:
    - panhog --help
   
    - pangene --help

about:
  home: https://github.com/yykaya/PanHOG
  summary: "A tool for pangenome analysis using HOGs"
  license: MIT
  license_file: LICENSE 

extra:
  recipe-maintainers:
    - yykaya 
