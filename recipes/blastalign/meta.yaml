package:
  name: blastalign
  version: "1.4"

build:
  number: 9
  skip: True # [osx]
  run_exports:
    - {{ pin_subpackage("blastalign", max_pin="x") }}

source:
  url: https://drive.google.com/uc?export=download&id=1Z0bt8vHRyR6QsEway1LxJjYIgM_E-j_f
  sha256: 20cd6895dc949d3aeafd14dcf18f2678d9ed24fdcaeddd9ace3e9862d84f106d
  fn: BlastAlign.tar
  #url: https://sites.google.com/site/belshawrobert/software/BlastAlign.tar
  #md5: c5476addbe673dca1f74ae7a5f62ce9b
  patches:
    - BlastAlign.patch
    - BlastAlign_fix_Divisionby0.patch
    - BlastAlignP.patch

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  run:
    - python
    - perl
    - blast-legacy

test:
  commands:
    - BlastAlign 2>&1

about:
  home: http://evolve.zoo.ox.ac.uk/Evolve/Blastalign.html
  license: GNU GENERAL PUBLIC LICENSE
  authors: Aris Katzourakis and Robert Belshaw
  summary: >
    Uses NCBI Blast to align nucleotide sequences that have large indels or are
    otherwise difficult to align globally.

extra:
  skip-lints:
    - should_not_use_fn
