{% set name = "aoptk" %}
{% set version = "0.4.2" %}
{% set owner = "rdurnik" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aoptk-{{ version }}.tar.gz
  sha256: ec9fc40c10b27596248ecb55000271a1f66fdac8f3f6a5db3737ee8d3bbb2f4b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - setuptools >=64.0.0
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=3.8
    - setuptools >=64.0.0
    - pandas
    - pymupdf
    - requests
    - biopython
    - click >=8.1
    - openai
    - jinja2
    - tenacity
    - boto3 >=1.43.2
    - python-dotenv

test:
  imports:
    - aoptk
  commands:
    - pip check

about:
  summary: "Tools to support data mining for the development of (q)AOPs."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  home: "https://github.com/{{owner}}/aoptk"
  dev_url: "https://github.com/{{owner}}/aoptk"
  doc_url: "https://github.com/{{owner}}/aoptk"

extra:
  recipe-maintainers:
    - hechth
    - rdurnik
