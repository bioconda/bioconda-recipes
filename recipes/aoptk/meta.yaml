{% set name = "aoptk" %}
{% set version = "0.3.2" %}
{% set owner = "rdurnik" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aoptk-{{ version }}.tar.gz
  sha256: 6d933144e4a3a3ebfce283b76da7a7390e4e5b774d0c45e44cc30d2c81e629ff

build:
  entry_points:
    - chemical-identifier = aoptk.application.chemical_identifier:cli
    - publication-tracker = aoptk.application.publication_tracker:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - setuptools >=64.0.0
    - setuptools-scm
    - wheel
    - pip
  run:
    - python >=3.8
    - pandas
    - pymupdf
    - metapub
    - requests
    - scispacy
    - spacy >=3.0.0,<3.8.0
    - huggingface_hub >=0.1.0,<1.0
    - beautifulsoup4
    - biopython
    - transformers
    - pytorch
    - openpyxl
    - click >=8.1
    - openai
    - spacy-layout

test:
  imports:
    - aoptk
  commands:
    - chemical-identifier --help
    - publication-tracker --help

about:
  summary: "Tools to support data mining for the development of (q)AOPs."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  home: "https://github.com/{{owner}}/aoptk"
  dev_url: "https://github.com/{{owner}}/aoptk"
  doc_url: "https://github.com/{{owner}}/aoptk"

extra:
  recipe-maintainers:
    - hechth
    - rdurnik
