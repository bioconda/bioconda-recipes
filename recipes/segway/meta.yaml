{% set name = "segway" %}
{% set version = "3.0.5" %}
{% set sha256 = "de77c66c75b4dec7b90a24ef6a8db435e807d1424b3ba66208877cb7db25157a" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools_scm
  run:
    - python
    - six
    - genomedata
    - gmtk >=1.4.4
    - autolog
    - textinput
    - optbuild
    - optplus
    - path.py
    - colorbrewer
    - drmaa >=0.4a3
    - ucsc-bedtobigbed

test:
  imports:
   - segway

  commands:
  # Smoke test
  - segway --version | grep {{ version }}
  - segway --help

about:
  home: http://segway.hoffmanlab.org/
  license: GPL2
  license_file: LICENSE
  summary: 'a tool for easy pattern discovery and identification in functional genomics data.'

extra:
  recipe-maintainers:
    - ericr86
  identifiers:
    - doi:10.1093/bioinformatics/btx603
    - biotools:segway
