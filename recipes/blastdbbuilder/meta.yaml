package:
  name: blastdbbuilder
  version: "1.0.5"

source:
  url: https://pypi.io/packages/source/b/blastdbbuilder/blastdbbuilder-1.0.5.tar.gz
  sha256: 3e0c5abce3e8516b8dc044bb9946a14f3a4ca63bd3870d1686dc95ba04e3c061

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage('blastdbbuilder', max_pin="x") }}
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=3.9
    - blast
    - seqkit
    - ncbi-datasets-cli

test:
  commands:
    - blastdbbuilder --help

about:
  home: https://github.com/asadprodhan/blastdbbuilder
  dev_url: https://github.com/asadprodhan/blastdbbuilder
  summary: Build custom BLAST reference databases from NCBI genomes
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asadprodhan
