package:
  name: blastdbbuilder
  version: "1.1.0"

source:
  url: https://pypi.io/packages/source/b/blastdbbuilder/blastdbbuilder-1.0.5.tar.gz
  sha256: a0f10a727c0ce77c07c7cd2a14ffc9698b76ffecc728eb21969212ff1472a1c1
 
build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage('blastdbbuilder', max_pin="x") }}
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv"

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - wheel
  run:
    - python >=3.9
    - blast
    - seqkit
    - ncbi-datasets-cli

test:
  commands:
    - blastdbbuilder --help

about:
  home: https://github.com/asadprodhan/blastdbbuilder
  dev_url: https://github.com/asadprodhan/blastdbbuilder
  summary: Build custom BLAST reference databases from NCBI genomes
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asadprodhan
