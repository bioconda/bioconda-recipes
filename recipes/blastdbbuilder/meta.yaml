{% set version = "1.1.0" %}

package:
  name: blastdbbuilder
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/blastdbbuilder/blastdbbuilder-{{ version }}.tar.gz
  sha256: c0dfd0fbd0d6e41858056633b970f5ac03919c3a1d9425ec756146fdb2ceacae

build:
  number: 0
  noarch: python
  entry_points:
    - blastdbbuilder = blastdbbuilder.cli:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('blastdbbuilder', max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
  run:
    - python >=3.9
    - blast
    - seqkit
    - ncbi-datasets-cli

test:
  commands:
    - blastdbbuilder --help

about:
  home: "https://github.com/asadprodhan/blastdbbuilder"
  dev_url: "https://github.com/asadprodhan/blastdbbuilder"
  summary: "Build custom BLAST reference databases from NCBI genomes."
  license: "GPL-3.0-or-later"
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asadprodhan
