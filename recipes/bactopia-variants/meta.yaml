{% set version = "1.0.4" %}

package:
  name: bactopia-variants
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage("bactopia-variants", max_pin="x") }}

source:
  url: https://github.com/bactopia/bactopia-variants/archive/v{{version}}.tar.gz
  sha256: 92599a591254e6d6085bcd9bb12b74d41d9f7623b8a95a20e74158967bc0a63a

requirements:
  run:
    - bactopia-py >=2.0.1
    - coreutils
    - gsl 2.6
    - openjdk 11.0.15
    - pigz
    - python <3.13
    - rename
    - snippy >=4.6.0
    - snpeff >=4.3,<5
    - sed
    - vcf-annotator >=1.0.0
    - vcflib >=1.0.0_rc3,<=1.0.2 # Snippy crashes with v1.0.3 and later
    - tabixpp 1.1.0 # vcflib requires libtabixpp.so.0, no longer available as of 1.1.2

test:
  commands:
    - "bactopia-variants"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: Methods used by Bactopia for SNP and InDel analysis
  dev_url: https://github.com/bactopia/bactopia-variants/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
