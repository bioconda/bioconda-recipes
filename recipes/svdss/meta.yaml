{% set version = "2.1.1" %}
{% set sha256 = "c73df403c9a6bd1463d627e50a0d94a9743daff0385d3aa98df89416ab0a349e" %}

package:
  name: svdss
  version: {{ version }}

source:
  url: https://github.com/Parsoa/SVDSS/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage('svdss', max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake =3.31.6
    - make
    - automake
    - autoconf
    - libtool
    - git
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - htslib
    - gsl
    - zlib
    - bzip2
    - xz
  run:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - samtools >=1.9
    - bcftools >=1.9
    - kanpig

test:
  commands:
    - SVDSS --version
    - run_svdss -v

about:
  home: "https://github.com/Parsoa/SVDSS"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Structural Variant Discovery from Sample-specific Strings."
  dev_url: "https://github.com/Parsoa/SVDSS"
  doc_url: "https://github.com/Parsoa/SVDSS/blob/v{{ version }}/README.md"

extra:
  #cli.c:(.text+0x11e8): undefined reference to `ksw_gg2_sse'
  #src/abpoa/src/simd_instruction.h:21:10: fatal error: immintrin.h: No such file or directory
  #include <immintrin.h>
  #additional-platforms:
    #- linux-aarch64
  identifiers:
    - biotools:svdss
    - doi:10.1038/s41592-022-01674-1
  recipe-maintainers:
    - ldenti
  skip-lints:
    - compiler_needs_stdlib_c
