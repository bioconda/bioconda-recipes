{% set name = "medicc2" %}
{% set version = "1.1.2" %}
{% set sha256 = "13cb58099d5e4b79b4169b8ccc8f2543863b1dab0a43fafb5e146bfd9d9adc97" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 4
  skip: True  # [py < 38 or py > 312]
  script:
    - export LDFLAGS="${LDFLAGS} -L${PREFIX}/lib"
    - export CPPFLAGS="${CPPFLAGS} -I${PREFIX}/include"
    - export CXXFLAGS="${CXXFLAGS} -O3"
    - sed -i.bak 's|-std=c++17|-std=c++14|' setup.py
    - sed -i.bak 's|"CONDA_PREFIX"|"PREFIX"|' setup.py
    - rm -f *.bak
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler("cxx") }}
    - {{ stdlib('c') }}
  host:
    - python
    - pip
    # The following are needed for building the Cython extension
    - openfst ==1.8.3
    - setuptools
    - cython <3
    - pathlib2
  run:
    - python
    - numpy <2.0
    - pyyaml >=5.4.1
    - openfst ==1.8.3
    - pandas <2.1
    - joblib >=1.0.1
    - biopython >=1.78
    - scipy >=1.7
    - matplotlib-base >=3.3.4
    - pyranges

test:
  commands:
    - medicc2 --help

about:
  home: "https://bitbucket.org/schwarzlab/medicc2"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: LICENSE
  summary: "Whole-genome doubling-aware copy number phylogenies for cancer evolution."
  description: |
    For more information see the accompanying biorxiv preprint "Kaufmann et al. Whole-genome 
    doubling-aware copy number phylogenies for cancer evolution with MEDICC2."

    MEDICC2 depends on conda-forge packages (e.g. openfst). Ensure conda-forge is enabled with strict channel priorityy when installing. See the project documentation for detailed installation.
  dev_url: "https://bitbucket.org/schwarzlab/medicc2"
  doc_url: "https://bitbucket.org/schwarzlab/medicc2/src/master/README.md"

extra:
  recipe-maintainers:
    - tlkaufmann
  identifiers:
    - doi:10.1186/s13059-022-02794-9
    - biotools:medicc2
  additional-platforms:
    - linux-aarch64
    - osx-arm64
