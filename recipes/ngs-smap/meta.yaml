{% set name = "ngs-smap" %}
{% set version = "5.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/ngs-smap/ngs_smap-{{ version }}.tar.gz
  sha256: 942127ac232ab29152aae46e2a1ded0f98e9cc586ea62e6cbfcab1081c9d3fab

build:
  number: 0
  noarch: python
  entry_points:
    - smap = smap.__main__:main
  ignore_prefix_files: True
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - setuptools-scm
    - setuptools_scm_git_archive
    - setuptools
    - python >=3.8.1,!=3.11
    - pip
  run:
    - python >=3.8.1,!=3.11
    - colorlog
    - cutadapt
    - biopython
    - gffpandas
    - matplotlib-base
    - natsort
    - openpyxl
    - pandas
    - plotly
    - pybedtools
    - pysam
    - seaborn-base
    - typing-extensions
    - gffutils
    - primer3-py
    - tqdm
    - scipy
    - numexpr
    - numpy
    - scanpy
    - pycirclize
    - python-igraph
    - python-kaleido

test:
  commands:
    - smap compare --help

about:
  home: "https://gitlab.ilvo.be/genomics/smap-package/smap"
  license: "AGPL-3.0-or-later"
  license_family: AGPL
  license_file: LICENSE
  summary: "SMAP is a software package that analyzes next-generation DNA sequencing read mapping distributions and performs haplotype calling to create multi-allelic molecular markers."
  dev_url: "https://gitlab.ilvo.be/genomics/smap-package/smap"
  doc_url: "https://ngs-smap.readthedocs.io/en/latest"

extra:
  recipe-maintainers:
    - ieguinoa
  identifiers:
    - doi:10.1101/2022.03.10.483555
