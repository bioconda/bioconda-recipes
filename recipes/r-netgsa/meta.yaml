{% set version = '4.0.7' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-netgsa
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/netgsa_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/netgsa/netgsa_{{ version }}.tar.gz
  sha256: 9bfac15cb9ec017926a6c836fd56f6e7c23fd9a508ca601e8c151738c67b6828

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]

requirements:
  build:
    - {{ compiler('c') }}              # [not win]
    - {{ compiler('m2w64_c') }}        # [win]
    - {{ compiler('cxx') }}            # [not win]
    - {{ compiler('m2w64_cxx') }}      # [win]
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - bioconductor-annotationdbi
    - r-matrix
    - bioconductor-rcy3
    - r-rcpp >=1.0.2
    - r-rcppeigen
    - r-corpcor
    - r-data.table
    - r-dplyr
    - bioconductor-genefilter
    - r-glassofast
    - r-glmnet
    - bioconductor-graph
    - bioconductor-graphite
    - r-httr
    - r-igraph
    - r-magrittr
    - r-msigdbr
    - r-quadprog
    - r-reshape2
    - r-rlang
  run:
    - r-base
    - bioconductor-annotationdbi
    - r-matrix
    - bioconductor-rcy3
    - r-rcpp >=1.0.2
    - r-rcppeigen
    - r-corpcor
    - r-data.table
    - r-dplyr
    - bioconductor-genefilter
    - r-glassofast
    - r-glmnet
    - bioconductor-graph
    - bioconductor-graphite
    - r-httr
    - r-igraph
    - r-magrittr
    - r-msigdbr
    - r-quadprog
    - r-reshape2
    - r-rlang

test:
  commands:
    - $R -e "library('netgsa')"           # [not win]
    - "\"%R%\" -e \"library('netgsa')\""  # [win]

about:
  home: https://github.com/mikehellstern/netgsa
  license: GPL-3.0-only
  summary: Carry out network-based gene set analysis by incorporating external information about
    interactions among genes, as well as novel interactions learned from data. Implements
    methods described in Shojaie A, Michailidis G (2010) <doi:10.1093/biomet/asq038>,
    Shojaie A, Michailidis G (2009) <doi:10.1089/cmb.2008.0081>, and Ma J, Shojaie A,
    Michailidis G (2016) <doi:10.1093/bioinformatics/btw410>.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
# biocViews:

extra:
  recipe-maintainers:
    - conda-forge/r

