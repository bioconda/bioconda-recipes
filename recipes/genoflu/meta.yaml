{% set user = "USDA-VS" %}
{% set name = "GenoFLU" %}

{% set version = "1.07" %}
{% set sha256 = "32766b9f6cd4ed17c86d3bedc30bd610fe530908e301d13b51f0035b305d8e10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('genoflu', max_pin="x") }}

source:
  url: https://github.com/{{ user }}/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

requirements:
  run:
    - python >=3.7
    - pandas
    - biopython
    - blast
    - openpyxl
    
test:
  commands:
    - genoflu.py -h

about:
  home: https://github.com/{{ user }}/{{ name }}
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: Influenza data pipeline to automate genotyping assignment.
  dev_url: https://github.com/USDA-VS/GenoFLU
