{% set name = "vartovcf" %}
{% set version = "1.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/clintval/{{ name }}/archive/{{ version }}.tar.gz
  sha256: a6ac6480669dd4e41b93c0c76e4715d37aa755e5dc238d64397c8e6b9ba51fe9

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - clangdev
    - pkg-config
    - make
    - cmake

test:
  commands:
    - vartovcf --help

about:
  home: "https://github.com/clintval/{{ name }}"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Convert variants from VarDict/VarDictJava into VCF v4.2 format."
  dev_url: "https://github.com/clintval/{{ name }}"
  doc_url: "https://github.com/clintval/{{ name }}/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    # TODO: enable this when either vartovcf or rust-htslib fix the bindgen issue: https://github.com/rust-bio/rust-htslib/issues/434
    # - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - clintval
