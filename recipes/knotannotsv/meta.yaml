{% set user = "mobidic" %}
{% set name = "knotAnnotSV" %}
{% set version = "1.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/{{ user }}/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: ac1e0cc57807b81483b8e206a72dbb8b3755523f519a452ed6b3fd45dc9a7bdf

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('knotannotsv', max_pin="x.x") }}

requirements:
  run:
    - perl
    - perl-yaml-libyaml
    - perl-sort-key
    - perl-excel-writer-xlsx

test:
  commands:
    - perl -MYAML::XS -e 'print $YAML::XS::VERSION, "\n";'
    - perl -MSort::Key::Natural -e 'print $Sort::Key::Natural::VERSION, "\n";'
    - perl -MExcel::Writer::XLSX -e 'print $Excel::Writer::XLSX::VERSION, "\n";'

about:
  home: https://github.com/{{ user }}/{{ name }}
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: License.txt
  summary: "Post-processing and annotation helper around AnnotSV results (Perl-based)."
  description: |
    knotAnnotSV is a simple tool to create a customizable html file
    (or xlsm file compatible with thousands of SV) from an AnnotSV output.
  dev_url: https://github.com/{{ user }}/{{ name }}

extra:
  recipe-maintainers:
    - tetedange13
