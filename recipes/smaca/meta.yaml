{% set name = "smaca" %}
{% set version = "1.2.4rc11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7d477cb72b5e5afdff14dcde8e9bda9ea661f84d50bba6dc570ff543dd1cc913

build:
  number: 0
  skip: true   # [py2k or osx]
  entry_points:
    - smaca = smaca.cli:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - pip
    - python
    - setuptools
    - setuptools-scm
    - cython
    - numpy
    - pysam
  run:
    - click
    - joblib
    - pysam
    - python
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - smaca
  commands:
    - smaca --help

about:
  home: https://github.com/babelomics/SMAca
  license: GPL-3.0
  license_file: LICENSE.txt
  summary: smaca is a python tool to detect putative SMA carriers and estimate the absolute SMN1 copy-number in a population.

extra:
  identifiers:
    - doi:https://zenodo.org/badge/latestdoi/250259934
  container:
    extended-base: True
  recipe-maintainers:
    - loucerac
    - erdanieee
