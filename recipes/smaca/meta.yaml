{% set name = "smaca" %}
{% set version = "1.2.4rc11" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7d477cb72b5e5afdff14dcde8e9bda9ea661f84d50bba6dc570ff543dd1cc913

build:
  number: 0
  entry_points:
    - smaca = smaca.cli:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - pip
    - python
    - setuptools
    - setuptools-scm
    - cython
    - numpy
    - pysam
  run:
    - click
    - joblib
    - numpy
    - pysam
    - python

test:
  imports:
    - smaca
  commands:
    - smaca --help

about:
  home: "https://github.com/babelomics/SMAca"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.txt"
  summary: "smaca is a python tool to detect putative SMA carriers and estimate the absolute SMN1 copy-number in a population."
  dev_url: "https://github.com/babelomics/SMAca"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1002/humu.24120
    - doi:10.5281/zenodo.3731299
    - biotools:smaca
  container:
    extended-base: True
  recipe-maintainers:
    - loucerac
    - erdanieee
  skip-lints:
    - compiler_needs_stdlib_c
