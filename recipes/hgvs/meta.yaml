{% set name = "hgvs" %}
{% set version = "1.5.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hgvs-{{ version }}.tar.gz
  sha256: 5d76d9cde7bd029d770f3e06ddac5b6bba22da2d8698e39a5a403053d9451251

build:
  number: 0
  noarch: python
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  entry_points:
    - hgvs-shell = hgvs.shell:shell
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('hgvs', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools-scm
    - cython
    - pytest-runner
  run:
    - python >=3.10
    - attrs >=17.4.0
    - biocommons.seqrepo >=0.6.11
    - bioutils >=0.4.0,<1.0
    - configparser >=3.3.0
    - importlib-resources
    - ipython
    - parsley
    - pre-commit >=3.4
    - psycopg2-binary

test:
  imports:
    - hgvs
    - hgvs.dataproviders

about:
  home: "https://github.com/biocommons/hgvs"
  summary: "HGVS Parser, Formatter, Mapper, and Validator."
  doc_url: "https://hgvs.readthedocs.io"
  license: "Apache-2.0"
  license_file: "LICENSE.txt"
  dev_url: "https://github.com/biocommons/hgvs"

extra:
  recipe-maintainers:
    - ok-gitr
