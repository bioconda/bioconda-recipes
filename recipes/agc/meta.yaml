{% set name = "agc" %}
{% set version = "3.2.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.2-arm64_linux.tar.gz  # [linux and aarch64]
    sha256: f58abfe7bbe9ec7df91b0c8d5b5705fcb41d94da1cc5d62c3f0b306e06c6b7d2  # [linux and aarch64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.2-x64_linux.tar.gz  # [linux and x86_64]
    sha256: ea28a5c714f8f125da9f2b243b1a3cb3a70e1b33ad87efb87b8d646ecf386ea0  # [linux and x86_64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.2-x64_mac.tar.gz  # [osx and x86_64]
    sha256: 460feddfbdc905da87ae5dffe85678fcc30f814d67d1fdc5e3f4064bb87602c9  # [osx and x86_64]
  - url: https://github.com/refresh-bio/agc/releases/download/v{{ version }}/agc-v3.2.2-m1_mac.tar.gz  # [osx and arm64]
    sha256: a913d8d3ce5710921dabc9533eb91dfc0f8401531bfa8a600d0def6b49d85f16  # [osx and arm64]

build:
  number: 0
  script: "mkdir -p ${PREFIX}/bin; install -v -m 0755 agc ${PREFIX}/bin"
  run_exports:
    - {{ pin_subpackage('agc', max_pin="x") }}

requirements:
  build:

test:
  commands:
    - agc

about:
  home: "https://github.com/refresh-bio/agc"
  summary: "Assembled Genomes Compressor (AGC) is a tool designed to compress collections of de-novo assembled genomes. It can be used for various types of datasets: short genomes (viruses) as well as long (humans)."
  license: MIT
  license_family: MIT
  dev_url: "https://github.com/refresh-bio/agc"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - should_be_noarch_generic
    - should_not_be_noarch_source
