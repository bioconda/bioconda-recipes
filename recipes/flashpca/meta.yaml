package:
  name: flashpca
  version: "2.0"

source:
  url: https://github.com/gabraham/flashpca/archive/refs/tags/v2.0.tar.gz
  sha256: e50955e2fbe9aa77fa656900e2468622aeae7e56ca026071fe1087583aa3d518

build:
  number: 0
  script: build.sh
  run_exports:
    - {{ pin_subpackage('flashpca', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - make
  host:
    - boost
    - eigen
    - spectra
    - openblas
  run:
    - boost
    - eigen
    - spectra
    - openblas

test:
  commands:
    - flashpca --help
    - flashpca --version || true

about:
  home: https://github.com/gabraham/flashpca
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Fast principal component analysis of SNP data (FlashPCA2)
  description: |
    FlashPCA performs fast principal component analysis (PCA) of 
    large-scale genome-wide SNP data using randomised algorithms 
    and the Spectra library.

extra:
  recipe-maintainers:
    - dbaku42
  identifiers:
    - biotools:flashpca
