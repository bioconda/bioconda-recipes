package:
  name: flashpca
  version: "2.0"

source:
  url: https://github.com/gabraham/flashpca/archive/refs/tags/v2.0.tar.gz
  sha256: e50955e2fbe9aa77fa656900e2468622aeae7e56ca026071fe1087583aa3d518

build:
  number: 0
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - boost
    - eigen >=3.3,<3.4
    - openblas
  run:
    - boost
    - eigen >=3.3,<3.4
    - openblas

tests:
  - script:
    - flashpca --help

about:
  homepage: https://github.com/gabraham/flashpca
  license: GPL-3.0-or-later
  summary: Fast principal component analysis of SNP data (FlashPCA2)
  description: FlashPCA performs fast PCA on large-scale genome-wide SNP data using randomised algorithms.
extra:
  recipe-maintainers:
    - dbaku42
