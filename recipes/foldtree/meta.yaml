{% set name = "foldtree" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url:  https://github.com/DessimozLab/fold_tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e2ac46cec52fff1edadb318ee5cee553ab704a30ceb15c5c7ef606c86b849c21

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage("foldtree", max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - click
    - snakemake-minimal <8

test:
  commands:
    - foldtree --help
    - foldtree --version

about:
  home: https://github.com/DessimozLab/fold_tree
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: "Foldtree creates phylogenetic trees from protein structures using Foldseek."
extra:
additional-platforms:
  - linux-aarch64
identifiers:
  - doi:10.1038/s41594-025-01649-8