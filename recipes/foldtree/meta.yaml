{% set name = "foldtree" %}
{% set version = "1.1.1rc1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url:  https://github.com/DessimozLab/fold_tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c611a29f2e7041b30e784a246d61c07a7582d1e48db2689065939842f48350c4

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage("foldtree", max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python =3.10
    - click
    - snakemake-minimal <8
    - biopython
    - foldseek
    - toytree =2.0.1
    - numpy
    - pandas
    - quicktree
    - python-wget
    - requests
    - scipy
    - ujson


test:
  commands:
    - foldtree --help
    - foldtree --version

about:
  home: https://github.com/DessimozLab/fold_tree
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: "Foldtree creates phylogenetic trees from protein structures using Foldseek."
extra:
additional-platforms:
  - linux-aarch64
identifiers:
  - doi:10.1038/s41594-025-01649-8