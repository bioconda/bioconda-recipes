{% set name = "foldtree" %}
{% set version = "1.1.0rc1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/DessimozLab/fold_tree/archive/refs/tags/v{{ version }}.tar.gz
  sha256: fb276266b01bb78c7a856fb529417a8eb9ecaad31dbdb0edf621411e1e238d6c

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage("foldtree", max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - click
    - snakemake-minimal

test:
  commands:
    - foldtree --help
    - foldtree --version

about:
  home: https://github.com/DessimozLab/fold_tree
  license: MIT
  license_file: LICENSE
  license_family: GPL3
  summary: "Foldtree creates phylogenetic trees from protein structures using Foldseek."
extra:
additional-platforms:
  - linux-aarch64
identifiers:
  - doi:10.1038/s41594-025-01649-8