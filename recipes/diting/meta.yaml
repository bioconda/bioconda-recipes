{% set name = "diting" %}
{% set version = "2.0.1" %}
{% set sha256 = "2657e680214581e53122b5e60a756cff546e0ac77af785a77b116c560d5cd0a8" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/SilentGene/DiTing/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling

  run:
    - python >=3.9
    - snakemake >=9.0
    - pandas
    - matplotlib
    - seaborn
    - megahit
    - spades
    - prodigal
    - bwa
    - bbmap
    - hmmer
    - kofamscan

test:
  commands:
    - {{ name }} --version | grep '{{ version }}'

about:
  home: https://github.com/SilentGene/DiTing
  summary: "A Snakemake-based pipeline to infer and compare biogeochemical pathways in metagenomic data"
  license: GPL-3.0
  license_file: LICENSE

extra:
  identifiers:
    - biotools:diting