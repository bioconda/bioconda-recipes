{% set name = "pyensembl" %}
{% set version = "2.6.6" %}
{% set sha256 = "12f1251e5b03dec69443ba5f719e66b44b7e155862e8221b5a159fe04c46cea6" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0]|lower }}/{{ name|lower }}/{{ name|lower }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  entry_points:
    - pyensembl = pyensembl.shell:run
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - typechecks >=0.0.2
    - numpy >=2.0.0
    - pandas >=0.15
    - datacache >=1.1.4
    - memoized-property >=1.0.2
    - six >=1.9.0
    - gtfparse >=2.5.0
    - serializable
    - tinytimer
    - pylint >=1.4.4
    - python-dateutil >=2.5.0

test:
  imports:
    - pyensembl
  commands:
    - pyensembl --help

about:
  home: "https://github.com/openvax/pyensembl"
  license: "Apache-2.0"
  summary: "Python interface to ensembl reference genome metadata."
  license_family: APACHE
  license_file: LICENSE
  dev_url: "https://github.com/openvax/pyensembl"
