{% set name = "iCount-Mini" %}
{% set version = "4.0.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: a248b4017e9886502f71e0b1d53f6fa90b278d88448b046635c672b8f05c65fb

build:
  number: 0
  entry_points:
    - iCount-Mini = iCount.cli:main
  script: "{{ PYTHON }} -m pip install . -vv --ignore-installed --no-deps"
  noarch: python

requirements:
  host:
    - pip
    - python
    - sphinx >=1.4
  run:
    - cutadapt >=1.10
    - matplotlib-base
    - numpy
    - numpydoc
    - pandas
    - pybedtools
    - pysam
    - python
    - sphinx >=1.4
    - bedtools ==2.30.0

test:
  imports:
    - iCount
    - iCount.analysis
    - iCount.examples
    - iCount.externals
    - iCount.files
    - iCount.genomes
    - iCount.mapping
    - iCount.plotting
  commands:
    - iCount-Mini --help

about:
  home: "https://github.com/ulelab/iCount-Mini"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Computational pipeline for analysis of iCLIP data"

extra:
  recipe-maintainers:
    - marc-jones
