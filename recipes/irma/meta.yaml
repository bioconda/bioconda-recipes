{% set name = "IRMA" %}
{% set version = "1.3.1" %}
{% set sha256 = "523cb657fbf7c7b1a037fa9cea62636f93647e46d1487a4ee3aa2d75614651dd" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/CDCgov/irma/releases/download/v{{ version }}/irma-v{{ version }}-universal.zip
  sha256: {{ sha256 }}
  patches:
    - irma-check-dir-writable.patch

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('irma', max_pin="x.x") }}
  binary_relocation: false

requirements:
  run_constrained:
    - __glibc >= 2.28
    - __osx >= 10.15
  host:
    - perl
  run:
    - perl
    - r-base >=3.5.1
    - parallel >=20200422
    - pigz >=2.8
    - blat >=35
    - samtools >=1.21
    - minimap2 >=2.29
    - zip >=3.0

test:
  commands:
    - IRMA -h 2>&1  | grep -q "Usage"
    - LABEL -h 2>&1 | grep -q "Usage"

about:
  home: https://wonder.cdc.gov/amd/flu/irma/
  license: Apache Software License, Apache-2.0
  summary: "IRMA: Iterative Refinement Meta-Assembler for the robust assembly, variant calling, and phasing of highly variable RNA viruses."
  license_family: APACHE
