{% set name = "obitools4" %}
{% set version = "4.4.33" %}
{% set sha256 = "d4edd547e5bc5a09464742eba526460a31f3e30e6716b980f04280f9018e85e8"%}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: "https://github.com/metabarcoding/obitools4/archive/refs/tags/Release_{{ version }}.tar.gz"
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c')}}
    - {{ compiler('go-cgo') }}
    - go-licenses
    - make
    - zlib
  host:
    - libzlib
    - zlib

test:
  commands:  # --help returns exit code 1
    - obiannotate --version
    - obiclean --version
    - obicleandb --version
    - obicomplement --version
    - obiconsensus --version
    - obiconvert --version
    - obicount --version
    - obicsv --version
    - obidemerge --version
    - obidistribute --version
    - obigrep --version
    - obijoin --version
    - obikmermatch --version
    - obikmersimcount --version
    - obilandmark --version
    - obimatrix --version
    - obimicrosat --version
    - obimultiplex --version
    - obipairing --version
    - obipcr --version
    # - obireffamidx --version  # works on master but not on release 4.4.0
    # - obirefidx --version  # works on master but not on release 4.4.0
    - obiscript --version
    - obisplit --version
    - obisummary --version
    - obitag --version
    - obitagpcr --version
    - obitaxonomy --version
    - obiuniq --version

  
about:
  home: "https://obitools4.metabarcoding.org"
  license: "CECILL-2.1"
  license_file: "LICENCE-CECILL-2.1.txt"
  #license_family: CECILL
  summary: "A software package for DNA metabarcoding."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
