{% set name = "obitools4" %}
{% set version = "4.4.15" %}
{% set sha256 = "f0994c9bd391b747aac2e7e263c8ba84c14538c83983458d977600914af62969"%}


package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

source:
  url: "https://github.com/metabarcoding/obitools4/archive/refs/tags/Release_{{ version }}.tar.gz"
  sha256: {{ sha256 }}

requirements:
  build:
    - {{ compiler('c')}}
    - {{ compiler('go-cgo') }}
    - libzlib
    - make
    - zlib
  run:
    - libzlib


test:
  commands:
    - obiannotate --help
    - obiclean --help
    - obicleandb --help
    - obicomplement --help
    - obiconsensus --help
    - obiconvert --help
    - obicount --help
    - obicsv --help
    - obidemerge --help
    - obidistribute --help
    - obigrep --help
    - obijoin --help
    - obik --help
    - obikmermatch --help
    - obikmersimcount --help
    - obilandmark --help
    - obimatrix --help
    - obimicrosat --help
    - obimultiplex --help
    - obipairing --help
    - obipcr --help
    - obireffamidx --help
    - obirefidx --help
    - obiscript --help
    - obisplit --help
    - obisummary --help
    - obitag --help
    - obitagpcr --help
    - obitaxonomy --help
    - obiuniq --help

  
about:
  home: https://obitools4.metabarcoding.org
  license: CECILL-2.1
  license_file: LICENCE-CECILL-2.1.txt
  #license_family: CECILL
  summary: "A software package for DNA metabarcoding"

# extra:
#   additional-platforms:
#   identifiers:
