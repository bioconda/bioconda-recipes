{% set name = "obitools4" %}
{% set version = "4.4.40" %}
{% set sha256 = "2586d9c33389e5856d714adcbf9917a30b9fdd167a4e55bc9dfffa6d6482f657"%}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/metabarcoding/obitools4/archive/refs/tags/Release_{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c')}}
    - {{ compiler('go-cgo') }}
    - go-licenses
    - make
    - zlib
  host:
    - libzlib

test:
  commands:
    - obiannotate --help
    - obiclean --help
    - obicleandb --help
    - obicomplement --help
    - obiconsensus --help
    - obiconvert --help
    - obicount --help
    - obicsv --help
    - obidemerge --help
    - obidistribute --help
    - obigrep --help
    - obijoin --help
    - obik --help
    - obikmermatch --help
    - obikmersimcount --help
    - obilandmark --help
    - obimatrix --help
    - obimicrosat --help
    - obimultiplex --help
    - obipairing --help
    - obipcr --help
    - obireffamidx --help
    - obirefidx --help
    - obiscript --help
    - obisplit --help
    - obisummary --help
    - obitag --help
    - obitagpcr --help
    - obitaxonomy --help
    - obiuniq --help

about:
  home: "https://github.com/metabarcoding/obitools4-doc"
  license: "CECILL-2.1"
  license_file: "LICENCE-CECILL-2.1.txt"
  summary: "A software package for DNA metabarcoding."
  dev_url: "https://github.com/metabarcoding/obitools4-doc"
  doc_url: "https://obitools4.metabarcoding.org"
  
extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:obitools
    - doi:10.1111/1755-0998.12428
    - usegalaxy-eu:obi_tab
    - usegalaxy-eu:obi_stat
    - usegalaxy-eu:obi_sort
    - usegalaxy-eu:obi_convert
    - usegalaxy-eu:obi_clean
    - usegalaxy-eu:obi_uniq
    - usegalaxy-eu:obi_grep
    - usegalaxy-eu:obi_annotate
  skip-lints:
    - compiler_needs_stdlib_c
