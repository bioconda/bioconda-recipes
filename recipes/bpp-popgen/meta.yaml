{% set name = 'bpp-popgen' %}
{% set version = '3.0.0' %}
{% set sha256 = '3c802f7173a53c5116eb27234a07c448090f0bc5f52fa1991110213bf7bf0429' %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/BioPP/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - cmake
    - pkg-config
  host:
    - bpp-seq
    - eigen
  run:
    - bpp-seq

test:
  commands:
    - test -f ${PREFIX}/lib/libbpp-popgen.so  # [linux]
    - test -f ${PREFIX}/lib/libbpp-popgen.dylib  # [osx]

about:
  home: "https://github.com/BioPP/bpp-popgen"
  license: CeCILL
  license_file: "COPYING.txt"
  summary: "Bio++ is a set of C++ libraries for Bioinformatics."
  dev_url: "https://github.com/BioPP/bpp-popgen"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
