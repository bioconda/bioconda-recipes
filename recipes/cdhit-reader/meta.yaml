{% set name="cdhit-reader" %}
{% set repo="cdhit-parser" %}
{% set version="0.3.0" %}


package:
  name: {{ name }}
  version: {{ version }}

build:
  noarch: python
  number: 0
  script: python -m pip install --no-deps --ignore-installed .

source:
  url: https://github.com/telatin/{{ repo }}/archive/v{{ version }}.tar.gz
  sha256: 04972f1ce8f061f28d2e112e0f98d3d2ba8fd3d2673ee4715fe4f19e43e436be

requirements:
  host:
    - python >=3.6,<=3.9
    - pip
  run:
    - python >=3.6,<3.9
    - cd-hit
    - click
    - xopen
    - more-itertools

test:
  commands:
    - cdhit-parser --version | grep {{ version }}

about:
  home: https://github.com/telatin/cdhit-parser
  license: 'MIT'
  license_file: LICENSE.md
  summary: 'Parse CD-HIT cluster files'

extra:
  recipe-maintainers:
    - telatin
