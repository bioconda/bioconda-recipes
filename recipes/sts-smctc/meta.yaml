{% set name = "sts-smctc" %}
{% set version = "0.2" %}

package:
  name: {{ name }}
  version: "2.0"

source:
  url: https://github.com/matsengrp/smctc/archive/refs/tags/sts-{{ version }}.tar.gz
  sha256: 918ed06db97bea21fb35d81890a93eac230115992a9a446ec31b3fdd4a288f5a

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - cmake
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - gsl
    - libcblas
  run:
    - gsl
    - libgomp  # [linux]
    - llvm-openmp  # [osx]

test:
  commands:
    - test -f "${PREFIX}/lib/libsmctc.a"

about:
  home: "https://github.com/matsengrp/smctc"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: COPYING
  summary: "A C++ template class library for the efficient and convenient implementation of very general Sequential Monte Carlo algorithms."
  dev_url: "https://github.com/matsengrp/smctc"
  doc_url: "https://warwick.ac.uk/fac/sci/statistics/staff/academic-research/johansen/smctc"

extra:
  notes: "This fork of smctc is maintained by the [Matsen research group at the Fred Hutchinson Cancer Research Centre](http://matsen.fredhutch.org/) for use in the [Sequential Tree Sampler online phylogenetics package](https://github.com/OnlinePhylo/sts)"
  additional-platforms:
    - linux-aarch64
    - osx-arm64
