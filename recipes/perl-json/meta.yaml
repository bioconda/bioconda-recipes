{% set name = "perl-json" %}
{% set version = "4.11" %}
{% set sha256 = "713bdbe724dbb915ed50265ffe47e079a511980cb2427aa19076788bb64c3182" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/I/IS/ISHIGAKI/JSON-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - make
  host:
    - perl
    - perl-json-xs
  run:
    - perl
    - perl-json-xs

test:
  # Perl 'use' tests
  imports:
    - JSON

about:
  home: https://metacpan.org/pod/JSON
  dev_url: https://github.com/makamaka/JSON
  license: GPL-1.0-or-later OR Artistic-1.0-Perl
  summary: 'JSON (JavaScript Object Notation) encoder/decoder'
