{% set name = "pbjasmine" %}
{% set version = "26.1.3" %}
{% set sha256 = "9f054bf03d9e5637ca353018f865fa65dfb6a933c6513a515d5da797b811f04e" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/PacificBiosciences/jasmine/releases/download/v{{ version }}/jasmine.tar.xz
  sha256: {{ sha256 }}

about:
  home: https://github.com/PacificBiosciences/pbbioconda
  license: BSD-3-Clause-Clear
  summary: jasmine

extra:
  recipe-maintainers:
    - armintoepfer
    - pb-dseifert
  skip-lints:
    #repackaged binary
    - should_be_noarch_generic

build:
  number: 0
  skip: True  # [osx]
  binary_relocation: False
  run_exports:
    - {{ pin_subpackage('pbjasmine', max_pin='x.x') }}
requirements:
  build:
    - {{ compiler('cxx') }}

test:
  commands:
    - jasmine -h
