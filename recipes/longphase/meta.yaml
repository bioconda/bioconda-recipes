{% set name = "longphase" %}
{% set version = "2.0.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/twolinin/longphase/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e9936716ab357317c7aea1de3ba397ec015a61a7b03bedb88b4138e94db3f699

build:
  number: 0
  skip: True  # [win or (osx and x86_64)]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - autoconf
    - automake
    - libtool
    - pkg-config
    - make
    - cmake
    - gnuconfig
  host:
    - zlib
    - bzip2
    - xz
    - libcurl
    - llvm-openmp  # [osx]

test:
  commands:
    - longphase

about:
  home: "https://github.com/twolinin/longphase"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  summary: "LongPhase is an ultra-fast program for simultaneously co-phasing SNPs, small indels, large SVs, and (5mC) modifications for Nanopore and PacBio platforms."
  dev_url: "https://github.com/twolinin/longphase"
  doc_url: "https://github.com/twolinin/longphase/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
