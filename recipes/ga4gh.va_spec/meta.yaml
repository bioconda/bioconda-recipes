{% set name = "ga4gh.va_spec" %}
{% set version = "0.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ga4gh_va_spec-{{ version }}.tar.gz
  sha256: a8813745d261e218932608a7905571354e14180be10c2972ed5d03f8b9a7cf72

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('ga4gh.va_spec', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=65.3
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.10
    - ga4gh.vrs >=2.2.0,<3.0
    - ga4gh.cat_vrs >=0.7.1,<0.8.dev0
    - pydantic >=2.0,<3.0

test:
  imports:
    - ga4gh

about:
  home: https://github.com/ga4gh/va-spec-python
  summary: GA4GH Variant Annotation (VA) reference implementation
  dev_url: https://github.com/ga4gh/va-spec-python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - emmcauley
