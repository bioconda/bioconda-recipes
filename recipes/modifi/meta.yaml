{% set name = "modifi" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sachdevalab/MODIFI/archive/refs/tags/v{{ version }}.tar.gz
  # Run: curl -sL <url> | sha256sum   to get this value after creating the release tag
  sha256: 6428df241a83b3976d88c07f1092e6682473f8f13bd0e4386497be79257a96f5

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('modifi', max_pin="x") }}
    - {{ pin_subpackage('modifi', max_pin="x.x") }}
requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - python
  run:
    - bash
    - python >=3.9
    - numpy
    - scipy
    - pandas
    - matplotlib-base
    - adjusttext
    - seaborn
    - statsmodels
    - biopython
    - h5py
    - scikit-learn
    - pyyaml
    - pysam
    - openjdk    # required for bundled MultiMotifMaker.jar (motif-finding fallback)
    - tqdm
    - joblib
    - psutil
    - regex
    - samtools
    # Linux only: bioconda pbmm2/pbtk are repackaged binaries and skip osx (see those recipes).
    - pbmm2  # [linux]
    - pbtk  # [linux]

test:
  commands:
    - modifi --help

about:
  home: https://github.com/sachdevalab/MODIFI
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: DNA modification detection from PacBio SMRT metagenomic data
  description: |
    MODIFI detects DNA base modifications and infers host-mobile genetic
    element (MGE) linkages from PacBio metagenomic sequencing data. It supports
    modification calling, motif discovery, and host-MGE association for both
    subreads and HiFi read types. Native motif finding uses pbmotifmaker (from
    pbtk) on Linux if installed; otherwise use the bundled MultiMotifMaker.jar
    (OpenJDK). On macOS, install PacBio tools separately or rely on the JAR fallback.

extra:
  recipe-maintainers:
    - wshuai294
