{% set name = "msmetaenhancer" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/msmetaenhancer-{{ version }}.tar.gz
  sha256: 6bc1b0b60b5c9a70445ea392cc1083895eec45174e707c8552d6efbb5aa6a00b

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('msmetaenhancer', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10,<3.14
    - poetry-core
    - pip
  run:
    - python >=3.10,<3.14
    - matchms >=0.30.0
    - pandas
    - scipy
    - requests
    - aiohttp
    - asyncstdlib
    - frozendict
    - twine
    - tabulate
    - rdkit
    - multidict
    - aiocircuitbreaker
    - openpyxl

test:
  imports:
    - MSMetaEnhancer

about:
  home: "https://github.com/RECETOX/MSMetaEnhancer"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "MSMetaEnhancer is a Python tool that adds more annotations (e.g. SMILES, InChI, CAS number) to MSP files."
  dev_url: "https://github.com/RECETOX/MSMetaEnhancer"
  doc_url: "https://msmetaenhancer.readthedocs.io"

extra:
  recipe-maintainers:
    - xtrojak
    - martenson
    - hechth
  identifiers:
    - biotools:msmetaenhancer
    - doi:10.21105/joss.04494
