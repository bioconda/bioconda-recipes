{% set name = "hamronization" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hamronization-{{ version }}.tar.gz
  sha256: da34ea26289041bdf5a7b2a3c4b3e0bf53cb3b549b3c5668e863472e723ae004

build:
  entry_points:
    - hamronize = hAMRonization.hamronize:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name|lower, max_pin='x.x') }}

requirements:
  host:
# <3.14 due to https://github.com/pha4ge/hAMRonization/issues/106
    - python >=3.7,<3.14
    - pip
    - setuptools
  run:
# < 3.14 due to https://github.com/pha4ge/hAMRonization/issues/106
    - python >=3.7,<3.14
    - pandas

test:
  imports:
    - hAMRonization
  commands:
    - pip check
    - hamronize --help
  requires:
    - pip

about:
  home: https://github.com/pha4ge/hAMRonization
  summary: Tool to convert and summarize AMR gene detection outputs using the hAMRonization specification
  license: LGPL-3.0-only
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - fmaguire
