{% set name = "mofapy2" %}
{% set version = "0.7.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3a8801cff9b88b547ca9331d93ceb413822f10fd2f47d8f9a7d877cb7b500aca

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - poetry-core
  run:
    - h5py
    - numpy
    - pandas
    - python >=3.8
    - scipy
    - scikit-learn
  run_constrained:
    - anndata >0.8

test:
  imports:
    - mofapy2

about: 
  home: "https://github.com/bioFAM/mofapy2"
  license: "LGPL-3.0-only"
  license_family: LGPL
  license_file: LICENSE
  summary: "Multi-Omics Factor Analysis."
  dev_url: "https://github.com/bioFAM/mofapy2"
  doc_url: "https:/biofam.github.io/MOFA2"
