{% set name = "vcf-validator" %}
{% set version = "0.9.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/tcezard/vcf-validator/archive/refs/tags/test_artifacts.tar.gz
  sha256: 0df3be7ae1aa1038d5ca52a5e365a86156b4421fcbe77b1127f6fad92dd2d2bd


build:
  script:
  number: 0
  run_exports:
    - {{ pin_subpackage("vcf-validator", max_pin="x.x") }}

requirements:
  host:
    - cmake >=2.8
    - sqlite >=3
    - zlib
    - automake
    - bootstrap
    - libboost-devel
    - libtool
    - zstd
  build:
    - {{ compiler('c') }}
    - make
    - cmake >=2.8
    - sqlite >=3
    - zlib
    - automake
    - bootstrap
    - libboost-devel
    - libtool
    - zstd
    - c-ares
  run:
    - zstd


test:
  commands:
    - vcf_validator --help
    - vcf_assembly_checker --help

about:
  home: https://github.com/EBIVariation/vcf-validator
  summary: EBI EVA - Validation tool for VCF file format compliance
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - apriltuesday
    - tcezard
    - ebi-variation