{% set name = "r-tsenat" %}
{% set version = "0.99.0" %}

package:
  name: {{ name }}
  version: '{{ version }}'

source:
  url: https://github.com/gallardoalba/TSENAT/releases/download/v{{ version }}/TSENAT_{{ version }}.tar.gz
  sha256: 2e050540db188be685a3c3cf7e0bd9fe575a9ad42263a4b0fbc85a782a35883e

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports: '{{ pin_subpackage(name, max_pin="x.x") }}'

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
  host:
    - r-base >=4.5.0
    - r-ggplot2
    - r-withr
    - bioconductor-biocparallel
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - r-matrixstats
    - r-mgcv
    - r-geepack
    - r-pheatmap
    - r-cowplot
    - r-dplyr
    - r-tidyr
    - r-rlang
    - r-rcpp
    - r-rcpparmadillo
    - r-memoise
    - r-readr
    - r-glmnet
    - r-nlme
    - r-glmmTMB
    - r-gamsel
    - r-fdrtool
    - r-patchwork
    - r-gridextra
    - r-rcolorbrewer
    - r-digest
  run:
    - r-base >=4.5.0
    - r-ggplot2
    - r-withr
    - bioconductor-biocparallel
    - bioconductor-s4vectors
    - bioconductor-summarizedexperiment
    - r-matrixstats
    - r-mgcv
    - r-geepack
    - r-pheatmap
    - r-cowplot
    - r-dplyr
    - r-tidyr
    - r-rlang
    - r-rcpp
    - r-rcpparmadillo
    - r-memoise
    - r-readr
    - r-glmnet
    - r-nlme
    - r-glmmTMB
    - r-gamsel
    - r-fdrtool
    - r-patchwork
    - r-gridextra
    - r-rcolorbrewer
    - r-digest

test:
  requires:
    - r-tsenat
  commands:
    - $R -e "library('TSENAT')"

about:
  home: https://github.com/gallardoalba/TSENAT
  license: GPL-3.0-or-later
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'
  summary: Tsallis Entropy Analysis Toolbox for transcriptome complexity analysis
  description: |
    Quantifies and models isoform-usage complexity in RNA-seq data using Tsallis entropy,
    a scale-dependent diversity measure. TSENAT computes q-dependent transcriptome
    diversity and divergence, compares measures between conditions, and provides
    visualization routines for scale-dependent complexity analysis.
  doc_url: https://gallardoalba.github.io/TSENAT
  dev_url: https://github.com/gallardoalba/TSENAT
