{% set name = "kingfisher" %}
{% set version = "0.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/kingfisher-{{ version }}.tar.gz
  sha256: 3b2b8870f437304de3b8701ed2bd9b3338c15374e5a0916a42676a6feb4e269e

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps -vvv
  run_exports:
    - {{ pin_subpackage('kingfisher', max_pin="x") }}

requirements:
  host:
    - python
    - pip
  run:
    - python
    - extern
    - requests
    - tqdm
    - pandas
    - bird_tool_utils_python >=0.4.1
    - pyarrow
    - awscli
    - pigz
    - curl
    - sra-tools >=3.0.5
    - aria2 >=1.36.0
    - sracat

test:
  imports:
    - kingfisher
  commands:
    - kingfisher --version | grep {{ version }}

about:
  home: https://github.com/wwood/kingfisher-download
  summary: Download/extract biological FASTA/Q read data and metadata
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENCE.txt

extra:
  recipe-maintainers:
    - wwood
