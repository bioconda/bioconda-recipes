{% set name = "kingfisher" %}
{% set version = "0.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/kingfisher-{{ version }}.tar.gz
  sha256: 3b2b8870f437304de3b8701ed2bd9b3338c15374e5a0916a42676a6feb4e269e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-build-isolation --no-deps --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - extern
    - requests
    - tqdm
    - pandas
    - bird_tool_utils_python >=0.4.1
    - pyarrow
    - awscli
    - pigz
    - curl
    - sra-tools >=3.0.5
    - aria2 >=1.36.0
    - sracat

test:
  imports:
    - kingfisher
  commands:
    - kingfisher --version | grep {{ version }}

about:
  home: "https://github.com/wwood/kingfisher-download"
  summary: "Download/extract biological FASTA/Q read data and metadata."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENCE.txt"
  dev_url: "https://github.com/wwood/kingfisher-download"
  doc_url: "https://wwood.github.io/kingfisher-download"

extra:
  recipe-maintainers:
    - wwood
