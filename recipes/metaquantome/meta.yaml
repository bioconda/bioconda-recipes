{% set name = "metaquantome" %}
{% set version = "2.0.4" %}
{% set file_ext = "tar.gz" %}
{% set hash_type = "sha256" %}
{% set hash_value = "4d18db3fcdabfcf67cbc256a95674bcca3f315105c0d149c7f1f721ae5af98c9" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/galaxyproteomics/{{ name }}/archive/v{{ version }}.{{ file_ext }}
  '{{ hash_type }}': {{ hash_value }}

build:
  number: 0
  noarch: python
  entry_points:
    - metaquantome = metaquantome.cli:cli
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-deps
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.5
    - pip
    - setuptools
  run:
    - python >=3.5
    - setuptools <82
    - legacy-cgi 
    - ete3
    - goatools
    - statsmodels
    - biopython
    - pandas
    - numpy
    - r-gplots
    - r-ggplot2
    - r-base
    - r-jsonlite
    - r-scico
    - r-dplyr
    - r-tidyr
    - libiconv

test:
  import:
    - metaquantome
  commands:
    - metaquantome -h
    - metaquantome expand -h
    - metaquantome filter -h
    - metaquantome stat -h
    - metaquantome viz -h

about:
  home: "https://github.com/galaxyproteomics/metaquantome"
  license: "Apache-2.0"
  license_family: APACHE
  license_file: LICENSE
  summary: "Quantitative metaproteomics analysis of taxonomy and function."
  dev_url: "https://github.com/galaxyproteomics/metaquantome"
  doc_url: "https://galaxyproteomics.github.io/metaquantome_mcp_analysis/cli_tutorial/cli_tutorial.html"

extra:
  container:
    # extended-base generates en_US.UTF-8 locale and sets LC_ALL, LANG properly
    extended-base: True
