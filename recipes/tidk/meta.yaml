{% set version = "0.2.7" %}

package:
  name: tidk
  version: {{ version }}

source:
  url: https://github.com/tolkit/telomeric-identifier/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 6351161ab426aa0c05799275951b83a953a1b8e02f11c8eeba079b31feabdea5

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('tidk', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config  # [osx]
  host:
    - openssl

test:
  commands:
    - tidk -h

about:
  home: "https://github.com/tolkit/telomeric-identifier"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Identify and find telomeres, or telomeric repeats in a genome."
  dev_url: "https://github.com/tolkit/telomeric-identifier"
  doc_url: "https://github.com/tolkit/telomeric-identifier/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/btaf049
