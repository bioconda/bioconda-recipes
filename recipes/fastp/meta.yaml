{% set version = "1.3.2" %}

package:
  name: fastp
  version: {{ version }}

source:
  url: https://github.com/OpenGene/fastp/archive/v{{ version }}.tar.gz
  sha256: 0c98acc55aa9771d854775db09cbf4c8fd1477d0b3dd3f3b08eebae0da0533db

build:
  number: 0
  skip-lints:
    - compiler_needs_stdlib_c
  run_exports:
    - {{ pin_subpackage("fastp", max_pin="x.x") }}

requirements:
  skip-lints:
    - compiler_needs_stdlib_c
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - isa-l
    - libdeflate
    - libhwy
  run:
    - isa-l
    - libdeflate
    - libhwy

test:
  commands:
    - fastp --help
  skip-lints:
    - compiler_needs_stdlib_c  # until https://github.com/bioconda/bioconda-utils/issues/1095 is resolved

about:
  home: "https://github.com/OpenGene/fastp"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A ultra-fast FASTQ preprocessor with full features (QC/adapters/trimming/filtering/splitting...)."
  dev_url: "https://github.com/OpenGene/fastp"
  doc_url: "https://github.com/OpenGene/fastp/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:fastp
    - usegalaxy-eu:fastp
    - doi:10.1002/imt2.107
