{% set version = "1.2.0" %}
{% set isal_version = "2.31.0" %}
{% set libdeflate_version = "1.23" %}
{% set highway_version = "1.3.0" %}

package:
  name: fastp
  version: {{ version }}

source:
  - url: https://github.com/OpenGene/fastp/archive/v{{ version }}.tar.gz
    sha256: fd7e20923e8f748803d54d9e0fabf44a44c748822a65062999e4b7edec6b8da6
    folder: fastp
  - url: https://github.com/intel/isa-l/archive/v{{ isal_version }}.tar.gz
    sha256: e218b7b2e241cfb8e8b68f54a6e5eed80968cc387c4b1af03708b54e9fb236f1
    folder: isa-l
  - url: https://github.com/ebiggers/libdeflate/archive/v{{ libdeflate_version }}.tar.gz
    sha256: 1ab18349b9fb0ce8a0ca4116bded725be7dcbfa709e19f6f983d99df1fb8b25f
    folder: libdeflate
  - url: https://github.com/google/highway/archive/{{ highway_version }}.tar.gz
    sha256: 07b3c1ba2c1096878a85a31a5b9b3757427af963b1141ca904db2f9f4afe0bc2
    folder: highway

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("fastp", max_pin="x.x") }}

requirements:
  build:
    - make
    - cmake
    - ninja
    - autoconf
    - automake
    - libtool
    - nasm >=2.14  # [x86_64]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}

test:
  commands:
    - fastp --help

about:
  home: "https://github.com/OpenGene/fastp"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A ultra-fast FASTQ preprocessor with full features (QC/adapters/trimming/filtering/splitting...)."
  dev_url: "https://github.com/OpenGene/fastp"
  doc_url: "https://github.com/OpenGene/fastp/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:fastp
    - usegalaxy-eu:fastp
    - doi:10.1002/imt2.107
