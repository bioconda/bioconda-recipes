{% set version = "1.3.1" %}

package:
  name: fastp
  version: {{ version }}

source:
  url: https://github.com/OpenGene/fastp/archive/v{{ version }}.tar.gz
  sha256: c4ace9d14dd412954efdfb6160a6069175fc470cbcdbd4d379eab6b7eb835d30

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("fastp", max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - isa-l
    - libdeflate
    - libhwy
  run:
    - isa-l
    - libdeflate
    - libhwy

test:
  commands:
    - fastp --help

about:
  home: "https://github.com/OpenGene/fastp"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A ultra-fast FASTQ preprocessor with full features (QC/adapters/trimming/filtering/splitting...)."
  dev_url: "https://github.com/OpenGene/fastp"
  doc_url: "https://github.com/OpenGene/fastp/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:fastp
    - usegalaxy-eu:fastp
    - doi:10.1002/imt2.107
