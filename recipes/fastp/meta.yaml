{% set version = "1.3.0" %}
{% set commit = "9d8e8880e8a4645c73d11accff5fe04290e96330" %}

package:
  name: fastp
  version: {{ version }}

source:
  url: https://github.com/KimBioInfoStudio/fastp/archive/{{ commit }}.tar.gz
  sha256: 32fe857bad86dc999f288b73150a7bc30d40b15c27a60d557baf239e3eea6c31

build:
  number: 1
  run_exports:
    - {{ pin_subpackage("fastp", max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - isa-l
    - libdeflate
    - libhwy
  run:
    - isa-l
    - libdeflate
    - libhwy

test:
  commands:
    - fastp --help

about:
  home: "https://github.com/OpenGene/fastp"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A ultra-fast FASTQ preprocessor with full features (QC/adapters/trimming/filtering/splitting...)."
  dev_url: "https://github.com/OpenGene/fastp"
  doc_url: "https://github.com/OpenGene/fastp/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:fastp
    - usegalaxy-eu:fastp
    - doi:10.1002/imt2.107
