{% set name = "perl-dbd-pg" %}
{% set version = "3.20.1" %}
{% set sha256 = "1f5831745ee105a56e0bd2ab09b204a0f286461423c1eefe2a6d7be0ad91d024" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/T/TU/TURNSTEP/DBD-Pg-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - make
  host:
    - perl
    - perl-dbi
    - perl-file-temp
    - postgresql
  run:
    - perl
    - perl-dbi
    - postgresql

test:
  imports:
    - DBD::Pg

about:
  home: "https://metacpan.org/pod/DBD::Pg"
  license: "Perl_5"
  summary: "DBI PostgreSQL interface."
  doc_url: "https://metacpan.org/pod/DBD::Pg"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
