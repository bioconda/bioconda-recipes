{% set name = "perl-dbd-pg" %}
{% set version = "3.19.0" %}
{% set sha256 = "6d30efeb119838ca22ae882b4183fe7fade42fb1ed99d6d1c84ce1625d86c9bd" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/T/TU/TURNSTEP/DBD-Pg-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - make
  host:
    - perl
    - perl-dbi
    - perl-file-temp
    - postgresql
  run:
    - perl
    - perl-dbi
    - postgresql

test:
  imports:
    - DBD::Pg

about:
  home: "https://metacpan.org/pod/DBD::Pg"
  license: "Perl_5"
  summary: "DBI PostgreSQL interface."
  doc_url: "https://metacpan.org/pod/DBD::Pg"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
