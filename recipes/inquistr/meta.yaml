{% set name = "inquistr" %}
{% set version = "0.27.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/wdecoster/inquiSTR/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e96b55ba9b0e877467a8510f3635e0a0e13abb586adbe9bb5c98e2bc21d90df2

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('inquistr', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - clangdev
    - make
    - cmake
    - autoconf
    - automake
    - libtool
    - pkg-config
    - htslib ==1.19 # pin because https://github.com/rust-bio/rust-htslib/issues/508
    - cargo-bundle-licenses
  host:
    - zlib

test:
  commands:
    - inquiSTR --help

about:
  home: "https://github.com/wdecoster/inquiSTR"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tandem repeat toolkit for long reads."
  dev_url: "https://github.com/wdecoster/inquiSTR"
  doc_url: "https://github.com/wdecoster/inquiSTR/blob/main/README.md"

extra:
  additional-platforms:
    - osx-arm64
    - linux-aarch64
  identifiers:
    - doi:10.1101/gr.279265.124 # to be updated
