{% set name = "perl-devel-checkcompiler" %}
{% set version = "0.07" %}
{% set sha256 = "768b7697b4b8d4d372c7507b65e9dd26aa4223f7100183bbb4d3af46d43869b5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/S/SY/SYOHEX/Devel-CheckCompiler-0.07.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
  host:
    - perl
    - perl-module-build-tiny
  run:
    - perl

test:
  imports:
    - Devel::AssertC99
    - Devel::CheckCompiler

about:
  home: "https://github.com/tokuhirom/Devel-CheckCompiler"
  license: "Perl_5"
  summary: "Check the compiler's availability."
  dev_url: "https://github.com/tokuhirom/Devel-CheckCompiler"
