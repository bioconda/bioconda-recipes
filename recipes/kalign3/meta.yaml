{% set name = "kalign3" %}
{% set version = "3.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

source:
  url: https://github.com/TimoLassmann/kalign/archive/refs/tags/v{{ version }}.tar.gz
  sha256: b3bebfd62e897e6513cc5014b919adeb8f6ab0543262cd9e655d495f0a8bf13c

requirements:
  build:
  - {{ compiler('c') }}
  - {{ compiler('cxx') }}
  - make
  - cmake

test:
  commands:
    - kalign -v

about:
  home: https://github.com/TimoLassmann/kalign
  license: GPL-3.0-only
  license_file: COPYING
  summary: 'Kalign is a fast and accurate multiple sequence alignment algorithm.'

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/btz795
