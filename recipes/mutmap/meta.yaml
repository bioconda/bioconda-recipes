{% set name = "mutmap" %}
{% set version = "2.4.0" %}
{% set sha256 = "063df95b43e8d930be444674db45e9f945fb0391b18b2494167e92d0a9ae12ab" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/YuSugihara/MutMap/releases/download/v{{ version }}/MutMap-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation --no-cache-dir . -vvv
  noarch: python
  number: 0
  entry_points:
    - mutmap = mutmap.mutmap:main
    - mutplot = mutmap.mutplot:main
  run_exports:
    - {{ pin_subpackage('mutmap', max_pin="x") }}

requirements:
  host:
    - python >=3.5
    - pip
    - setuptools
  run:
    - python >=3.5
    - samtools >=1.7
    - bcftools >=1.7
    - bwa
    - htslib
    - snpeff
    - trimmomatic
    - matplotlib-base
    - numpy
    - pandas
    - seaborn-base

test:
  commands:
    - mutmap -h
    - mutplot -h

about:
  home: "https://github.com/YuSugihara/MutMap"
  summary: 'MutMap: pipeline to identify causative mutations responsible for a phenotype.'
  license: 'GPL-3.0-or-later'
  license_family: GPL3
  license_file: LICENSE
  dev_url: "https://github.com/YuSugihara/MutMap"

extra:
  identifiers:
    - biotools:mutmap
    - doi:10.1038/nbt.2095

    
