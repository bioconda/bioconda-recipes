{% set name = "savvy" %}
{% set version = "2.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/statgen/savvy/archive/v{{ version }}.tar.gz
  sha256: f96585faddeba9dd6bbf22f828ecb9f866cc7075947dd25f89c1a618cb9f3bb5
  patches:
    # Fixing postrelease issues
    - patches/0002-patch-cmakelists-for-conda-build.patch

build:
  number: 0
  skip: True  # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - cmake <4
    - make  # [not win]
  host:
    - shrinkwrap
    - zstd
    - zlib
    - liblzma-devel
  run:
    - shrinkwrap

test:
  commands:
    - test -d ${PREFIX}/include/savvy  # [linux]
    - test -f ${PREFIX}/include/savvy/savvy.hpp  # [linux]
    - sav --help

about:
  home: "https://github.com/statgen/savvy"
  license: "MPL-2.0"
  license_family: MOZILLA
  license_file: LICENSE
  summary: 'Interface to various variant calling formats.'
  dev_url: "https://github.com/statgen/savvy"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - matuskosut
    - jonathonl
  skip-lints:
    - compiler_needs_stdlib_c
