{% set name = "genesis" %}
{% set version = "0.34.0" %}

package:
  name: {{ name }}
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

source:
  url: https://github.com/lczech/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a0d54612942629c6ae50cfac4f1c51a9393273be8e573706f111e9b310ad87bc

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake >=3.14
    - autoconf
    - automake
    - libtool
  host:
    - zlib
    - bzip2
    - xz
    - libdeflate
    - libcurl
    - openssl

test:
  commands:
    - test -f ${PREFIX}/lib/libgenesis.so      # [linux]
    - test -f ${PREFIX}/lib/libgenesis.dylib   # [osx]
    - test -f ${PREFIX}/include/genesis/genesis.hpp

about:
  home: https://github.com/lczech/genesis
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: A C++ library for working with phylogenetic and population genetic data
  description: |
    Genesis is a C++ library for working with phylogenetic and population
    genetic data. It supports trees, placements (jplace), population genetics
    (sam/bam/cram, pileup, sync, vcf), sequences (fasta, fastq, phylip),
    and taxonomies. It provides distance measures, clustering, PCA, and
    visualization tools.
  dev_url: https://github.com/lczech/genesis
  doc_url: http://doc.genesis-lib.org/

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/btaa070
