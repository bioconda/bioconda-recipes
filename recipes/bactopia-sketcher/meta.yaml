{% set version = "1.0.3" %}

package:
  name: bactopia-sketcher
  version: {{ version }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('bactopia-sketcher', max_pin='x.x') }}

source:
  url: https://github.com/bactopia/bactopia-sketcher/archive/v{{version}}.tar.gz
  sha256: 748b767d2db9428d89ff970bbea1c2b936cc23ebc91524d4838d43bf9e235825

requirements:
  run:
    - bactopia-py >=2.0.1
    - coreutils
    - gsl 2.6
    - mash >=2.3
    - pigz
    - python <3.13
    - sed
    - sourmash >=4.8.4

test:
  commands:
    - "bactopia-sketcher --version"
    - "bactopia-sketcher"

about:
  home: https://bactopia.github.io/
  license: MIT
  license_file: LICENSE
  summary: Methods used by Bactopia for minmer sketching
  dev_url: https://github.com/bactopia/bactopia-sketcher/

extra:
  recipe-maintainers:
    - rpetit3
  identifiers:
    - biotools:bactopia
    - doi:10.1128/mSystems.00190-20
