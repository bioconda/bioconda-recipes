{% set name = "muscle" %}
{% set version = "5.0.1278" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git_url: https://github.com/rcedgar/muscle
  git_rev: 28089b1ece7c963a1f377db314d7c70ad0c08d33

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
    - llvm-openmp  # [osx]
    - make

test:
  commands:
    - muscle -version
about:
  home: https://github.com/rcedgar/muscle
  license: GPL-3.0-only
  license_file: LICENSE
  summary: "MUSCLE: multiple sequence alignment with high accuracy and high throughput"

extra:
  identifiers:
    - biotools:muscle
  skip-lints:  # https://github.com/rcedgar/muscle/issues/6
    - missing_hash
    - uses_vcs_url
