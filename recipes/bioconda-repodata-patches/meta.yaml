{% set name = "bioconda-repodata-patches" %}
{% set version = "20260421" %}  # whenever you add or change patches in `gen_patch_json.py` or adjust any other code, ensure that this is the "current" date, and always higher than the latest version in master

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: .

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  host:
    - python =3
    - setuptools <82
    - requests
    - tqdm
  run:
    - python =3
    - setuptools <82
    - requests
    - tqdm

test:
  commands:
    {% for subdir in ("noarch", "linux-64", "osx-64") %}
    - test -e $PREFIX/{{ subdir }}/patch_instructions.json
    {% endfor %}

about:
  summary: "Generate tweaks to index metadata, hosted separately from anaconda.org index."
  home: "https://github.com/bioconda/bioconda-recipes"
  license: "CC-PDDC"
  dev_url: "https://github.com/bioconda/bioconda-recipes"

extra:
  recipe-maintainers:
    - bioconda/core
  skip-lints:
    - missing_hash
    - repodata_patches_no_version_bump # TODO: remove this once this has been patched, hopefully via: https://github.com/bioconda/bioconda-utils/pull/1086/commits/d39d6f1494353e4099a15ad3a1ae352da7d4fa12
