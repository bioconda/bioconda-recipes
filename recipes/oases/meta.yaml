{% set name = "oases" %}
{% set version = "0.2.09" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/dzerbino/oases.git
  git_rev: 1b4c14c

build:
  number: 3
  run_exports:
    - {{ pin_subpackage(name, max_pin = "x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - llvm-openmp  # [osx]
    - git-lfs
  run:
    - velvet
    - llvm-openmp  # [osx]

test:
  commands:
    - oases | grep "oases - De novo transcriptome assembler for the Velvet package" > /dev/null

about:
  home: "https://github.com/dzerbino/oases"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.txt"
  summary: "De novo transcriptome assembler for short reads."
  dev_url: "https://github.com/dzerbino/oases"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - uses_vcs_url
    - missing_hash
  identifiers:
    - biotools:oases
