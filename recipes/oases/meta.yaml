{% set name = "oases" %}
{% set version = "0.2.09" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/dzerbino/oases.git
  git_rev: 1b4c14c
  sha256: unused

build:
  number: 4
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - git-lfs
  run:
    - velvet
    - libgomp  # [linux]
    - llvm-openmp  # [osx]

test:
  commands:
    - oases | grep "oases - De novo transcriptome assembler for the Velvet package" > /dev/null

about:
  home: "https://github.com/dzerbino/oases"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.txt"
  summary: "De novo transcriptome assembler for short reads."
  dev_url: "https://github.com/dzerbino/oases"
  doc_url: "https://github.com/dzerbino/oases/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - doi:10.1093/bioinformatics/bts094
    - biotools:oases
  skip-lints:
    - uses_vcs_url
    - compiler_needs_stdlib_c
