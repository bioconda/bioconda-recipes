{% set name = "riassigner" %}
{% set version = "0.6.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/riassigner-{{ version }}.tar.gz
  sha256: 8bf68968c109ae73222eacb1079082871fb26efd19445dae964b984fd569dc66

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vvv
  run_exports:
    - {{ pin_subpackage('riassigner', max_pin="x.x") }}

requirements:
  host:
    - python >=3.11,<3.14
    - pip
    - poetry-core
  run:
    - python >=3.11,<3.14
    - numpy
    - matchms >=0.30.1
    - pint >=0.25.2
    - pandas
    - scipy
    - urllib3 >=2.6.3
    - fastparquet >=2025.12.0
    - click >=8.0

test:
  imports:
    - RIAssigner

about:
  home: https://github.com/RECETOX/RIAssigner
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'GC-MS retention index calculation'
  description: |
    RIAssigner is a python tool for retention index (RI) computation for GC-MS data
  dev_url: https://github.com/RECETOX/RIAssigner

extra:
  recipe-maintainers:
    - hechth
