{% set name = "bioconda-utils" %}
{% set version = "4.3.0" %}
{% set sha256 = "c4450933a7c1991f01e5dc50ef0047058679d8d560790b8c905f70e7b6f89aca" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/bioconda/bioconda-utils/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv
  entry_points:
    - bioconda-utils = bioconda_utils.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python =3.13
    - setuptools <82
    - pip
  run:
    # Keep in sync with
    # https://github.com/bioconda/bioconda-utils/blob/master/bioconda_utils/bioconda_utils-requirements.txt
    # (The '.*' is removed as the '=' already does that)
    - conda-forge-pinning =2026.01.07.13.16.30
    - setuptools <82
    - python =3.13
    - conda =26.1
    - conda-libmamba-solver =25.11
    - conda-build =26.3
    - conda-index =0.7
    - conda-package-streaming =0.12
    - mamba =2.5
    - argh =0.31
    - colorlog =6
    - tqdm =4.67
    - yaspin =3
    - ruamel.yaml =0.18
    - pyaml =26.2
    - networkx =3.6
    - pandas =3.0
    - libblas * *openblas
    - boltons =25.0
    - jsonschema =4.26
    - jinja2 =3.1
    - anaconda-client =1.14
    - galaxy-tool-util =25
    - involucro =1.1
    - skopeo =1.15
    - findutils
    - git =2
    - regex =2026
    - aiohttp =3.13
    - aiohttp-jinja2
    - aiohttp-session
    - aiohttp-security
    - aiofiles =25
    - aioftp =0.27
    - backoff =2.2
    - cachetools =7.0
    - gitpython =3.1
    - gidgethub =5
    - pyjwt >=2.4.0
    - beautifulsoup4 =4
    - requests =2.33
    - pygithub
    - diskcache =5
    - platformdirs =4
    - tabulate =0.10
    - psutil

test:
  imports:
    - bioconda_utils
  commands:
    - bioconda-utils --help
    - bioconda-utils lint --help
    - bioconda-utils build --help
    #- >
      #CONDA_AGGRESSIVE_UPDATE_PACKAGES=
      #CONDA_AUTO_UPDATE_CONDA=0
      #"${PREFIX}/bin/mamba" install --prefix="${PREFIX}" --dry-run --satisfied-skip-solve
      #--file="$( python -c
      #'from os.path import dirname, join; import bioconda_utils; print(join(dirname(bioconda_utils.__file__), "bioconda_utils-requirements.txt"))'
      #)" 2>&1 | grep -qF 'All requested packages already installed'

about:
  home: "https://bioconda.github.io/contributor/build-system.html"
  license: MIT
  license_family: MIT
  license_file: "LICENSE.md"
  summary: "Utilities for building and managing bioconda recipes."
  dev_url: "https://github.com/bioconda/bioconda-utils"
  doc_url: "https://bioconda.github.io/contributor/guidelines.html"
