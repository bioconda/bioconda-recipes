{% set name = "py2bit" %}
{% set version = "1.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py2bit-{{ version }}.tar.gz
  sha256: 42e707bfc41d63518955f77363dbbddcefde8201de287483243b058bfa483418

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('py2bit', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - pip
    - setuptools
  run:
    - python

test:
  imports:
    - py2bit
    - py2bitTest

about:
  home: "https://github.com/deeptools/py2bit"
  license: MIT
  license_family: MIT
  license_file: "LICENSE.txt"
  summary: 'A package for accessing 2bit files using lib2bit.'
  dev_url: "https://github.com/deeptools/py2bit"
  doc_url: "https://github.com/deeptools/py2bit/blob/{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64