{% set version = "4.4" %}

package:
  name: pangolin
  version: {{ version }}

source:
  url: https://github.com/cov-lineages/pangolin/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c367075a9392cc0e288d3d4ea5c1a23eb4981177caa2b67f902daf74f1b73958

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install --no-deps --ignore-installed .
  run_exports:
    - {{ pin_subpackage('pangolin', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip >=19.3.1
    - setuptools
  run:
    - python >=3.10
    - biopython >=1.74
    - pandas >=2.3.1
    - joblib >=0.11
    - scikit-learn >=1.7.1
    - tabulate
    - pulp >=2
    - minimap2 >=2.16
    - snakemake-minimal >=9.9.0
    - gofasta
    - usher >=0.6.2,<=0.6.3
    - ucsc-fatovcf >=426
    - git
    - git-lfs
    - scorpio >=0.3.12
    - constellations >=0.0.15
    - pangolin-data >=1.2.133.2
    - conda
    - pip >=19.3.1

test:
  commands:
    - pangolin -h
    - pangolin --all-versions
    - pangolin --update-data --datadir "$(mktemp -d)"

about:
  home: https://github.com/cov-lineages/pangolin
  license: GPL-3.0-only
  license_file: LICENSE.txt
  summary: Phylogenetic Assignment of Named Global Outbreak LINeages

extra:
  identifiers:
    - usegalaxy-eu:pangolin
