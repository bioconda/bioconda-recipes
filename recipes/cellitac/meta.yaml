{% set name = "cellitac" %}
{% set version = "1.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/c/cellitac/cellitac-{{ version }}.tar.gz
  sha256: bfadae79a61492d52d24643aeab60e5dda0e196f08b52fbfa896916964f8c620

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.9
    - pip
  run:
    - python >=3.9
    - numpy
    - pandas
    - scikit-learn
    - xgboost
    - imbalanced-learn
    - matplotlib
    - seaborn
    - plotly
    - networkx
    - openpyxl
    - rpy2

test:
  imports:
    - cellitac
  commands:
    - cellitac --help

about:
  home: https://pypi.org/project/cellitac/
  license: MIT
  license_file: LICENSE
  summary: "Cell type identification using Transcription factor Analysis and Chromatin accessibility"

extra:
  recipe-maintainers:
    - RanaHamedAbuZeid
    - laitanawe
