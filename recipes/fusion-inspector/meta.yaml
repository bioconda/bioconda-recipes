{% set name = "fusion-inspector" %}
{% set version = "2.11.3" %}
{% set build = "0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/FusionInspector/FusionInspector/releases/download/FusionInspector-v{{ version }}/FusionInspector-v{{ version }}.FULL.tar.gz
  sha256: 1698a6154fdf70dde1380bedd18fbd8753725076f0c898e2af89e226fb488acd

build:
  noarch: generic
  number: {{ build }}
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

# Trinity is needed for the build, because we have to set its location in an environment variable.
# We need HTSLIB >=1.3, but was complaining about unpinned. CONDA_HTSLIB is 1.6.
requirements:
  host:
    - htslib
    - trinity >=2.15.1
  run:
    - python >=3
    - requests >=2.19.1
    - bzip2
    - htslib
    - samtools >=1.3
    - perl
    - perl-uri
    - perl-set-intervaltree
    - perl-db_file
    - gmap >=2017.11.15
    - star >=2.6.1b
    - trinity >=2.15.1

test:
  commands:
    - FusionInspector --help 2>&1
    # The following command(s) need to be invoked from where they are located.
    # FusionInspector runs them from that location. These tests invoke them that way.
    # There are quite a few files in the directory. I just run one of them to make sure it is there.
    - "$PREFIX/share/{{ name }}-{{ version  }}-{{ build }}/util/retrieve_fusion_junction_reads_by_accession.pl --help 2>&1 | grep usage"

about:
  home: "https://github.com/FusionInspector/FusionInspector"
  license: "BSD-3-Clause"
  license_family: BSD
  license_file: "LICENSE.txt"
  summary: "In silico Validation of Fusion Transcript Predictions."
  description: |
    FusionInspector is a component of the Trinity Cancer Transcriptome Analysis Toolkit (CTAT). FusionInspector assists in fusion transcript discovery by performing a supervised analysis of fusion predictions, attempting to recover and re-score evidence for such predictions. - https://github.com/FusionInspector/FusionInspector/wiki
  dev_url: "https://github.com/FusionInspector/FusionInspector"
