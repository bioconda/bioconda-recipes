{% set version = "1.02" %} # Remember to update sha256 below

package:
  name: cesar
  version: {{ version }}

source:
  url: https://github.com/hillerlab/CESAR2.0/archive/refs/tags/1.02.tar.gz
  sha256: 62d4615c1a0e5494d4bc7bbda5799bc9f9e04cebc81cd655644bb18d19bed242

    
build:
  number: 0

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  run:


about:
  home: https://github.com/hillerlab/CESAR2.0
  license: MIT license 
  license_file: LICENSE
  summary: |
    CESAR 2.0 is a method to realign coding exons or genes to DNA sequences using a Hidden Markov Model

test:
  commands:
    - cesar -h 2>&1 | cat > /dev/null
