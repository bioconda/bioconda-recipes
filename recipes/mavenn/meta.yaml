{% set name = "mavenn" %}
{% set version = "1.1.4" %}

package:
  name: mavenn
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 8de191f10d0940f07a14fb8abb2a2d1d66eb1830d10cba12bc2d051086f849bd

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vvv --no-build-isolation --no-deps --no-cache-dir"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - pip
    - python >=3.8
    - hatchling
  run:
    - logomaker
    - matplotlib-base
    - numpy
    - pandas
    - python >=3.8
    - scikit-learn
    - scipy
    - seaborn-base
    - tensorflow
    - pytest

test:
  imports:
    - sklearn
    - mavenn

about:
  home: "https://mavenn.readthedocs.io"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "MAVE-NN: genotype-phenotype maps from multiplex assays of variant effect."
  dev_url: "https://github.com/jbkinney/mavenn"
  doc_url: "https://mavenn.readthedocs.io"

extra:
  recipe-maintainers:
    - andrefaure
