{% set name = "dark-matter" %}
{% set version = "7.1.18" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dark_matter-{{ version }}.tar.gz
  sha256: 0cdba6033fef443737ee15f149138e8702234eca4b989efec88a163b7bbbd639

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python <3.14
    - setuptools >=61.0
    - pip
  run:
    - python <3.14
    - bio >=1.8.1
    - biopython >=1.87
    - bz2file >=0.98
    - cachetools >=5.5.2
    - dendropy >=5.0.1
    - python-edlib >=1.3.9.post1
    - ete4 >=4.3.0
    - ipython >=8.12.3
    - python-kaleido >=1.2.0
    - matplotlib-base >=3.7.5
    - mysql-connector-python >=9.0.0
    - numpy >=1.14.2
    - plotly >=6.6.0
    - polars >=1.36.1
    - progressbar >=2.5
    - prseq >=0.0.33
    - pysam >=0.23.0
    - pyzmq >=14.3.1
    - requests >=2.32.3
    - rich >=14.0.0
    - scikit-learn >=1.3.2
    - simplejson >=3.5.3
    - summarize-ranges >=0.1.1
    - types-cachetools >=5.5.0
    - types-requests >=2.32.0
    - xlsxwriter >=3.2.9
    # optional dependencies:
    - picard-slim
    - bcftools
    - samtools
    - emboss
    - diamond

test:
  imports:
    - dark

about:
  summary: "Python library and utility scripts for working with genetic sequence data."
  home: "https://github.com/acorg/dark-matter"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/acorg/dark-matter"
  doc_url: "https://github.com/acorg/dark-matter/blob/master/README.md"

extra:
  recipe-maintainers:
    - m-d-grunnill
