{% set name = "comet-ms" %}
{% set version       = "2026011" %}
{% set comet_version = "2026.01.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://github.com/UWPR/Comet/releases/download/v{{ comet_version }}/comet.aarch64.linux.exe # [linux and aarch64]
    sha256: 5d90290fc309cf4b762a717dc73112384a9b7ba2ab21012de293f750dd120d30 # [linux and aarch64]
  - url: https://github.com/UWPR/Comet/releases/download/v{{ comet_version }}/comet.aarch64.macos.exe # [osx and arm64]
    sha256: 836b1723da96e6df20c898f4b46f7c1ba6b938b5455c7584a38e95f30e6fcab8  # [osx and arm64]
  - url: https://github.com/UWPR/Comet/releases/download/v{{ comet_version }}/comet.linux.exe # [linux64]
    sha256: 77edb2ae39b8eae01801160dd9c57033612b5726c2b9e5debc7e81a094a7b618 # [linux64]
  - url: https://github.com/UWPR/Comet/releases/download/v{{ comet_version }}/comet.macos.exe # [osx and x86_64]
    sha256: a7146a9dfe9105fefb913978931083142bb990421b01b82ca6fae3258870036f  # [osx and x86_64]

build:
  run_exports:
    - {{ pin_subpackage('comet-ms', max_pin=None) }}
  number: 0

requirements:
  build: []
  run: []

test:
  commands:
    - comet.exe -p && rm comet.params.new
    - comet -p && rm comet.params.new

about:
  home: https://uwpr.github.io/Comet/
  license: Apache-2.0
  license_file: LICENSE
  summary: Comet is an open source tandem mass spectrometry (MS/MS) sequence database search tool.
  dev_url: https://github.com/UWPR/Comet

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
    - osx-x86_64
  skip-lints:
    - should_be_noarch_generic
  identifiers:
    - doi:10.1007/s13361-015-1179-x
    - doi:10.1002/pmic.201200439
