{% set name = "taffy" %}
{% set version = "0.0.3.post1" %} 
{% set commit = "5ab000b8e12bef211352131b9891c8e2cfb94063" %} 

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git_url: https://github.com/ComparativeGenomicsToolkit/{{ name }}.git
  git_rev: {{ commit }}

build:
  number: 0
  skip: True # [win]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }} 

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - make
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  host:
    - python >=3.7
    - pip
    - setuptools
    - cffi
    - numpy 
    - htslib
    - zlib
    - bzip2
  run:
    - python >=3.7
    - cffi 
    - numpy 
    - htslib
    - zlib
    - bzip2

test:
  imports:
    - taffy
    - taffy.lib
  commands:
    - taffy

about:
  home: https://github.com/ComparativeGenomicsToolkit/taffy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "A C/Python/CLI library for working with TAF alignment files"
  description: |
    Taffy is a C and Python library with a CLI for manipulating, 
    reading, and writing TAF and MAF format multiple sequence alignments. It allows 
    conversion between the formats and manipulation of the alignments with utilities 
    for preparing them for different use cases
  dev_url: https://github.com/ComparativeGenomicsToolkit/taffy
  doc_url: https://github.com/ComparativeGenomicsToolkit/taffy/blob/main/README.md

extra:
  skip-lints:
    - uses_vcs_url
    - missing_hash