{% set name = "taffy" %}
{% set version = "0.0.3" %} 
{% set commit = "1329d999948ad4acc10116276fa7a9752a749595" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ComparativeGenomicsToolkit/taffy/archive/{{ commit }}.tar.gz
  sha256: 7bde65427cc28f2752429d095945982813ef69b812123ad6556bda82963f5084

build:
  number: 0
  skip: true  # [py<38 or py>=313]
  entry_points:
    - taffy = taffy.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - make
    - pkg-config
  host:
    - python >=3.8,<3.13
    - pip
    - setuptools >=61.0
    - cffi >=1.0.0
    - numpy
    - htslib
  run:
    - python >=3.8,<3.13
    - cffi >=1.0.0
    - pytorch
    - numpy
    - matplotlib-base
    - htslib

test:
  imports:
    - taffy
  commands:
    - taffy view -h
    - taffy norm -h
    - taffy add-gap-bases -h
    - taffy index -h 
    - taffy sort -h           
    - taffy stats -h
    - taffy coverage -h
    - taffy annotate -h

about:
  home: https://github.com/ComparativeGenomicsToolkit/taffy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Taffy is a tool for manipulating taf and maf format alignments'
  description: |
    Taffy converts between pangenome graph formats (GFA, VG, MAF) and 
    provides utilities for working with pangenome alignments.
  dev_url: https://github.com/ComparativeGenomicsToolkit/taffy

extra:
  recipe-maintainers:
    - SaimMomin12