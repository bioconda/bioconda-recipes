{% set name = "raxml-ng" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/amkozlov/raxml-ng/releases/download/{{ version }}/{{ name }}_v{{ version }}_source.zip
  sha256: da3d9c0ff931eb630f8b3972182c2a398bd2c13e4fde800ff62bd2053d6eb785

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('raxml-ng', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - htslib
    - cmake
  host:
    - gmp
    - htslib
    - openmpi
  run:
    - htslib
    - openmpi

test:
  commands:
    - raxml-ng --version
    - raxml-ng-mpi --version  # [not osx]

about:
   home: https://github.com/amkozlov/raxml-ng
   license: AGPL-3
   license_family: AGPL
   license_file: LICENSE.txt
   summary: "RAxML Next Generation: faster, easier-to-use and more flexible"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  container:
    # openmpi needs ssh client
    extended-base: true
  identifiers:
    - doi:10.1093/bioinformatics/btz305
