{% set version = "4.0.4" %}
{% set sha256 = "e42f671f0dd46ac5606bc8c68a93ffdd09bfb90e8eb12e4b22269c320d0adc52" %}

package:
  name: motus
  version: '{{ version }}'

source:
  url: https://pypi.io/packages/source/m/motus_tool/motus_tool-{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  number: 0
  noarch: python

channels:
  - bioconda
  - conda-forge

requirements:
  host:
    - python>=3.12
    - pip
  run:
    - bwa>=0.7.19
    - vsearch>=2.30.4
    - python>=3.12
    - biopython>=1.8.5
    - bioconda::fetchmgs>=2.1.2
    - pysam>=0.23.3
    - polars>=1.32.2
    - rapidfuzz>=3.13.0
    - tqdm>=4.67.3

outputs:
  - name: motus
    script: build.sh

test:
  import:
    - motus
#  commands:
#    - 'motus 2>&1 | grep "Version" | sed "s%^.*Version: %%" | grep -qF "{{ version }}"'

about:
  home: http://motu-tool.org/
  license: GPL-3.0
  license_file: LICENSE
  license_family: GPL
  summary: Marker gene-based OTU (mOTU) profiling
  dev_url: https://github.com/motu-tool/mOTUs

extra:
  notes: A tiny wrapper to the command motus was added. See build.sh for 
  additional notes identifiers:
    - biotools:motus
  recipe-maintainers:
    - Alessio Milanese
    - Saul Pierotti
