{% set version = "4.0.4" %}
{% set sha256 = "e42f671f0dd46ac5606bc8c68a93ffdd09bfb90e8eb12e4b22269c320d0adc52" %}

package:
  name: motus
  version: '{{ version }}'

source:
  url: https://pypi.io/packages/source/m/motus_tool/motus_tool-{{ version }}.tar.gz
  sha256: '{{ sha256 }}'

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage("motus", max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - bwa >=0.7.19
    - vsearch >=2.30.4
    - python >=3.12
    - biopython >=1.8.5
    - pysam >=0.23.3
    - polars >=1.32.2
    - rapidfuzz >=3.13.0
    - tqdm >=4.67.3
    - fetchmgs >=2.1.2

test:
  import:
    - motus
  commands:
    - 'motus --help 2>&1 | grep "Version" | sed "s%^.*Version: %%" | grep -qF "{{ version }}"'

about:
  home: http://motus-tool.org/
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: GPL
  summary: Marker gene-based OTU (mOTU) profiling
  dev_url: https://github.com/motu-tool/mOTUs

extra:
  notes: A tiny wrapper to the command motus was added. See build.sh for 
  additional notes identifiers:
    - biotools:motus
  recipe-maintainers:
    - hjruscheweyh
    - saulpierotti
  additional-platforms:
    - osx-arm64
    - linux-aarch64
