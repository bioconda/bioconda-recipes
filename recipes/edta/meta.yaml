{% set name = "EDTA" %}
{% set version = "2.3.0" %}
{% set sha256 = "66437a333403429cad1d8c11c43a862dc8e376e50f3983cbeabae62276e0dc94" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/oushujun/EDTA/archive/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage('edta', max_pin='x') }}

requirements:
  run:
    - annosine2
    - bedtools
    - biopython
    - cd-hit
    - coreutils
    - genometools-genometools
    - grep
    - helitronscanner
    - ltr_finder_parallel
    - ltr_harvest_parallel
    - ltr_retriever >=3.0.0
    - mdust
    - muscle
    - openjdk
    - pandas
    - perl
    - perl-json
    - perl-text-soundex
    - python >=3.8
    - pyarrow
    - r-base
    - r-dplyr
    - r-ggplot2
    - r-here
    - r-tidyr
    - repeatmodeler >=2
    - repeatmasker
    - samtools
    - tesorter
    - tir-learner

test:
  commands:
    - EDTA.pl -h > /dev/null
    - EDTA.pl --check_dependencies > /dev/null 
    - EDTA_processK.pl -h 2>&1 | grep -i "Perform EDTA"
    - EDTA_raw.pl -h 2>&1 | grep -i "Obtain raw"
    - lib-test.pl -h 2>&1 | grep -i "To test"

about:
  home: "https://github.com/oushujun/EDTA"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  summary: "Extensive de-novo TE Annotator."
  dev_url: "https://github.com/oushujun/EDTA"
  doc_url: "https://github.com/oushujun/EDTA/wiki"

extra:
  identifiers:
    - doi:10.1186/s13059-019-1905-y
    - doi:10.1101/2022.10.09.511471
    - biotools:EDTA
    - usegalaxy-eu:edta
