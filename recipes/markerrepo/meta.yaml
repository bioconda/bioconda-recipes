{% set version = "0.1.6" %}

package:
  name: markerrepo
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/markerRepo/markerrepo-{{ version }}.tar.gz
  sha256: 96b0843ef6efa49a7fa00c71ff7cde76569f1a151c715b60b1ac2c7722c6f19a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('markerrepo', max_pin="x.x") }}

requirements:
  host:
    - python
    - setuptools >=77.0.3
    - pip
  run:
    - python
    - pandas >=1.5.3
    - numpy
    - matplotlib-base >=3.7.1
    - seaborn >=0.12.2
    - pyyaml >=6.0
    - gitpython
    - scikit-learn >=1.2.2
    - apybiomart
    - scanpy
    - intervaltree
    - ipython
    - requests

test:
  imports:
    - markerrepo
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/markerrepo/
  summary: A tool for marker list management and annotation in the single cell context.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hschult
