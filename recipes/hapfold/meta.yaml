{% set version = "0.1.0" %}

package:
  name: hapfold
  version: {{ version }}

source:
  url: https://github.com/LuoGroup2023/HapFold/archive/refs/tags/v{{ version }}.tar.gz
  sha256: ef64ecb477413f327e7e3e158b48aa843d0d13cb998d6665822eea249f753556
build:
  number: 0
  skip: True # [osx]
  run_exports:
    - {{ pin_subpackage('hapfold', max_pin="x.x") }}
requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - zlib
  run:
    - zlib
test:
  commands:
    - HapFold 2>&1 | grep 'Usage'

about:
  home: https://github.com/LuoGroup2023/HapFold
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Efficient and Accurate Chromosome-Scale Haplotype Reconstruction.'