{% set name = "sracha" %}
{% set version = "0.1.7" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/rnabioco/sracha-rs/archive/v{{ version }}.tar.gz
  sha256: ac858c21e3be87a62a303e44f2a57bb874676c82fff25e9b898c9794562ce8fc

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('sracha', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}

test:
  commands:
    - sracha --help

about:
  home: https://github.com/rnabioco/sracha-rs
  license: MIT
  license_file: LICENSE
  summary: Fast parallel SRA downloader and streaming FASTQ converter.
  dev_url: https://github.com/rnabioco/sracha-rs
  doc_url: https://github.com/rnabioco/sracha-rs#readme

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - jayhesselberth
