{% set name = "kmer2stats" %}
{% set version = "1.0.2" %}
{% set sha256 = "7931335035d1ea756bce7b5a497bafea69f0662ace4011cf9631b3f5b456cf92" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage("kmer2stats", max_pin="x") }}

requirements:
  host:
    - python >=3
    - pip
    - setuptools
  run:
    - python >=3
    - pandas
    - numpy
    - scikit-bio

test:
  commands:
    - kmer2stats --help
    - kmer2stats --version

about:
  home: https://github.com/SantaMcCloud/kmer2stats
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: "A tool for creating data files for statistic based on kmers."
  dev_url: https://github.com/SantaMcCloud/kmer2stats
