{% set name = "ga4gh.cat_vrs" %}
{% set version = "0.7.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ga4gh_cat_vrs-{{ version }}.tar.gz
  sha256: f06530d28aa21bf007ce0cfeee4a98458fc6506ce552029866414fd303fa4de6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('ga4gh.cat_vrs', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=65.3
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.10
    - ga4gh.vrs >=2.1.3,<3.0
    - pydantic >=2.0,<3.0

test:
  imports:
    - ga4gh.cat_vrs

about:
  home: https://github.com/ga4gh/cat-vrs-python
  summary: GA4GH Categorical Variation Representation (Cat-VRS) reference implementation
  dev_url: https://github.com/ga4gh/cat-vrs-python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - emmcauley
