package:
  name: bayescan
  version: "2.1"

source:
  url: https://cmpg.unibe.ch/software/BayeScan/files/BayeScan2.1.zip
  sha256: c6bbc52a5a6a30e895951faf2bd6291ca47fdccdc708e693fce02389548d5547
  patches:
    - 0001-Use-CXX-and-no-static.patch

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('bayescan', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
  host:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
  run:
    - libgomp  # [linux]
    - llvm-openmp  # [osx]

test:
  commands:
    - bayescan_2.1 | grep -qF BayeScan

about:
  home: "https://cmpg.unibe.ch/software/BayeScan"
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: source/COPYING
  summary: "Phylogenetics - Randomized Axelerated Maximum Likelihood."
  doc_url: "https://cmpg.unibe.ch/software/BayeScan"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:bayescan
    - usegalaxy-eu:BayeScan
    - doi:10.1534/genetics.108.092221
  skip-lints:
    - compiler_needs_stdlib_c
