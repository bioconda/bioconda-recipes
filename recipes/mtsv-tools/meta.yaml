{% set name = "mtsv-tools" %}
{% set version = "2.1.1" %}
{% set sha256 = "8b467f5e2df0254a8f24107b399516a37db2acd52ce7ed0c670bb21523f50e99" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/FofanovLab/mtsv_tools/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 1
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config

test:
  commands:
    - mtsv-build --version

about:
  home: "https://github.com/FofanovLab/mtsv_tools"
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  license_family: MIT
  summary: "mtsv_tools contains core tools for alignment-based metagenomic/metatranscriptomic assignment."
  dev_url: "https://github.com/FofanovLab/mtsv_tools"

extra:
  additional-platforms:
    # requires <emmintrin.h>
    - linux-aarch64
    - osx-arm64
