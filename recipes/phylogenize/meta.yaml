{% set name = "phylogenize" %}
{% set version = "2.0.1" %}
{% set sha256 = "faf907eb0a9f339a35130ac59f2a9fdbedc10091dd70acb70ca6d0316f6edde5" %}

package:
  name: phylogenize
  version: {{ version }}

source:
  url: https://github.com/pbradleylab/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - r-base >=4.5
    - vsearch =2.30.6
    - repermulize =1.1.1
    - r-stringi =1.8.7
    - r-stringr =1.6.0
    - r-tidyverse =2.0.0
    - r-ragg =1.5.2
    - r-phangorn =2.12.1
    - r-pryr =0.1.6
    - r-svglite =2.2.2
    - r-functional =0.6
    - r-settings =0.2.7
    - r-gtools =3.9.5
    - r-furrr =0.4.0
    - r-scales =1.4.0
    - r-phytools =2.5_2
    - r-testthat =3.3.2
    - r-ggiraph =0.9.6
    - r-tidymodels =1.4.1
    - r-extradistr =1.10.0.3
    - r-plotly =4.12.0
    - r-castor =1.8.5
    - r-ashr =2.2_63
    - r-seqinr =4.2_36
    - r-kableExtra =1.4.0
    - r-phylolm =2.6.5
    - r-pbapply =1.7_4
    - r-purrr =1.2.2
    - r-tibble =3.3.1
    - r-dplyr =1.2.1
    - r-future =1.70.0
    - r-mass =7.3_65
    - r-ape =5.8_1
    - r-phylolm =2.6.5
    - r-dt =0.34.0
    - bioconductor-ggtree =4.0.4
    - bioconductor-biomformat =1.38.0
    - bioconductor-qvalue =2.42.0
    - bioconductor-ancombc =2.12.0
    - bioconductor-clusterprofiler =4.18.4
  run:
    - r-base >=4.5
    - vsearch =2.30.6
    - repermulize =1.1.1
    - r-stringi =1.8.7
    - r-stringr =1.6.0
    - r-tidyverse =2.0.0
    - r-ragg =1.5.2
    - r-phangorn =2.12.1
    - r-pryr =0.1.6
    - r-svglite =2.2.2
    - r-functional =0.6
    - r-settings =0.2.7
    - r-gtools =3.9.5
    - r-furrr =0.4.0
    - r-scales =1.4.0
    - r-phytools =2.5_2
    - r-testthat =3.3.2
    - r-ggiraph =0.9.6
    - r-tidymodels =1.4.1
    - r-extradistr =1.10.0.3
    - r-plotly =4.12.0
    - r-castor =1.8.5
    - r-ashr =2.2_63
    - r-seqinr =4.2_36
    - r-kableExtra =1.4.0
    - r-phylolm =2.6.5
    - r-pbapply =1.7_4
    - r-purrr =1.2.2
    - r-tibble =3.3.1
    - r-dplyr =1.2.1
    - r-future =1.70.0
    - r-mass =7.3_65
    - r-ape =5.8_1
    - r-phylolm =2.6.5
    - r-dt =0.34.0
    - bioconductor-ggtree =4.0.4
    - bioconductor-biomformat =1.38.0
    - bioconductor-qvalue =2.42.0
    - bioconductor-ancombc =2.12.0
    - bioconductor-clusterprofiler =4.18.4

test:
  commands:
    - '$R -e "library(phylogenize)"'

about:
  home: "https://github.com/pbradleylab/phylogenize"
  dev_url: "https://github.com/pbradleylab/phylogenize"
  license: MIT
  license_family: MIT
  summary: "Phylogenize is a tool that allows users to link microbial genes to environments, accounting for phylogeny."
  doc_url: "http://phylogenize.org"

extra:
  recipe-maintainers:
    - kekananen
  indentifiers:
    - doi:10.1093/bioinformatics/btz722
