{% set name = "cospar" %}
{% set version = "0.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cospar-{{ version }}.tar.gz
  sha256: 4ad09dd1c841e8e7fef433d671f039b35eb687eb6bb12c63f4478bcf3a339c20

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - poetry-core
    - pip
  run:
    - python >=3.9
    - anndata >=0.10.0,<0.11.0
    - fastcluster >=1.2.6,<2.0.0
    - gseapy >=1.1.3,<2.0.0
    - numpy >=1.26
    - pandas >=2.1.0,<3.0.0
    - scanpy >=1.10.0,<2.0.0
    - scikit-learn >=1.3.0,<2.0.0
    - scipy >=1.11
    - statsmodels >=0.14.2,<0.15.0
    - tqdm >=4.66.5,<5.0.0
    - leidenalg >=0.10.2,<0.11.0
    - matplotlib-base >=3.8.0,<4.0.0

test:
  imports:
    - cospar

about:
  home: "https://github.com/ShouWenWang-Lab/cospar"
  summary: "A toolkit for dynamic inference of cell fate by integrating state and lineage information."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/ShouWenWang-Lab/cospar"

extra:
  recipe-maintainers:
    - raymond-u
    - ShouWenWang
