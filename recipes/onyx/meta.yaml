package:
  name: onyx
  version: "0.0.1"

source:
  url: https://github.com/omics-tools/onyx/archive/refs/tags/v0.0.1.tar.gz
  sha256: 5153a9e71768e66112085828098ad38f1871f4ba538d4a0e7dde379d21652218

build:
  noarch: python
  script: python -m pip install . --no-deps -vv

requirements:
  host:
    - python
    - pip
  run:
    - python >=3.8
    - kmc
    - seqkit
    - samtools
    - tqdm
    - requests

test:
  commands:
    - onyx --help

about:
  home: https://github.com/omics-tools/onyx
  license: MIT
  license_file: LICENSE
  summary: Alignment-free biological sex inference from sequencing data

extra:
  recipe-maintainers:
    - omics-tools