{% set name = "onyx" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/omics-tools/onyx/archive/refs/tags/v0.0.1.tar.gz
  sha256: 5153a9e71768e66112085828098ad38f1871f4ba538d4a0e7dde379d21652218

build:
  number: 0
  noarch: python
  run_exports:
    - {{ pin_subpackage("onyx", max_pin="x.x") }}
  script: python -m pip install . --no-deps -vv

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python >=3.8
    - kmc
    - seqkit
    - samtools
    - tqdm
    - requests

test:
  commands:
    - onyx --help

about:
  home: https://github.com/omics-tools/onyx
  license: MIT
  license_file: LICENSE
  summary: Alignment-free biological sex inference from high-throughput sequencing data
  doc_url: https://github.com/omics-tools/onyx
  dev_url: https://github.com/omics-tools/onyx

extra:
  recipe-maintainers:
    - omics-tools
