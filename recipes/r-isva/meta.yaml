{% set version = '1.10' %}

package:
  name: r-isva
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/isva_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/isva/isva_{{ version }}.tar.gz
  sha256: f44aaf11e38088a20d607c6137f41189ef85baf82073ce17a90851e3165fa1c6

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  run_exports:
    - {{ pin_subpackage("r-isva", max_pin="x") }}

requirements:
  host:
    - r-base
    - r-jade
    - r-fastica
    - bioconductor-qvalue
  run:
    - r-base
    - r-jade
    - r-fastica
    - bioconductor-qvalue

test:
  commands:
    - $R -e "library('isva')"

about:
  home: "https://CRAN.R-project.org/package=isva"
  license: "GPL-2.0-or-later"
  summary: 'Independent Surrogate Variable Analysis is an algorithm for feature selection in
    the presence of potential confounding factors (see Teschendorff AE et al 2011, <doi:
    10.1093/bioinformatics/btr171>).'
  license_family: GPL2
  license_file: '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2'
