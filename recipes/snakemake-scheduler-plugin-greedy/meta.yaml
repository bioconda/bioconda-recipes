{% set name = "snakemake-scheduler-plugin-greedy" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/snakemake_scheduler_plugin_greedy-{{ version }}.tar.gz
  sha256: 2e865e0af902a903c974b7e78b9014db5b8185414bad379e75541cfe40979833

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  host:
    - python >=3.11.0,<4.0.0
    - hatchling
    - pip
  run:
    - snakemake-interface-common >=1.23.0,<2.0.0
    - snakemake-interface-scheduler-plugins >=2.0.2,<3.0.0

test:
  imports:
    - snakemake_scheduler_plugin_greedy

about:
  home: "https://github.com/snakemake/snakemake-scheduler-plugin-greedy"
  summary: "A greedy Snakemake scheduler plugin."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/snakemake/snakemake-scheduler-plugin-greedy"

extra:
  recipe-maintainers:
    - johanneskoester
    - fgvieira
