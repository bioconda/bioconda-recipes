{% set name = "snakemake-scheduler-plugin-milp" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/snakemake_scheduler_plugin_milp-{{ version }}.tar.gz
  sha256: be1ff180af06923c26f11e3c6346f663b9dca4c332229502a9701870afeb8bb6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x') }}

requirements:
  host:
    - python >=3.11.0,<4.0.0
    - hatchling
    - pip
  run:
    - snakemake-interface-common >=1.23.0,<2.0.0
    - snakemake-interface-scheduler-plugins >=2.0.2,<3.0.0

test:
  imports:
    - snakemake_scheduler_plugin_milp

about:
  home: "https://github.com/snakemake/snakemake-scheduler-plugin-milp"
  summary: "A Snakemake scheduler plugin using Mixed-Integer Linear Programming (MILP)."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/snakemake/snakemake-scheduler-plugin-milp"

extra:
  recipe-maintainers:
    - johanneskoester
    - fgvieira