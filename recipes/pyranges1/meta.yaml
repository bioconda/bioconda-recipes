{% set name = "pyranges1" %}
{% set version = "1.3.6" %}
{% set sha256 = "c7b89f366ce48db087ce273cb1a4de60e52c8304830a73d6c24423a1102f6bc5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - pyranger = pyranges1.cli:main
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=61
    - setuptools-scm >=6.2
  run:
    - python >=3.12
    - fire  # for pyranger CLI command
    - pyrle >=0.0.43
    - bamread
    - pyfaidx
    - pybigwig
    - joblib
    - pandas
    - tabulate
    - natsort
    - ruranges >=0.1.2
    - gtfreader >=0.2.0

test:
  imports:
    - pyranges1
  commands:
    - pyranger --help

about:
  home: "https://github.com/pyranges/pyranges_1.x"
  summary: "GenomicRanges for Python."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/pyranges/pyranges_1.x"

extra:
  recipe-maintainers:
    - endrebak
