{% set name = "pyranges1" %}
{% set version = "1.3.6" %}
{% set sha256 = "c7b89f366ce48db087ce273cb1a4de60e52c8304830a73d6c24423a1102f6bc5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pyranger = pyranges1.cli:main
  run_exports:
    - {{ pin_subpackage('pyranges1', max_pin='x.x') }}

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=61
    - wheel
    - setuptools-scm >=6.2
  run:
    - python >=3.12
    - pyrle >=0.0.43
    - bamread
    - pyfaidx
    - pybigwig
    - joblib
    - pandas
    - tabulate
    - natsort
    - ruranges >=0.1.2
    - gtfreader >=0.2.0

test:
  imports:
    - pyranges1
  commands:
    - python -c "import pyranges1 as pr; print(pr.__version__)"
  requires:
    - python >=3.12

about:
  home: http://github.com/pyranges/pyranges_1.x
  summary: GenomicRanges for Python.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - endrebak
