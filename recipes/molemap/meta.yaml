package:
  name: molemap
  version: "1.4.3"

source:
  url: https://github.com/kehrlab/molemap/archive/refs/tags/v.1.4.3.tar.gz
  sha256: cf1a6508f6375cfbc945b1ef4c662f58a037676dcdc4c6d5ff31c949b86aca5c

build:
  number: 0

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
    - libzlib
    - zlib-ng
    - zlib
    - htslib
  host:
    - zlib
    - htslib

test:
  commands:
    - molemap index -h

about:
  home: "https://github.com/kehrlab/molemap"
  summary: "Ultra fast molecule mapping for linked- and long-read data."
  dev_url: "https://github.com/kehrlab/molemap"

extra:
  additional-platforms:
    - linux-aarch64
