{% set name = "tecap" %}
{% set version = "0.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/FullLengthFanatic/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9408733a7313ea549966e7deb621c877eec867a7ed8fad620e71c55a28d744c9

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - tecap = tecap.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling >=1.18
  run:
    - python >=3.9
    - pysam >=0.22
    - intervaltree >=3.1
    - matplotlib-base >=3.5
    - numpy >=1.22

test:
  imports:
    - tecap
  commands:
    - tecap --version
    - tecap classify --help
    - tecap basecomp --help
    - tecap compare --help

about:
  home: https://github.com/FullLengthFanatic/tecap
  summary: 3' terminal exon capture diagnostics for long-read scRNA-seq
  description: |
    tecap classifies long-read alignments by where their 3' end lands relative
    to the terminal exon, its UTR, and a polyA site atlas. It decomposes
    capture failures into nine mechanism buckets and measures reference base
    composition downstream of each cleavage site, separating classical A-tract
    internal priming (>=60% A) from moderate-A priming (30-50% A). Empirically
    the two regimes split single-cell preps from bulk Iso-Seq; the biochemical
    driver of the split is currently uncharacterized. Designed for PacBio
    Iso-Seq / Kinnex and Oxford Nanopore cDNA BAMs. Direct-RNA sequencing is
    unsupported.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/FullLengthFanatic/tecap
  dev_url: https://github.com/FullLengthFanatic/tecap

extra:
  recipe-maintainers:
    - FullLengthFanatic
  identifiers:
    - doi:10.5281/zenodo.19762736
