{% set version = "2.0.3" %}

package:
  name: atlas
  version: {{ version }}

source:
  url: https://bitbucket.org/wegmannlab/atlas/get/{{ version }}.tar.gz
  sha256: 1bef65602ab1aae222ce1720444fb1a71a65965c8a67498245b03e9f3c7d9992

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("atlas", max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake
    - ninja
  host:
    - armadillo
    - fmt
    - htslib
    - mkl # [x86]
    - lapack
    - nlohmann_json
    - openblas
    - jsoncpp
    - zlib
  run:
    - armadillo
    - fmt
    - htslib
    - mkl # [x86]
    - lapack
    - nlohmann_json
    - openblas
    - jsoncpp

test:
  commands:
    - atlas | grep "successfully"
    - atlas simulate
    - atlas summaryStats --bam ATLAS_simulations.bam --fasta ATLAS_simulations.fasta
    - atlas GLF --bam ATLAS_simulations.bam
    - atlas saf --glf ATLAS_simulations_GLF.glf.gz --fasta ATLAS_simulations.fasta
    - atlas majorMinor --glf ATLAS_simulations_GLF.glf.gz
    - rm ATLAS* saf.saf.* simulate.* || exit 1

about:
  home: https://atlaswiki.netlify.app
  license: MPL-2.0
  summary: "ATLAS: Analysis Tools for Ancient and Low-depth Samples"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
