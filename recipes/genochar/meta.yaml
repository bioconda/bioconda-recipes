{% set name = "genochar" %}
{% set version = "0.6.3.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f6feaf4dbc6c778736920bbbb8543b5633289b27a57c7aaef578e242d4c0b583

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage("genochar", max_pin="x.x") }}
    
requirements:
  host:
    - python >=3.10
    - setuptools >=68
    - wheel
    - pip
  run:
    - python >=3.10
    - pandas >=2.0
    - openpyxl >=3.1

test:
  imports:
    - genochar
  commands:
    - pip check
    - genochar --help
  requires:
    - pip

about:
  home: https://github.com/ljunwon1114/GenoChar
  summary: 'GenoChar: Genome characterization workflow for generating publication-ready tables from microbial genome assemblies'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ljunwon1114
