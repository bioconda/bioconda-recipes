{% set name = "rectify-rna" %}
{% set version = "2.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace("-", "_") }}-{{ version }}.tar.gz
  sha256: 5b7248cf64e8a2345f27e5f5ccb116ee848557b3d96336d574a7cecbc322d5cd

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - rectify = rectify.cli:main

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - numpy >=1.20
    - pandas >=1.3
    - pysam >=0.19
    - scipy >=1.7
    - scikit-learn >=1.0
    - matplotlib-base >=3.5
    - seaborn >=0.11
    - pybigwig >=0.3
    - biopython >=1.79
    - pydeseq2 >=0.4

test:
  imports:
    - rectify
  commands:
    - rectify --help

about:
  home: https://github.com/k-roy/RECTIFY
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'Unified RNA 3'' End Correction Framework'
  description: |
    RECTIFY corrects poly(A) tail artifacts in RNA 3' end sequencing data.
    Features A-tract ambiguity correction, AG mispriming detection,
    NET-seq refinement, and downstream analysis (DESeq2, clustering, motifs).
  dev_url: https://github.com/k-roy/RECTIFY
  doc_url: https://github.com/k-roy/RECTIFY#readme

extra:
  recipe-maintainers:
    - k-roy
