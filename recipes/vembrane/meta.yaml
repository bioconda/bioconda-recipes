{% set version = "2.5.0" %}

package:
  name: vembrane
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/v/vembrane/vembrane-{{ version }}.tar.gz
  sha256: 3c472c461c36ed89fb4a13c95e0b22963c97295c94ddd4175e86fc4c38e98f27

build:
  number: 0
  entry_points:
    - vembrane = vembrane.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vvv
  run_exports:
    - {{ pin_subpackage('vembrane', max_pin="x") }}

requirements:
  host:
    - pip
    - setuptools
    - wheel
    - python >=3.10
    - hatchling
  run:
    - asttokens >=3.0,<4
    - cyvcf2 >=0.31.1,<0.32
    - intervaltree >=3.1,<4
    - networkx >=3.5,<4
    - numpy >=2.1,<3.0
    - obonet >=1.1.1,<2
    - pysam >=0.23.3,<0.25
    - python >=3.12
    - pyyaml >=6.0,<7
    - typing-extensions >=4.12.2,<5
    - yte >=1.9,<2
    - pyarrow >=22.0.0

test:
  imports:
    - vembrane
  commands:
    - vembrane --help
    - vembrane --version

about:
  home: https://github.com/vembrane/vembrane
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Filter VCF/BCF files with Python expressions.

extra:
  recipe-maintainers:
    - felixmoelder
    - mbargull
    - tedil
