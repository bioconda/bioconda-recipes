{% set name = "deepchopper" %}
{% set version = "1.3.3" %}
{% set sha256 = "ceaed4fd0749ad06ed8277eaac11016ce996aba0ff22f14889c9805e0b5ce04e" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [py > 312]
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  entry_points:
    - deepchopper = deepchopper.cli:app
    
requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - cmake
    - pkg-config
  host:
    - python
    - pip
    - maturin >=1.2.1,<2
    - setuptools-rust
    - setuptools
  run:
    - python
    - pytorch >=2.6.0
    - lightning >=2.1.2
    - torchmetrics >=1.2.1
    - rich >=13.7.0
    - transformers >=4.37.2
    - safetensors >=0.4.2
    - datasets >=3.0.0
    - evaluate >=0.4.3
    - typer >=0.12.0
    - gradio >=5.12.0
    - fastapi >=0.115.0
    - scikit-learn >=1.5.2
    - hydra-core >=1.3.2
    - omegaconf >=2.3.0
    - python-multipart >=0.0.12
    - pyfastx >=2.2.0
    - deepchopper-cli >=1.3.1
    - pyarrow >=20.0.0
    - pytz

test:
  imports:
    - deepchopper
  commands:
    - deepchopper --help

about:
  home: "https://github.com/ylab-hi/DeepChopper"
  license: "Apache-2.0"
  license_family: Apache
  license_file: LICENSE
  summary: "A Genomic Language Model for Chimera Artifact Detection in Nanopore Direct RNA Sequencing."
  description: |
    DeepChopper is a genomic language model designed to identify artificial sequences.
    It provides functionality for encoding FASTQ files, making predictions, and chopping sequences.
  doc_url: "https://github.com/ylab-hi/DeepChopper"
  dev_url: "https://github.com/ylab-hi/DeepChopper"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - yangyangli
