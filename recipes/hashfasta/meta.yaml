{% set version = "1.0.0" %}
{% set name = "hashfasta" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/sam-sims/{{ name }}/archive/{{ name }}-{{ version }}.tar.gz
  sha256: aa3e806d837dbcdf2314f1c1fcd70565d0a138b8bba57e702e5c543baa0a9a4d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('hashfasta', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - hashfasta --version

about:
  home: https://github.com/Sam-Sims/hashfasta
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Very quickly compute hashes for FASTA/FASTQ files considering **only** the sequence content.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - sam-sims