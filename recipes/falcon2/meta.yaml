{% set name = "falcon2" %}
{% set version = "1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/cobilab/FALCON2/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e819bff7c45496099d93605b8aee2211df7c357ed3702edb25eb4bcad26060a2

build:
  number: 0
  run_exports:
  - {{ pin_subpackage("falcon2", max_pin="x") }}

requirements:
  build:
    - cmake
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}

test:
  commands:
    - falcon2 --help

about:
  home: https://github.com/cobilab/FALCON2
  summary: "FALCON2 genomic compression tool"
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - LuiisLaranjeira
    - pratas
