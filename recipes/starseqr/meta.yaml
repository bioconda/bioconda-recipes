{% set version = "0.6.7" %}

package:
  name: star-seqr
  version: {{ version }}

source:
  url: https://github.com/ExpressionAnalysis/STAR-SEQR/archive/v{{ version }}.tar.gz
  sha256: fc82ab8771156cc482480af1b5271bd2a8c74f6daa7c102bdb39a7d0880440d5

build:
  number: 7
  skip: True  # [py < 37]
  script: {{ PYTHON }} -m pip install . -vvv --use-pep517 --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('starseqr', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - setuptools
    - cython
    - pip
  run:
    - python
    - six
    - networkx
    - gffread
    - pandas >=0.18.1
    - numpy
    - pysam >=0.9.1.4
    - primer3-py
    - intervaltree_bio

test:
  imports:
    - ssw
    - starseqr_utils
    - starseqr_utils.tests
  commands:
    - starseqr.py -h

about:
  home: https://github.com/ExpressionAnalysis/STAR-SEQR
  license: ../../LICENSE
  summary: "RNA Fusion Detection and Quantification."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
