{% set name = "gffutils" %}
{% set version = "0.14" %}
{% set sha256 = "0246a16373453a5a1faf6696553557f2ebf49b2f91a7730cb59d46b5cbd1d9b1" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --ignore-installed --no-deps -vv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - argcomplete >=1.9.4
    - argh >=0.26.2
    - pyfaidx >=0.5.5.2
    - python
    - simplejson

test:
  imports:
    - gffutils
  commands:
    - gffutils-cli -h

about:
  home: "https://github.com/daler/gffutils"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Work with GFF and GTF files in a flexible database framework"
  doc_url: http://daler.github.io/gffutils/
  dev_url: https://github.com/daler/gffutils

extra:
  identifiers:
    - biotools:GFFutils
