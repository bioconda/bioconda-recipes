{% set name = "seqfu" %}
{% set version = "1.26.0" %}
{% set sha256 = "2b3aa5d6f983aed570d26b0cf48d910f847704d57401ef64e5b026de3dd0afff" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/telatin/{{ name }}2/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [win]
  conda_pkg_format: 2
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - nim >=2.0.8
    - make
    - pkg-config
    - coreutils
  host:
    - curl
    - pcre
    - zlib
  run:
    - pcre

test:
  commands:
    - seqfu
    - seqfu stats --help
    - seqfu --version
    - "seqfu --version | grep '{{ version }}'"

about:
  home: "https://github.com/telatin/seqfu2"
  docs: "https://telatin.github.io/seqfu2"
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  summary: "DNA sequence utilities."
  description: |
    A collection of utilities to work with FASTX (FASTA or FASTQ) files
    that accept gzipped input.
    Tools to interleave and deinterleave, to calculate stats, and extract
    portions of sequence datasets.

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - telatin
  identifiers:
    - biotools:{{ name }}
    - doi:10.3390/bioengineering8050059
