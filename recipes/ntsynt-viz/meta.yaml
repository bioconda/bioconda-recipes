{% set name = "ntsynt-viz" %}
{% set version = "1.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/BirolLab/ntSynt-viz/releases/download/v{{ version }}/ntSynt-viz-{{ version }}.tar.gz
  sha256: b30a3c3caa4725577f37eb616d1a0426d5347493195e0dd44111f387c2589e95

build:
  number: 0
  noarch: generic
  run_exports: 
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  run:
    - python >=3.8
    - snakemake
    - quicktree
    - intervaltree
    - r-base
    - bioconductor-treeio
    - r-ggpubr 
    - bioconductor-ggtree 
    - r-phytools 
    - r-dplyr 
    - r-argparse 
    - r-scales 
    - r-stringr 
    - r-gggenomes >=1.1.0
    - r-tidyr

test:
  commands:
    - ntsynt_viz.py --help

about:
  home: https://github.com/BirolLab/ntSynt-viz
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: 'Visualizing multi-genome synteny patterns'
  dev_url: https://github.com/BirolLab/ntSynt-viz
