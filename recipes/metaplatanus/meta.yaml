{% set version = "1.3.1" %}
{% set sha256 = "4d91e5cfffdde8a9989aa12f9a6e97eaa2076509f587acca39cee39e0d8914b5" %}

package:
  name: metaplatanus
  version: {{ version }}

source:
  sha256: {{ sha256 }}
  url: https://github.com/rkajitani/metaplatanus/archive/v{{ version }}.tar.gz

build:
  number: 3
  run_exports:
    - {{ pin_subpackage('metaplatanus', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
  host:
    - zlib
    - bzip2
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - wget
  run:
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    - perl >=5
    - tgsgapcloser >=1.0.3
    - racon >=1.4.20
    - metabat2 >=2.12.1  # [x86_64]
    - bwa >=0.7.17
    - minimap2 >=2.17
    - samtools >=1.9
    - seqkit >=0.16.1
    - psutil >=5.8.0
    - megahit >=1.2.9

test:
  commands:
    - metaplatanus -h

about:
  home: "https://github.com/rkajitani/metaplatanus"
  license_family: GPL3
  license_file: LICENSE
  license: "GPL-3.0-or-later"
  summary: "MetaPlatanus: A hybrid metagenome assembler."
  dev_url: "https://github.com/rkajitani/metaplatanus"
  doc_url: "https://github.com/rkajitani/MetaPlatanus/blob/v{{ version }}/README.md"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  identifiers:
    - biotools:metaplatanus
    - doi:10.1093/nar/gkab831
