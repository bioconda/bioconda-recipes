{% set version = "1.0.12" %}

package:
  name: blastdbbuilder-gui
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/b/blastdbbuilder-gui/blastdbbuilder_gui-{{ version }}.tar.gz
  sha256: d82a1b77ba075e3ba6638f4fbe7cf86c60eb4a9aa08652b09bb8ed890a0ca991

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage("blastdbbuilder-gui", max_pin="x") }}
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
  run:
    - python >=3.9
    - blastdbbuilder >=1.1.0
    - customtkinter

test:
  imports:
    - blastdbbuilder_gui

about:
  home: "https://github.com/asadprodhan/blastdbbuilder"
  summary: "Graphical user interface for building customised BLASTn databases using blastdbbuilder (GUI)."
  license: "GPL-3.0-or-later"
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asadprodhan
