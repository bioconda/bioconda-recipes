{% set name = "r-psadd" %}
{% set version = "0.1.3" %}

package:
  name: {{ name }}
  version: {{ version }}


source:
  url: https://github.com/erifa1/psadd/archive/refs/tags/v0.1.3.tar.gz
  sha256: 93415d8c69f102c7982965f1d216350d75d7b8528f0e599b5f3cc2d8d4a68a46

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin = "x") }}


requirements:
  build:
    - r-base=4.4.3
    - r-remotes
    - r-renv
    - r-essentials
    - git-lfs
    - zlib
    - cmake
    - openssl
    - git
    - libcurl
    - gmp
    - mpfr
  host:
    - r-base=4.4.3
    - r-ggplot2
    - bioconductor-phyloseq
    - r-plotrix
    - r-vegan
  run:
    - r-base=4.4.3
    - r-ggplot2
    - bioconductor-phyloseq
    - r-plotrix
    - r-vegan


test:
  commands:
    - '$R -e "library(''psadd'')"'

about:
  home: https://github.com/cpauvert/psadd
  license: AGPL-3.0-only
  summary: "This package contains customs functions and additions to the phyloseq package. Instead of sharing functions scripts, I bundled functions and their documentation into this package for the sake of clarity and re-usability. Original author: Charlie Pauvert"

extra:
  skip-lints:
    - should_be_noarch_generic