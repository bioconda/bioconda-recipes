{% set version = "0.2.0" %}

package:
  name: maxalign-rs
  version: {{ version }}

source:
  url: https://github.com/apcamargo/maxalign-rs/archive/v{{ version }}.tar.gz
  sha256: 17c332bd28e75742f7bb93dc4d4c869a03ff77a2e1ff24789a9edaa401b60935

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("maxalign-rs", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("rust") }} 
    - {{ compiler("c") }}
    - cargo-bundle-licenses

test:
  commands:
    - maxalign-rs --help

about:
  home: "https://github.com/apcamargo/maxalign-rs"
  license: "GPL-3.0-only"
  license_file:
    - LICENSE
    - THIRDPARTY.yml 
  summary: "An algorithm for optimizing MSAs by maximizing the alignment area."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
