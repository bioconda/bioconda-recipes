{% set version = "0.3.0" %}

package:
  name: maxalign-rs
  version: {{ version }}

source:
  url: https://github.com/apcamargo/maxalign-rs/archive/v{{ version }}.tar.gz
  sha256: cda8a05e1398479493131eee91541d852ea821696339ae108f39d2564c91d74d

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("maxalign-rs", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("rust") }} 
    - {{ compiler("c") }}
    - cargo-bundle-licenses

test:
  commands:
    - maxalign-rs --help

about:
  home: "https://github.com/apcamargo/maxalign-rs"
  license: "GPL-3.0-only"
  license_file:
    - LICENSE
    - THIRDPARTY.yml 
  summary: "A tool for optimizing multiple sequence alignments by maximizing the alignment area."

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
