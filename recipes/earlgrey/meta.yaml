{% set name = "EarlGrey" %}
{% set version = "7.0.2" %}
{% set sha256 = "cb38abba112a06d59810a74ce212ca08c0da866626398764fad2231c5bdd1c90" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/TobyBaril/EarlGrey/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [osx]
  run_exports:
    - {{ pin_subpackage('earlgrey', max_pin="x") }}

requirements:
  build:
    - make
    - {{ compiler('cxx') }}
  run:
    - python =3.9
    - hmmer
    - trf
    - cd-hit
    - genometools-genometools
    - pandas
    - ncls =0.0.64
    - pyfaidx
    - pyranges
    - parallel
    - repeatmasker =4.2.2
    - ltr_retriever
    - mafft
    - mreps
    - ninja-nj
    - repeatscout
    - recon
    - repeatmodeler >=2.0.4
    - bioconductor-genomeinfodb
    - bioconductor-genomeinfodbdata
    - bioconductor-bsgenome
    - bioconductor-plyranges
    - r-ape
    - r-optparse
    - r-tidyverse
    - r-plyr
    - r-viridis
    - r-cowplot
    - r-ggtext
    - r-data.table
    - r-magrittr
    - bedtools
    - emboss
    - pybedtools
    - samtools
    - heliano
    - r-kableextra

test:
  commands:
    - df -h
    - earlGrey -h

about:
  home: "https://github.com/TobyBaril/EarlGrey"
  dev_url: "https://github.com/TobyBaril/EarlGrey"
  doc_url: "https://github.com/TobyBaril/EarlGrey/blob/v{{ version }}/README.md"
  license: "OSL-2.1"
  license_file: LICENSE
  summary: "Earl Grey: A fully automated TE curation and annotation pipeline."
  description: |
    Earl Grey is a full-automated transposable element (TE) annotation pipeline,
    leveraging the most widely-used tools and combining these with a consensus
    elongation process (BEAT) to better define de novo consensus sequences when
    annotating new genome assemblies.

extra:
  identifiers:
    - doi:10.1093/molbev/msae068
