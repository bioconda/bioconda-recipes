{% set name = "pgenlib" %}
{% set version = "0.94.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pgenlib-{{ version }}.tar.gz
  sha256: 21d475e126c5dd1daadc1fe8bffa3e463ae4b57851983babe7056e73408ca354

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('pgenlib', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools <81
    - cython >=3.1.0
    - numpy >=2.0.0  # [py >= 39]
    - zlib
  run:
    - python
    - setuptools <81
    - numpy >=1.19.3

test:
  imports:
    - {{ name }}

about:
  home: "https://github.com/chrchang/plink-ng"
  license: "LGPL-3.0-or-later"
  license_family: LGPL
  license_file: LICENSE
  summary: "Python wrapper for pgenlib's basic reader and writer."
  doc_url: "https://github.com/chrchang/plink-ng/blob/master/2.0/Python/README.md"
  dev_url: "https://github.com/chrchang/plink-ng/tree/master/2.0/Python"

extra:
  recipe-maintainers:
    - chrchang
  identifiers:
    - doi:10.1186/s13742-015-0047-8
  additional-platforms:
    - linux-aarch64
    - osx-arm64
