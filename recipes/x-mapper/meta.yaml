{% set name = "x-mapper" %}
{% set version = "1.2.1" %}
{% set sha256 = "ce8992ec2f610cd809f318b3069b528bff0721033176f5e18851e4159951eb1e" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mathjeff/Mapper/releases/download/{{ version }}/x-mapper-{{ version }}.jar
  sha256: '{{ sha256 }}'

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('x-mapper', max_pin="x") }}

requirements:
  run:
    - openjdk >=8,<=21

test:
  commands:
    - x-mapper --version

about:
  home: https://github.com/mathjeff/mapper
  license: MIT
  summary: Genomic sequence aligner
