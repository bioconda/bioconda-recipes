{% set name = "x-mapper" %}
{% set version = "1.2.0-beta11" %}
{% set sha256 = "08ed68cd80f013e9e3ea3b02672075885a2125f64d507260a87b4cc182522a14" %}

package:
  name: {{ name|lower }}
  version: {{ version|replace("-", "_") }}

source:
  url: https://github.com/mathjeff/Mapper/releases/download/{{ version }}/x-mapper-{{ version }}.jar
  sha256: '{{ sha256 }}'

build:
  noarch: generic
  number: 0
  run_exports:
    - {{ pin_subpackage('x-mapper', max_pin="x") }}

requirements:
  run:
    - openjdk >=8,<=21

test:
  commands:
    - x-mapper --version

about:
  home: https://github.com/mathjeff/mapper
  license: MIT
  summary: Genomic sequence aligner
