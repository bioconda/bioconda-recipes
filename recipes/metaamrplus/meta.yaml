{% set name = "metaamrplus" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5ae9181e0eb5b64e929e4980bbef47c7aec7e2c81ae8bfda1d5a3e072b4f89ec

build:
  noarch: generic
  number: 2
  run_exports:
    - {{ pin_subpackage("metaamrplus", max_pin="x") }}

  script: |
    set -euo pipefail

    mkdir -p "$PREFIX/bin"
    mkdir -p "$PREFIX/share/metaamrplus/db"

    install -m 755 "$SRC_DIR/bin/metaamrplus" "$PREFIX/bin/"
    install -m 755 "$SRC_DIR/bin/metaamrplus_batch" "$PREFIX/bin/"
    install -m 755 "$SRC_DIR/bin/annotate_metaamrplus.py" "$PREFIX/bin/"

    DB_DIR="$SRC_DIR/db"
    cp "$DB_DIR"/MetaAMRplus_DB_v1.0.* "$PREFIX/share/metaamrplus/db/" || true

requirements:
  build:
    - coreutils

  host:
    - python >=3.8,<3.13

  run:
    - python >=3.8,<3.13
    - coreutils
    - gawk
    - blast >=2.14
    - prodigal
    - pandas
    - wget
    - ncbi-amrfinderplus

test:
  commands:
    - metaamrplus --help

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: "MetaAMRplus AMR + metal resistance + colocalisation analysis"
  description: "MetaAMRplus is a command-line tool for detecting antimicrobial resistance genes, metal/biocide resistance genes, and their genomic colocalisation."

extra:
  recipe-maintainers:
    - migshaw03