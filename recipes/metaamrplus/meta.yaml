{% set name = "metaamrplus" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5ae9181e0eb5b64e929e4980bbef47c7aec7e2c81ae8bfda1d5a3e072b4f89ec

build:
  number: 0
  noarch: generic

requirements:
  host:
    - python

  run:
    - python
    - gawk
    - blast
    - prodigal

test:
  commands:
    - metaamrplus --help

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: "MetaAMRplus: AMR, metal resistance, and co-localisation analysis tool"
  description: |
    MetaAMRplus detects antimicrobial resistance genes, metal/biocide resistance genes,
    and genomic co-localisation from sequencing data.

extra:
  recipe-maintainers:
    - migshaw03
