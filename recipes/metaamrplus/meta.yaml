{% set name = "metaamrplus" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 5ae9181e0eb5b64e929e4980bbef47c7aec7e2c81ae8bfda1d5a3e072b4f89ec

build:
  number: 3
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script: |
    mkdir -p $PREFIX/bin
    install -m 755 metaamrplus.sh $PREFIX/bin/metaamrplus
    install -m 755 annotate_metaamrplus.py $PREFIX/bin/

requirements:
  host:
    - python
  run:
    - python
    - coreutils
    - gawk
    - blast
    - prodigal

test:
  commands:
    - metaamrplus --help

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: "MetaAMRplus: AMR + metal resistance + co-localisation analysis"

extra:
  recipe-maintainers:
    - migshaw03
