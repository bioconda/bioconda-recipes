{% set name = "metaamrplus" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/migshaw03/MetaAMRplus/archive/refs/tags/v{{ version }}.tar.gz
  sha256: a4df0265df68803b0b7f0f1252d61b4de86d30160a0908787723188b30520562

build:
  number: 4
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  script: |
    set -euo pipefail

    mkdir -p $PREFIX/bin

    # Install main CLI tools (FROM YOUR REAL REPO STRUCTURE)
    install -m 755 bin/metaamrplus $PREFIX/bin/metaamrplus
    install -m 755 bin/metaamrplus_batch $PREFIX/bin/
    install -m 755 bin/metaamrplus-download-db $PREFIX/bin/
    install -m 755 bin/annotate_metaamrplus.py $PREFIX/bin/

requirements:
  host:
    - python

  run:
    - python
    - coreutils
    - gawk
    - blast
    - prodigal

test:
  commands:
    - metaamrplus --help

about:
  home: https://github.com/migshaw03/MetaAMRplus
  license: MIT
  summary: "MetaAMRplus: AMR + metal resistance + co-localisation analysis"

extra:
  recipe-maintainers:
    - migshaw03
