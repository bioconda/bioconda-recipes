{% set version = "3.0.0" %}

package:
  name: sharkmer
  version: {{ version }}

source:
  url: https://github.com/caseywdunn/sharkmer/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e195597b64644bd33126966de84c89b963c1680e77b776e40f21246a8e4a5424

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('sharkmer', max_pin='x') }}

requirements:
  build:
    - {{ compiler('rust') }}

test:
  commands:
    - sharkmer --help
    - sharkmer --version
    - sharkmer --list-panels
    - sharkmer --cite

about:
  home: https://github.com/caseywdunn/sharkmer
  summary: "Kmer counter and seeded de Bruijn graph assembler for in silico PCR and genome size estimation"
  license: MIT
  license_file: LICENSE

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - caseywdunn
