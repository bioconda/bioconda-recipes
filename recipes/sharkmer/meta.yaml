{% set version = "2.0.0" %}

package:
  name: sharkmer
  version: {{ version }}

source:
  url: https://github.com/caseywdunn/sharkmer/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 65d97d5e62f115198025089fd2e95f0954ed8b680a89e150fd87e99e5c6809cb

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('sharkmer', max_pin='x') }}

requirements:
  build:
    - {{ compiler('rust') }}

test:
  commands:
    - sharkmer --help

about:
  home: https://github.com/caseywdunn/sharkmer
  summary: "Kmer counter and seeded de Bruijn graph assembler for in silico PCR and genome size estimation"
  license: MIT
  license_file: sharkmer/LICENSE

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - caseywdunn
