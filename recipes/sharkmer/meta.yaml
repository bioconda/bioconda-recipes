package:
  name: sharkmer
  version: 1.0.1

source:
  url: https://github.com/caseywdunn/sharkmer/archive/refs/tags/v1.0.1.tar.gz
  sha256: 7fd9ffdcea8dc7a85ed3759eb51bf9330a1d809a8e2d8a38bbc0bea7667e8b18

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('sharkmer', max_pin='x') }}

requirements:
  build:
    - {{ compiler('rust') }}
    - cargo-bundle-licenses

test:
  commands:
    - sharkmer --help

about:
  home: https://github.com/caseywdunn/sharkmer
  summary: "Kmer counter and seeded de Bruijn graph assembler for in silico PCR and genome size estimation"
  license: MIT
  license_file:
    - LICENSE
    - LICENSE.dependencies.json

extra:
  recipe-maintainers:
    - caseywdunn
