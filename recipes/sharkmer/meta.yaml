{% set version = "3.1.0" %}

package:
  name: sharkmer
  version: {{ version }}

source:
  url: https://github.com/caseywdunn/sharkmer/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 1cd6ff1f90d4028c288030a9dbc86f88a7181b48180249997740df8fb4da3609

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('sharkmer', max_pin='x') }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}

test:
  commands:
    - sharkmer --help
    - sharkmer --version
    - sharkmer --list-panels
    - sharkmer --cite

about:
  home: https://github.com/caseywdunn/sharkmer
  summary: "Kmer counter and seeded de Bruijn graph assembler for in silico PCR and genome size estimation"
  license: MIT
  license_file: LICENSE

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  recipe-maintainers:
    - caseywdunn
  skip-lints:
    - compiler_needs_stdlib_c
