{% set version = "0.14.0" %}

package:
  name: alevin-fry
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("alevin-fry", max_pin="x.x") }}

skip-lints: - compiler_needs_stdlib_c

source:
  url: https://github.com/COMBINE-lab/alevin-fry/releases/download/v{{ version }}/source.tar.gz
  sha256: e21ce5d3507c152af6e91548687290e3676f13a55cc49c806c722bcff823df3f
  #patches:
  #  - use-libradicl-0.8.2.patch

requirements:
  build:
    - {{ compiler('rust') }} 
    - cmake
    - autoconf
    - make
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - pkg-config
  host:
  run:

test:
  commands:
    - alevin-fry --help

about:
  home: https://github.com/COMBINE-lab/alevin-fry
  license: BSD 3-Clause
  license_file: LICENSE
  summary: alevin-fry is a tool for the efficient processing of single-cell data based on RAD files produced by alevin

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
