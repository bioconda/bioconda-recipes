{% set version = "0.9.0" %}

package:
  name: lexicmap
  version: {{ version }}

source:
  url: https://github.com/shenwei356/LexicMap/archive/v{{ version }}.tar.gz
  sha256: 977a8fdb86a8ed5e8304b89d5a432536e3c42681edb5b9e3018e687be59d918f

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('lexicmap', max_pin='x.x') }}

requirements:
  build:
    - {{ compiler('go-nocgo') }}

test:
  commands:
    - lexicmap version

about:
  home: https://github.com/shenwei356/LexicMap
  summary: efficient sequence alignment against millions of prokaryotic genomes
  license: MIT

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - should_be_noarch_generic
    - should_not_be_noarch_source
