{% set name = "PlasmidCommunity" %} 
{% set version = "1.0.0" %}

package:
  name: plasmidcommunity
  version: 1.0.0

source:
  url: "https://github.com/wuxinmiao5/PlasmidCommunity/releases/download/v1.0.0/v1.0.0.tar.gz"
  sha256: "2a011ce7693227fc27579e58929b992fefbb3d46412cbaa9f342e0f4ea5e1c7a"

build:
  number: 0
  noarch: generic
  run_exports:  
    - r-base

  # script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv  # Python 包的安装命令
  # 如果非 Python 包，可能需要改为：
  # script: make install  # 或其他构建命令

requirements:
  host:
    - r-base
  run:
    - r-base
    - r-tidyverse
    - r-readr
    - r-readxl
    - bioconductor-biostrings
    - r-seqinr
    - prodigal
    - fastani
    - blast >=2.1.2

test:
  commands:
      - PlasmidCommunity/plasmidcommunity.sh --help
  #   - echo "hello world"

about:
  home: "https://github.com/wuxinmiao5/PlasmidCommunity"
  license: GPL-3.0
  summary: "PlasmidCommunity: A Software Suite for Klebsiella pneumoniae Plasmid Classification Framework, Assignment, and Transmission Risk Prediction"
  doc_url: "https://github.com/wuxinmiao5/PlasmidCommunity/blob/main/README.md"
