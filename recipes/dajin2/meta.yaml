{% set name = "DAJIN2" %}
{% set version = "0.9.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dajin2-{{ version }}.tar.gz
  sha256: dda85ad49a78270e321a39e8464cd4222bd20619268480cce8d5966d1000b7f5

build:
  entry_points:
    - DAJIN2 = DAJIN2.main:execute
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('dajin2', max_pin="x.x") }}

requirements:
  host:
    - python >=3.10,<3.13
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=3.10,<3.13
    - mappy >=2.24,<3.0.0
    - pysam >=0.21.0,<1.0.0
    - numpy >=1.24.0,<2.0.0
    - pandas >=2.1.0,<3.0.0
    - scipy >=1.10.0,<2.0.0
    - plotly >=5.19.0,<6.0.0
    - openpyxl >=3.1.0,<4.0.0
    - rapidfuzz >=3.6.0,<4.0.0
    - scikit-learn >=1.3.0,<2.0.0
    - flask >=2.2.0
    - waitress >=2.1.0
    - jinja2 >=3.1.0
    - cstag >=1.0.0
    - midsv >=0.13.1
    - wslpath >=0.4.1

test:
  imports:
    - DAJIN2
  commands:
    - DAJIN2 --help

about:
  home: "https://github.com/akikuno/DAJIN2"
  summary: "One-step genotyping tools for targeted long-read sequencing."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/akikuno/DAJIN2"
  doc_url: "https://github.com/akikuno/DAJIN2/blob/{{ version }}/README.md"

extra:
  recipe-maintainers:
    - akikuno
