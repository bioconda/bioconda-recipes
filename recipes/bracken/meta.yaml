{% set name = "bracken" %}
{% set version = "3.1.1" %}
{% set sha256 = "9f58917f5ce94270f890e67b15e0fa69d796095d452c5fd769e20e469bc81cfa" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/AnthonyPiot91/Bracken/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}
  patches:
    #- osx.patch  # [osx]
    - py3.patch

build:
  number: 0
  skip: True  # [osx and x86_64]
  run_exports:
    - {{ pin_subpackage('bracken', max_pin="x") }}

requirements:
  build:
    - {{ compiler('cxx') }}
    - make
  host:
    - llvm-openmp  # [osx]
    - libgomp      # [linux]
  run:
    - python
    - kraken2

test:
  commands:
    - bracken -h
    - bracken-build -h
    - est_abundance.py -h
    - generate_kmer_distribution.py -h
    - kmer2read_distr --help
    - combine_bracken_outputs.py -h

about:
  home: https://github.com/AnthonyPiot91/Bracken
  description: This build uses a temporary fork (https://github.com/AnthonyPiot91/Bracken) including a bugfix not yet merged upstream (https://github.com/jenniferlu717/Bracken)
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: 'Bracken (Bayesian Reestimation of Abundance with KrakEN) is a highly accurate statistical method that computes the abundance of species in DNA sequences from a metagenomics sample.'
  dev_url: https://github.com/jenniferlu717/Bracken
  doc_url: https://github.com/jenniferlu717/Bracken/blob/v{{ version }}/README.md

extra:
  additional-platforms:
    - linux-aarch64
   # missing perl-list-moreutils-xs, perl-io-compress and rpsbproc for osx-arm64
   # - osx-arm64
  identifiers:
    - biotools:Bracken
    - usegalaxy-eu:est_abundance
    - doi:10.7717/peerj-cs.104
