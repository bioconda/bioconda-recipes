{% set name = "cnmf" %}
{% set version = "1.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cnmf-{{ version }}.tar.gz
  sha256: 0cbf42009399106874aafc888331baa811b129c12119bb942a23e885575e46a4

build:
  number: 0
  noarch: python
  entry_points:
    - cnmf = cnmf:main
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  run_exports:
    - {{ pin_subpackage('cnmf', max_pin="x") }}

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - scikit-learn >=1.0
    - anndata >=0.9
    - scanpy
    - pandas
    - numpy
    - fastcluster
    - matplotlib-base
    - palettable
    - scipy
    - pyyaml

test:
  imports:
    - cnmf
  commands:
    - cnmf --help

about:
  home: https://github.com/dylkot/cNMF
  summary: "Consensus NMF for scRNA-Seq data."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/dylkot/cNMF

extra:
  identifiers:
    - doi:10.7554/eLife.43803
