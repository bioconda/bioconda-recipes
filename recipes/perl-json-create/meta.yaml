{% set name = "perl-json-create" %}
{% set version = "0.36" %}
{% set sha256 = "3adb7e599e328397c5b9c00d6b1320a4c0b42217a0df4257d574b6021673cc49" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://cpan.metacpan.org/authors/id/B/BK/BKB/JSON-Create-0.36.tar.gz
  sha256: {{ sha256 }}

build:
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}
  number: 0

requirements:
  build:
    - make
    - {{ compiler('c') }}
  host:
    - perl >=5.26.2
    - perl-carp
    - perl-extutils-makemaker
    - perl-unicode-utf8
    - perl-json-parse >=0.60
    - perl-file-spec
    - perl-file-temp
  run:
    - perl >=5.26.2
    - perl-carp
    - perl-json-parse >=0.60
    - perl-unicode-utf8 >=0.62

test:
  imports:
    - JSON::Create

about:
  home: http://metacpan.org/pod/JSON::Create
  license: perl_5
  summary: 'fast, minimal, UTF-8-only serialization of data to JSON'

extra:
  # osx-arm64 is erroring due to missing perl-encode in conda forge
  additional-platforms:
    - linux-aarch64
