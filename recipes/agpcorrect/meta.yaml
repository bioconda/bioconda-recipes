{% set name = "agpcorrect" %}
{% set version = "1.0.7" %}
{% set sha256 = "4f72aca0851a20c1d537163e040a7c589d9be9211a378a1e83510f33e542f2bd" %}
package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sanger-tol/PretextView/archive/refs/tags/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python

requirements:
  host:
    - python >=3.8
    - pip
    - biopython >=1.78
  run:
    - python >=3.8
    - biopython >=1.78

test:
  commands:
    - AGPCorrect --help

about:
  home: https://github.com/sanger-tol/PretextView
  license: MIT
  license_family: MIT
  license_file: LICENCE.txt
  summary: Correct AGP files for sequence length discrepancies
  dev_url: https://github.com/sanger-tol/PretextView/blob/master/AGPCorrect