{% set version = '1.2.8' %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-genekitr
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/genekitr_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/genekitr/genekitr_{{ version }}.tar.gz
  sha256: d07fb367051f91e2ee3ea10608f64893a6ded4f9ce868fc4866f7d499ef91212

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'        # [win]
    - '*/Rblas.dll'    # [win]
    - '*/Rlapack.dll'  # [win]
  run_exports:
    - {{ pin_subpackage("r-genekitr", max_pin="x.x") }}

requirements:
  build:
    - {{ posix }}zip               # [win]
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
  host:
    - r-base
    - bioconductor-clusterprofiler
    - r-dplyr
    - r-europepmc
    - r-fst
    - r-geneset
    - r-ggplot2
    - r-ggraph
    - r-ggvenn
    - r-igraph
    - r-magrittr
    - r-openxlsx
    - r-rlang
    - r-stringi
    - r-stringr
    - r-tidyr
  run:
    - r-base
    - bioconductor-clusterprofiler
    - r-dplyr
    - r-europepmc
    - r-fst
    - r-geneset
    - r-ggplot2
    - r-ggraph
    - r-ggvenn
    - r-igraph
    - r-magrittr
    - r-openxlsx
    - r-rlang
    - r-stringi
    - r-stringr
    - r-tidyr

test:
  commands:
    - $R -e "library('genekitr')"           # [not win]
    - "\"%R%\" -e \"library('genekitr')\""  # [win]

about:
  home: https://www.genekitr.fun/
  license: GPL-3.0-only
  summary: Provides features for searching, converting, analyzing, plotting, and exporting data
    effortlessly by inputting feature IDs. Enables easy retrieval of feature information,
    conversion of ID types, gene enrichment analysis, publication-level figures, group
    interaction plotting, and result export in one Excel file for seamless sharing and
    communication.
  license_family: GPL3
  license_file:
    - '{{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3'

extra:
  recipe-maintainers:
    - conda-forge/r

